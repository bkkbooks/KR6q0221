body:
  text: 門人大庚大斧大中大康較普説天臺植聖寺開戒上堂普説拈香云此一瓣香不是尋常所有即我盧舍那佛於心地初發心中一毛頭許已曾熏遍法界所謂當當常有因故當當常住法身有緣非無因故念念不去其心我今登此金剛寶座將此五分法身之香供養本師盧舍那如來及千華臺上百億釋迦世尊十方三世諸婆伽梵當來下生彌勒尊佛大智文殊師利菩薩優波離尊者與西天東土前傳後受諸大律師南山聖祖雲棲大師鵝湖大師及諸護戒護法八部聖衆即此真香普同供養此一瓣香雖受國王水土實乃劫外靈根今日山僧傳持無上戒法先當恭祝皇帝萬壽天地合符文武共秉忠貞兵氣銷為日月風雨時若五榖豐登此一瓣香靈山親囑隨處流芳奉為本山護法生生常現密嚴身處處同成功德聚此一瓣香果然太煞分明正要知其所自某十八年前曾於博山堂上親得聞此消息今日天臺座上傳此戒法不敢自昧來因特拈出供養本師博山堂頭無異大和尚用酬戒法之恩遂斂衣就座維那白椎竟師召大衆云今日山僧升此寶座且道是慶讚我佛生辰耶是薰發汝等戒性耶若謂慶生授戒無非皆為此事秪如悉達太子未入母腹之時汝等以何日為降生之辰以何人為得戒之師若於此薦得則壁立萬仞頂天立地去也又何容彼㘞地才生小孩子稱尊作大目空世界旁若無人者而從其乞戒也哉雖千載之下有子孫如雲門者欲一棒打殺貴圖天下太平爭奈賊過後張弓乎即如諸方叢林四月八日莫不浴佛慶讚以此激揚諸佛出世遮段因緣且道太子初生既有如此奇特不知當時淨梵王與摩耶夫人及迦毗羅國人民皆見否若見則人人皆當頓悟去也又何待臨涅盤後復升忉利為母説法哉若不見也是靴裏動指是誰為他盟證彼且如何才沾乳臭復自迷失本來而娶妻耶輸陀羅生子羅睺羅至遊四門觀生老病死等苦乃大驚畏夜半踰城出家雪山六年苦行又復於臘月八夜始觀星悟道大叫奇哉又復現千丈盧舍那身於華藏世界説華嚴圓頓之法又復於摩醯首羅天宮説此梵網心地戒品乃至説法四十九年談經三百餘會繇是觀之亦無非描寫注腳初生指地指天稱我獨尊遮一段事至於末後拈花教外別傳付矚摩訶迦葉亦不過心心相傳密密印證此指地指天之前遮段消息也所以盧舍那佛自説心地初發心中當當常有因故當當常住法身者正是如來親口直説此心地中當當見性成佛之妙旨非所謂戒光從口出光告千華上佛哉若於此會得則知世尊著衣持鉢乞食而歸須菩提冷眼覷破大叫希有如來以此付囑護念應如是住如是降伏其心與迦葉破顏微笑與指天指地皆無差別大衆汝等既求我受菩薩大戒正是上承佛化下度群生之時若不於此發明盧舍那佛心地發心當當常住之因及我佛初生指地指天及著衣持鉢之事與拈花付囑之事不特非真佛子非真受佛戒非真入佛位非真代佛揚化且不知自己性命落處終日業識茫茫無本可據又安知自皈依之當當常住法身哉又安可以令一切衆生皆知所自皈哉大衆從今已去當知我所示之當當戒本須向父母未生前冷眼看破始知日用當當皆是盧舍那佛心地所現之事所謂一切是情是心皆入佛性戒中蓋心外無戒戒外無心你諸人會麼宗我等云今日諸弟子不知夙生何幸得聞和尚如是指示敢問千華臺畢竟當當所為何事師震戒尺一聲下座庚辰建安王修源殿下請秉寧古上藍寺上堂普説師升座拈香云此一瓣香瞻仰有分讚歎無窮祝延皇帝聖壽伏願一人有慶萬國咸寧此一瓣香專奉建安國王莊嚴福智振祖機以弘聖道開真智以利群情此一瓣香覿面無私當機不昧穿過馬祖大師鼻孔透過壽昌東苑眼睛念茲慧命懸絲特此酬報法乳維那白椎師舉袖云諸仁者會麼昔日世尊於靈山會上親自拈出示衆獨迦葉尊者領悟微笑故得傳此直指人心見性成佛之宗又以此付囑諸大菩薩於十方剎土示現國王宰臣長者居士等身而為內外法護使此慧命流通不盡傳至西天二十七祖般若多羅尊者遙見震旦神洲有大乘氣特囑達磨大師云汝於此方有大法緣後來獲菩堤者不可勝數二百二十年後林下有一人當得道果聽吾讖曰震旦雖闊無別路要假兒孫腳下行金雞解銜一粒粟供養十方羅漢僧此正讖十邡馬大師也後六祖亦囑南嶽云汝後當出一馬駒踏殺天下人果於磨磚成鏡良駟窺鞭而馬祖大興洪都與石頭大興南嶽於是江西湖南二支分派五焰分燈天下宗風獨盛於此直至宋元之末祖燈寂寥近世幸我壽昌先祖突出大好山法乳橫流為博山東苑二先師以及山僧前年因李冢宰黃司理劉尚寶諸公請住匡山圓通乃有廬嶽之舉今過洪都果見有大乘氣幸建安殿下不忘付囑特請山僧開堂於永寧古上藍寺重新提唱馬祖向上宗風且道向上宗風如何提唱復舉袖云若於此薦得便當與佛祖把手並行其或未然更與通一消息乃書圓相云會麼天得此以清地得此以寧帝王得此以參天地之精公侯得此以輔日月之明仲尼得此以始終條理集群聖之大成老聃得此以常無常有合衆妙而無名釋迦得此以指天指地等法界而證盟達磨得此以一花五葉傳心法之繩繩馬祖得此踏殺天下龍象皆驚石頭得此以滑殺天下海嶽俱靈溈山得此以撥出星火而蟲木發熒臨濟得此以悟無多子而鬚尾雙擒洞山得此以邈秪遮是而渠我相應雲門得此以拶斷秦鑽而拄杖直行法眼得此以心石撲落而法界崢嶸壽昌得此透過大好而曹洞中興東苑得此以一枝橫出而萬物敷榮圓通得此以一聲㘞地而今古齊轟且道今日始終全提一句又作麼生復打圓相云一氣不言含有象萬靈何處謝升平珍重僧問法王與國王説法意旨作麼生師云龍袖拂開全體現象王行處絶狐蹤僧擬再問師震聲一喝下座黃檗堂中因事普説師曰佛昔嘗轉差僧看病非獨愍彼苦也欲藉病以省發未病者耳如洞山所謂老僧看他有分也須親自決擇始得你且看他未病時與我同此行住坐臥説會説能不背降心自求徹底受用及一朝病發卻自錯亂毫無一法相應自作主宰不得蓋人人有箇幻化空身雖無作者受者而彼四大毒蛇偶然觸發互相凌噬乃至五陰熾盛八苦交煎轉不能自治也既見如是何不平時早求一箇徹底受用聻自在曰堂主無緣特地病發不得徹底操持師曰彼緣更勝直下便討證驗也汝等於此參究如習武藝人著不著不見利害彼今已到教場操練便比尋常手段不同蓋參禪原為敵病患了生死而發鋭也今遇病小試耳若值閻羅大王下戰書時符到奉行便不顧性命始見真本事也雖然千兵易得一將難求所謂一將功成萬骨枯亦要他素有此種性耳復進語云謾説了生脫死秪如某等在此堂中全不覺察自己是非偏去簡點他人過失如某人好説欺心話某人惡人巡昏沉某人粗糙出入不循規矩某人慣觸惱人身語意業令大衆不得安意參究如此人者和尚必須以擯罰從事始得師笑曰來説是非者便是是非人雖然此靈山會上不能無者爭怪得你此正汝等承佛祖祕密威力熏發積集之種子也所謂爐鞴鍵鎚正欲使你變化習氣脫胎換骨切不可輕易磋過試問汝等尋常住靜未入叢林誰見得你等虛憍愛著有如是乎你底散亂昏沉有人肯警策汝乎你底執計疑難有人指摘剖決汝乎天下名山有幾處叢林為參禪爭性命者乎你出了此堂更無人見你過也噫你見戲劇麼尼姑下山遇一僧偷目看他尼曰遮比丘如何看比丘尼彼僧乘其機曰遮尼子你不看我爭知我看你即此便是古今人境是非之緣起也世間豈有人境是非為孤起之能所哉皆是人自招架耳彼之伎倆有盡我之不采無窮木人看花鳥有何心境可惱亂哉雖然此猶是石壓草語未是發藥病語不見釋迦文佛恰遇提婆達多為彼發藥也耶故曰我非提婆達多善知識安得疾成此莊嚴無上佛菩提哉你謂某人能觸人無明惱亂人身心我謂你等尚未有真對頭在所謂棋逢敵手見高著將遇神兵顯異謀汝等如此根解正汾陽所謂間神野鬼不消數杯酒幾陌紙錢斷送他千萬里外去也安得我此堂中有彼提婆達多作首座善星比丘作西堂障蔽魔王作後堂那吒太子作堂主摩登伽女作悅衆寶蓮香比丘尼作侍者維摩不二開士及華嚴諸善知識作鄰對單令十方邪外為值日服事則我等有此一會不消歷三大阿僧秪劫而頓證法身亦不消承事無邊剎海而偏證三昧也何故十世古今不離當念一念看破事事圓融看得破看不破燈籠露柱一齊懡㦬將謂捨此衆生無明業識別有所謂妙湛總持乎我但恐你發不起此業識耳真發得起如敵勝怨匹夫一呼出入九軍龍象蹴踏信非驢所能堪也若捨一法不明滿足菩提八萬塵勞門開則八萬種種智門開矣上根聞此一了則一切了如金剛慧心頓發則根本無明化為寶覺真心若彼初心別學不免經一事長一智入一地斷一惑若不反轉刀頭去性命上拶入卻在塵情上分剖何異欲入舍元殿人反向長安城外打之繞何日夢見根本無明之妙覺又何日到百尺竿頭更進一步哉汝知無明與佛性是一是二麼衆禮拜師復云我也是為他間事長無明亦但願你大衆向沒孔鐵鎚裏盡底發起遮根本無明一椎粉碎我當為汝助喜也圓通上元滿期劍峰時禪人設供請上堂普説師擊如意云看憍陳如尊者來也請向東邊立著你尊者最初聞佛聲教而悟道畢竟道如何悟試舉似圓通為汝證據看大迦葉尊者來也請向西邊立著你尊者末後明佛心宗而傳法畢竟法如何傳試舉似圓通為汝證據二尊者大笑曰你圓通無乃太過高乎我等悟道傳法已有世尊證據自茲以降一皆取證我等你何人生於末法之世自稱全提佛祖號令踞坐匡嶽之廬大開爐鞴鉗鎚煆煉天下英傑即令結制三月你曾激勵幾衲子有省發聻我等正來為汝證據你若刀錐不密鈍置學人大言不慚全無的實我將為汝倒斷去也知麼圓通儼然而笑曰噫今日當仁不讓即三世諸佛且立下風況你二尊者乎你尊者且看圓通底作略也乃震聲云衆中有真師子兒麼出來為我與二尊者打箇開交僧才出師便喝僧頓足師吒云短販樵人徒誇書劍僧拂袖一匝師云逐塊村龐又僧出問龍鳳呈祥時如何師云我遮裏未足貴進云獅子出窟時如何師云打折你驢腰進云人人氣宇如王那箇是當家種草師云三千劍客今何在僧擬議師大喝云速退又僧才出問師便喝僧便禮拜師云草賊大敗復問衆中有真能出手眼者麼良久云特地一場翻成敗闕雖然我更須問尊者我佛出世幾年四十九年説法幾會三百餘會得道證果者幾人如我潛修密證者不計其數得如來正法眼藏者幾人獨遮迦葉一人靈山百萬人天如何獨彼一人當機領旨元自希奇圓通乃解顧曰夫如是則爭怪得我圓通耶如我世尊現法界身説稱性法而座下猶如盲聾遮箇消息何曾夢見次至鹿野苑示應劣身秪為你憍陳如五比丘輩略施方便次千方等曲唱傍敲沿及楞嚴選擇圓通本根未免依義説解向上玄關總未踏著復次般若乃淨洗幾微當法華時始付家業然其無上寶藏猶未分疏得下逗到末後於靈山拈花方得付囑你迦葉一人嗣及達磨航海西來九年面壁服毒六遭秪得半臂神光所以傳此法者命如懸絲迄至我今誠如所言生於末世法弱魔強人多癡怠戒律未能精持經論無因深究若非夙根利智到此總須茫然我又何人安敢以佛祖慧命自欺欺人而令後昆如彼童子聚沙為栗以輕心慢心高自許可而為彼證據者哉我寧可身陷泥犁終不以此互相孤負也二尊者相與浩歎曰善哉希有我此如來正法眼藏有所付囑也你請速歸鹿野苑我仍捧金襴袈裟立於雞足山中以待彌勒下生也我圓通大愧曰今日屈尊慶幸不小敢伸一偈奉為餞別偈云相將攜手思何窮感觸之機趣轉濃解釋春風無限恨靜依石耳一叢叢珍重闃然大師請上堂普説時值武林雪閞和尚有書并語録至師將升座鐵雲把住云把斷聖凡路頭時請師速道師劈頭便打雲又把住師又打云觸犯當頭遂升座又出問黃龍峰毒鼓才撾選佛場阿誰得中師云不用命者雲禮拜起一喝師云瞎漢進云無位真人是如何師云誰與你分疏進云也具一雙眼師云且放汝三十棒著雲禮拜云要大衆證據白椎竟闃然大師出啓請曰四方雲集海衆臨筵懇請慈尊為衆普説作人天之眼目為萬古之洪規師召云大衆見古佛現前放光麼三世諸佛為一大歡喜因緣出現於世以種種方便譬喻言辭欲令一切衆生開示悟入佛之知見生大歡喜自知作佛所以世尊乘歡喜緣故降神母胎已作佛事何等歡喜於無憂樹下左脅出生便稱天上天下唯吾獨尊何等歡喜直至雪山鬚髮自落六年苦行泯絶身心夜半觀星豁然大悟曰奇哉一切衆生皆具如來智慧德相但因妄想執著而不證得我今既悟當令彼證何等歡喜乃干菩提樹下成等正覺降伏魔軍制諸外道何等歡喜於是不動寂場示現盧舍那身十方塵剎主伴交參同證華嚴一真法界何等歡喜復卸珍御上服現丈六化身於鹿野苑説阿含教化度人天小乘何等歡喜復於方等彈偏吒小歎大褒圓令諸二乘漸入佛慧何等歡喜復於般若陶汰諸根純一清淨妙入醍醐何等歡喜乃至法華會權歸實大暢本懷一切授記皆得作佛交付家業各有所歸何等歡喜末後於靈山會上多子塔前拈花示衆迦葉破顏以正法眼藏涅槃妙心付囑與摩訶迦葉復以金襴袈裟命向雞足山中以待彌勒下生佛佛授受法法親傳何等歡喜至是始欲涅槃能事已畢無佛可成無生可度誓願已滿撒手跋提何等歡喜佛有金剛舍利付諸羅漢等有大律藏付優波離等有大經藏付阿難陀等有大論藏付迦旃延等有大法藏教外別傅獨付迦葉傳佛慧命久住于世不令斷絶何等歡喜嗣是迦葉阿難以親兄親弟一呼即諾密相付囑推倒剎竿何等歡喜乃至西天心心相傳次二十八祖達磨大師觀此方有大乘氣特特西來為法求人面壁于嵩山之下六遭忍受毒害九載始遇神光斷臂安心傳佛心髓何等歡喜至于三祖覓罪相不可得四祖求解縛不可得五祖求老少不可得六祖求一物不可得乃知機緣會遇命如懸絲性相宛然本自清淨何等歡喜至是一枝橫出得道如林南嶽青原兩宗特異南嶽腳下出一馬駒踏殺天下人青原腳下出一石頭滑殺天下人何等歡喜至于溈山之寒灰發焰臨濟之直捋虎鬚洞山之睹影逢渠雲門之出身象骨法眼之一切現成遂為五大宗祖何等歡喜乃至一千七百全機大用妙唱玄通列焰分燈光天照地何等歡喜迄我壽昌先祖親悟惟寬之好山中興曹洞之正脈宗風大振法慧橫流乃有博山東苑二先師如南嶽石頭之嗣曹溪何等歡喜博山已有我雪關法兄震吼于東浙聞谷大師偕古德諸公請雪關闡法於雲棲先祖之古剎東苑有我不肖道盛蹴踏於江西師伯闃然大師偕諸山法屬推不肖主法於壽昌先祖之禪林天下見聞無不歡喜曰聞谷闃然二大師真古佛再來也本高迹下屈尊就卑向高高峰頂立於深深海底行向深深水底行於高高峰頂立於此二師觀之乃知古風不墜至於正偏兼帶賓主協通類之不齊混則知處深明寶鏡三昧大興曹洞宗風豈非千古希奇萬世標榜之一大歡喜因緣哉只如闃大師為衆請新壽昌升堂普説畢竟千聖不傳密付不絶一句作麼生道聻良久以如意繞三匝云大衆歡喜下座雲棲掃塔徐大玉吳若谷徐九知張顧存嚴認公嚴無敕宋孔章王昭平洪載之方子凡姚愚谷龔華茂宋子野姚期兩嚴子餐沈冠東錢亢子王以中洪玉衡諸居士并耆舊行素了幻幻成無住蘊玄善徵等請上堂普説師打圓云向上一路千聖不傳末後牢開直須親到達磨大師特來東土遇梁武帝不契即渡江於少林面壁此時震旦義學相高多滯名相驚見斥相指心不能領略輒生嫉害乃至六遭服毒末遇神光安心歸位始付衣鉢并授楞伽經以印心嗣是東土一花五葉偏燦寰區皆是親悟親證始得使此真宗不墜也或謂達祖既以不立文字直指人心何復以楞伽為印乎此正明一切佛語皆以心為宗旨不特楞伽是離文字法如能親悟心印則三藏十二部一切修多羅皆是離文字為宗旨也達祖斥相指心正以彼時教家執著名相不見心宗斥者斥其名相也非斥彼不當開闡教義也如能悟此心宗又何經律論觀淨諸教非直指之妙心哉不見我雲棲太師最初發心即以生死大事而起疑情剃染之後即偏參諸方尊宿嘗於京師參笑巖和上求指示笑巖曰阿你三千里外來開示我我有甚麼開示你時大師言下有省因過東昌聞譙樓鼓聲乃悟其旨作偈曰二十年前事可疑三千里外遇何奇焚香擲戟渾如夢魔佛空爭是與非此後見法門師承大壞參學無真乃大權設教開戒律闡教乘標淨土而歸于心宗世人不知大師悟證之繇以大師乃教中圓人何必捏歸禪宗以亂其統又孰知大師先悟禪宗而後開教海收攝群機消歸正覺之苦心乎世間開戒闡教標淨者甚多未必皆悟道之後設施也獨大師於悟心之後弘法是以説戒戒即金剛戒相也設教教即妙明真心也立論論即直剖宗旨也標淨淨即全提佛心也挽近主法之人孰能如大師真參實悟而後舉揚宗旨振作玄機密用哉今之參學曾起二十年前可疑之事乎曾有於三千里外一聞譙鼓而不疑乎大疑大悟小疑小悟不疑不悟如今人疑也未疑安得有遇而且悟此奇特乎昔雲門湛和上或問中嘗載大師宗門機用甚悉如拈外道問佛空生宴坐公案云若於良久處欲望開迷陰霾萬里宴坐邊擬聞般若説竟多時既然如是鞭頭得指空裏飛花者是箇甚麼參又拈自性西方惟心淨土云若直指自性不但過此娑婆千萬億國土為非也設箇自性已涉程途若實談性心不但寶蓮金地種種莊嚴為非也説箇自心早成垢穢你看大師如此起疑如此參悟如此提宗門向上機緣如此指示惟心淨土此豈與未悟拈心宗而代佛揚化敷文演義者可比擬哉吾大師深念如來一代時教為後世分門別戶互相矛盾之弊故於悟心之後密移一步始能會通佛語諸教而歸于無門法門之心宗也不然達祖只須傳心不必以教為印矣豫小子舌短何足以舉揚萬一但稟承大師法蔭今敬入山掃拜靈塔諸大護法尊宿命登此座辭不獲免強為贅疣慚愧無地還知此一舉揚底意旨麼親到須彌莫問山既遊大海休誇水下座請雪嶠大師主徑山祖庭為衆普説師呼大衆云至道無難惟嫌簡擇但莫憎愛洞然明白從上佛祖出世為人別無奇特直是要人了此分別是非之心則與此道相應何有聖凡迷悟之異哉近世此道寂寥幸雲棲紫柏憨山禹門壽昌雲門博山天童磬山瓶陶諸大老遞相振起今亦取次示滅獨有雪嶠老宿住此徑山靜室三十年來少有知其隱微者如能觀其為人及語録頌古諸作則古峭奇絶處非今人所能及然而奇僻曾不掩也正彼奇僻不掩所以換卻人眼睛鼻孔具眼人乃見其奇不見其僻不知者只見其僻不見其奇此老不合時宜故故如此夫古人之峭絶有人搆得上使此老如汾陽之説夢作祭不將幾杯冷酒幾陌紙錢斷送盡天下之孤魂野鬼乎蓋彼時尚有慈明輩驅奪他不得竟為其嗣今則罕見其儔矣獨怪黃海岸余集生二公偏能知之再三再四欲推出主徑山祖庭惜此主僧不知退讓乃至又請主廬山開先而廬山正值荒亂衲子難尋而此老復歸此山是亦不忍自棄其深根固蒂之地也此中又幾人能知之哉即黃海岸亦但能創發其始事而終不能死生以之成其末後也洪覺範謂張無盡見真淨如葉公好書龍真龍現前則棄而走何以解耶傍觀者清而當局迷耶嗚呼世間求知己豈不誠難乎哉此老惑亂天下人處欲嗣古雲門匡真大師欲矯時弊不知轉甚然有可原者非彼近世絶無師承而強欲嗣古人也此老昔嘗受知於禹門雲棲二大師而二師亦非輕易肯許可人者一乃末後有所付囑一乃已前有所印契況二老皆親承笑巖和尚法脈有自來者也禹門之下有天童磬山是其同參兄弟皆欲推出為人此老倔強掉頭漫罵欲別行一路此其犯人指目又何辭焉禹門雲棲之印可天童磬山之推重此老雖不藉此為重亦足表信于人使其樹高千丈葉落歸根一著終不能不嗣笑巖之下為師承有據也余集老以雪老嗣雲門如壽昌嗣曹洞此又大不類矣壽昌乃廩山之嗣雪老則愛慕雲門宗旨也壽昌因馬祖下與善之大好山而悟道亦可為馬祖法嗣歟然而雪老脫落又妙在末後終不忘所嗣拈禹門香則海內久參衲子皆勃然更仰矣豫亦曾以此意于廬山時達之今復得住此山正欲全其末後大事庶使宗門有公道在亦不致後人效尤亂統也去年遭此一變足見諸護法能別具隻眼用一段苦心為祖庭到此終有一人成就其事是亦因果之不可昧滅也故豫亦感海岸生平為法之心成之于先今豫為彼成之于後使海岸末後更能入勝熱厭足之門則亦不負子與相知之久今來徑山為作祖庭一完局也使豫果不知其為人則不必言矣既知其人而置海內老尊宿于度外不互相激揚而成其事是則為忍心欺法罪人也又安可高坐千峰眼空四海自為人天圭表也哉汝諸仁者幸深念此相贊成之始不負今日親相告報之意
