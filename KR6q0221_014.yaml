body:
  text: 門人大嵩大權大韶大麟較贊三大士贊夢筆山常住請有遮一箇不可無遮兩個恰好三個可以同行同住同坐同臥同做些子事同說些子話試問做甚麼事說甚麼話噫你不是我同流即與你道破又堪作個甚麼又無欺禪人請壁立萬仞石不自知漩復千里水不自疑煙雲生處望者自奇良久云我不欺汝汝無自欺又古拙上座請大千撮來如芥子大拋人面前七奇八怪文殊普賢起佛見法見墮二鐵圍至今莫辨獨觀自在袖手默踞如伏太阿橫截三世咄誰是不用命者便恁麼去又此是何時袖手閒坐一片婆心堪作甚麼若謂救苦尋聲是向外馳求安知掩室面壁非向上墮畢竟如何得箇出身免遭明眼特地勘破又盞子撲落地碟子成七片忙殺小善財百城尋不見遮消息誰能薦黃鶯啼斷洛伽春幾點落花浮水面又姚門方氏清芬閣畫年七十一枯木崖前下毒火五臺路上透金塵赤腳波斯弄明月驚起姑姑似婦人普賢大士飲象圖贊能負願行之奇必濟生死之險鼻孔既由我牽腳跟何妨你轉飲法乳之恩深勞汗血之報顯咄只今是誰具得遮般手眼題達磨大士贊一函未開一鉢未付獨坐堆堆做個甚麼只遮些兒已便惑亂了西天東土又遮箇老臊鬍抱膝坐巖谷眉攢天竺愁眼凝震旦毒不知欲何為咄又流支遇你藥不毒圜通藥毒不遇你如今覓你真裔苗毒死渠則你禍止咄不見道士為知己者死又折蘆渡江時惜不遇黃檗打斷你腳跟何處去作賊遮賊賊那知千載下有人捉得捉得後如何拈拄杖便打云還不知黑白你會折蘆過江我會穿鞋走路捏怪讓你西來安分輸我東土秪有一可疑可恨底緣故害又害不得毒又毒不死卻能使我此土萬世之人不是此悟便是此誤杭州崇先真歇清了禪師贊秀骨挺雪峨於天半丰神拂春曉於眉端空劫全提撩象王鼻孔丹霞一掌奮師子爪牙路轉生機句開活眼七據緇海寶座籠雲五捧紫泥金襴耀日捲洞簾於鶴嶺標宗塔於皋亭燈傳法界真光脈接遮那慧命先壽昌師翁真贊阿呵呵遮老漢究竟你生平吃飯與人一般香屙屎與人一盤臭何故滿天下人個個稱玄贊妙莫是你于世法出世法別有一竅麼噫不是你腳下遮箇兒孫爭解向你面前發遮一笑又面不如翁面心已是翁心雲巖不良久洞山不沉吟睹影逢渠人不識閒聽鳥語落花陰紫柏達觀大師贊有牙如利劍口似血盆之氣概惜無吹滅紙燭者與激揚有肋下築拳面上揮掌之豪雄惜無徹底痛棒者與創發雖則生不逢人然而道已驚世至於重開眼藏為法忘軀此又誰曾不飲其法乳者乎咦雲栖蓮池大師贊全身拶透娑婆不與人共天日拈一句截斷聖凡命根煉百毒消盡古今祕密不是太煞利害正要使冤親打箇生死開交始可同門出入大哉古佛無所不用其極曹溪憨山大師贊長干拔劍五髻搖鈴弄牢山之牙爪激天闕之雷霆蛟龍驚而啓蟄海嶽震而飛腥民其衣而執戟冠其髮以著經重闢南華吹風幡之遠影獨留肉像配祖殿之高楹誰能眼開作天夢之游戲公善憨密發海印之光清東苑老和尚真贊造維摩室覷破佛土皆空過趙州關喝倒壽昌作怪訪大仰幾番盤錯阿兄出東苑一場漏逗故物性情孤僻事跡疏違入夷山而折杖遇浪子而覆舟遁世無依至死絶侶就地草埋誰請塔樣欲見龍眠雲起須聽虎嘯風生天童密雲和上贊遮箇老凍膿還有勘破你生平利害者麼拈一枝杖子幾乎打殺天下人弄一枝拂子幾乎賺殺天下人今日性命果然落在圜通手裏也好與劈頭痛棒三十且道是打殺伊是賺殺伊天下衲子各為伊領去又昔入閩時冤家相遇曾施陷虎之機特驗出身之路要奪你拄杖愈是橫行既罵我懸梁何妨高豎咸驚法戰斬新誰識兵符密御方今欲買棒棒見血之蒿枝切莫錯認遮老橛頭底招牌始得不誤主顧雲門散木澄老和尚真誰射南方一箇兒濺出新豐枝上血石繖驚生散木花妒殘秦望山頭月瞻懸越門獅吼禹穴從斯毒氣不能藏千古冤深難與雪聞谷大師影穎脫窯瓶禿號掌石鬧藍裏抽條冷灰中返擲狹路曾逢渠拶教牛上壁將我鼓山箭上加尖奈棄禹門跳浪一霹顓愚大師像贊稟童真身奮大人志參空印之無文挈清涼之未墜策杖撥天下兩眼自奇退步占寰中四依獨貴半生善病以破情一味平嘗而得意末後振作金陵別有孤光照世三世真贊有引時奇侍者請少林一宗之有洞上至我壽昌此時無此人可乎繼有我東苑而獨有天界此時無此人可乎彼此一時此三人為何人乎吾奇子試自視之知此則千百年前千萬世後更是何人題曰鴆鳥影落水中魚鱉觸之皆死毒鼓聲撾耳外遠近聞者立亡你遮三個老怪物無始積毒犯人此時還曾有佛祖邪魔于名色前殺活裏別有出身路麼喝一喝云收博山老和尚真贊壽昌得箇不肯急水灘頭拋篙藥山無藏身處見人上樹忽號黃金弗與增色打破雪關拴牢活埋天下英雄漢萬里雲霄飛羽毛誰見毛鳳凰山上烈風愈高闃然大師塔上贊鐘聲撞倒金樓月惹得寶方棒幾折低頭誓欲去活埋卻怪杖人輕漏泄以故末後於祖庭結此業到來人剔眉睫黃龍角上弄風光無縫塔前笑不徹鼓山永覺和尚像大好聖箭射透石鼓賺殺太原幾遭猛虎如何影弄鴛湖驚得木人起舞為甚麼起舞只為誤沾著了他的毒蠱天童山翁和上像前天童以一棒撼臨濟復起後天童以三玄振太白高風棒不透玄終非所出玄不透棒將何所宗一任明眼擇其異同吾以心交有在是故獨讓山翁佛日石雨和尚影兄從雪峰輥毬來我往鼓山放箭去恰值黯淡灘頭招手一笑直得船驚目注旋於南屏徑山又隔角相思卻成箇巖頭道底末後句咄且放過遮一著靈巖儲和尚濟下已仆之宗決不可無天童又不可無三峰更不可無未翁如孤賒易於流弊須正遍妙乎協中面門豎亞機如電棒眼三玄活似龍問誰為靈巖知己莫不是栖霞老儂撒真人贊示道人俗號王靈官者嘗聞撒真人誓死學仙道王靈官執鞭隨之以察考伺其一念差鐵鞭擊破腦覷捕歷年多一毫無潦草畏敬而神明身心冰月皎千聖無別傳此鞭須自討黃海岸儀部贊遮一著子誰敢當鋒公能拼命深入吾宗入吾宗何所得卻又能殺能活於世法出世法作白拈賊咄題金正希太史寫大士像觀世音菩薩將錢買胡餅放下手是箇饅頭試問金太史正恁麼時如何著筆速道速道以有叟堂為妙意庵贊有引豫愛陶靖節詩二語妙絶有云汲汲魯中叟彌縫使其淳于此足以想見五柳先生雖不以名教自命其于拈提聖人刻的處若身有之其為住持名教亦大矣唐空翁今之處士也能以名教挽世不辭落草入泥其于性命指歸能決焚舟破釜視其身世已如薪盡而火將別傳得其名教又似薪傳而火愈不盡夫如是無乃將娑婆極樂打成一片就中以金針玉線而彌縫之亦可謂汲汲者矣乃為之贊烏龍之有潭兮何潛見之不可以變通其能用九用六兮何亢戰之不可以始終聞朝夕以知其故兮妙乎環中之道以應無窮吾以是知唐翁之無不可以西東自贊既欲傳我真如何傳我假果然傳我假卻也真脫灑不見龐公一遇馬大師便解將那沒柄笊籮撈盡他天上天下又遮箇半夜教化不知向那裏討彼嗟生不逢時我喜來得恰好不辭從井救人何嫌赴溺援嫂肉白骨須用靈丹醫死馬弗煩本草刀斬刀殺活無痕毒攻毒神奇莫考即有箇絶後重蘇底來應笑他投曉不早又活貓兒叫出怪頭死馬駒踏出奇腹劫火中燒出惡腳涅槃後迸出蠱毒遮裏識得吾真擉瞎佛祖眼目咄又咄遮箇放浪漢五十三年腳不點地圜通選聖未開場會祖圖來百雜碎今住雙徑峰頭亦且不曾發市一片熱心海底燒兩隻冷眼天上視視何意竊笑達磨卻似折本了歸日久收得震旦許多大利噫正當恁麼時我也疑著你又門人竺菴成公請我不假人以顏色阿誰特地能描得饒他良久裏傳來未是雙徑真骨血如何是真骨血自有人常于此切又遮漢於一切法不敢作死看不敢作假看不敢作難看不敢作易看或曰早哩或曰未必或曰恁麼那或曰是甚的或曰我也不知我也不會或曰我恰活卓卓地見得有絶沒交涉底奇特事或曰你還識浪杖人麼有箇曰我也不董得不妨大笑打他一棒曰放過即不可又一生從井救人誰知別有出身卻是難為親近要箇眼裏有筋鎮州蘿蔔休誇大拄杖頭防鱉鼻瞋又門人松影麟公請江南踏白多年灑掃幾成破帚被人描出請題拶得慚無措手昨鬥湊了前後底行跡一篇又何異乎糞穢中再加抖擻立時扯碎焚之掉轉逼墻狗口乃爾大罵你遮松影廝兒何不如他掣風顛子為我打一箇痛快筋斗又舉起筆自題也不難拈起棒打退汝諸人也不難拽破遮軸子便行也不難每日焚香禮拜遮影子也不難直饒能體此老志有大機用建一梵剎如尊正規莊嚴將此供養於正宗堂為創法祖也不難秪是要與此老親相見卻也難噁好貨定要你相見作麼即別有相見處又堪作甚麼不能與你相見又怎生聻呵呵呵秪遮些子便是汝諸人難相見處便是汝諸人沒奈何處可不是難可不是難又天無頭地無腳須彌無腰日月無殼遮條拄杖子一生東敲西磕迫得太虛空大叫冤屈無下落達磨特復來勸言老兄且放遮一線著如我小弟亦聽其得髓得皮又何妨於醍醐毒藥杖人大怒云都是你遮禍殃也放你不過那堪更錯錯錯錯又栖霞然請遮漢一生自強故能眼空膽大有箇沒皮肚皮所以見怪不怪江南將四十年今得兩椿痛快笑公可承我宗攝山可傳我代杖人特地開宗千古破顏有在又涵子請曾上皖江逆煙波而弄棹特登浮渡呵毒霧而驅風去楚之計未成留吳之意有在復來姑孰平陸俄起骨堆笑入圜扉地藏重翻公案不使兩間道沒故令七論聲騰既碩果以天全亦快心于奇遇秪此一段涵子頗知別有風規還須自見又門人大嵩請廬山三百年毒藪死貓頭兒忽開口石耳馬耳峰齊聾驚得西江藏北斗北斗藏消息別峨眉飛來一片雪拄杖頭上叫蒼天觸處難逃此血熱又竹關智請江南三月杜鶻啼血染梅枝日月迷不許夜參先捲席傳薪獨聽旦時雞是何雞天生疾固自栖栖不妨有客能歌鳳笑看河圖出欲齊又少年一味是癡中年一味是迷老年一味是疲不知末後何如切忌道著道得著卻也奇又門人大英請大地噇糟自醉屈指幾個醒人痛口無禪無師忍使千古陸沉故將毒醫死馬別有活法如神莫怪杖頭高遠胡天擊出石麟又門人大補請杖頭擊處無他事卻笑空山呼應多不是緊箍些子密英雄何自出淆訛滿盤誠莫測遮著又如何去住謾勞重劄印碧巖前看鳥銜花又龍門法侄樵風妙請雙徑看竿頭鯉躍南屏笑爐裏雪飛又別十五年移星換斗忽到皋亭仍撞著箇樵採底把住我鈯斧子問歇祖遮具靈骨付與阿誰咄你問是非者卻來惹是非又姑孰火燒裙帶香無驢新婦拖泥走過橋村酒已親嘗拋卻杯兒開笑口此笑口驚星斗皋竿風急閃紅旗齊射鵠心看好手又門人石潮寧請瘦笻曾刺遮那血造論風驚泥鉢沙誰似殷勤奴見婢天光日月兩挨磨今湊拍還唱歌喜看披襴能起舞何妨習氣震山河又門人梅逢忍請馬耳石耳齊聽鼓旻老重來何所補狼藉天花選聖場折半破三誰薦取遮聱頭好講古崇先血掌復開宗喫痛兒孫應作祖又門人阿劍別請霜藤忍俊自相扶勾引春風啼鷓鴣一片韶華間玩弄孰能有也孰能無雙眼碧似愁胡不辭絶倒冰枯處笑看龍巢生鳳雛又侍者大淳請大顛只此一條杖韓公首座兩人扶那弓弦上半箇聖人問我侍者皆嘴盧都豫笑曰莫怪潮州碑上添出焉烏又侍者大勤請從前行了多少不太平路偶又撞到調達埋毒於地藏放珠處拉來較勘各失情由聊與據款且作影嚮衆好警策我執侍之儔又侍者大圓請近視闊步大膽小心不修邊幅自展胸襟就中有不容己此外別無所欽不是同天地混帳安得與古今對針又楚黃弟子大衍請坡詩之竹萌抱靜節是創先句心史之宿火藏永焰是慎後句杖人無善狀衍子為露布又門人巨音選請生平許多將謂就中又或不然正是時機所逗斯道妙乎屢遷吾嘗於此切良久固難傳自笑玄之玄殷勤捲起夜明簾又依杖行者興旭請杖者嘗要箇人向三千里外拔一莖草來即擲卻更命向三千里外取一杯水來即潑卻且道是甚麼意思若有此人他自會得又戒弟子一傑請七尺軀無椰子大往往分身作買賣將本求利沒一文惹下古今多少債還得去真痛快還不去且莫怪又門人協妙權請我亦不知遮廝所以俄然病痛雜然頓起獨與佛魔毒翻終始就裏淆訛不容自己其誰特地不甘一任分明處分你又中塔法孫興越請法界是大家共底誰能去此獨存彼不計有利與無利一任各自做行市西天不知東土屋破看星眠東土不見西天衣穿瘦骨露爭怪異端並起萌蘆笑倒老頑皮儘教邪法難扶拄杖擊翻死獦怛或有覷得遮消息與他八面受敵又門人蒲菴健請遮漢拈條拄杖子作麼不惜從井救人不惜入夜尋人不惜破舌告人不惜刳心示人不惜深責佛聖托重人不惜痛棒古今欺逆人原來是個多不自量人絶不自慚人何物小廝兒乃敢大膽師遮沒蓋載人我也疑你是箇不可測識人佛事安慈氏像甲午博山迎軒坐笑等一箇人卓卓到來是誰最親無筋底眼見你乞一文疑為小利有血底背當機承一掌汗下通身且喜回途復妙草緑花新布袋收歸三會滿龍華放出十分春安迦葉尊者像咄遮箇尊者卻也怪哉靈山會上失笑多子塔前張乖雞足山中鈍置枯木巖裏活埋今日浪杖人推汝出一頭地撥轉天光令汝看取寒潭龍起空劫花開寶方和尚新像開光寶方先祖於少林惟寬禪師大好山一鋤鋤破豁開正眼自是衡鑒天下照耀古今雖則滅度有二十年而元肅等重建祖堂重新祖像主氣儼然如當機呵佛罵祖時也今值開光之日命法孫道盛為先祖點眼盛大笑曰先祖眼在何處是豈我之所能點哉雖然眼以血能視手以血能捉先祖雖已滅度遮一點真正血脈卻在我手裏我若不分明點出孰能見我先祖常住法身光明法眼之不昧滅哉乃舉筆示云會麼正法眼向瞎驢滅祖師心從夢筆傳為憐覿面無人識點出雙輪照地天徑山掛鐘板拈鍵鎚示云會麼未入堂前腳跟下好與一鎚既入堂後頂門上好與一鎚進前燒香禮拜兩班依位而立腦背後好與一鎚若向遮三鎚下薦得便知汝等安身立命去處更須遮裏有個出身活路方可到我方丈中喫棒為汝撥轉向上關捩子雖然也須為汝等通個消息乃付鎚與維那擊鐘板一下復云會麼千聖不傳真祕旨當機一震定乾坤崇先挂鐘板拈圜板示云會麼次舉椎云看十方無壁落四面亦無門圜陀陀光爍爍誰敢向遮裏觸背無情說法脫賺洞山開眼尿床驚翻臨濟沒巴鼻漢漫坐瞞頇門裏出身不易身裏出門猶難驀然創發鐵牛機突出摩醯三隻眼到遮裏更須知有全放全收底殺活鍵鎚在今特分付西堂為衆竭力堂擊鐘板各一聲師復云是甚麼一擊拶開無縫鏬大千迸出不傳機送老和尚神像入師表堂甲午博山坐久不成勞機來還湊巧儼然良久時神彩真師表請你沙老師移過胡床踞斯晝錦堂中捲起夜明簾子一雙碧眼靜看月上花稍鳥啼春曉最奇是繞砌金蘭浥露香盈庭玉樹臨風皎想你沙老師當此時豈不點首笑曰不期你遮放浪子乃能位置得我如此恰好送真歇祖真像入師表堂云看左綿雍氏生祖身丹霞淳翁發祖神萬世兒孫續祖命今日曹華公供祖真儀保嗣慧命正是火有薪而愈傳法得人而益遠只如顯孝重興歇祖出現又作麼生稱慶多子堂前分覺胤千華叢裏擁優曇祖師堂告香甲申西天東土與本山八十七個沒孔鐵鎚今日還欲向新長老如意子頭上求出氣麼你要求我為你出氣須我後來人登你向上位龍王堂告香退己讓人地步深遠付囑靈山內祕外顯海底生塵山上魚萬古宗風因你闡韋馱告香匹夫橫行聖人所恥眼光爍破四州豈肯一隅自委權在手已非一朝令能行乃見風旨禮開山國一欽禪師甲申徑山牛頭一枝賴師拔起無法可傳遇徑則止試巾子山人喝石以救佛法之危見代宗皇帝立身而啓龍顏大喜點開馬祖圜機惑亂天下無已禮第二代無上忠禪師塔國一宗風因公大振白日雷轟獅子奮迅兩賜紫衣天子尊千古嘗光無上印秪今印在那裏彈指云遮裏驗取禮大慧杲禪師塔眉間掛劍血濺梵天平地骨堆千古含冤瞎臨濟小廝兒法眼吐圜悟老巴子狐涎今朝撞著對頭頂門痛與加尖咄禮元叟端禪師塔遮破坐具能展能收三十痛棒迥出常流兩被金襴眼睛突出重振妙喜宗風高懸雙徑佛日禮達觀可大師塔舍己求人忘軀為法剖正眼藏照十方剎無影樹下誰同船鵬搏峰前逢老達相逢時如何以手捉云鼻孔拈來阿剌剌禮鳥窠道林禪師塔類不齊混知處凡聖位中留不住隨緣寄跡鳥窠賺殺鬼家活計白侍郎到遮裏始驚坐鎮江山有薪火之危通侍者十八年乃悟欲參諸方求佛法之意悟個甚麼聻布毛拈起一吹三藏十二部千七百公案都被無影樹頭風吹去吹到那里去以如意指窣堵波云高著眼冬至博山禮先和尚塔甲午拈香云從來刀斧斫不開莫道相逢不顧此時還有見我當山老漢底超越佛祖手眼者麼遮老漢每常自謂得壽昌老人一箇不肯以故生平不肯輕許一人即天下衲子許多受其爐鎚驀地躍冶而出其門者曾有幾人能不自欺欺人又能得此不肯以殺活聖凡定此不傳宗旨如遮老漢者乎雖然如是冤有頭債有主即不肖雖猶子蓋最初親從董巖求受大戒及依止此山迄示寂於今已四十有年正值世道交喪遍歷如幻希奇不啻隱忍存神繫此懸絲慧命又況近日法門邪逆橫起亂我祖宗源流何敢自惜微軀不與同法者救正此始終流弊揭明我佛祖正宗哉幸此天機有定故乃不辭幾千里冒此風波以趨我師無縫塔前燒此一瓣痛心之香以上金剛慧壽更不自禁其悲欣交集也我老和尚寧不大創哀憐為之破顏微笑者乎且道燒北香後更有甚麼意旨噫自非退密藏天地安得全機振古今禮雪關和尚塔舉拂子云看大地是洪爐活飛此片雪東土與西天咬碎舌根血此處須知我雪關先師兄未出世時作我博山堂中首座眼光已爍破諸方也惜乎先和尚逝早致我兄如孤臣孽子保此不傳慧命至於震吼閩浙光闡洞上玄猷而海內英奇靡不望風畏服又惜我兄抽身太速使門下亦步亦趨者見其超軼絶塵未免瞪乎其後雖然又安知無有自奮而追風向上者乎如不肖弟者雖不能與兄生死同條至有深密靈根與法乳相親者猶足挨開無縫神光與之處分此事我兄灼灼威靈能不儼然為之鑒格尚饗寶方師翁像前上供南泉為馬祖作供洞山謂待有伴時即來某甲為寶方設齊我翁卻不待請而自至且道我翁如何得恁麼不惜眉毛聻獨不聞不是冤家不聚頭乎秪如我翁儼然親臨應將何物以為供養乃作拜云謝翁降慈無可祗待先祖忌辰塔前上供正月十七日師拈香示云會麼二十年前我先祖以遮個指示諸人雲巖路相次欲絶正當今日我法孫以遮個拈示先祖洞上水灼然逆流且道先後壽昌恁麼拈示還知有也無噫年年此日難欺昧須是知恩解報恩祖塔前同諸法屬獻茶師震聲喝云會麼獅子哮吼祖父俱盡盡後如何乃轉上向下云旋機返躑全歸父會麼復轉下向上云一道圜明照大千遂作禮獻茶乃舉杯長吸曰乾復曰滴滴不落別處接博山雪關和尚訃狀設靈座壽昌師舉訃狀大哭云雪關師兄你忍心將博山一枝法眼特地斷絶去也蒼天蒼天你果斷絶得去麼紅爐焰裏雪山頽折角泥牛遍地吼嗚呼哀哉乃率衆上茶湯念誦東苑和尚忌辰燒香庚午七月十三東苑先師示滅武夷六六峰前長笑一聲而別如今一十九年誰見鼻孔遼天不肖當央拈出賺殺東土西天且道為甚麼如此兒孫別有真奇特肯把親親作話傳東苑老和尚忌辰拈香禮畢乃召云看遮箇老聱頭是傷心江上客不遇故鄉人昔在東苑退茹時有一等人視彼青黯黯處疑有一大毒物而畏避之至於風吹草動亦能斷送人命根無端撞著不肖逆子輕輕將生平底鶻突奪去直得忍氣吞聲以至不肖四十年來亦未敢輕試然又賺殺多少射覆之徒今於博山堂上正當揭出始不負此隱微也乃彈指云見麼飲光不是酒顛漢毒氣難銷舞不休壽昌祖翁老和尚忌辰拈香云看看有恩有怨不成法界無恩無怨法界不成遮箇沒巴鼻老漢便是佛界魔界中第一箇頂尖底恩怨渠魁更有箇能於無諱無忌中道得箇不觸不背底堪為八面受敵者許他報此恩怨有分噫直須防遮箇毒物始得雖然今日於博山爐內炷此一瓣意旨又作麼生乃燒云鳳凰山上香光起文彩風流振古今雲棲老和尚忌辰臘盡𥕥脫蓮出冰池三千里外驚悟何奇東昌樵鼓穿心過擲戟焚香笑大機轉身一步指日西馳集佛學大成啓禪關密椎當機一箇鐵餕餡嚼斷六方長舌臨行一句莫作怪拈起千古全提今日博山堂前重開生面誰於旃檀篆上親見寒眉養庵老和尚忌辰昔年峰頂親逢今日博山作忌不啻梅花枝上笑春風茶銚爐邊增意氣至於黑白圈子誰敢描摹無縫鎖門豈容觸諱推原此當當常有因稟明斯歷歷是何位鐘聲驚起七條飛旃檀穿卻木叉鼻壽昌老和尚百歲忌辰師拈香云見麼百年冤對不開交今日分明還自招應是業緣無避處焦瘡仍著艾頭燒乃炷云艾頭燒轉使萬世兒孫恨不消便禮拜壽昌祖翁忌辰梅花無諱忌遇伴即來春色有時機不言自到誰於生死陳中與性命殺開血路儼若邪魔骨裏將佛祖抓出偷心推倒大好山突突兀兀滅卻少林種冤冤仇仇驀地相逢卒難回避老钁頭莫作怪直饒掘盡十方塵剎作活埋坑爭奈慣向空中打筋斗底兒孫今日把你分明捉敗辭先老和尚塔千峰春色好日照百花新遮是甚麼人出身處盛不忍說辭去恐驚塔裏人自有兒孫在還應一笑親辭雪關和尚塔兄既有授命敏者自能為弟特此辭去兄須密速之何則花須連夜發莫待曉風吹為嵩乳和尚起龕棲鳳嶺雲飛臥龍江月露白日不移輪青山常舉步本自有來繇不是無緣故不見愛才人取之必以度恭惟菩提堂上嵩乳密和尚泗洲阿箇唐柴頭穿得淮平牛鼻孔蔣八鎦季是何人出格隨鄉不打哄皋亭杖者原同條新豐苗裔抽劫外之靈枝大好風光運寰中之寶鏡如公初入諸方棘藪踏斷沒耳草鞋末登博嶠鐵門死盡偷心活路故能急水灘頭奪竹篙而跳出裂石崖裏藏古錦以春歸晚香吹萬里之海天碩果結上林之笑傲秪如遮一笑落在何處咄咄多子塔前親看取為石冷舉火召云石冷你今一口氣不來也畢竟向何處去咦突然撒手令人驚咬斷繩頭別路行翻憶當年閒喫棒於今痛快此生平杖人作麼生助你轉身吐氣擲炬云大火流金曾不換千峰秋色月初清送龍門峻上座靈骨入蓮華寺塔擊石鼓毒斷偷心捧石頭驚銷駿骨重磨寶劍光射棲霞斂鍔違華薪傳沒縫藏機大速遊刃應神還有知峻上座轉身處麼座斷威音開別眼密移爻象看飛龍封塔遮箇沒蓋藏底東西那有藏祕你底去處直饒摩竭已喪全鋒殺活古今誰能見血留此一箇封皮看是誰與作冤對底來裂破渠面門相見
