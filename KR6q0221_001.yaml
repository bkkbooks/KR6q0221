body:
  text: 門人大成大峻大然大浩較上堂己未冬莆田林宗伯偕諸大謢法及住持翠林大心獅林大燈等請於蓮山國歡寺開堂師云此一瓣香佛頂𩕳上透出正眼藏中拈來祝延今上皇帝一人有慶天下太平此一瓣香同胞共乳灶裏生蓮一氣連枝各自橫出今特拈來供養堂上曹山本寂國歡文炬二老祖藉此穿過天下人鼻孔撩出天地人眼睛此一瓣香烈如鴆毒猛似靈丹劫火光中奪得黃龍頷下探來今特供養中興曹洞宗壽昌先祖老和上東苑本師大和上用酬法乳之恩上首白椎竟僧問二株五派以何相傳師云雲度鐘聲徹九天進云莫是突出大好山千里遙相見麼師云行人更在千峰外進云東苑獨出一枝與少林分披五葉還有同別也無師云解笑還他碧眼兒進云恁麼則心心相印無差互也師云直須親透此消息始得問如何是西來大意師云露柱貼膏藥進云如何是九年面壁師云洗手解煙包進云神光三拜見個甚麼師云怕死不稱冤進云達磨謂之得髓時如何師云喫土須咽唾進云便恁麼去時如何師云平地莫跌交問昔年灶裏如何解生兩朵蓮華師云雷部主青山進云恁麼則聲震古今也師云惱亂水火神進云曹山文炬一母所生皆證祖位是何願力師云烏碗飛白碟走進云莫是各顯神通麼師云山門無口石磉咬人進云今朝重主法席早見洞水逆流師云線穿紅葉奉雙親進云恁麼則千古兒孫皆得力師云誰撫梧桐思鳳凰進云今日開堂祝聖一句又作麼生師云闔國歡呼無量壽普天樂唱太平年乃震聲喝云會麼千聖齊拜下風未為分外十方同時鼓舞乃見希奇到此還有領略承當處也無大笑云可惜許當年老達磨初遇梁武帝不曾推上此高座子看他將西來的的意作麼生舉似人若只是廓然無聖對朕不識可謂面皮厚三尺不被明眼人掀翻座子亦當自打退鼓折蘆渡江而去那復出乖遺醜纍及後世秪如蓮山今日重新出世莫是特為初祖雪屈麼兒孫各有超群志豈肯區區較是非然則特畫乾坤祝萬曆主一句當作麼生道謳歌不識羲皇德海闊天空日月高下座海澄諸居士請上堂今朝十月十五手提貫珠慢數高聲只念彌陀不敢呵罵佛祖活冤家恰值順風耳聾生魔障剛遭千里眼瞽決定今日蓮山又是呵罵佛祖翻身急報閻羅忿氣衝冠大怒撞幽冥鐘擊陰司鼓會同十殿閻君要使刑罰得所商量重鑄油鍋計較新栽劍圃必須活捉蓮山親身受此極苦牛頭阿旁奉命而來爭奈先聲奪其氣主近前卻要近前觸忤不敢觸忤苦啞苦蓮山見之不覺大笑一聲直得十方法界與地獄天堂一時化為水乳正當恁麼時如何天涯何處覓靈雲桃花亂落如紅雨羅山碧天師遣徒持曹能始居士書來請上堂問春間羅山結制冬下蓮嶼開堂總是和上高蹤還有門庭堂奧之別也無師云羅山喫白飯蓮嶼飽青精進云紫羅帳裏撒珍珠到處光明還燦爛師云莫須倚在錦屏畔令人旁指作阿嬌乃云羅山拈頭不便蓮嶼捉尾誰能三人證龜成鱉木蛇笑倒枯藤曹家女切莫作怪蜘蛛絲咬殺蜻蜓石倉居士且披禪衣作李夫人叫救的夢碧天長老好提數珠敲葉相國底棋枰歸去來兮聊寄三十拄杖莫教我擯出首座只因差一著賺卻古傳燈佛誕日上堂問出生時已指天地何到雪山六年後乃悟道師云燒羹易喫冷債難還曰畢竟如何曰嚼破舌頭不是肉乃云拄杖子忍饑耐渴坐地喫了須彌山曾不見謝土吸了大海水亦不見酬源夜來創個奇論謂佛生時原不曾指天地後亦不曾觀星悟道此皆捏怪雲門故欲打殺和上明日上堂舉出此意豈非斬新公案乎蓮山大喝曰遮妖怪便乃拗折拋在大火聚中燒去了今日拈得遮條新拄杖子頭正尾正不敢妄生節目若有問世尊初生意旨者但打云恭喜你好彩頭又有問雪夜觀星者但打云恭喜你好結款更有問中間與出世為人事作麼生但打云恭喜你千古春風常在手但教隨處有生涯喝一喝上堂文殊普賢忽起佛見法見被世尊攝入二鐵圍山蓮山拄杖子忽起佛見法見被我一捏粉碎撒向十方微塵國土皆成大菩提樹根盤大地葉覆三千各各樹下有世尊成等正覺吹大法螺擊大法鼓演大法義拄杖子忽然翻生又變出許多神奇魔王來毀佛謗法滅僧惱亂十方諸佛佛大笑曰煮豆燃豆箕豆在釜中泣本是同根生相煎何太急魔王呵云猶自念曹子建底詩章在佛曰你亦念個詩章看魔王曰歡在粉牆上儂在粉牆下細語歡不聞壓碎鴛鴦瓦驀喝一喝拈拄杖將大衆打散小年諸莊夫請上堂問南泉不出方丈到莊上喫油餈是何作用師云邪言不入正人耳進云莊主親到方丈謝降重是如何師云何似時衰鬼弄人進云和上尊重不受請今日諸莊送供養時如何師云好好與他一頓進云有過也無師云重賞之下必有勇夫進云感恩不淺師云打鼓為三軍乃云風俗作小年灶神送上天天帝有何說更不與人傳果是個泥瓦合成靈從何起驀地卻生出兩朵蓮只今誰能向我杖頭討個壓年錢除日上堂南泉提起貓兒刀前誰能救得洞山收卻果桌句下孰能轉身子湖捉住賊僧如何承當不下大隨隨劫火去直下無能知歸遮裏一一得個出身句我與你分歲尚且大有事在洞山云三途地獄未是苦衲衣下不明此事最是苦諸兄弟抖擻眉毛已是墮坑落塹平日急急整理手腳如獅子遊行哮吼返擲而去虎狼野干聞之遺尿失魂誰敢當前與作敵哉暫時失念瞥起偷心打在軟洋海底掙命不起後日莫怪不為汝等道破乙亥九月麻城劉邑宰李太宰梅中丞周司馬陳司寇梅惠連李公楫請於寶筏寺開堂師云此一瓣香天然尊貴巍巍莫讚蕩蕩難名奉祝皇帝陛下聖壽萬歲伏願位育建中和之極統御慶日月之光諸大護法宰官居士親扶法座共振宗風伏願生生示現普門身世世莊嚴真佛剎此一瓣香昔日無欺今朝不昧光明妙密拈對人天供養中興曹洞正宗始祖江西壽昌師翁大和上用表親定宗旨之嗣即此一瓣同氣結根連枝發秀供我信州博山本師大和上建州東苑本師大和上用酬一參一證雙垂法乳之恩伏願大衆同生欽重堂主白椎云法筵龍象衆當觀第一義師良久云觀見麼大鏡中天物物自照若更待揚眉瞬目已是增金之黃添玉之白也雖然今日山僧升此寶華王座還有向上全提也無其中有得此先聲者正好對衆酬唱庶不負本分風光有麼有麼衆無語師乃舉如意云奇奇標天指地曾為傳語之人面壁安心可是分燈之種今日山僧出世一句更作麼生道乃畫一云會麼人人頂上有金輪萬古威音光聖代珍重復白椎云諦觀法王法法王法如是下座李公楫居士設供請上堂師就座白椎竟師振尺云寶鏡已當空誰是出頭者恆鑒出云箇中全無事師云死漢不斬進云古澗寒泉水作何色師云拖出去進云如何是不萌草下藏香象師云臭也不知進云徹底無依作麼生轉身師云那裏討遮穢人僧問四方流寇八面兵戈學人向何處安身立命師云頂門上僧禮拜云謝師答話師云也須向鋒刃上翻身始得支浮法師問大明國裏清平世界流寇因緣從何處起師云既是大明國裏清平世界誰見流寇誰見刀兵聻進云見今國家不寧百姓不安又作麼生師畫云消歸得麼支禮拜起云乞師曲垂方便指示中下之機師云列位久立列位知得嵞山聖人拈出各安生理一句麼理則不作非為矣更有甚麼亂事若不知自己遮箇生理則舉身眼耳鼻舌皆為流寇之城池也何獨以四境之外者為流寇哉抵如在上位而璣衡廣運在下位而金玉振聲一皆得此中危微之機光被四表格於上下為君為師制禮作樂無非藏密同患而參贊此兩間也不然從何處立達何處位育哉大衆直須親自透遮箇生理始得其中有能別出手眼者麼玄韞問寶鏡重輝請師指示師畫一云莫向遮裏死卻進云寶筏新開事如何師云問津之人多錯路進云寶鏡寶筏還有賓主也無師云打破大散關中間得自在進云賓主相去幾何師云此中無問答人進云賓主相見亦有言說也無師云待侍者與你三十棒韞禮拜師震聲云太宰何在太宰近前作禮擬問師云再禮拜著宰禮拜起云向上宗風大師已舉示何方便息此干戈師云問取當事人宰云如何得太平去師曰盡在明君方寸中宰云和尚也須認一半師云高著眼宰云君臣妙旨蒙師示人境俱奪事如何師曰法王寶劍當央舉八極光天慶太平宰云謝和尚大法師云大衆正好遮裏唱太平歌去下座邑宰劉公同李太宰諸公請上堂師云向上一路千聖不傳本分風光須自領悟山僧便恁麼下座還有親切為人處也無大衆便恁麼禮拜而退還有不相孤負處也無雖然官不容針正好添花錦上石女夜拋梭文彩煥然滿地木人朝唱曲音聲杳爾難聞其中還有正偏兼帶不落是非者出來唱和看衆無語師云恁麼則山僧倒騎露地白牛游戲十方剎土去也舉如意云見麼自古輪王全意氣不彰寶印自然尊下座太宰中丞同闔邑諸縉紳請上堂師撫尺云見麼見山僧登法座麼登座為箇甚麼莫是為大衆舉頭不見天麼莫是為大衆低頭不見地麼莫是為大衆開眼不見人麼莫是為大衆伸手不見掌麼畢竟為箇甚麼聻衆無語師復云拼得性命方為得性命不怕生死方出得生死衆中還有好手中呈好手者麼出來與山僧相見有僧在衆中喝一喝師云是那箇出來莫要藏頭露影僧出舉坐具云正要問和尚遮箇喚做甚麼師云禮拜著僧禮拜起云畢竟喚作甚麼師云斬頭求活漢僧一喝師云再喝一喝看僧連喝歸衆師云衆中有簡點得遮僧落處者麼若簡點得出方知喝中有賓主句更有不惜性命者出來百戰場中當有敵勝者不可如他一合便退僧復問云向上事如何師云敗將不斬僧理前問師云拖去遮死漢僧歸衆師乃云極力舉不起底圭峰山覿體承當滿口道不出底百子塔點頭領略更有從上佛祖無量機緣卻是五腦山土地悉能理會獨有昔日僧問雲門如何是西來大意門曰久雨不晴土地不契因并呈似龍湖龍湖云恁麼則一切皆不會也土地乃問如何是久雨不晴龍湖答云氣急殺人土地大笑云我悟也龍湖云你悟箇甚麼土地云前日一連陰雨我那泠廟無人燒香賽願忽然一滴漏落在我土地婆頭上被他埋怨了半箇月真箇氣急殺人龍湖震聲一喝土地直得冰消瓦解你諸人會麼莫將間學解埋沒祖師心遂下座解制上堂師云龍湖和尚又要去也其中有不惜性命出來掀倒法座者麼僧出問未出母胎有一句子請和尚道師云舌頭拖地進云直指人心見性成佛意作麼生師云眉毛拄天進云更請和尚方便垂示師云斬頭求活僧歸衆師云末後一句始到牢關秪如透脫牢關大方獨步一句作麼生道良久云逢人且說三分話未可全拋一片心下座大雄菴上堂師升座擊香臺云聞麼良久朗聲云巍巍獨坐大雄峰一喝曾教三日聾今日當陽明舉似西江吸盡吐東風且如不與萬法為侶者是甚麼人聻一僧出衆云閣靜不須重借月三更自有夜明簾師顧視云乾闥婆王親托出摩尼光影照三千更有於光明門頭出身者麼大宰出云近日有提婆達多一頌呈上頌云平地孤堆最誤人枉將法座賺冤親瞿曇自有金針度認影迷頭又隔津師云何不道提婆別有金針度聻大宰撫手云此又是老婆勘破有來繇也師震威一喝便下座臘八日期主李栩偕鹿門法師請師因戒壇為先君尚書裏貞公上堂說法師拈香竟振尺一聲良久顧視大衆曰見麼我佛昔於臘八子夜觀星悟道大叫奇哉普見一切衆生本來成佛但因妄想執著而不證得秪如現前香燭騰輝眉光相射與昨日風雲驟興雷雨交作比昔日觀星悟道有同別否若無同別何佛於天地日月萬象森羅之中獨睹星而悟聻於此透得則知現前衆生本來成佛亦無古今生死之異也何獨父子血脈相承本無斷絶者而不立地成佛哉會耶不會且看昔日乾峰示衆云十方婆伽梵一路涅槃門路頭在什麼處以拄杖畫一畫曰在遮裏雲門云扇子𨁝跳上三十三天觸著帝釋鼻孔東海鯉魚打一棒雨似盆傾你若於此會得雲門拈扇子意則知乾峰畫拄杖落處亦知十方諸佛并一切衆生與尚書公落處本自無生無滅又何有執著更解脫哉衆無語師曰孝子李栩當體父子血脈親承何不出衆舉揚聻栩出日月在中天水在波師曰與你有甚相干何不向自己分上道取一句來栩以手打一圓相師曰未舉手時遮箇落在什麼處栩即禮拜師曰俊哉直須猛著精采始得不然又向腳根下蹉過了也珍重六安齊頭山水晶寺上堂附修竹彬公設供禮拜請云今日某甲母難之辰伏乞和尚法施使先親速獲超往并示某甲末後大事師良久云會麼午夜日頭紅石女臨盆急㘞地叫一聲生箇鐵棘栗性猛利情奇崛假龍舒陳氏裔苗託齊頭獅子躅躑吒吒呀呀翻巢破敵五十年來虎蹤狼跡不覺逗留至今且道承誰恩力乃畫一圓相云若於此薦得不惟覷破生死牢關至於彼此冤親總向遮裏七花八裂去也雖然猶是彬公就地掃塵邊事祗如我夢筆杖人受彬公深心供養如何是親切相為處耶乃于相中畫一卍字云會麼五色彩霞籠玉象分明一點座中圓其中有能為彬公祝贊一句者麼衆無語復云噫祝不得讚不得赤肉團邊光赫赫雪峰打鼓請同看寶志杖懸剪鏡尺剪鏡尺明歷歷願公常住此人天直待當來問彌勒珍重壽昌語録丙子掃壽昌祖塔闃然謐大師偕諸護法請師住壽昌本寺開堂師以如意指法座云見麼若向遮裏明得不惟坐斷十方直教三世諸佛齊拜下風有分雖然如是更須知有向上全提一著在大衆看取新壽昌向毗盧頂上行去也遂升座拈香云此一瓣香結根鷲嶺發秀熊峰遙付囑於當時密傳持于斯日爇向爐中祝延皇帝聖壽萬萬歲伏願佛心不二慧命無疆主華藏之莊嚴致剎塵之位育此一瓣香兆自衆生腳底透於諸佛頂門覿面無虧全機不昧爇向爐中專奉為益府殿下宗室賢明闔郡縉紳諸大護法伏願同扶慧日以高明共贊宗風而妙密此一瓣香劫火洞然曾拾得今朝對衆特重拈爇向爐中專伸供養我壽昌先師翁老和尚東苑先師大和尚用酬法乳之恩斂衣就座上首白椎竟僧問法窟當年獅子吼今朝據座又嚬呻一聲震動乾坤句特請分明舉示人師云才望剎竿影擺手出章江也須是個漢進云初機未會玄微意請向從前話一周師云兩手分付與阿誰進云龍峰白浪掀天舞湧出漚花遍界香師云大衆不消徒著力自有鉗鎚密與人進云擎出滿盤皆具足當機領略事如何師云退身三步僧以手作拈香勢云學人作恁麼話會得麼師云已過去也進云雖然數樹蒼松古也秪一灣流水長師云壽昌自有真源在進云不是枝頭開玉蕊爭得乾坤處處春師震聲云大衆見壽昌放眉間白毫相光麼良久復曰天無私覆地無私載日月無私明時候無私序帝王無私德臣民無私功善惡無私報所以靈山拈無私之花少林面無私之壁二祖安無私之心曹溪傳無私之法青原南嶽開無私之二宗馬祖石頭列無私之五派百丈撥無私之火溈山直下知歸黃檗揮無私之棒臨濟頓徹婆心雲巖示無私之鏡洞山錦縫重開雪峰升無私之堂雲門當機獨領地藏豎無私之指法眼妙契天然乃至千七百沒巴鼻漢一味無私心心相印法法相傳至我壽昌先師翁觸發大好無私之山重興曹洞之旨洎我東苑先和上勘破臺山無私之路透過趙州之關迄我道盛偶入東父無私之室勒回鞭影之駒親承壽祖無私之宗振起簫韶之鳳是故二十年來縱橫方外無私任運到處自強今日歸家幸逢法屬推上法王無私之座重揚先祖無私之風何異削雪為銀火不銷白戰未曾持寸鐵雖然如是今日開堂一句作麼生道良久云高提祖印當空照一道無私謝太平結椎下座寶方上堂竺土大仙心東西密相付且道如何是密付的意旨良久復云昔我青原老祖當時曾命石頭遷禪師往南嶽通個書信遂撥開一條衝天大路自非足下生雲的也不容易進遮一步你看他石頭如獅子游行一蹴便到那南嶽見讓和尚即問不慕諸聖不重己靈時如何讓公眼似電光舌如利劍何曾放過天下一人即道子問太高生頭云寧可永劫墮沉淪不向諸聖求解脫即拂袖便行不啻鯤鵬奮怒直得水激三千扶搖九萬自此石頭一宗傳至雲巖曹洞直至於我寶方燈燈不絶全因此青原一足之真風也後世人徒知馬祖一喝百丈三日耳聾殊不知青原垂足石頭萬劫心死秪如今日紹登我祖寶方法座既為承嗣子孫畢竟密傳個甚麼衆中果有明眼者請出來證據如意子便磕著也有麼良久云玉璽不離天子手金箱那許外臣知下座謐大師壽日上堂僧問大好山頭雲靄靄寒潭波底月團團父子無功即不論君臣道合事如何師云雨滋山草秀玉片本來輝進云如何是正中偏師云木雞啼子夜進云如何是偏中正師云芻狗吠天明進云如何是正中來師云八萬里鵬從海出進云如何是偏中正師云三千年鶴遠天歸進云如何是兼中到師擊如意云會麼進云正偏已蒙師指示祝壽一句又何如師云西竺峰前橫紫氣壽昌橋下涌春潮進云和尚已恁麼學人又不然師云速道速道進云須彌頂上蒼松古廣寒宮裏桂花香師云劃斷千峰上紅輪滿一堂僧禮退師云向上一句威音未敢先聲末後一句彌勒安能措口當央一句直饒釋迦才生作獅子吼未免雲門遮一棒在所謂出身猶可易脫體道應難我當時若見好與一棒即了更說甚與狗子吃貴圖天下太平以至後昆紛紛接響不相孤負誰是其人惟我禪伯謐公大師於五十八年前正當此日雖曾㘞地一番卻不虛張聲勢且于道盛屈尊就卑推登祖位自非善於門裏出身身裏出門孰能致從上佛祖慧燭常燒終不見跋也耶雖然如是秪如今日祝揚慧壽一句作麼生道舉如意云優鉢華中旋日月靈光直透未生前下座師誕日上堂特特升堂為證據要人透我藏密句一句父母未生前一句才生便㘞地一句四十五年的若人一句中薦得我堪與佛祖為師切忌靜沉死水二句中薦得我堪作人天之主切忌動落今時三句中薦得我堪與隨流入妙切忌自救不了若能三句一齊薦得方能情見不偏始終超脫不縱不橫如摩醯首羅天王眼相似此猶是壽昌門庭施設邊事須知向上一路尊貴自別不見寶鏡三昧首末云加是之法佛祖密付但能相續名主中主且作麼生能續主中主去良久擊如意云日日是今日下座元旦上堂今上皇帝為一大事因緣出現於世恭遇元正啓祚泰運方新壽昌寺僧謹以正直方便舉第一義祝延聖壽普令光天之下一切臣民開示悟入帝之知見且道如何是帝之知見而一切臣民又作麼生悟入彈如意云樂麼康衢擊壤者何有于我哉涂季玉居士因大乾寺祈夢歸請上堂僧問雨打階前濕何八得所繇師云烏龜向火進云和風開地凍枯木曷生輝師云白鱉吞冰進云滿山香馥馥百草獨青青時如何師云楊子江頭楊柳春楊花愁殺渡江人進云其如清夜月還應落前溪師云閒話作麼進云非欲強來呈舊面只因特地太惺惺師云放過一著又僧才出禮拜師云冒刃衝鋒僧即退師云一場大夢良久復云世人有夢鬼神能解鬼神有夢天帝能解天帝有夢聲聞能解聲聞有夢菩薩能解菩薩有夢諸佛能解諸佛有夢虛空能解虛空有夢拄杖子能解拄杖子有夢山僧能解且道拄杖子有甚麼夢山僧作麼生解乃拈拄杖向空中擊一下云一擊震寒空觸倒妙高峰石人衫子破拍手笑春風笑個甚麼笑壽昌新長老白地裏拈葛藤掠虛空秪如新長老又作麼生噫重賞之下必有勇夫石人石人你也須夢見遮個消息始得卓拄杖下座上堂十道不通風啞子來傳信夜半漆崑崙皎然雪萬仞若向遮裏會得可與洞山老祖把手並行其或未然今日壽昌為汝說破復曰噫鋸𨮂稱錘易決擇生死難石上栽花易安立性命難難不難心上看黑豆未生芽去處善財童子未曾參易不易境上覷阿難欲速成寶王五濁惡世誓先入如何入無為真人乾屎橛釋迦調達暗承當賺殺文殊與彌勒廣照寺諸耆宿請上堂師才到座鐵雲便喝師不顧遂升座雲出問訊即歸位師擊案云何不速道雲又喝師云野干鳴進云亦見我烹祖的手腳師云且退一邊著進云今日且放寬一線師云不容你不立下風進云恰好恰好白椎竟僧出問當陽一機請師指示師云白日青天轟霹靂進云若是則萬象之中常獨露孤峰頂上現全身師云一馬生三寅進云可謂一切無收攝觸處盡圓成師云踏殺天下無幾個進云知音不在頻頻舉達者須知暗裏驚師云且向雲飛鳥沒處尋消息去進云將謂煙籠海口窄一匝紅輪徹底輝師云閒話太多生進云也少他不得遂禮拜師擊如意云太法有時機激揚開祕密棒打石頭人嚗嚗論真實如何是論真實聻若論登臺說法有甚麼難只是一提一唱使人直下心開意解為難耳鐘鳴鼓響直得通身光迥迥地恨不得將此光迥迥底心肝五臟提示諸人使見者聞者心肝五臟一個個光迥迥地爭奈皮下無血似鴨聞雷安有崖崩石裂之事乎諸佛欲說法時必先六種震動天雨四花吹大法螺擊大法鼓無非欲翻破衆生無始劫住無明透出光迥迥底以照天照地去也至于祖師門下棒喝交馳龍象蹴踏拈鎚豎拂擎叉輥毬種種激揚將謂爭奇弄怪亦不過敲骨打髓裂碎頂門光迥迥地不暇安排心行處滅耳今日廣照元尚諸師特來壽昌設供勸請舉揚山僧特地一場光迥迥中亦有人蓋覆得去麼亦有人透脫得去麼良久云石牛步步火中行反顧休銜日邊草果是好山腳下人自然不昧來時道擊如意下座解制上堂師云南贍部洲上堂西牛賀洲擊鼓東勝神洲解制北俱盧洲作舞須彌頂上撞金鐘直得三十三天梵王帝釋一個個退位求出身活路乃至天魔外道知非便捨與二乘聲聞緣覺離涅槃床及至五十五位菩薩直上階梯造等妙二覺才得捨功就位即轉位旋機復於向上竿頭更進一步爭奈須彌山底金剛際下那一個強遭瘟底躲根漢子不肯放下偷心若能全心放下豈不虛空粉碎大地平沉橫身劫外獨步大方也哉雖然此猶是指蹤極則秪如壽昌全提祖令為諸人結制且道曾與諸人向何處結聻令又向何處解聻解制之後諸人向何處安身立命作甚麼活計聻乃擊案云一拳拳倒須彌山一踢踢翻金剛際不向如來行處行男兒自有衝天志擊案下座黃海岸司理請上堂師升座士拈香云遮一炷香特為新壽昌拈出師震聲云速道士便喝師云且莫詐明頭士云卻是和尚顢頇乃禮拜歸位白椎竟師喝一喝云大衆見麼黃海岸居士穿一雙沒鼻草鞋向南方諸知識肚皮裏踏過一遭今日特歸壽昌且作麼生為他證據聻良久云請君吸盡西江水看取馬駒踏殺人士云半滴不留師云已蹉過也士從西過東立師豎起如意士云張牙露爪即不無和尚且無轉身句師云你且向腳跟下透出著士從東過西立師云東走西走即不無本分底事尚未在士云且道居士立在那裏師云脫卻草鞋著士云如何是途路中事師云莫向三千覓大千士云如何是入門句師云泥牛踞地笑呵呵士云如何是出門句師云南山起雲北山下雨士云如何是不出不入句師云露柱向汝道士遂禮拜云須是遮老漢始得白椎將下座士復問云朗月當空時如何師以手拜云深深拜到月兒高進云月落時如何師云相隨來也黃海岸同諸護法請上堂師擊如意云達磨大師又來也且道又來做個甚麼若向遮裏薦得不徒作我腳下兒孫亦乃重開五葉有麼黃海岸出問如何是重開五葉師云特地相逢不相識士云達磨大師來也師云儼然相對不相知士云龍吟霧起虎笑風生如何是賓主相見底事師云高著眼士禮拜云謝師答話師云畢竟達摩大師又來做個甚麼衆下語不契師乃將一隻鞋拋下地云昔日曾遺一隻履如今特要湊成雙下座中天剡水大師請上堂師擊案云指南一路作者自歸格外玄機為求知己所以一雙孤鴈拍地高飛兩個鴛鴦池邊獨立於斯薦得妙協正偏覿面相逢別有話會須使大好山重重突出要令曹洞水派派逆流且道秪今是甚麼時節良久復召云大衆見我中天剡水法兄麼昔日曾見我博山先大師來壬申九日我於金陵天界寺兩相欣逢亦復各分閩楚彼時送別詩云相逢不是喜同門囊裏昆吾一劍存君既入閩吾入楚風雲湊處自無痕計今別去六載果然法兄特來壽昌掃塔正當九日請我升座激揚祖父宗風秪如重陽菊花已自湊巧畢竟一句忘言作麼生收科聻剡水師作禮云請和尚歸方丈師云推倒門前剎竿著遂下座黃海岸偕中天剡公往金樓峰留闃然大師請上堂師升座拈拄杖云天不能蓋地不能擎一條拄杖八箇眼睛中間一箇透頂睜獰復卓一下云口咬鼻孔誰察其情夜來捉得白月天曉太煞分明且道捉得白月在那裏衆默然師云豐干三昧寒山不知將謂不是我同流誰知賺殺老文殊寒山三昧拾得不知將謂失卻來時路恰好相逢攜手歸畢竟歸向何處良久云呵呵呵惟我知一任時人痛著疑印光出拍手云惟我知惟我知師云又錯空也海岸居士云文殊饒舌師云何不出來再道一句士禮拜歸位師卓拄杖云黃龍翻倒天河水萬派千流逐我來士云黃龍出洞時如何師展兩手士云黃龍歸洞時如何師振身而立士云興雲作雨時如何師云金翅鳥王在此士云復欲傾湫倒嶽時又作麼生師云性命在我手裏士遂禮拜云須還他一隻手始得師便下座士復問金樓掀起時如何師劈開胸示之士云推倒金樓時如何師云吞卻居士福山語録丁丑仲冬新城諸縉紳居士等請師住持福山禪寺上堂師舉如意指法座云會麼諸佛出身處東山水上行看看壽昌杖人騎黃龍峰登雙林寶華王座去也遂升座拈香云此一瓣香如天普蓋似地普擎特供養今上皇帝無量壽佛伏願龍顏多喜天下太平此一瓣香針錐不出法界難藏特供養覆船開山和尚紹隆大師西竺禪師及危王大檀越伏願靈光不昧萬古騰輝此一瓣香靈山付囑天然有在茲特拈出奉為諸大護法伏願成就慧身齊登正覺此一瓣香少室峰前不傳消息茲特拈出供養壽昌先師翁老和尚東苑本師大和尚用酬法乳之恩乃就座司理黃公問云紹隆出世七佛證盟和尚出世甚麼人證盟師云星池重見幢幡影進云瓊樓寶殿是甚麼人居住師云簫曲猶聞鸞鳳音進云滿堂龍象師還辨別得也無師云空王嚼碎赤波斯公禮拜海公問諸佛出世為一大事因緣和尚出世畢竟為個甚麼師云大好山中第一人進云恁麼則長天日月輝今古大地笙歌處處新也師云特地誰登千仞壁謾教千古仰標題進云龜毛揮電影兔角攪空華是誰分上事師云一曲無絃獨自操海禮云謝和尚證盟張拱之問今日福山遮瓣香從那處拈起師云穿靴人打獵進云如何得不斷絶去師云赤腳人食肉進云斷絶時如何師云君子愛財進云如何得斷而不斷師云取之以道張禮拜何長白問今日福山大衆請和尚開示師云凌空駕出覆船子驚起波濤風拍天何禮拜云今日親見覆船也余三明問如何是山中主師豎如意云會麼進云如何是主中山師云蹴蹴巉巉最上層絶頂阿誰頻舉手進云賓主相見時如何師云相樂自相知余禮云謝和尚指示師云雲開天上路今古試高蹤上首白椎師震聲一喝云覆船和尚無生可度撒手太孤危紹隆大師面目多端惑亂人不少西竺老子靈龜曳尾狼籍叢林更有許多藏頭露穎老古錐仔細簡點將來不免一齊斷案且道今日新福山出世為人當作麼生聻良久云寶杖指開千聖眼大明天下共傳心喝一喝下座臘月八日上堂師云會麼山僧昨夜正熟睡五更鐘響方瞥地醒來猶自眼眯拈得口來失卻鼻低頭吃粥乃思量不勝令人大慚愧愧個甚麼愧彼雪山徹骨寒半夜星兒獨自覷獨自覷叫蒼天說向人前不值錢不值錢千古萬古空自憐珍重師誕日上堂師擊如意云去年四十五大擂壽昌鼓今年四十六重撾福山毒福山壽山相對高紅日光生白玉毫迦葉頭陀不忍俊橫披倒舞金襴袍且道迦葉意作麼生良久云也是家富小兒驕除日上堂師云崑崙奴著鐵褲打一棒行一步打發根本無明撞翻從上佛祖逗到臘月三十日來折合不下依舊甜瓜徹蒂甜苦瓜連根苦且道福山正當重闢門庭斬新條令作麼生與大衆折合喝一喝云踏倒須彌第一峰太歲頭上添新土珍重壽昌先和尚忌辰上堂司理黃公拈香云此一瓣香供養壽昌先和尚且道壽昌還來也無師云月夜三更穿市過進云先壽昌在甚麼處安身立命師擊香臺云會麼進云且喜壽昌猶在師云雨滋三草秀花發上林春公禮拜師云僧問巴陵如何是道陵云明眼人落井雲門大師憐兒不覺醜將以此一語可與他後作忌僧問興善如何是道善云大好山興善乃馬祖腳下兒孫以故乖示一言半句猶足踏殺天下萬世我壽昌師翁聞此一語特地發明本分大事闡揚洞上宗風且道師翁如何不承嗣馬大師聻若向遮裏簡點得出始可與先師翁作忌衆中有簡點得者麼請出舉揚公云他家自有青山在師云誰向其中半出頭進云謝大衆證盟師云畫得真符打真鬼倒騎玉象趁麒麟時龍湖桂轂大師在筵公因問作家相見時如何師云腦後著雙睛進云今日龍湖龍現也師云突出驪珠頷下照進云張牙露爪時如何師云妙作通明一點秋進云風雷迅速時如何師云端坐定乾坤進云忽遇金翅鳥王出現又作麼生師展手云一任掌中飛公禮拜師云且喜收下了也便下座解制上堂僧問未登寶座已涉廉纖大衆叮嚀請師再振師云口力希中眉垂進云官不容針歇後語也師云東路突西路橫進云末後一句始到牢關如何是末後一句師云待闍黎瞥地一回著進云樹倒藤枯又作麼生師云三十文錢沒人償你僧禮拜又僧問十五以前即不問十五以後事若何師云頭上痛針錐進云鉤錐會著一任縱橫又作麼生師云遍身紅爛進云恁麼則福山獨露無私雨又向匡廬覆大雲去也師云臭氣衝天僧一喝師擊如意一下乃云福山於四月十五日也無生擒活捉手段與諸子結生死冤家正當九十日也無烹凡煆聖底爐鎚與諸子敲骨打髓如今七月十五日也無殺人活人底刀劍與諸子作性命開交所以結制也燈籠攙露柱懷胎解制也木人倩石女原夢無端陷殺平民不妨笑倒作者雖然如是汝等諸子於三個月中特地喫了福山底金蠶蠱毒他時後日毒藥發作卻大有事在便下座終
