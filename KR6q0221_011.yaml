body:
  text: 門人大龍大燈大文大健較機緣乙亥龍湖問答太宰問三玄五位是發明悟後事是發明悟前事師云臨濟開眼尿床洞山合眼投水公云大師意作麼生師云心不負人面無慚色周司馬問流寇有何法力可退師云有一行咒公云甚麼咒師舉如意云吽吽傍者云便恁麼持去如何師云狗銜赦書諸侯避道陳司寇問大師出世如何為人師云此問最親切公云畢竟如何師云死水不藏龍公云日夜波濤湧激時如何師云張無盡曾作無佛論周赤城毛自明二太守過訪恆鑒云師以何法開導二公師云一人云昨夜十字街頭井被人抬去一人云只見今早街上濕一人憤然不平為無此事鑒云二公信得及否師咄云癡漢你見百子塔點頭也未鑒無語宋戶部問返聞聞自性自性如何聞師召居士士應諾師云山僧戒口太宰問我聞圓相從耽源傳仰山是否師云公見西天十五祖睹龍樹現月輪相否宰云見師云提婆即是外道宰云此意甚深師手畫破圓相云西天外道六師及九十六種皆向遮裏折伏但得其旨則千變萬化無不暗合圓機也宰云師從何而得此旨師云白雲斷處見明月黃葉落時聞搗衣恆鑒引僧來參問如何是學人自己師云禮拜著僧禮起師云你如何在遮裏欺誑我僧擬議師震威喝出鑒云和尚還須方便師以如意驀口便打又僧問云如何是學人自己師云吉獠舌頭三千里進云某甲不會師云入海捉波斯進云還許參究否師云反腳穿靴水上立僧立次師問云阿誰僧云堂中學人師云山門騎佛殿向聖僧鼻孔裏去你見麼僧云不見師云打二板也未僧云打也師云喫茶去王康伯王見虛諸居士來參師云魚因甚麼即跳過龍門一士云全仗風雷力師云如何又有點額底士云是他氣力未充師云話墮也士云和尚還須方便師曰喫水去又僧問魚因甚麼即跳過龍門師云逢人但恁麼舉僧擬議師云徒遭點額問某看古人言教激發此心不起如何師豎起如意曰教中曾説著遮箇麼僧云不知師曰今見了還知麼僧云此須和尚始得師叱曰自暴自棄漢僧問生死大事不明乞和尚指示師豎起如意曰見麼僧云見師曰見甚麼僧云如意子師曰有眼如盲去僧問學人無箇入處乞和尚指示師以如意擊香臺云會麼曰不會師曰賴你不會到有箇好消息僧云秪遮不會便是入處麼師曰又被風吹別調中資秀禪人持一杖贈太宰師即奪之曰若道遮杖是太宰底如何又在龍湖手裏若道是龍湖底如何又是太宰杖道道秀云請和尚道師即以杖擊之太宰笑曰臨濟小廝兒卻具一隻眼師擲下拄杖曰放過一著太宰一日命使持所作頌古一則請政師撫使者曰去請太宰公親來領證據公又遣使云明日必親來但和尚莫虛哄師曰卻是公先哄我也次日公才入方丈師據座震聲一喝曰入門須辨主端的請公分公近前不審師曰何不速道公乃趨傍就座師曰我要公當機便透如何又恁顢頇去公云我特來領證據原來又是虛哄師曰是公自納敗闕爭怪得山僧寶公大笑曰今日和尚又勘驗一箇衲僧也師曰山僧棒折那梅中丞問孔子知世不可為而欲為地藏知生不可盡而欲盡如今日和尚於刀兵荒亂中説法度人同是一副婆心奈如此時人情危險之終不可度乎師曰孔子地藏蓋將自己看大了將世界看小了如一身一家有一小事不妥貼便是自己一大事不了當也若僧者以生在遮人世便逃不得遮人世如同舟遇風亦因其患難而行乎患難耳豈有大過人之事乎公大喜曰如此説法惟上根利智則一聞千悟矣若夫業重癡迷何可與説道理哉豫又竊疑佛嘗以密言真言度諸鬼神明説與人尚自不知密説與鬼又安知乎不知則不信不信則疑疑則謗謗則無所不至矣師又何法以開此癡迷哉師曰如公昔掌兵權凡出一號施一令令惟主將謀士知之使三軍皆知則心志不一精神不專擬議愈多而是非愈起則水火不足以趨生死不足以敵也故從上先聖皆以神道設教而一天下之性情正以智者太聰明不可與之道理與道理則聰明愈亂愚者太癡迷又不可與之道理與道理則癡迷愈惑故密語真言正為上智下愚者設也公太笑曰奈何泄盡太宰問寶鏡三昧中所云如虎之缺如馬之馵此二句若以道理注解或即應下文以有下劣故拖泥帶水以示敗闕因為救人不嫌自敗捨位就功故云寶几珍御如此解不知合否望師以道理判示不敢當上上機也師曰寶鏡謂佛道垂成云者正恐大通智勝自滯空劫猶十劫觀樹而佛法不得現前也故有三墮之設欲其不觸虎頭之缺與犯馬足之馵而迥超於功位耳故以寶几珍御之驚異黧奴毛角之下劣空劫守株之尊貴互相救其觸背之非豫所謂邪食作病以毒為醫云者元無實法也自非三墮忘玄之人安得妙協寶鏡之不觸背哉師一日與太宰坐僧堂中因舉壽昌和尚頌臨濟喫棒公案云醍醐上味出乎乳滴水攙中便不成三十棒頭開正眼何嘗傅得祖師心師顧太宰曰如何是正眼聻公悚然僧一悟出問如何是正法眼師劈面一掌曰問甚麼悟云莫秖遮便是否師又一掌曰不識好惡漢悟禮拜再請開示師曰逢人不得錯舉太宰因有頌曰無影堂前萬木森松風蘿月度知音秖須覓個瘋顛漢一掌酬他徹困心師看頌曰見之不取思之千里太宰公初度師問未出母胎度人已畢意旨如何公曰請大衆各下一語看衆下語不契公再請師指示師曰待公出母胎著公曰我知大師婆心也太宰曰袁中郎嘗引羅近溪云聖人乃安心之百姓百姓乃不安心之聖人猶是道學窠臼不許夜途剛把火大家吹滅暗中行鄧豁渠末後見解又出於近溪耶然中郎輩所見亦止此耳師曰此正盤山所謂指縱極則也安知有向上一路太宰曰寒輝因達大師舉竹篦子話曰道是即觸道不是即背將謂此中有一語參數年乃白大師曰某今知此中無一語也達師乃掇轉曰此中正有一語還須參取豈非達大師善縱奪乎師笑曰只遮竹篦子話當時才舉起已太煞漏逗太煞落草了也那堪更引入此葛藤哉即彼向後有個深入處爭奈紆曲途路何祗如僧問馬祖離四句絶百非請師直指西來意此問不妨奇特而馬祖父子自然能出手眼不負來機日面月面頭白頭黑真可謂不負西天讖語馬駒踏殺天下人也公曰此去漢陽不遠黃鶴樓上題詩一頭白一頭黑今日益見大師師曰踏黃檗直公問大師曾見黃元公丁艱歸時雪關有把關一語否師曰未聞直曰雪關問元公見壽昌與天童事何如元公曰虎頭虎尾一齊收天童聞之曰元公正似做官人受了分上止斷得一平和官私師笑曰天童卻要説箇相似惜當時未遇一打老虎腰者耳雅虛問張無盡見兜率悅後其頌馬祖一喝江西從此立宗風特翻雪竇之案何如師笑曰無盡見地固是超絶仍跳不出大冶精金無變色之殺活鋒也如雪竇拈德山不答話公案云德山握閫外威權有當斷不斷不招其亂底劍在如此舉唱孰能及哉凡看古人公案不可執一偏知見彼固各有出身之路如僧問馬祖離四句話祖謂今日困問取智藏雖是他父子踏殺天下人你知此僧問智藏問海兄再問馬祖始終卻勘破此三老底意乎虛云此須是和尚始得師曰你也不得草草又問石霜昭首座答九峰一條白練去為明一色邊事九峰不肯首座即坐脫有何過處師曰可惜首座當機蹉過卻乃尋死大可笑也虛云九峰意旨何如師曰你道九峰夢見先師意也未虛曰和尚又作麼生師曰若我作首座見他曰若明得先師意我當如先師服侍便不待他舉話即應聲以大棒打出曰我遮裏容不得你遮般侍者豈不坐振先師宗風使九峰向三千里外自瞥地去哉虛禮謝而退李冢宰問如何是圓通為人處曰慣將飛劍斬精靈曰也有能斷命根者無曰死機不犯如何是向上事曰赤腳上刀山如何是末後句曰淚出痛腸如何是學人自己曰六親無靠骨肉無情如何是學人自己命根曰鏡裏栽花如何是命根不斷曰水中撈月如何大修行人命根亦不斷曰不因樵子徑爭到葛洪家如何不自肯去曰餓鬼思沙袋如何得自肯去曰劫賊入空房如何得大自在去曰成人不自在自在不成人如何得成人自在自在成人曰甜瓜徹蒂甜苦瓜連根苦曰恁麼則大解脫去也曰富嫌千口少貧恨一身多如何得正偏妙協曰類之不齊混則知處如何得功位雙超曰須知尊貴一路自別曰秖遮是向上不傳之妙否曰居士作麼相續去公作禮曰恩大難酬師默然戊寅圓通問答僧來參師曰何處來曰雲居來師曰明月湖有人試探竿否曰謝和尚指示師曰脫空謾語漢指示你甚麼僧無語師叱出荊藩國主聞師入楚過蘄州差官迎入宮庭供養王問曰大師慈悲降重願示法旨令得悟入師云殿下因何得知山僧王曰大師宗風何處不聞師云殿下自有法旨但能深心體究則無一時不悟入也王云如何得佛法時時現前師云山僧本是方外如何得入王宮王云此是大師願力師云不因殿下何緣得入王云覿面相對還可當佛法否師云殿下現前指出那一事是世法王云須是大師點破始得師云殿下還記得靈山付囑的事麼王曰不因今日未免忘卻師微笑世子禮拜師云世子還記得麼王曰請大師授記師云授記已久也王曰若不夙生授記安得復遇慈顏師云此可謂真從靈山付囑來也因請法名大登字嗣聖世子禮謝復請為王妃授記及開示宮中慈悲喜捨戒殺持齋參究自己性命兼修六度莊嚴為世世依正報相之事于是闔宮歡喜王因問太祖從何修而獲此師云此夙修已成菩提示現帝王身以説法度生安立世界者也王曰今日大師不異釋迦入波斯王宮轉大法輪令宮內外皆得種成佛因緣惟大師常應願求使終得成就也師云殿下常使摩尼不昧則與蒼生作大檀施矣王問法要五日師堅辭乃差官送歸圓通設供謝法九江兵憲黃公過訪圓通問云弟子常參此宗歷年已久曾未得箇入處大師何以指示師云台駕冒雪而來跋踄甚是不易公云大師亦還以話頭指示人否師云只今話頭亦不少也公云爭奈了無入處師云公也不得當面諱卻公喏喏及出門師顧公云還記得藥山門前風景麼公云是甚風景師指空中雪云片片不落別處聻公云謝大師指示師云前頭更有數峰奇還須與公看過公乃笑揖而別後師因赴能仁會與公茶次因問云我等自知此事大難今日出來做官更覺多事也師云公正須向此處一一透過始于生死得力不見古人要於異類中行即刀山劍樹須全身拶入乃得大解脫法若在死水裏浸殺何處有出身活路公云遮般作用恐亦不易承當師云甕裏何曾走卻鱉公喜甚一日又過圓通問師近來參禪人皆依大慧中峰提話頭起疑情今大師何以接引後學師云宋元已前但能使人疑情起不肯教人起疑情山僧雖無實法與人然亦不敢孤負來機公云畢竟有何方便師云公且將自己本命元辰掀翻著公不語師云公曾參究甚麼來曰萬法歸一一歸何處師云秪如趙州云我在青州作一領布衫重七斤意作麼生公云不會師云趙州當時見僧問萬法歸一一歸何處如何不下一喝打一棒卻乃恁麼答去此正古人殺人刀活人劍也何曾以死語死法使天下人作焦芽敗種哉公曰如何是生機一路師驀呼公二侍人二侍人趨前師拈一片果子問云遮箇是甚麼對曰核桃肉師云不是不是去侍人去師云且喜二人俱無所知若是蘇子瞻輩又作許多禪道佛法會也師復呼侍人前來侍近前師云遮箇你也應有分各分一半喫去二侍接去師云好生喫公時悚然師云山僧太煞罪過公云遮箇境界不能時時現前何也師云公雖參究此事秪為尋常日用打作兩橛耳若要與本分機用相應直須頭頭物物不得輕放過耳無分世法出世法即妻子煩雜公事綢繆正好時時提撕此事令主人常自惺惺便能遊戲聖凡操縱殺活所以於一切生死處自能作主有自繇分有出身路始可向有佛處坐斷無佛處稱尊也公云一向也知世法佛法元是無二及乎臨機應事又打作兩橛所以往往當面蹉過今幸大師指點頭頭不得放過令我全身拶入不勝痛快不勝警醒師云欲得省力須於直下便見所謂萬象之中獨露身聻公大喜揖謝金正希太史過訪茶次問師曰見箇甚麼道理便自肯去師云如劫賊入空房金曰賊以有所獲心始休既入空房則心益不休也師云誰教他妄起偷心又問如何能使弟子如廣額屠兒放下屠刀便云我是千佛一數師云好與三十棒公曰過在何處師云直饒公放下扇子曰我是金正希也好與三十棒況道我是佛乎公曰若不親自見是佛如何肯放下屠刀師乃揕其胸曰秖遮箇是甚麼還容得佛與金正希公乃喏喏良久又問大師如今日用還作麼生師因拈如意子示云遮箇是甚麼曰如意子師云知得秪遮是便自休去歇去將謂別更有不免向外馳求公曰知得他堪作何用師云與人敲枷打鎖起死回生全得渠底大機大用所謂知有者始解奉重不知者枉自顛倒耳公時爽然問難徹夜而去南昌問答建安王請齋問曰久仰大師宗風今幸慈悲降重師云殿下還記得靈山付囑底事麼王拱手曰全仗大師開示師云今日覿面相對儼然未曾相異王問法王與國王還有同別也無師云在法為法王中尊在國為國王中尊王云即國王亦必須以法為尊師云殿下一賽兩彩也王問一念未生時如何師云風前不露影王云一念已生後如何師云腳下泥三寸王云正當恁麼時如何師云金輪腦後看王云三千里外逢人時如何師云殿下須向頂門上行始得王云恁麼則萬里翱翔去也師云黃河徹底清王云謝大師指示師云也須殿下自肯承當始得師因與諸宗侯問答開示後王又問曰世尊説法四十九年未曾説一字大師遮段指示還曾道著也無師出舌云看取山僧舌頭王云無舌時又作麼師云還要問麼王微笑南美宗侯因談及曾到曹溪師云見六祖大師麼公云見師云見衣鉢麼公云見師云衣鉢作麼生公云衣已殘鉢已破師提袖云我遮個還好在公不語師云鉢既破六祖將甚麼喫飯公云遮個須問大師師云恁麼則勸公一杯茶著公擬對師云擬議時大庾嶺頭便提不起也建安王問永寧古剎馬祖道場今朝大師升座人天瞻仰設何權巧方便接引師云今幸殿下親自證明問鳴鐘擊鼓説法已竟大師莫是重下注腳麼師云殿下已向聲前具得遮隻眼麼問臨濟一喝有賓有主賓主且置如何是一喝師云也須當機承領始得問千聖籠罩不住的萬魔窺伺不得的還有壞時也無師云且喜話頭猶在問玄沙要一擔無底桶子不知要他作麼師云縱有遮擔子秖恐玄沙無安置處問有拄杖子又與個拄杖子未審還與個什麼師云圓通遮箇如意從來無人疑著王大喜曰不特江西從此立宗風將令震旦從此開佛國去也鄒端侯居士問云弟子嘗自參究了不與此宗相應何也師云如今見前有甚麼不相應處秖為盡天下人參禪皆是念念放過了自己好好底安身立命處乃用他傍瞥分別識心轉轉活不得死所以於此無分別自覺聖智境界轉轉不相應也問或有一二人能承當此宗者亦秖是知有箇事而此心於無分別境中尚在半死半活間較彼世諦粗惡習氣稍稍輕清灑落些子然此根本偷心未能大死到盡安得絶後重蘇振發此本分機用於三墮縱橫中超出正遍功位情見語意而絶無滲漏哉果有一人念念不敢昧滅自己忽然勘破此幾一念死盡傍瞥偷心則此真大闡提秉殺活劍橫揮直掃更無有一毫生死冤親聖凡是非之法而得當此鋒也今人參禪所以不能大徹大悟直截根源者正以未達念念本自無私所以妄起凡聖是非之心自為顛倒障惑豈此念念無私之外別有一法能為我心之障惑哉故吾洞上宗旨全在初心知此一念無私如獅子哮吼頓斷一切傍瞥之念則始終造詣皆有轉身出路更可以不斷聲色不捨異類不執尊貴如石牛步步火中行返顧不銜日邊草也又何有逆順是非之相應不相應哉居士大喜曰此大師擊塗毒鼓揮吹毛劍斷盡天下萬世參學人之命根也乃禮拜而謝師問群公江西稱為選佛場且道當日選甚麼人作佛黃公云便請大師指點師云我要個鼻孔遼天底進云須令他臭個宗眼始得師云水上駕鐵船還讓他龐老進云大師手眼何在師云一箭射一群也進云畢竟還有選去的麼師云我遮裏個個都選來進云玉石何分師云華嚴五十三善知識還有主伴正偏也無公云莫是一味總成真麼師云碧眼胡僧不點頭進云他有甚長處師云好手之中呈好手紅心中裏貫紅心公云恁麼則今日重開選佛再見馬駒也師云且看遮龐公能攪亂叢林不公云弟子不敢造次師微笑云毒物司理黃公舉余集老問雪嶠大師云徑山不動軒為甚被大水推倒請和尚著一語師云隨流始得妙公云雪師答云禮下于人必有所求師云求個甚麼公云賺殺人復舉雪師問余中丞我欲隨喜南京報恩塔未審塔頂門幾時開請和尚亦著一語師云霹轟轟地公笑云余老答云尖溜溜地師云一任人卜度黃公問如何是有禪無淨土師云月籠丹桂遠星拱北辰高進云如何是無禪有淨土師云草枯鷹眼疾雪淨馬蹄輕進云如何是有禪有淨土師云腰纏十萬貫跨鶴上楊州進云如何是無禪無淨土師云舉頭天外望誰是遮般人進云淨土與禪宗還有同別也無師云客路如天遠侯門似海深進云永明壽作四料揀意旨如何師云為憐三歲子不惜兩莖眉進云和尚全提祖令亦教人修淨土也無師云坐斷十方還我本分事來公云恁麼則一賽兩彩也鄱湖舟中別黃司理答壽昌蘊石關主十二問問新壽昌開法圓通為是用惡辣鋤钁抑是單賣死貓頭黃答曰惱亂叢林師云看取令行時問投子在圓通打睡醒了也未黃答曰徹困師云遮尿床鬼子問太陽以皮履寄遠公為是預先知有為是夜半雙陸亦是別有道理黃答曰冤有頭債有主師云賊無種相哄弄問知恩深處報恩深投子恁麼承嗣恐亦報恩未盡黃答曰小蟲吞大蟲師云問取石女兒問覆船之舟楫未備好山之耕作未收和尚遽爾他往不亦辜負兩頭麼黃答曰我從來疑著遮漢師云怎怪得老僧問華嚴會上不離菩提座上升天宮和尚今日全身出沒亦伎倆有限麼黃答曰你向甚麼處見禿驢師云寐語作麼問今日匡廬之行仗甚麼過鄱陽湖黃答曰隨風倒舵師云借闍黎背上著草鞋問若遇粗行沙門作麼抵對黃答曰圓通賣弄死貓頭師曰一鋤兩段問昔年開先撞倒鐘樓今日打在門首過亦欠他草鞋錢麼黃答曰心不負人面無愧色師云闍黎也須親到一回始得問冒暑過匡廬往還經數次拄杖頭撥著一個兩個也無黃答曰三三兩兩師云驗取居士拄杖子看問圓通開場一著居士先下手矣又用新壽昌重整旗鎗作麼黃答曰耕問奴織問婢師云你見山僧底邊幅麼蘊曰某甲仍有一問托大居士侯和尚進圓通最初上堂時節呈之不得著訛字句先後時刻也黃答曰仲文不作賣書郵別黃司理答余用晦居士九問問馬祖踏殺天下龐公吸盡西江如何學人終日奔波為是那邊不明遮邊不了黃答曰蚊子咬鐵牛師云何不濃煎薑茶喫兩三碗問三腳驢子因甚千里駒也趁不及黃答曰畜生不得無禮師云破頭山下拾枯枝問三人玩月南泉超然物外如何是物外黃答曰剎竿頭上挂燈籠師云弄光影漢有甚麼限問巖頭兩舉末後句畢竟是有是無是同是別黃答曰矢上加尖師云滿口雌黃心似蝎問一里兩里狗眼見鬼三工四工牛目知風何也黃答曰好與一坑埋卻師云見怪者心惑問捏殺三千祖槌扁作扇搖上書一箇字兩點又三勾是何心行黃答曰狼籍不少師云不許攙行奪市問雲巖不知有意旨如何黃答曰東家人死西家助哀師云他家自有靈符在問無雲生嶺上有月落波心過在甚麼處黃答曰露師云墻壁瓦礫問捏鼻捲席已太多生如何震威一喝直得三日耳聾聻黃答曰傷弓之鳥聞弦聲而驚師云遮納敗闕漢焉知有今日事師月夜間立與璞首座併諸子談及習氣難除之事座云璞亦思及於此有詩二句云最喜懶安解牧牛歸宗宣老可為儔請和尚代續末後二句師云欲知今日門前事車過分明兩道溝座禮拜師復曰豫昔在博山與雪關顏石二兄坐石曰二兄可作一詩讚我何如關應曰近日看山頭不動阿師卻有幾分頑豫曰此結語也關曰兄何不為起語乎豫曰芒鞋踏破幾重關未得身心徹底間近日看山頭不動阿師卻有幾分頑當時三人撫掌大笑座曰不因和尚今夜重舉幾遺落此奇事徑山問答機緣僧問徑山八十七代祖庭今幸和尚中興請問如何是中興事師云山僧拄杖未開封進云和尚大煞慈悲師云謝子殷勤請喫一棒僧禮退僧問諸祖各有門庭請問如何是和尚門庭師云幾時到遮裏僧云昨日師云在那裏安單僧云客房師云原來是門外漢進云如何是門內事師云闍黎且繞天下行腳去著僧便出師云一任滔滔師問僧何處來曰金粟師云在金粟作甚麼曰間住師云金粟那有間飯你喫曰遮裏未嘗不間師云我遮裏容你不得僧便喝師云遮弄精魂漢便打出僧問有句無句如藤倚樹樹倒藤枯句歸何處如何是句師打云逐語生解漢在遮裏作麼僧云畢竟句歸何處師打云且打斷葛藤著僧問百萬松杉雙徑杳三千樓閣五峰寒有人道杳字是繞字寒字是函字還是那個字更妙師云你曾到凌霄峰也未僧云曾到師云你那一對瞎窟眼只好出氣僧云和尚因何罵某甲師云好貨我罵你因僧問五位王子有同別也無師云一有多種二無兩般曰如何是誕生王子師云銀盤盛雪曰如何是朝生王子師云明月藏鷺曰如何是末生王子師云類之不齊曰如何是化生王子師云混則知處曰如何是內生王子師云夜半正明天曉不露進云五位王子還有父也無師云東宮雖正嫡不面帝堯顏進云恁麼則九重深密人難見也師云須知向上一路尊貴自別僧禮拜云謝師指示師云山僧失利僧問大慧竹篦子和尚也拈提否師云不拈曰為什不拈師云沒遮間工夫曰莫是和尚親切為人處也無師云浪蕩拾花針僧問和尚往年嘗用如意如何近來亦用拄杖師云禮防君子曰和尚也怕遮些狂禪和子麼師便打云正為如此行者問初祖云外息諸緣內心無喘心如墻壁乃可入道古人又道從緣薦得相應疾就體消停得力遲豈不與前相違師云兔角杖挑潭底月龜毛拂縛樹頭風進云內不放出外不放入始得相應觀音大士又道從聞思修入三摩地師云拋出沒孔鎚打碎空王腦進云馬祖升堂百丈捲席已深明昨日事後來一喝直得耳聾又是甚麼師云荊棘林下拔足月明簾外轉身進云南山起雲北山下雨即不問空生巖中晏坐帝釋因何雨花師云路逢死蛇莫打殺無底藍兒盛將歸進云發真歸元十方虛空消殞未審斯人何處安身立命師云癡人面前不得説夢者禮拜云今日某甲小出大遇師打云你道甚麼僧問昨日和尚開示二居士看一切公案與自己著語無論巧拙須先得個自己痛快痛快處莫便是省發麼師云痛快處是搔著癢處曰不癢不痛時如何師云頑皮怪肉有甚麼血性曰泥牛吼月木馬嘶風又如何師曰正是頑皮怪肉曰如何又解吼月嘶風師云爭奈你不痛快師一日示造東苑和尚塔因緣榜於殿左有僧見乃到方丈禮云某甲見東苑和尚塔已造了也師云塔造在那裏僧展兩手師云未在僧乃珍重而出復呈頌曰東苑靈塔逼塞虛空通身焦爛處處無蹤塔門沒縫八面玲瓏咦夾路桃花風雨後馬蹄無處避殘紅師覽云馬蹄無處避你作麼生承當僧云承當則有避處也師云煙霞生背面時如何僧云處處耀日輪師云待塔合尖著僧云合尖了也師云如何得一枝橫出僧云三十年後待某甲與和尚別通一箇消息師云只今作麼生僧云終不敢造次便禮退崇先機緣師問僧甚處來曰鼓山師曰不跨石門句有人道得無曰無人道得師曰可惜眉毛僧云請和上指示師曰緊峭草鞋去師問僧甚處來曰和上不知某甲來處麼師曰野狐精𨁝跳作麼曰情知和上有此一機師曰苦不是新羅僧禮拜師曰村夫喫橄欖師問僧曾見博山先和上否曰天界寺曾見師曰有甚麼言句曰有則有忘卻了也師曰前孤負眼睛後孤負耳朵曰如何得不孤負去師曰手長衫袖短腳瘦草鞋寬師問僧曾見天童和上否曰金粟時曾見師曰如何是棒下無生忍臨機不見師曰須是和上始得師曰掠虛頭漢自領出去師問僧去年貧不是貧今年貧始是貧你道香嚴在那裏安身立命曰錐也無立甚麼命師曰亡命漢向草裏滾作麼曰何處是草裏滾師曰黃連作馬鞭僧問如何是佛師曰未夢金人如何是法師曰不見白馬如何是僧師曰王庫無此刀如何是常住三寶師曰兩粥一飯如何奉持師曰朝看東南晚看西北還有知恩報恩者無師曰畢竟水從海裏去到頭雲信嶺邊歸僧問有問石頭和尚如何是道頭曰木頭又問如何是禪頭曰碌磚此意如何師曰藝壓當行僧云或問和尚如何是道作麼生師曰好皮不染皂問如何是禪曰好人不倩錢問此與石頭答有同別否師曰白馬廟前好繖鋪僧曰不會師曰木屐店在對門開僧曰恁麼一副要用也師云天晴不肯去直待雨淋頭僧禮拜師大笑曰消得消得僧問雲巖良久云秖遮是便可傳得真麼師曰洗木屐進云洞山為甚沉吟師云石頭搖進云如何又因過水睹影始乃大悟玄旨師云穿心國裏日如脂進云某甲不會師曰弱水如堪渡蓬萊人易登僧問知有底人如何行履師云燒火不用薪進云不知有底人如何指示他師云煮石念摩訶進云一朝瞥地時如何師云矮子上天梯病中垂六問問馬祖安因甚道日月面佛代云且喜和尚無恙維摩獨寢一床世尊問甚麼疾代云送人入火坑石霜首座自能坐脫立亡九峰侍者因甚謂他未會先師意代云須知石霜門下劍戟縱橫佛鑑佛眼憤出五祖祖具甚眼道待他大病一番始思量我代云還知祖父利害麼洞山病遣問雲居云雲巖路相次絶也如何先教伊遠立聲未絶果被一棒代云瞎驢滅卻正法眼吾有大病非也求醫代云某甲放參去也
