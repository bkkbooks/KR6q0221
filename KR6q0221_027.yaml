body:
  text: 門人大奇大忍大寧大杲較書札復梅長公中丞書有真骨性人被世界磨成無真骨性人被世界磨滅歷觀神聖英奇莫不遭危難而大有為所謂吉凶生大業乎今當治久而亂固是常事獨此幾希公道望人主張則天地之健順可不息也幸明公挺然以斯道自任復能力持出世性命之宗即使天下知有而不克承當彼或稍有戒心亦不敢故意作逆也況有乘風雷而自為變化者乎龍湖之龍砍額在此又復梅中丞書天下事皆有直捷簡要法有費盡平生才力竟不能得者有費盡平生才力而後始得者有不費一毫才力才入手便得者所謂國家可均爵祿可辭白刃可蹈中庸不可能而智愚賢不肖有過與不及之弊獨大舜得之則用其中於民顏淵得之則服膺而弗失其餘索隱行怪則無所忌憚矣釋迦談經四十九年老婆費盡腕頭力砧杵猶成斷續聲及至末後拈花始得一直捷簡要獨迦葉破顏領旨不啻夫子呼參而唯也後世不達其直捷反成無限淆訛又豈止不悟一千七百爛葛藤而已哉而佛聖之愈直捷轉使衆生之愈委曲自非善於隨機點化就路還家其鈍置人固不少耳所以山僧昨日答公拈花頌云世尊伎倆窮處才得一箇出身不是他家具眼依然腳底泥深不知高明以為何如答李夢白太宰書讀手諭深知為彼不肯參究者開一接引之機要於途路中指入堂奧之意正古人放行中有把住把住中有放行孤危平實就裏縱操皆親切為人處然先聖為人不圖目前取驗恐見小利而大事不成往往垂手下藥不使惑亂瞑眩則骨髓膏肓之疾終不瘳也如云有見公案話頭妄生穿鑿反生毀謗果有人焉能于真法穿鑿生謗則如人以惡心伐旃檀樹則彼身染香氣亦終得解脫也故曰不妨惑亂疑殺天下人是皆以異方便助發真實義也觀公之意即衲之意然衲雖如此答公而其為人垂手必須如公所示始可投今日之機也誰謂今日金粟如來床頭寶劍無殺活哉寄浦城雪生潘達書見子書與弔白臬及招魂傳嘯諸稿子之才過於識學激於情雖向慕古今奇特之士然終未專用力於默識以祈神悟耳夫默識之功即返觀天性也於無聲臭中密得領悟則神協天人自無物我不平之氣與今古無聊之辭矣昔夫子門下獨顏曾愚魯能克己慎獨絶無一毫外樂之思故其心齊坐忘神清金石自足與天地參正所謂虛室生白吉祥止止是也吾子方將琢巧以擬造物何若收其放心而恬養此浩然之充塞哉因賊亂與梅中丞書衲前年在麻城聞賊勢甚急而官長守城甚嚴城中士夫及富豪日夕多作計較私奔出城到山中作寨而寨多未成或惹起窮民變為土賊乘機殺掠日傳訛報驚駭愚民流離困苦自相殺亂及乎寇至城雖未破而城外人民自投鋒刃彼彼皆是也悲哉及今年再至麻城而城中士民以慣經不怪見四鄉百姓擁來城下官長輒令築城門點煙戶守城垛不問彼是有身家可戀不相通城外為亂否亦不問彼平日活計有餘可忍窮餓不奔走否彼賊果逼近則官長巡城點煙戶不在者責罰不知官才去而煙戶亦趨歸且怨恨賊不速來即開城從賊反得快忿而恣欲也適在河南鳳陽一路親見此病何曾賊善攻以破城是皆官長士夫憤激百姓私通外寇為內應而破城也夫天下守城之計莫善於保民保民之計莫善于察貧苦百姓使之有衣食度活有身家可戀則百姓用命不待教誡責罰自戮力死守矣古人以百姓為干城仁義為甲兵豈虛語乎又見有賊勢急遠遠於省城州府請官兵殊不知官兵亦他處百姓也竭盡庫廩錢糧以養官兵戕害百姓虜掠婦女樹頭草根無不剽盡官兵之毒慘有甚於流寇者何不以庫廩錢糧養我鄉黨親友父子骨肉為足食足兵之計以死守信義而不去哉近聞涿州馮因西邊闌入關公自散家財以給貧苦手執壺漿登城慰諭守城窮民使能下城斬賊首者懸賞金寶若干如有士夫富豪私奔出城者任百姓抄奪其家於是貧富無二貴賤一心而賊不敢窺則城為之守矣即壽州方孩未侍御亦嘗親見其若是此二公真天下保民守城之萬全策也蓋自古以得民為得天下欲治天下者捨百姓之心而能治天下者吾未見其可也我公素以經濟自命海內推重有邊才堪寄社稷之任今此麻城皆宗族鄉黨不能明目張膽以排難決義是擲宗祀鄉親於賊盜之鋒刃也安見能推忠孝于天下國家哉昨與大宰痛口說此亦大驚愕今特遣使迎公歸城急圖全策何故以小忿而退守一沈莊耶某嘗謂良醫不患病奇但患不察脈理與下藥良將不患敵詭但患不識賊機與制兵倘有以天下自任者凡有危疑險阻皆反求諸己平心處事平氣通情則天下古今治亂如庖丁解牛恢恢乎游刃有餘地矣道盛無狀唐突以公知我我知公故不敢避諱忌冒瀆尊嚴惟慈悲原諒幸甚復李太宰書承示答中丞公問著著皆有手眼據款斷案就中接引如趙括讀父書誤殺四十萬性命正是今日談文字禪誤墮生死也若真悟佛祖心法則縱橫機用又孰能當其鋒哉如四種貪欲料揀此四等人皆應病施藥如泥合水而垂利濟也雖然聖帝明王嘗使貪使欲使癡使詐以毒攻毒以病治病往往成大功業證大莊嚴所謂先以欲鉤牽後令入佛智是也蓋天下皆貪欲之藪如京師絶域無貪欲則人誰肯奔赴與拼命建功業哉即今沈莊集聚誰非貪欲之人乎獨有不貪不欲之人難度佛嘗呵為焦芽敗種無激發之機故當以彼可畏可患迫之投以毒藥惱亂之而起其疾以發其機其餘有貪欲之人隨其情欲以餌之又誰能逃此法網哉載讀中丞公復居士書竊見親履實踐所以觀自在菩薩必須行深般若岸頭始知五蘊皆妄識緣生無實性也若不深造到無實性無智亦無得處安能心無罣礙而出夢想顛倒而究竟涅槃得大安樂地耶盛嘗言八萬四千稱性功德智慧門門門皆有八萬四千魔王邪外把關據要水泄不通若非普門大士通身具八萬四千爍迦羅眼八萬四千毋陀羅手安能一一覷破一一打開此種種差別以大通廓徹此八萬四千功德智慧之法門哉如某漢者八萬四千當關之一邪魔耳惜公於此退屈更不就中發一大力尋出降魔劍照妖鏡鼓勇直前掃清天下以致太平也此公雖謂勘破誓不復為其冷腹最熱而實為某漢一戰而卻反使彼八萬魔軍之類益得昌熾而不可滅也我正欲公不忘夙憤發一大怒而掃清妖孽以報君父以安天下始快我心也即今日偏守護生堡而置西陵危城于櫐卯之上此實某所抱恨亦復視公如趙括讀父書也知我罪我豫何敢辭容日某當親謁沈莊願刳心以質正之寄吉州蕭伯玉次公古今藝藝是一則不可結款公案孰能于此目空天壤哉目空天壤猶半提也自策此杖於方外撥草瞻風第求一可與此杖敲擊者以慰生平而已盡生平不獲亦何負於獨往獨來以畢鄧林耶原非敢於分外侈求也承公伯仲深心檀護忽讀佳刻吹毛淬利其於天壤間超超乎格量之表矣此道談之如剝筍護之須如愛竹不知何以親切至此銅山西崩洛鐘東應郗公舉此以問遠公便是易耶遠公默然當時為遠公作何語方為匡廬石耳吐氣乎惟逢如是人不肯放過何待他日相逢始為絶倒復黃海岸公濟子至得接二手扎徹見為選聖建梵剎振宗風之心雖旻古佛再來其始終願力不過是也承諭赴閩蚤歸欲於觀星日向圓通受大菩薩戒此正公深契丹霞掩耳又能嚴樹律幢況此末法人多習漏為濁智流轉自非金剛大士挺力荷持則此梵網心地戒臺幾為草莽所侵安望有從正定而現萬德莊嚴以攝授群情哉此盛當刻日趨歸冒闍黎位以證盟盧能大士登壇受具而開天下之宗門也春間貴同年金正希過訪深能以大法自任與盛訂今冬山中結制必須親證大事又極致意凡士紳相從者必先令嚴肅戒鋒為入道前陳何期氣類有如此妙協乎欣慰欣慰復少司農巖犖戴公書附來書法末明說海澨陳人滄桑以來百苦交煎始知偌大乾坤無立錐地為未聞道者著腳處也夙生悲憤陡從兵火中喚出甲申之冬幸遇三峰下問石老和尚門人今大司成胡此菴老師不吝婆心成有加雖然覷得橛頭終以未能大用現前曲盡法奧為恨昨幼仁道兄來頒賜兩語録跽悉金鎞見大和尚不惜弄粥飯氣到處尋人乃知和尚求人之難與學人遇師之難其切一耳今因幼仁還敬啓洞上門庭即不問且問捶碎三門打翻露柱還我尊貴無上一路來時如何數千里外可為炙豬左膊也無直待血濺梵天始見老僧今日撇地明說頂禮可勝悲仰之至渴望喝聲祈即郵及法末明說合十百拜衲於方外為法求人已數十年矣近於江寧有陳旻昭諸公力為護法使此縣絲不墜今幸飛翰從空而下始知血性丈夫能於百苦交煎中悲憤而出且得與大司成胡公激揚此本分大事何奇特如之衲素神交者莫過陳百史想必嘗相倡酬此如幻解脫法門也當此之際有如是機緣得非佛祖不傳之慧命大有以振興乎雖然也須絶後重蘇底漢子始擔荷得始不自欺欺人昔者裴相國於壁影間喚起黃蘗幾番痛受鉗鎚陸大夫於鵝瓶裏呼出南泉未免深承錐拶張無盡得兜率辣手始能捉敗德山張子韶遭妙喜毒心乃得勘破物格諸作家是皆棒頭有眼明如日不變精金火裏看也如大居士果能捶碎三門打翻露柱自當得全機活脫大用現前也又何從人問如何若何向上向下別尋尊貴一路哉事不獲已大居士直須向佛祖無立腳處真的的得個轉身吐氣則如師子兒哮吼返擲縱橫自在更不假他人一毫威力便能獨蹈大方堪報不報之恩以助無為之化也到這裏正好與山僧相見復熊銓部雪堂居士書從來以知己為難而時節機緣為尤難即昔人亦有尚友千古者而恨生不同時也今山僧幸居士一見莫逆又能傾倒素心非不世之遇乎倘果能徹底參證本分大事正不妨於世出世而君親之恩佛祖之恩一賽兩彩也誠如手諭若未到心空及第透過鐵壁銀山真可謂門外打之繞一場懡㦬矣又何貴於世出世哉惟居士始終此旨是幸答唐宜之居士書問承居士手翰云學人晝間念佛至衰老之年淫欲尤其深恨豫曰祗恐所念未必切所恨未必深又謂乃夜間猶有不曾識面之女人入夢豫曰何物神通乃爾又謂雖未必有邪事而念頭上有不能作主者屢屢豫曰念底佛向何處去也乃使此妖魔屢屢又謂此明是夙習深重工夫不得力豫曰據此供是實則晝間所念之佛未切而作不得主也明矣又謂假若頓明心地之後此境還現也無豫曰待公悟後自知不著問人也又謂假若有境相亦不相妨否幸垂開示豫曰不特假若有此境既真有天堂之樂地獄之苦亦不相妨但有苦樂之夢而顛倒不如無苦樂之覺為解脫也不知公能觀覺時之假若有如夢中之真覺乎其或未然直須猛力喚醒主人公則雖夢裏明明有六趣何如覺後空空無大千哉又問昨日某請問自從無始貪嗔癡豫曰若知無始即悟無生生死本無貪嗔何有又謂既曰貪矣貪者即是始如何又說無始豫曰公未開口前這一問還有始也無又謂老師搖手弗令開口豫曰山僧打失手眼處最多又謂假使釋迦牟尼佛在座上此問還答也無豫曰佛豈有不答但莫問著臨濟德山又謂意者發明心地之後無始消息自然曉了此時不須言乎豫曰公未悟已自曉了若真箇悟後我也怕殺你又謂抑無始消息三世諸佛亦有難開口處故置而不言乎幸垂慈示豫曰若恁麼再參三十年秪恐仍在鬼窟裏作活計也且與公舉一則舊公案看昔有外道問世尊不問有言不問無言世尊良久外道讚歎曰世尊大慈開我迷雲令我得入乃禮拜而去阿難白佛外道得何道理稱讚而去世尊曰如世良馬見鞭影而行公且道世尊良久還是有難開口處否如何外道以為令我得入又入箇甚麼阿難是佛侍者如何作此問佛以為見鞭影且指何處為鞭影公以山僧搖手為不答話而世尊全無一語則佛無慈悲有不隨機答人話之過矣公也須這裏著眼看透始得不然則山僧鈍置公之罪不可以自懺也又謂修行人上乘煩惱即是菩提不須轉不須除也不須覺豫曰公見經中云知是空花即無輪轉知幻即離不作方便離幻即覺亦無漸次乎又謂盜賊與聖賢雖是同體然現行為盜賊豫曰空本無花捏目而有又謂如金入礦必須陶汰方始成金豫曰但了妄緣即如如佛又謂礦即是金是義然否豫曰妄依心起悟妄即心波因水生悟波即水何不可之有又謂既云不須轉矣相宗又言轉識成智二義相背否幸垂慈示豫曰有分別心名識無分別心名智此相宗所謂轉名不轉體六祖亦云五八六七果因轉但轉名言無實性若於轉處不留情繁興永處那伽定是也而法華實相妙義以是法非思量分別之所能解今公必欲分別明白不知至道無難唯嫌揀擇才有是非紛然失心乎若知此意則知維摩雖云善能分別諸法相而於第一義諦實不動也又謂如來出世原為大事因緣直指人心見性成佛豫曰若是本來心性成佛亦是假名又謂隨機接引隨問隨答蓋千變萬化而不可窮豫曰心外無法使彼法法頭頭自悟本心何不可窮之有又謂今宗門上堂拈香其詞意大約相同豫曰公能知同中之異異中之同則無宗教之疑矣又謂至門庭施設或用一棒隨人來皆一棒或用一喝隨人來皆一喝其以棒喝悟明者有之矣豫曰公亦知語默動靜喜笑怒罵處皆有機鋒棒喝能開悟人處也無又謂其棒喝而仍然昧者甚多也豫曰有終身于文字道理中昧然者亦不少然一等狂妄瞎禿借此胡喝亂棒以欺心欺世而賺誤天下者誠可恨也又謂譬如人病千般百樣總以一丸藥療之恐未能應病也豫曰至理一言轉凡成聖如世間果有神丹大藥之機鋒棒喝直當使人起死回生化骨成仙去也又豈特能療千般萬樣之妄病哉又謂古來宗師皆是大開手眼之人實其見不及此終守此法而不變易必有其故幸垂慈示豫曰此或公未及見古人作用不可以執死語守死法者以誣先聖也果有大開手眼之人死蛇也弄得活元不在法須看其人之作用則悟其故矣又謂昨承教理障難除不欲饒舌愚謂理障者自謂有得而欣欣守其營壘也豫曰此公說得著也又謂今某方抱惑而來若無一言解其疑惑問者自說問的話答者自說答的話未免有悵然失所之歎幸賜落草之談以解一時之惑旅次紙筆不恭翹切翹切或大衆中開示或賜書垂教皆隨師意豫曰此有數種有一種問東答東問西答西以水濟水以火益火者此增人業識枷上添鎖者也有一種問以分別答以無分別問以有情識答以無情識此以殺人刀為活人劍或以毒攻毒以楔出楔神出鬼沒正打傍敲令人悵然失其來意未嘗不是毒手令人自疑自參如郭功甫之聞上大人如張無盡之踏倒溺器如李翱之貴耳賤目如于頔之客作漢被黑風吹未嘗非婆心徹困落草相為也又何待借毛錐子向口中漉漉地處掃來以塗人面孔哉惟公以深心法門洞見天下皆有此疑故先為發藥耳此豈居士真有如此之繞之葛藤哉不敢有負來意奉復如此惟高明諒之復廣陵姚永言太僕書古云知有者始解奉重世人既不知有又安能自奉重哉衲嘗以子貢謂夫子之言性與天道不可得而聞者是渠自己悟得乃特地喚醒世人無徒聞夫子之文章也不然則孟子所謂見而知之聞而知之皆得繼其道統者又何物乎昔與黃元公金正希諸君子相與得以神交居士亦藉此見不可見聞不可聞之文章以神交也今薛更老歸獲接手教幸覽龍湖外録併佳作見寄深見虛懷過譽語妙心精當此時也幸陳旻昭諸公全身荷持此事更有高明如公能為此宗酬唱又何患末法不大相振起哉凌蒼老張稚公聞在廣陵奮迅之極皆欲即赴選佛我公必慨然偕來激揚矣可勝佇望寄木陳大師書久仰道風未獲快晤而別峰相見已非形跡矣近聞雪大師示寂雲門傳者多謬因思彥暗章二禪人相次而來審知有師為主末後大事則此凋秋雙樹愈見體露金風也可勝慰哉某濫席徑山續遭多故未克完大師祖庭公案誠山門不幸也適於金陵與諸護法商確又聞雲門諸公已有定議此正各成其是而公論曾不廢也況古人塔有舍利靈骨爪髮衣鉢等分供一方隨其親疏而奉之總不悖于法化茲既得師為至親必能深原大師生平精神意志所輕重而位置之則今日之舉措即天下後世之光範也某本局外何當預此以曾有請大師主祖庭之事似不容恝然付之不聞故先以法門大體始終為之議草必請正高明并質諸護法務使曲盡善美然後彼此皆千古有光統冀鑒裁為定區區毫楮不宣請雪嶠大師住持徑山書盛自庚辰秋於匡廬別大師入閩亦嘗修候然不奉教言已四閲星霜矣今秋從金陵來武林掃雲棲先太師塔即擬趨謁聞已飛錫別峰故不果也在京時承余未也諸公訂盛住黃山故於十月即歸光明寺為藏拙計護法諸公及鄒邑侯以徑山方在是非未定知金陵諸公及研窮上座與盛有方外緣特招主其席庶可息此餘紛而盛亦恃與南中諸公有夙好故慨然應之欲藉此以疏通其故而完美此勝事也仲冬十八勉而入院以慰其心亦因是通訂諸護法登山必請大師旋錫雙徑主持祖庭以快海內渴慕并俾盛返光明以踐前約豈不遂區區贊成法門之一念乎且盛前於廬山嘗與海岸計延大師主開先時竊有疑其中未實者盛力任之曰如果不諧盛當追圓通訥以方丈居白雲端之故事待大師也況此徑山是大師先住盛在後住昔妙喜嘗再住雙徑而愈興則今大師何獨不可重振五峰乎蓋盛之意知大師必不介意於去來在世諦流布中不妨留一則大公無我毋固毋必之機緣以啓迪此末俗也竊以大師為深知盛者必不以為虛衍故事乃敢仰扳諸護法與山中耆舊自來親迎法駕先布此懷伏惟允許與杭州嘉興諸護法求請雪大師公啓書近日海內先輩尊宿獨有雪大師其住雙徑靜室已久雖嘗開法於廬山長水乃應一期之命而非所坐道場也徑山實天下之祖庭偶以教律所居與宗門相左故有前此一變而大師反因是離山識者深為之惋歎焉衲去秋適來武林掃雲棲先太師塔即入黃山光明寺為藏拙計不意諸護法過推衲之為人特以徑山法席命主持之衲切念祖庭有難豈忍默視故慨然而應蓋欲藉此為主庶可挽回嫌隙及完美雪師住山三十年之高行也前已先修書達其必請主持之意復書雖是固辭然衲已先決之于心必成其事而使天下人以衲真實為法門成此揖讓之風不為欺飾深取罪于明眼也雖然此天下之公法也一去一就皆當以大法為重此正衲所以不負諸公之意亦所以成衲于法門作一勝事是必仍仗護法大公之心鈞鼎之力發一公啓請師主持則千古之下知一人之心即天下之心一山之事即萬世之事也惟諸公不忘付囑幸始終贊成山僧幸甚法門幸甚與槁木上座梅惠連既出世豈有不親來決擇於浪杖人者乎浪杖人既知惠連已出世豈有不親為激勵者乎此勢所必至無待更謀之也昨聞於太平蹉路路雖已蹉而人亦肯自蹉乎惠連今更號槁木此木非真槁然無生意者乎好當看取龍吟花噴底消息幸木公速速親向杖人道來耿玉齊居士小子從浙中來言於西湖舟上會天臺主人耿居士與淡然兄深詢杖人近狀幾笑破知己之口今且蒞政東越則此時庭前一株花切不可如夢相看以昧滅吾正法眼也杖人以別緣在白門不久當歸雙徑或我居士於省會尚可圖晤并討十七年來本參機緣與近日之作用何如杖人當不惜眉毛與一決擇也越中必於天童雪竇雲門諸尊宿處作大佛事不知曾有何敲唱幸有以慰我與陳旻昭居士偶讀武夷第一塔歌有云石屏崖下埋金鏡月黑風高千劫命自從擊碎珊瑚鞭不許諸人離險阱杖人乃蹴起曰不意我東苑先師一點毒血從大險阱飛入吾彀先中子心腑裏成一惡蠍斧斫不開也不知更能奪杖人無文印子與大地冤家作個飲恨咽氣之路否速速為我道來與蔡蓮西明府道不難於知而難於行有能一日行之則道未有不明於天下也孔子天縱之聖尚乃學無常師以多聞擇善而集其大成故能賢於衆聖焉其高弟學而優者每出仕必聞政於夫子夫子必以切於事情者告之如子賤子游輩能承其命於臨事亦必尊賢取友學道愛人以成其善政此古人之能知能行足以風法天下後世者也今我高明家學淵源天資又超朗出宰西秦則其舉賢赦過任怨任勞正下車之第一義也豫方外人何以此而塵冰鑑憶昔有懷未達或藉此亦所以陰翊聖道并酬知己之私又何嘗非以身心性命之旨而公諸天下乎琴劍之次不妨以徑山大慧全録王陽明文集及顏氏迪吉録載之以恣探討其於心法聖學治政經濟無有不講行將大有得於此也答陳百史少宰書衲前年在靈谷時偶溧陽一禪人持高明火宅狹門六問索衲下語時衲大笑曰答在陳公問中矣關吏問津尚合繻乎彼時北望已知火宅狹門牛車鞭影自不容己也客秋復來白門會令兄侍御公談及大居士淡泊自處加意巖壑性光流逸利於吹毛愈令人擊節痛快有此兼長自以為今日兼中妙協尚有所屬正藉明眼大人塤箎唱和而後振此黃鍾也山僧三十年來為法求人苦心片片今得苦心承當者得非親受靈山付囑特示於此大轉變中密為接續者乎古人所貴者心法相符正得其用也未一謀面而能親如骨肉是非侍御公之久參與衲密邇又孰能使吾與大居士至如此哉然當斯末法雕攰正有事在非徒說而已也千聖慧命別路激揚將誰為寄將誰為傳此衲之所以急急如救頭然如持絲命竊深有望於二丸輔太虛始不相負此一時之雷雨屯也此時青雲之端正是昆明池底劫火洞然雖欲不放舍身命亦可惜許公既不以衲為外人衲安敢不盡情剖露果然放舍身命自然不犯鋒芒桑林之舞四顧委土矣若傷大軱亦可惜許又答百史讀書先當辨人真是其人不可以形跡拘也藏身方外本為求人雖借著作寄意鑒諒者亦多至可與立與權者誠難旦暮遇矣老居士生平自矢者何如多生慧種何如天以奇世界煉公者何如遇此時位不負本來而能成大菩薩行為萬法之大成不開向上眼而可乎惟開向上眼而乘夙願力因立處之時位攪長河為酥酪則庶可以不孤負耳試問姚樞許衡與羅什之吞針澄圖之塔鈴有同別否復方潛夫中丞夢筆托孤于竹關乎竹關托孤于夢筆乎代明錯行忽爾妙協非感時義烏知消息誦至此處啞然一笑請更為公廣之水火托孤于土乎春秋托孤于冬乎道理托孤于象數乎百物托孤于一毫乎五倫托孤于師友乎正坐托孤于傍觀乎覆載托孤于虛空乎混沌托孤于天地乎三摩托孤于妙奢乎毗盧托孤于彌勒乎先咷後笑怨怒中和杏花藥樹真空妙有以貌例之無不反判果知其故皆一貫也直是業緣無回避處多生公願隨分自盡然不可不一原反窮致始享真不動心耳我公三世淵源研極不倦誠慮墨守理窟正坐傷鋒恰感此時隱几開徑豁然遁世之無悶藏身之無礙變易不易偕行消息更何疑乎豈待以蘇子瞻黃山谷李伯紀張子韶為比哉生于憂患天之鉗鎚既嘗蘗味索性苦瓠連根吞萬古風吐一口氣猶是冷灶熱血語也且問超乎甘苦不落計較者又在何處答黃玉耳居士致馬擎宇督臺奇男子偶然覕地別行一路自非人所能阻者三軍可奪帥匹夫不可奪志孔子信之矣竹關自為竹關豈杖人能按牛頭耶諸公若扯得出去自是諸公手段若扯他不動自是道人腳跟老僧只管看寄梅惠連槁木書昔衲與令兄中丞游小洛伽時正遇寇警衲有詩云大地驚危欲震鰲浮生何處腳跟牢洛伽原在風波上誰解乘流占步高今已十年只恐洛伽大士觀此夢事厭於疲勞不肯隨波逐浪孤負卻我此偈也居士試為我簡點此偈還無恙乎前日許天魚會豫於天界談我居士已披髮入山括天地於毫端囊古今於一念專以六時修蓮花淨業無乃太占地步於洛伽大士頂門上乎聞陳庇華亦把臂入社今日支許主盟陶謝齊收自當不讓東林矣不知耶舍如意尚能令石上淡影作虎溪聲否寄李公子拄杖哥書豫自己卯秋離麻城之後世事日見多變令先尊太宰翁雖仙去此心無一日不念拄杖哥年幼如不得正人君子扶持恐未免習俗移人而為賢者所難也孟子云天降大任勞筋餓體空乏拂亂以增益其所未能又謂孤臣孽子能居心慮患而求其必達夫人誰不勞苦空乏但無能增益其所未能而自達耳稍可容頭過身因循荏苒且陷溺蠅營狗苟矣自負負天者何限今拄杖哥亦可謂孽子矣能居心慮患以求必達而增益其所未能乎莫祗以操切世事造械衒術能計訾贏與世人較智角能為達也讀書見聖賢之心學道行聖賢之事必以格致慎獨為準其身能正則物正事正而家國俱達矣孰能以不正物事而欺誑之哉寄來龍湖開示諸篇時時過目如時時見我也寄大同嚴三求孝廉豫久不見三求乃於僧持手上讀懷友集見三求能取師友於格外又能卜逸山取千古逸事將知三求必能取逸師逸友而進於大宗師之逸死以享其大生也險阻人間有如此種種逸致則天地待人亦厚矣其亦不負為千古之逸人也夫與劉阮仙昨黃坤五過竹關以奇辨與無可往復赤幟羽扇賓則始終賓主則始終主觀者愕然阮仙居士驛騎頓勞何怪真長故入深源雲霧中耶幸得杖人來一笑而罷誰信得無用之用別路尊貴也乎凡事不徹其故未易入折攝場中由我時出也庖丁解牛而文惠君悟養生輪扁釋椎鑿而桓公化其糟粕矣何謂小出不是大遇復僧祥旦公書即馬嘉植昔有覿面不相見千里卻同風如西河獅子慣咬殺人之慈明以楊大年李文和見道穩密特意而晤果一酬一唱如撾毒鼓至今聞其聲尚未有絶者豫前曾於鴛湖會靈巖檗菴諸公談及晚近法門卒多點綴即有機鋒可觀了與生死性命無涉辟如真道士畫符略為塗抹便能驅雷遣將若假道士雖極盡咒水燒黃徒使野鬼見之撫笑又討甚死急乎彼時相推已知公為血性丈夫有著手心頭便判之風矣去秋於汝航處讀菜根佳什興味果爾蕭然喜為之和不意高明能不厭我葛藤於別峰相見且訂晤期將見此宗猶有仙人無婦玉女無夫之密也又何幸如之與吳子遠尊翁太史合蓮池憨山博山為一滴乳纍纍設問反復所以擁篲清道扶掖來學苦心哉居士為三一公之象賢獨子一念及此可不怵然所以繼志者乎挽近膩情黠識未嘗用剝蕉洗狗之力輒藉維摩大乘自恕其三毒實縱淫醟耳道且勿論身為之夭比比也念觀我太史甚安敢薄待子遠復吉州李梅公諸護法請住青原書庚辰洪都承大居士與劉西佩諸公延衲泰定及建安國主請主上藍一時宗風丕振皆不忘付囑之力也明年郭首龍居士親到廬山圓通挽衲主青原祖庭彼時以圓通事不能脫手後因楚江亂在吳越間幾二十年前在天界適台駕過訪獲與劉平老及旻昭笑峰友蒼諸子相會亦皆以護祖庭為囑此正時節因緣有待耳蓋青原七祖為曹溪長子首出群英後石頭下二支一藥山雲巖下出洞山一宗一天皇龍潭下出雲門法眼兩宗皆其源高流長也從來法道有興有廢使無興廢相尋則天地生殺之氣機亦息聖凡剝復之神化亦窮矣惟在人能通變則使佛聖皆不倦耳設世尊不有調達諸魔外攻擊則三明六通及諸莊嚴皆無繇發現所以維摩云衆生不病則我不病吾若不病則衆生病不能愈也正以諸佛功德莊嚴皆從衆生六十二見諸病中得龍樹馬鳴不因外道則不造論達磨不面壁不服毒則不能傳法二祖不立雪斷臂則不能安心得髓即六祖亦有室中揮刃之事傳此法者命如懸絲不其然乎自古佛聖英雄誰非以吉凶悔吝而生大業即二支五派之後獨存濟洞二宗子孫亦從近世始盛也山僧數十年正為祖宗大法不惜軀命而海內諸明眼咸能見諒以故到處建立非為一己之私今在浙中以先因護法請主皋亭崇先是真歇了禪師開山者茲五百年來祖塔祖庭幾于湮沒非乘此會後來未易於重振也青原今得笑峰主持使山僧為向上一位不更尊貴乎惟高明鑒原與韓聖秋大周高明天資不世出於道法踴躍如此當以慧命自愛先當發明向上事以持戒立德始能光輝之而酒色尤是伐性之斧切當痛戒庶幾有入道之候不然徒以口說是勝終是自暴棄也復毛尊素居士杖人自出世來遇大根器如焦弱侯諸老乃耆皓之年又曾心蕊曹能始李夢白梅長公耿九一黃元公金正希諸公皆退休於鼎沸之時相遇酬唱足以引發後昆而吾此法脈猶未及托囑至竺菴笑峰光雪無可輩出世分上不必較也天界遇賢昆仲英茂堪任高深亦以世艱莫深盤錯近於劍川提麗化參同最有關係今質我書義全提大快夙隱端有賴紹述矣去秋劉千里曾在越中數會已與談及此公自不肯輕易向去更有頭正尾正荷持者在也如蘇黃趙張亦何曾非深入虎穴再上重樓者乎即大手眼如黃龍雖代座泐潭終振起慈明之道妙喜不嗣湛堂而光大圓悟之宗況此時正當群吠影響哉非欲控人以自私而實為天下得人法門惜眼也居士與彼同事親密正宜使三楚宗風從此振作明春能不畏石頭路滑一親省杖人於皋亭乎惟為法自愛復龍三翁及石溪上座山僧生來實有賣心肝求人痛願以故不敢以大千世界有芥子許非我捨身命作佛事處然而就中求本色真知己為此慧命者又的有類不齊混不得一著子在亦嘗有語云人如比干心可剖心如比干人可友使能執此以繩世則當作孤風絶侶如船子倩人求法嗣未必可能得也何肯如雲巖向異類中行不露頭角即南泉道吾沒巴鼻老不免將黑豆子換卻他眼睛況其餘哉如山僧從前知己寧有過於李夢白黃元公者與彼數十年親相盤錯末後乃見得力此後獨我龍三翁與石溪公曾不謀面千里知心每接讀手書刀刀見血令我蹴然驚起愧彼先聖常遊化諸國犯難求人今有若而人能以生平不屈人者而甘心委命於我而我何心何行不心肯口肯相與質成況二公久於此道正如畫龍已成文不加點者又何風雷之能相送竊恐眼高品潔不耐時世將為絶侶之行欲托孤于萬世旦暮之遇也二公如果不屑屑於此則亦不應急於見山僧之入泥水一稱之為憂天憫人一稱之為赤子聖人此仲尼不敢當者我何敢直任觀此則深知孔子者莫如儀封以天將夫子為木鐸達巷黨人以大哉博學無所成名其超於長沮桀溺石門荷蕢諸人之偏於自知而何知有天地日月始能成此古今哉此山僧又剖孔子之心密我佛祖之意欲託命於智過師者舍此豈更別有尊貴之一路乎正我龍翁所謂造物不報之以人而報之以天能壞乾坤已壞之壞死藥汞假死之死則不啻於龍潭吹滅紙燭以一條白棒專打毗盧頂上行者也石上座謂此真血脈如鐵函心史終不可磨滅則又能剖比干之心於杖人所賣之心矣如此何求不得肯強自彌縫以自虧其渾全之本領乎逆知與天門洞庭一隊近況當更有相質正者在又復龍三三無心於天下求知己而有真知己者以不謀自合也有心於天下求知己而無真知己者以有謀卻背也端木氏以夫子之得邦家其諸異乎人之求之此深得不患人之不己知求為可知之妙吾宗有聞答泗州大聖話謂雲門兒孫猶在豈別有術哉正是深於致知而自能格物也今山僧之得遠交於公真快足我生平亦自有故豈肯以施設故事要於入門機鋒轉語而後為之真投契哉嗚呼末俗之流弊瞎千古平人之眼正在此也中靜赤膽忠心不讓古之孤臣孽子此來吳越使諸方皆知白雲問石和上有此最後侍者能痛切為師求較刻語録及乞塔銘以垂不泯只此亦惟公與檗老深見其始末又況有靈巖靈隱萬峰諸叔為之策勵此外孰能以一己之私而為彼此之異同乎幸公更須表述之使彼不敢自委當為之事正不負白雲和上是公輩親承之所自也山僧與公神交如此不更深於別峰相見者乎與出泥尹洞庭居士世固有風聞及觀其文字而如其人乃於親見其事更不知其人者有之又有風聞及觀其文字而不信其人乃於親見其事始深知其人者有之或初見而疑信相半及久與之同事而後深悟其人之真僞者有之使此三種人自求其故亦有不知其所以然者此千古神理之妙有不可偏執心境以求之而自能傳其造化之宗脈也以故佛祖聖賢於世出世法但深自求其精密以交接人而待其人自造自入自悟自證更不強其人如何造入悟證此機緣也於是乎言曰此向上一路千聖不傳末後牢關直須親透如此則不獨在參學分上即為人分上皆當以此自勉也今之為人者不能以此自勉乃執此以督貴學人不更與自己本分草料轉沒交涉乎即山僧與公初會於金陵興善及牛首與杭之淨慈更於天界以書札相通有年亦兼於聞知見知而山僧之所以懷公公之所以懷山僧兩皆不知其所以能然也此中又誰能蛇足乎雖然也須公與山僧於生死性命中有自肯處有出脫處有不可相欺處則可謂向上不傳之真知己也不則世間豈無以文字道理與人情世事各自以為能知己者哉寄些菴郭天門居士千古萬古只有遮些子千變萬化只有遮些子遮些子通則世出世法無有不通者遮些子不通即自己一身底根塵識與日用動靜生死性命皆不通也又何能通彼六凡四聖之種種法界為吾一心之法界哉秪如世間人有能通遮些子不能通那些子有能通文字道理而不能通人情世事有能通機鋒妙密而不能通生死性命者何也此正是不能真通遮些子也果能通遮些子則又何生死性命夢想顛倒之能惑亂哉所謂通遮些子者正要通生死性命夢想顛倒遮些子也如公高明以此自命為楚些乎為遮些乎果能為遮些子必須有箇自肯處必須于佛祖聖賢世出世法有箇大透脫始得不然公與龍三翁及檗菴洞庭石溪諸公平生相逼拶者是那些乎當此時世當此機會肯如此瞞頇而不大作箇徹底打透之事乎前年承公過訪於蕪湖六度菴一見莫逆亦深知公是箇不肯自欺底人必不肯得少為足必不肯如假死汞銀不可見生死之洪爐也惜乎不曾久相盤錯別來應更有出脫處中靜歸藉此一訊高明幸有以慰我于千里之外庶不負遮些子神交也辭杭嘉湖諸護法請再住徑山書甲申冬山僧承諸護法請主徑山已為祖庭一番安置而往金陵忽當此時山中多故而虛其席又承諸護法公舉於當道宰官力請山僧復主祖庭山僧業住崇光曾面對張方伯范兵憲諸公再三辭之矣今日諸當道公啓又到山中諸耆舊亦來足見護法深心山僧已領其意然決不敢應命亦使一等人不言而喻也蓋護法以扶樹正宗為主既能請山僧主持祖庭又肯使山僧保全大體則請者辭者兩皆有光此又勝於再主祖庭再倡祖道而護持正法眼藏莫更全美于此矣況天下尊宿甚多耶惟大護法見亮與劉潛柱居士江南宗門之盛曾不過三十年來而衰濫之極過於唐宋之末此亦風運之所致也不有振古真人孰能挽回既倒之狂瀾乎前自吾壽昌崛起江西而承嗣者獨博山東苑二師一顯一隱門堂大峻傳法者命如縣絲而雪關兄早逝獨區區責任在己故不惜軀命求人幾四十年然所遇名公幾滿天下求其如李夢白黃元公余集生諸公能自參究挺身為我法者甚少即有之亦但外護不克如龐裴楊李諸老必以參透生死牢關親證佛祖宗旨表表於傳燈足為千古之心眼也至若今日能以內外自護慧命必欲親取證此心法者獨見居士與陳旻老幾費草鞋如三登九上之矢志不委耳古人亦有寬於性命以得少為足如蘇子瞻之自謂印可於東林及借座於佛印假稱於玉泉每自失機張無盡亦自謂再參兜率已得末後句不免又為真淨覺範所奪只此亦可為參證淆訛之激勵也今日此宗之濫又何曾兢兢以性命為宗本哉山僧此說在居士已熟有成鑒果能以求師友徹證己躬而為吾宗主盟則世出世法均有賴也豈非山僧與居士世交法脈之源流有所自哉復錢牧齊老居士書山僧昔年以痛念法門濫壞故於植聖草中有五大著述之作今幸老居士具擇法眼見此深為擊節當不畏百倍之難於集景德傳燈時且欲多方身贊其事此非如看兩大蟲相咬之機忽然觸發八角磨盤空裏走而作獅子吼以震動北斗南辰之祕哉吾宗洞下諸祖語録著述甚少獨投子青丹霞淳天童覺真歇了四祖有拈古頌古與雪竇顯並傳於世而宏智真歇二祖語録久已散失近聞毛子晉居士有舊刻本正擬求之晉公與老居士最是密邇乞轉致之使得重梓又使二祖再生而法乳橫流於無盡也今有宏祖與歇祖所作塔銘呈上可見妙絶千古彼時妙喜善罵諸方獨推重智歇二祖則其為迥出常流可知矣惟高明留神是幸屢接台教何深心至此正以從上諸宗語録行實機緣如紫柏大師密藏開公遺稿皆當到處采訪以存此大法慧命聞吳中有續古高僧傳如惲道生家多藏舊本或得便求之共成勝事此全在大護法垂手遍索也承命作募刻夢遊全集疏并讀淡歸釋公記事得此緣起甚妙如貴邑瞿幻寄編指月録此公手眼不讓古人已為彼采集作傳稿在白門當即彙出一大快事也拙作幸而引玉又特作獅子一吼矣寄示無可智公老胡西來踏翻震旦盤子立倚天長劍使絶代英雄皆從渠乞命逮二支奔放五派橫流更出淆訛別施殺活雖有神奸莫能反款及乎蟲生獅肉狐假虎皮僭竊成褫詭詐交易而符劍失真邪異得計安知更無踏翻此盤從彼乞命者乎此杖人隱忍的有不容自己者在也你智子於此又何敢自委乎彼臥薪嘗膽破釜焚舟為何事而吾宗正丁此時如不能於無門創開不測之門無毒拈出不傳之毒則又何足使此能作向上主盟別展逆流手眼乎聞子已出龍眠隱於匡廬當以破籃一莖慎自變化之寄秋嶽曹居士衲前在龍淵真塔正當擊水尋珠聚沙稱佛之時而高軒偕葵翁屢顧如春風吹卉花鳥逞機自應有冷眼俊心觸發天分者得非主賓酬唱之妙密哉友蒼比來又承慰致愈見旋乾轉坤輻湊時至幾自有在耳錢牧老以憨大師全集屬序相傳寫正本幸我公在粵中搜得之今使法乳流通則曹溪肉祖儼然未壞也文節師來乃知至孝格心得見親啓手足靈源以逝者如斯所讀萬卷書今在何處父子間當有不隔者悟此薪傳之密則何詫徐師川獨入燈林哉特述慰詩聊表微意嘉禾拙録并塵慧眼或笑故紙有時亦堪合藥也惟清幃中不惜眉毛看紅輪決定沉西去也無幸有以示我復劉覺岸居士杖人嘗以吾宗最盛莫過於唐宋彼時二支五派交錯縱橫而師承妙密國王宰臣具擇法眼者甚多護持正法易為力也至近代獨有濟洞二宗不絶自壽昌雲門天童罄山諸老崛起雖是中興還同草創而後之師法多有混濫而具擇法眼者甚少或此後當多有因邪打正者出也杖人最奇是前集指月録之瞿公彼雖曾親近達大師而其手眼有無師智自然智不讓古之作者杖人嘗令笑峰無可細採其事入於傳燈正宗更別為傳集而流通之如龐居士録可單行也余於金陵最喜居士不事邊幅能於底裏著到正當與笑峰無可輩相與砥勵使此正法眼不致混亂即杖人之所以望公當如楊大年之能透悟而修傳燈瞿幻寄之能省發而集指月豈不千古有同風哉復王子京居士杖人自鍾山與居士論出處之有時果至後來神幻百出此正是造物不欲置人於死地而以活法變化之也有一等自負遮天作略到此曾有一籌成驗乎可見真作略全在生死急難中迫出來也凡小百姓則不在此論如二乘人以出生死為重涉生死為破戒大士以度生死為重以遠生死為破戒使皆以冒難遊行為犯輕垢必不可則釋迦不說我以提婆達多入諸磨難故得成無上莊嚴又如善財已發菩提心必遍參勝熱婆羅門無厭足王於刀山劍樹得大如幻三昧何曾以坐在黑豆未生芽前為得大遊戲乎試問今日不間介人還入山中得不犯嫌疑乎還入朝市得不免諱忌乎如此較之則我與公皆不可一己之私而害造化之妙密也正要公參大冶紅爐禪三墮縱橫禪若喫老婆飯抱不哭孩子說不能說大話將欺閻閭哉好生努力向自己逆順心中切切參證非欲公好惹事向外去打埋以賊夫人之子也試問居士一口氣不來時安排箇甚麼出處好與紀伯紫居士杖人嘗與梅長公云真有骨性人被世界磨成真無骨性人被世界磨滅如此世界在吾子亦可謂備嘗其風味矣可能謂有骨性人被世界磨成者乎果遮世界能磨成其人乎速須猛自提起勿一差二誤尋救手不著也如作巫師人要去捉鬼先要有藏身法使鬼捉我不得則可自古未有不立身於不可勝之地而能勝人且不為人所勝者也立不可勝之地是何地乎早不尋此安身立命不為生死所侵處終無以自勝也況我期子有向上事在可不破釜焚舟以自圖之復嚴三求居士居士昔於靈谷結制時與竺菴諸子法戰更於印海處閉關半夜大叫打破漆桶被杖人捉住直得目瞪乃推出旋作偈呈悟即時扯破乃喻之以錢塘忠懿王納土於宋設彼於身國性命有一毫捨不得則太宗肯慨令彼復王於越哉此正是懸崖撒手絶後重蘇始得如回途石馬出紗籠且能踏殺天下人也居士自此遭世變幻深能韜晦不敢妄生節目此亦神龍出沒無人能窺其首尾也必如何為我出一手眼扶此不倒之光幢乎今承手札殷至特題小像命阿劍別子持與居士好知此題非贊杖人即是居士贊且作麼生能如楊大年使八角磨盤向我傳燈中遍作獅子吼乎幸有以慰我寄天童木陳和上客秋獲睹光儀消盛數十年寤寐惜未久領玄誨啓我頑蒙然亦不減道存目擊也愚菴兄從四明歸極稱太白風光愈見於大多勝此不特為法門慰籍矣淮上嵩乳兄幸大師以大法為公讚序扶獎深用感激盛素所無狀今住皋亭破院百廢莫舉亦秪苟全衰病而已每於寂寥中懷想海內所得知己者莫過於大師與愚菴靈巖三四老友為最親密賦詩自慰卻又夷然今特奉質高明或不擲我於不屑也拙刻雖多荒穢之極板在江南未全印便附數冊先乞揮斤曷勝顒望復西湖愚菴和上弟無似今得倚杖越中籍法兄木老繼老二三良友交光披拂亦足以慰此孤寂則所幸者多矣而老兄至親注念尤切人生於世又何加焉讀預囑稿振勵神奇西子湖摩蕩千古別有一段天機存此不傳之祕也木老書序引弄弟之贅辭而化出精異此又妙於僧繇之點眼也安得高什時時啓我之盲瞶乎尊體本質淳粹暫爾怠倦寒梅忍俊不禁時則皋亭專望老頭陀一快笑也惟時珍愛不一寄靈巖繼起和上盛嘗以世界之大古今之遠而歷世能主盟此名教宗旨而不可以昧滅者不過數人其餘皆附和贊成雖少有乖異適足以成其機用之變化也自古有天資者誰不謂能主盟哉或此中不能開心見誠以感格天下亦終不濟於名教宗旨反資其無忌憚者以成大滲漏卻難於挽救也是故佛聖之道皆貴乎至誠無欺所謂誠則著著則明明則動動則變變則化唯天下至誠為能化是也如此誰謂世法出世法有異致哉岐而二之者特以名教之於身世以宗旨之於性命自相懸絶耳如仲尼與釋迦會遇肯自異乎故盛在太平時曾作斯文宗旨難得知己說以就質法眼正以此也昔妙喜善貶剝諸方晚年嘗於雪峰訪真歇於天童訪宏智至今以為法門標格盛在今日得與法座天童愚菴諸老獨相親密不能自解者豈非各自開心見誠之所致哉故前有懷三友詩托石溪道者持上正使我輩為此宗主盟不致於異人所變亂又安知吾輩之仰前人不猶後人之仰今人哉偶有所見特書此附衲子歸山呈教不一復瀋陽祖心可姪禪師余杖人嘗有脫空不可必之語云人如比干心可剖心如比干人可友又云有能為千古傷心之人則能為萬世快心之事亦自笑之果以此法求人則千古亦不多得也雖然世固不可多得有以大法自持斯文自命者而不以此眼而求此心則將何以立身處道而不為自欺欺世之人哉今讀老姪書益見千古之傷心有在端然不是脫空千古之痛眼未亡的然自是可必果有此痛眼能為此傷心果有此痛心能為此快事則余前此的非謾語的非可求於天下人也來書中句句非字而字字皆血心也字字可激英雄也字字可泣鬼神也字字可痛佛祖也字字可破癡頑也可解不可解之連環也可刻不可刻之心印也子亦無復重敘原委也蓋來書已滿盤揭露若隱若顯若僞若真橫拈倒用傍打正敲其縱奪殺活已曲盡其機神矣即吾未答之意已先在言中即吾欲答之言已先在意裏至苦心為壽昌博山華首祖父法脈之深微并余與老姪自匡山白門於南北之分及天然姪笑峰友蒼旻昭諸公之能同此眼此心於傳燈正宗有可質正不可質正者皆在此中無餘蘊矣去年從博山歸浙倚杖皋亭今夏友公持此書來不勝悲感聊勒此附復惟為法自愛是囑主博山時復何觀我書公諱三省衲在廬山與黃海岸談天下士輒稱居士高明當為吾宗過量人海岸已作古矣忽接手教先得同然真不禁搔著生平庠處衲自承壽昌先祖記別來四十年求人若止為吾洞宗探取此逆流者則是世間有外人心中有外法矣裴公美不云乎夫血氣之屬必有知凡有知者必同體衲所求于有知同體之間雖繇迷悟而感聖凡又豈肯以世出世間而分其體哉即別傳五宗异唱同風而洞上獨以君臣父子主賓正偏功位內紹外紹五位三墮玄關金鎖鳥道玄路種種綱宗以簡擇聖凡之偷心透徹佛祖之祕旨何其密乎後學不知先聖立法之微輒或泥五宗之門庭而失別傳之指歸此又何足於世出世法而能兼中妙協其有知同體也乎故衲以此宗難得其妙乃於集成鼎定惓惓不能自已也前得竺菴成能荷祖庭之事復得笑峰然無可智旻昭中諸子尚堪任此今返西江又幸高明能協諸公不謀面而應幾得先聲而薦旨則壽昌博山之空答呼應密證妙心共印全提當有坐我匡床奪此柱杖者不在破顏分付之後也千古痛快無踰此時茲度歲於夢筆開春即歸博山定常住事後或爾振杖而行應不負此嘉命也
