body:
  text: 門人大選大補大聞大渡較贊毗婆尸佛過去莊嚴劫第九百九十八尊身從無相生已是招箭垛擒賊須擒王射人先射馬阿誰傳謂早留心至今不知燈是火只這一箇不得妙兮儼見你槃頭婆提亦自安排不下尸棄佛莊嚴劫第九百九十九尊試問父母未生前明相光耀何處見此身如沫心如風芬陀利花春已遍幻出無根實性空我不是渠渠孰薦毗舍浮佛莊嚴劫第一千尊舉終便見始那有可借你喚作前境甚脫空心不有兮誰主使笑殺婆羅樹下人畫箇石丸與飢子拘留孫佛見在賢劫第一尊因父得禮我而母善抽枝安和城中坐尸利撒泥打樓太煞奇了得身心本性空留些佛火燒口皮拘那含牟尼佛賢劫第二尊知之一字妙禍同根坦然不怖於生死清淨城中月一痕坐烏暫兮銀碗盛雪赴來機兮導師雷門迦葉佛賢劫第三尊放光開此迷幻打鼓大集三軍唱出無生曲子尼拘樹下如雲只要檀郎認得何辭呼玉頻頻釋迦牟尼佛賢劫第四尊冤有頭兮債有主生來作怪噴毒乳淨梵王官恩怨深一箭射透九鐵鼓驀然踏破漆桶城斷貫索穿邪外虎雪山打失眼中星賺殺迷頭幾千古撒五時之漫天網拈末後之不傳弩多子塔前成浪聞金襴破綻待誰補第一祖摩訶迦葉尊者西天二十七祖煆金粧佛面誘來好女成煙糞草滅意根藉沒靈山家産見拈花而微笑瞿曇驀地轉機將法眼以傳心飲光憑空受纍更結集兮藥中多毒入雞山也雪上加霜第二祖阿難尊者侍佛出頂取頷下驪冷灶著火而發爆欲鉤牽人於不疑善啓無門鑰慣鋸沒孔錘拶師兄別傳漏逗倒剎竿刺在爛泥更有弄絲兮可危乃於撒手兮得兒第三祖商那和修尊者九枝草未萌聖人已自表五百同參獨吼獅降伏火龍光北斗吒利逢問年髮老心白否如金解博金心法還自剖枯木巖前懈慢生指空香乳從何有千聖三昧不相知十八變中看突曉第四祖優波鞠多尊者狹路投機悟性即為給侍波旬作嬈入定已見狂迷人狗蛇底花冠誰不喜戴從地倒底法子我豈相欺落草尋尼觸鉢是何粗行置籌度衆克肘得箇馨兒捉敗無相好佛和贓總與茶毗第五祖提多迦尊者此是何香穿卻西天鼻孔出家無我通達諸佛常心夢金日光照乾坤湧寶山法流今古不變異處去逢渠是我同參何物阿私仙懸記報分六劫從緣薦得自相應到此方能無滲漏第六祖彌遮迦尊者受人付囑此身何敢躲根遊化北天睹氣而思法嗣觸器負淨闤闠中手眼誰靈識我何方稱名後心因自在禪祖第七如來寶座已先登賢劫再來宣傳至教符尊記癡人面前切忌説夢湧身多樹快且自焚第七祖婆須密尊者靈衣不挂好發酒顛賺殺平民其狂不醒遇知己而投器承印記而出廛撥草迦摩快逢智者就機論義一點豁然證得虛空七花八裂慈心三昧者也之乎第八祖佛陀難提尊者頂中肉髻突照人天特地瞻光果得半箇口挂壁上心佛誰親七步復行踏殺恩怨無限春光收不得好看花鳥任時更第九祖伏駝密多尊者不惜草鞋撞著香蓋此子處胎二十年不知作箇甚麼怪一見便除鬚髮復乃祥光遍界付法得人既奇手持箇赤幡兒將他邪外一時捉敗第十祖脅尊者開眼不尿床擁脅不至席一付鐵脊梁撑破虛空壁指地成黃金夜奢面前立來處太分明諸佛亦不識第十一祖富那夜奢尊者化被五百人親證已如掌果後至一長者紹法乃知馬鳴鋸解木義出與師平佛不識知汝被我解悟裸露而分身作蠶笑披衣而漆桶不快第十二祖馬鳴尊者隱顯神通迷悟自迥功勝於有作無作推伏彼外道邪宗仆地湧金人變女傍敲亦奇指空現金龍降魔全提更異化性海而建立激怒飛以乘風第十三祖毗摩羅尊者曾為外道善攻異端幾度扣門呼不出翻身直入裏頭看遇蟒盤而受彼戒瞋毒冰消訪龍樹而決先心疑情瓦解此中妙曲有知音何怕風吹於別調第十四祖龍樹尊者龍之潛飛神於機感九十六宗執計根痛於我慢下一鏟誰悟性空如月輪提婆金鎞刮眚眼就中殺活兮藏鋒象外明宗兮絶罕後遺六代付南陽耽仰奇能翻死款第十五祖迦那提婆尊者樹王妙在不傳尊者貴於自悟座上虛明孰見銀盆盛雪言前密旨喜逢鉢水投針師資啄啐既同時邪外難興齊負墮赤幡縱奪清風起白足羅睺法眼開第十六祖羅睺多羅尊者杖頭撥出五佛影指點難提金出井我無我故義何成上苑春歸花夢醒寶鉢擎來飯獨香令渠分食齒生光娑羅樹下翻筋斗莫怪槃山弄子狂第十七祖僧伽難提尊者莊嚴王子仗劍生能裂世網神助行金水河邊承祖胤紫雲峰下遇奇嬰手持圓鑑心眼徹諸佛之機一笑決風鈴心靜印南能無影樹留千古月第十八祖伽耶舍多尊者寶鏡形影夢中來兩人相見不疑猜為法求人震月國鳩摩聞佛耳如雷一喝是誰心眼露西天打鼓驚東土自焚火後一莖毛鴛鴦飛去針何度第十九祖鳩摩羅多尊者積代簪纓肯自愛聊成落魄償人債瑞草還於嘉運生輪王寶冠曾不戴中竺逢渠闍夜多何疑好手旃陀羅屠刀拈起俄能薦諸佛當鋒奈若何第二十祖闍夜多尊者如幻門中開宿智神機撥出盤修利無絃有韻妙能彈大地琴聲何習氣以杖倚壁畫佛光就中奇特莫驚狂幸然失卻二乘果今獲親承妙法王第二十一祖婆修槃頭尊者明暗二珠前後步羅漢卻來試其故顛倒父母表聖兒夜多機下親分付那提國裏覓摩拏自在王宮摘異花五百年前承佛記莂師資繼聖非敢矜誇太子儼然嗣眼藏鐘聲披出古袈裟第二十三祖摩那羅尊者既傳慧命遊西印指來塔影王機迅大器遙觀鶴勒那龍宮諸子誰堪任福薄還生羽族中免教負重轉難逢一笑隨流俄得性飛鳴而去弄宗風第二十三祖鶴勒那尊者金幢七佛授金環夢覺神童來破顏化鶴異香先嗣法無心用我絶躋攀祖令藏機密獅乎窺此班吉凶須自試生死在親刪白虹一道橫天地黑氣五枝貫亦間東北竺中當難起汝能吼哮出重關第二十四祖師子尊者五衆撥開知見沙奇哉拳握索斯多是珠莫道龍宮嚫古佛於今得也麼吾嘗於此切無箇似年牙要頭砍將去那更問如何師子不返躑罽王非作家白乳光吞天外月赤肱血濺鏡中花第二十五祖婆含斯多尊者神劍何來化掌珠解鈴師項得真符南天奪默非名義置毒邪人禍自殂國王有大德二子卻殊途最奇不如密乘機上祖圖得法自應絲作命焚衣愈見火中芙師承險絶能通變教外傳來別有樞第二十六祖不如密多尊者王子儼然傳祖令白光印土遙相映若他長爪捏空花太山壓頂誰能競已先有神童纓絡自稱命緩急汝何行出處我同姓師並王車雙眼明遠劫未曾離智鏡勢至重來證二人震旦南天分法柄第二十七祖般若多羅尊者不辭為法向南征香至王先作主盟無價寶珠呈慧鑑試三太子獨高擎縱奪當機驚互顯汝心過量自天生如來法藏轉相授震旦二株花果成設大法藥留難預明毒中最密腳下能行分手舒光還遠照東西一吸笑長鯨第一代菩提達磨大師東土十代祖師尊貴天生王子內紹透頂神珠手眼俱照開佛知見救正六宗雷啓蟄飛日出冰融聲震竺乾般若留記觀光支那有大乘器西來無路折葦可航面壁無門弔影可藏命毒不死千聖寸絲髓分不得一花五披笑彼蕭梁後悔何追蔥嶺熊峰徒見鞋皮少室石頭萬古冤對遺恨兒孫誰敢欺昧第二代大祖慧可大師老胡未來霜刃先利光奪神州骨生秀異具擇法眼獨能識師立雪斷臂不惜微肌幸蒙曰可求開甘露雖欲已安端在廣度命之自覓徹底摝撈了不見心潭月俱拋善破人夢如駭雞犀更令各道白日誰齊三拜歸位豈敢不對謂吾得髓諸子之罪衣法所繫寧弗是競付囑有在道不虛行淫坊酒舍汝事非干且試調笑或者知慚花飛鏡中何債可償仲侃偶來敲空作響第三代鑑智僧璨大師皖公山下業風俄吹病不瞑眩厥藥何施遇折肱人笑而指點覓罪不得九重雲卷日麗中天光吞萬象三寶燦然光生花上心珠獨露明白無瑕隨照失宗門出千差得旨歸根現前大用能徹悟之自知奉重謂吾處得反成相誣獅子遊行肯落轍途不負來機此法可續千聖同銘無勞更囑第四代大醫道信大師大解脫門把手不入平地忽迷乃悟得失遇司空老一言洞明攝心無寐夢縛俱清戒定發光群情喝彩神衛吉城賊圍盡解破頭山上橫出一枝牛首求人懶虎展眉路往黃梅小兒秀異性空無常花開種智朝廷嚮風三詔不起引頸受刃彌加欽企真身不滅塔戶自開脅猶不席千古巍巍第五代大滿弘忍大師雙髻峰頭手眼有在栽得青松盤如紫蓋法道可聞無賺我老師既能遲再來尚早借宿浣衣女子首肯果育英奇濁港光耿驀地相逢真堪一笑知是宿緣誰能巧湊東山法門愈為大闢七百高僧以秀首席俄有獦獠根性太利知心是佛槽廠安置米熟將篩推倒鏡樹皮鞋擦了寒眸獨注三杖碓頭時為證悟衣鉢南行還令自渡能者得之儼然脫穎花雨紛飛塔光永炳第六代大鑒慧能大師大法東流時節已熟道無南北宗有所屬至人乘願隱顯甚奇如服金剛終自出之聞無住心柴擔忽折辭母南行忍祖獨接西來衣鉢付之令止命如懸絲爭端必起大庾嶺上誰敢輕提汝反面目密在何迷懷憩會藏機緣有待指點風幡印宗擁戴曹溪大啓山海齊歸舌本瀾翻殺活全機法周震旦棋布星聯首出原嶽兩峰插天風捲雲飛以網張取知解之徒空欲高舉葉落歸根來時無口末後牢關千聖不曉第七代江西青原行思禪師倒剎竿後此宗甚密豎義赤幡多所破立碧眼試來吹毛草創馴至六傳聖諦全蕩廓然無務更落何階如得髓人獨拔群才首命分化雄踞青原廬陵米價震國初傳曹溪嫡子特指尋思箭鋒相拄不讓於師豎起拂兒東土未有屈殺西天移星換斗荷澤來參振身而立瓦礫精金無揀得出從前祖令誰曾與齊意句藏鋒始此全提第八代南嶽石頭希遷禪師室中真子的是內生親承顧命掉臂西行十影神麟超異衆角獨出青原瞻風南嶽一書不通諸聖不慕既驚太高翻然返步汗血成功誰賞蓋代鈯斧住山垂足何邁夢從祖遊乘龜智海密契參同心宗有宰惟馬簸箕知石頭滑再試隱峰噓之跌殺丹霞龐老來大寂門皆歸衡臺深植靈根藥山天皇英英兩展嗣出三宗源高流遠第九代澧州藥山惟儼禪師一代時教整理腳手不被法羈始能掣肘緊峭南鞋錐刺直指四路不得蚊子落嘴血濺馬駒眉毛搭印篾縛鐵牛皮膚脫盡恩歸有毒石上栽花不許千聖間殺鴉丫玩弄獅兒爭遊異類巖蠻無角那討巴鼻各任榮枯誰獨藏密立高行深斫口迥出第十代潭州雲巖曇晟禪師大雄虎子忽追風來俗氣不除一訝眼開乃驚藥山別有長處折腳鐺兒出手提去百丈草年心燈不續頂上花冠輪王最獨禪之深旨女不繫裙日夜未眠不字成文默笑同條生死何別嚙指把針末後始決善來價公親傳寶鏡鸞鳳沖霄不留兆朕第一代筠州洞山悟本良價禪師洞宗鶻突元頭命世必異初心摸著娘生鼻虎生三日氣食牛牙爪才開何猛利探草南泉供馬師有伴即來誰敢忌返竿拔卻無情舌雲巖拂子寧截鐵邈得影兮眼破光軒笑銀盆盛白雪五位縱橫兮揀類不齊之滲漏知歸九重深密兮續混不得之尊貴自別二雄妙協兮神兩刃之交鋒秪這兼中兮透三綱之橫絶不傳向上炭奚藏千聖全收風獨烈第二代洪州雲居道膺禪師噇得翠微羅漢飯不虛參見作家來我名向上不能道問著祖師罪敢推思大如何佛不作火爐汗下眉毛落大闡提漢孝難酬誰能把住渠羊角喝他諸佛田庫奴那不沿盤乞丐乎寸絲不挂行仍撲笑倒新羅老趙驢遊子歸來朝捶暮打何親切尊貴迥異金鸞玉鳳沒分疏價公末後獨憐兒一棒撩出雲巖路第三代洪州鳳棲同安丕禪師鳳棲山中無縫塔白日吽吽人不襪金雞玉兔展家風客來秪待曾不乏短販夜行不覺曉要踢要拳須自了孤峰迥秀出煙蘿江西湖南休亂走盲頭亂喝賊身自迷和贓捉敗劍甲安施藕絲繫得大象鐵鎖拴來石牛乃知佛出不出不傷王道風流同安一隻箭子腦後看來已過饒你唱祖師衣打教蒼天話墮第四代洪州鳳棲同安志禪師向上妙全提可中肯落草不是鳳凰兒卻向那邊討多子塔前是誰宗子能秀五老峰下看吾正令斯行夜明廉外臣奉重以排斑萬里歌謠樂太平之至化須是驢漢始得何殊鷲嶺親承不落今時機自密迥然不換貴天然標的不乖玄旨在同安繼世妙難傳第五代朗州緣觀禪師梁老門風太煞孤峻資陽水急白鹿松高縱能透出波瀾更須善騰霄漢家親作賊識得無冤活水果能神龍收來袈裟角下蔥嶺不傳印胡人謾唱歌孤舟曾不犯海上棹煙波格外玄機末後喜逢知己急索自肯當場已邈全真不辭放出牙關影豫上碑去在第六代郢州太陽警玄禪師置毛義虎獰風已奪汗牛撞彩梁山打破吳處士畫點出秦鏡狐疑夜放烏雞帶雪三句驗盡諸方浮渡琅琊妙協八子逝兮誰嗣遠公奇兮代傳頂相皮鞋白象藏異苗翻茂青鷹夢第七代舒州投子義青禪師猛省性自法離快便浮山一走三年鞭影悟玄機狗口那堪斯一嘔深契太陽宗旨洞然日月繞須彌能使鳳宿龍巢簾捲曹溪風少室且試鋒於鐵面美食不飧果握手以癩頑高價已償唱底誰家曲子威音一箭透重關淮月照見郢春入水長人能獨出第八代東京天寧芙蓉道楷禪師佛祖言句家常飯咬斷為人命根天子假敕堯舜無一拂打開頂眼衝流度刃掩耳便行密用潛機年尊得力卯生日戌生月燈來甚奇食進鹽行奉馬仙陀未俏道行冠絶不受寵褒忤旨再三寧甘下獄徙淄州而不涅疾受刑而不磷果能石上插芙蓉橫身界外何風彩第九代鄧州丹霞子淳禪師劍州賈子甚奇特自能徹證芙蓉室卻笑德山入水泥我宗無語眼一隻丹霞有句可示人玉女懷胎旨自深一任金刀裁剪看六戶風光別有春打破形山寶何處日午如迷夜沒趣拄杖頭邊見得親蘆花明月何能祕升天底事須揚卻擲地金聲熱碗鳴石牛不舉人間步類不齊兮洗不清第十代真州長蘆真歇清了禪師丹霞遭箇問空劫鬧何堪踏著鉢盂口一掌如倒竿日照孤峰秀妙訣不容心此度難瞞我紅爐出礦金才抵長蘆即能繼席遍主祖庭聲光赫奕覓箇如吾快活人先師掌下便徹底銜鐵負鞍徒苦辛莫怪山僧敲出髓是誰桶底忽然脫一衆失聲無箇活死款難翻空作灰可惜老婆輸棒喝何如自作舞老歇較些兒隔岸花香村酒美這樣風流卻也奇第十一代明州天童大休宗玨禪師長蘆漁父迷青眼奪得鉤錐好斗膽十字街中問道人臨風斫額休招款劫前運步丫角童兒吹玉簫於太白峰頭世外橫身蛾眉女子散天花於玲瓏巖畔妙契非意門槌與拍板謾計家風真證非傳鏡水并秦山何妨擊節白雲向寒巖而斷驚起膺公一棒之龍明月隨夜船而來釣歸乳竇千層之雪第十二代明州雪竇足菴智鑑禪師小兒生緣太煞奇母子俄然觸密機洗瘍伸出劈佛手那得囊藏此利錐長蘆看明月休公卻傍瞥就中置毒果難逃象山遁迹妖風絶悟來肚大要吞人再試嶽林風愈烈佛祖不奈你何長汀且分半橛尊貴位中收不得觸處相逢笑不徹主中主誰敢別丙丁吹滅火燒天花雨滿城落金屑第十三代明州天童長翁如淨禪師沒來由處有來由柏子庭前真怨仇捉敗枯枝俄𨁝跳眼睛鼻孔一齊收便解拈頭去作尾燒香自首彌天罪失卻乳峰陷阱深短販天童笑若輩火爐燒殺鐵臭拳水牯生卵叫飛鳶紅日出來天下濕過橋屎急活油煎禹門浪暖頭生角拋出多年老鼠藥毒死春風勾鷓鴣文殊作怪無錐卓一款招承供足菴黃泉路上好相甘兒孫各有沖霄志誇你祖宗寧不慚第九代住襄州鹿門覺禪師初參楷老於芙蓉聞舉靈雲走下風莊周劍殺三千客從此桃源路不通誰悟蜘蛛能結網打得蜻蜓無伎倆恰似烏梅咬鐵釘跂死禪和追影響不禁叫笑奇知燈飯已遲打破東瓜印鹿門別有機大地是經何妙密鴨吞螺螄眼突出不如食我箇油餈一飽百飢無復喫牛角不用有風流不沾白家酒兔角不用無笑他東壁挂葫蘆天下無情可恕那知有理難圖第十代住青州普照一辨禪師大地是經函乾坤是眼孔試問如何見得親卻被牛皮遮骨董狗口擬開對鹿門搖手打翻這漆桶放步青州賣布衫七花八裂不羞慚通身紅爛膿滴滴不啻玄沙得自甘室中百問細盤詰正令既行真偽別節度全憑密印符守關有禁誰能越笑癡狂弄水月莫怪渠儂賺殺人不到傷心情未瞥第十一代磁州大明寶禪師青州隊裏橫行索取老胡親的一箇沒孔鐵鎚打透東壁西壁不識痛癢潑皮棒拆乃驚汗脊剛剛夜半枕頭驀被針兒一刺輪王寶藏腰帶徒資赤窮洞上家私拳踢許多痛快風前搆得電光機虎尾虎頭齊捉敗笑他玉犬能夜行天曉不知誰作怪第十二代太原王山體禪師生臺鳥拾食拍手便飛去撫你背一掌回眸何卓豎幸自可憐生兩兩成孤負大明塗毒撾侍者吹毛露十載抽單疑只今諸方來去笑吟吟非栽頭角減風彩參學繇來印契深異目超宗師子自有真種旋機轉位尊貴不落階梯升座白槌誰見衝流度刃東行西立已見棺木瞪睛不是活捉生擒手爭見王山有大機第十三代磁州大明雪巖滿禪師普照寶門排闥入俊年佛法是生冤不徒千里來相見握手驚看下榻前死灰忽有一粒爆跪受同參勝默教愧殺諸方獅子蟲一室操戈何怨報末造王山聞邈真能疑言句病誰尋忽然藥發非歸炭始悟兼中意最深料掉沒交涉此回不我嫌夜行曾不到迥出月明前第十四代燕京報國萬松行秀禪師遍謁還趨勝默風大地自己如何轉根利那堪令且遲玄沙未徹語俄薦雪巖不點頭腦後箭誰放頭上出角自能擎雲手上生牙正好喫棒雞飛忽悟不讓當鋒捉敗謝三猛虎收來岑老大蟲不怕阿師高笑我超超秀出萬山松第十五代西京少室雪庭福裕禪師萬松門下得何消息而來老大低聲卻向學人納敗作家有眼接人活句自藏鋒衲子出奇老賊和贓能蓋覆親炙十年還得髓聖兒果作帝王師馳驛而火偽經賜號而建精剎面壁一花開五葉好知官不容針誰買黃金鑄子期就裏私通車馬趙州衫子破風流不在著衣多孝子諱爺名立雪庭前看血刃第一十六代少室靈隱文泰禪師當機一句試拈來開口家産被人沒撫掌其誰奈我何風顛箇漢能穎脫塵剎底事喝彩示人笑他覿面太分明翻自抱贓而叫屈僧參才展具天網何恢恢禹門曾未跳驀與一聲雷撑得飯袋子有頭無尾可惜桃花浪徒自曝腮第一十七代西京還源寶應福遇禪師講壇雄辨如流靈隱拂子截倒欲透此事且驢年面熱汗下卻也好切莫向他求老賊我捉了西來大意是何風送泉聲笑倒老胡又甚月移花影弄假引子賣私鹽糟裏蟲兒呼不醒第一十八代鄧州香嚴淳拙文才禪師悟得證道歌幻化法身句便作獅子兒直吞諸佛祖及謁還源老古錐問君不見是阿誰覿面親呈不回互剔起渾家兩道眉墮坑落塹呵呵笑秦時𨍏轢還𨁝跳勘破白牯與黧奴尉斗烹茶不同銚撲落四法界拈示不成文清風伴明月更與孰相親針不容官線能牽馬善翻公案野狐涎滿盤這著誰能下第一十九代萬安南陽松庭子嚴禪師參了江月照卻被松風吹再謁息菴讓臨機不見師撞開淳拙鋪毒蠱能吞吐蒼天連叫冤靈鑰真風度五乳獅子兒哮吼超群去巖頭何過師不肯洞德老賺殺一船人煙波誰解討秦槐不聽法面壁已遺殃左搓箇芒繩秋草空斷腸第二十代住少室凝然了改禪師香山月印再三撈還來松庭覓甚碗路逢死蛇盛將歸鹵莽卻來弄擔板笑裂山僧臭口門一言獨拔出行款久販滯貨捉月癡猿句外明宗大蟲紙裹得髓須教三十棒莫聽千峰啼杜鵑第二十一代少室俱空契斌禪師特扣改翁末指示老胡未到何碑記誤得秦槐下喝來贓誣還教重失利乃知趙老勘臺婆荊棘林中陷阱多石頭不通南嶽信禍事誰能奈你何洞山一宗機獨玄烏龜向火劫空前吉凶曾未兆切莫亂拋錢上堂屈指從頭數西天四七東二五算來不出我指頭徒向泥中去洗土罷罷罷歸歸歸嬴得嵩山明月在杖頭隨處有光輝第二十二代西京定國無方可從禪師龍潭未見龍超化卻將化空裏打箇筋斗來詐明道士鐵鎚墮天下掠實無掠虛不打自招笑殺渠慣用老人今勘破何妨收拾這蠻驢末後關還透過百丈甘為野狐九峰不肯首座果能平地生波許你家中穩坐第二十三代少室月舟文載禪師夢中撞出風光露便解撒沙為佛事驚見提唱善藏鋒劈碧巖者是何故老無方手段好嵩山影石冷推倒悟得大龍殺活機山花澗水真神巧祖庭主鼎久如絲泛月千峰看抖擻第二十四代北京宗鏡大章宗書禪師水冷石邊出風香花裏來習儒心上判眼自頂𩕳開踏上載月舟棹得清波別追上古參同宗明千聖轍天下正偷安誰砥此狂瀾先人何付囑幾希獨把竿末上將歸鐘鼓墮心法分明鏡忽破無影樹下孰逢渠年牙以者騎風過第二十五建昌廩山蘊空常忠禪師早識良知是禍門遍搜方外無當意拂衣重到五乳峰指我青黯黯處聻捉敗指東話西老宗鏡拂開何皎皎新豐此道復南行歸隱廩山誰得討羅鄧瞻風喜唱酬突有冤家來聚頭宗眼拶之看究竟峨峰鞭起吼天牛一生快活笑不徹折腳鐺兒還自挈莫怪渠儂太陸沉誰知劍已付豪傑第二十六代江西建武壽昌無明慧經禪師金剛印上出娘胎此箇經兒帶得來終始脫如盧行者好山何讓樹臺推西江喝起新豐月海嶽風生趨下列策杖重登少室堂大撾塗毒聲何烈北去臺山遇瑞峰兩相酬唱展斯宗濟門尚有箇知己渠亦因之始露蹤此事不難於自了管窺天地一何小寥寥千聖賴於今行解相應堪不朽钁頭舉起識還希奪食驅耕別有機垂足巖前苔路滑孤峰千古幾能歸第二十七代建州武夷東苑晦臺元鏡禪師虎嘯風生龍蟄起聱頭便掩丹霞耳高呈知見老龍峰推下險坑飲毒水驀然撞倒維摩床仍欲擊彼當門齒勘破不值半文錢和贓捉盡把關子钁頭不復能作怪憐兒打失風流袋相持正印付全提具眼天然應有在特以同門訪博山當機不讓自應甘命根斷處眉毛豎三日喝驚秋露寒武夷奇突難邈狀汾陽葉縣差可況臨行一嘯自全提六六峰頭聲獨放
