body:
  text: 門人大龍大健大燈大文較上堂壬午春豫章饒元瑛居士請師金粟園值佛誕日設供請上堂鄧大超居士問雲從龍風從虎聖人作萬物睹正當物睹時如何師展兩手示云會麼進云師行芳草裏我又入深村師以手畫圓相云是甚麼進云家住海門東扶桑最先照師云紅爐片雪飛須是眉毛見進云夜半負趨誰有力秪許空王獨自知師云退步著士禮拜饒大齊居士問如何是直指人心見性成佛之旨師云腳跟下分明看取進云是法住法位世間常相住時如何師云頂門別有路通霄進云秪今當如何進步師云直須徹底無私始得士禮拜師云向上一路千聖不傳木雞啼子夜芻狗吠天明向上一路千聖不然石人衫子破大地沒人縫且道我佛為甚才出摩耶母腹便乃指天指地周行七步將謂是腳跟下是頂門上耶大抵還他肌骨好排場搬演自風流秪如今日饒大齊居士請山僧升座舉揚并求授菩薩大戒可謂塵勞之儔為如來種也且作麼生舉揚聻良久云龍袖拂開全體現指天指地不徒然下座庚辰秋臨川宰陶弘持景陵談擬陶偕本邑湯季雲諸公天寧監寺大通設供請上堂師升座宗侍者問黃檗道大唐國裏無禪師秪如今日臨川諸縉紳居士請和尚於天寧古剎升座又作麼生師云一箭透九關進云和尚也須照顧傍有不肯者師云痛棒頂門敲進云恁麼則擊碎虛空通身手眼師云活中有路孰能行進云幾度扣門呼不應翻身直入裏頭看師云放過即不可便打者禮拜云作家作家雙炯問龍吟霧起虎嘯風生和尚重振荷玉宗風斬新條令一句作麼生師云秋水斷橋橫進云瞿曇無說迦葉無聞和尚又作麼生師云扁舟空載月進云滿筵龍象師還辨得也無師云杖頭有眼光如電進云恁麼則學人蹴踏毗盧頂𩕳去也師云露柱堂堂笑殺人徹凡問古人云天得一以清地得一以寧今日天寧諸公請和尚說法且道如何是向上法師云清波無透路進云和尚也須珍重師云拔劍攪龍門進云恁麼則太阿藏匣去也師云喪身失命僧歸衆師確如意云會麼天寧法窟涼來久荷玉風吹樹未休今日圓通重振作喜看明月正當秋諸仁者古之天地日月即今之天地日月曾無變異今之山河人物與古之山河人物屢多改遷秪如遮多改遷底與無變異底還有同別也無若向遮裏薦得說甚天地與我同根萬物與我一體其或未然則異端互相隱怪百姓茫無所知又安能向其中透徹他古今同異去不見唐時曹山本寂禪師親受洞山良價和尚寶鏡三昧宗旨一日辭去洞問子向甚處去曹曰不變異處去洞曰不變異處豈有去耶曹曰去亦不變異諸仁者秪遮去亦不變異透徹雲巖秪遮是與渠我交參之旨所以建立君臣正偏五位之宗縱橫三墮一念無私透過三無滲漏以大闡洞上宗風而開古今之心眼也且道重重錦縫文彩奇微遮箇金針玉線是誰拈得聻今日圓通到此臨川天寧諸公請山僧升堂重振曹山本寂家風山僧是自家屋裏人不妨重重拈出秪要求箇明眼底人透出生死牢關全提向上機用其中還有不被天下人瞞底麼復打圓相云看看向遮裏透徹牢關去彩鳳衝開霄漢碧光昭海嶽盡文明珍重下座癸未司禮車喬高張諸大護法設供請于靈谷結制上堂師指法座云巍巍堂堂正位中央面南而看北斗西成而震東方欲祝聖明無量壽須登此座寶華王即升座拈香云此一瓣香根盤空劫之前葉布大千之外七鬯主位育以無私赫濯亙古今而永久專奉為二祖列宗當今皇帝伏願在天之靈齊佛之位御金輪而成正覺統法界以證莊嚴兼願滿朝文武共秉忠貞一統八荒同遵治化干戈底定禮樂振興時雨光風登三咸五諸公見在儼然不忘靈山付囑作人天之柱石為佛祖之金湯此一瓣香劫火光中迸出黃龍峰上拈來端為供養江西壽昌師翁慧經老和尚建州東苑本師元鏡老和尚用酬法乳之恩伏惟大衆各生珍重師就座維那白椎云法筵龍象衆當觀第一義監院容源問蔣山虛席已多年今日吾師重布宣豎拂拈鎚即不問太平一曲若為傳師云紫金山上撞金鐘進云恁麼則寒松一色千年別野老拈花萬國春師云合掌山門禮至尊進云木馬嘶風雲布彩泥牛吼月水波生師云偏是詐明人弄影僧禮拜喝一喝師云莫鹵莽維那禮拜起便喝師云紅爐飛片雪進云大地起波濤師云闍黎在何處安身立命進云和尚還見學人也未師云你須仔細進云翻身擊碎黃金鎖露出山河一片青師云好生禮拜進云謝和尚答話便禮拜印明問三百年重興佛事此日大闡宗風如何是和尚為人處師云個個頂門著一鎚進云還有不入爐鞴者麼師云腳跟好與三十棒進云且喜高低嶽瀆齊稱賀萬象森羅拱手歸師云且看令行時僧禮拜又僧問學人不服諸方胡棒亂喝喜今日親覲和尚作麼生接引師云家家有路通車馬進云老人真手眼師云見個甚麼道理僧禮拜又僧問向上一路諸祖不傳和尚登寶志公座傳個甚麼師云志公不是閒和尚進云志公三百年外有一句說不到底佛法請和尚舉師云何不當央識浪公進云百花全仗春風力果熟香飄事若何師云捏得怪來無用處僧便喝師云不必不必僧禮拜師曰果然果然師以如意打圓相云靈麼千聖頂𩕳上建法幢立宗旨方能振佛祖不傳之真機威音王那邊旋天關轉地軸始可提聖凡無犯之正令至於入廛垂手臨難救人卻如大醫王治脈調元唯扶血氣而延年壽又如大將軍伐謀致勝不動干戈而見太平我為法王於法自在何有世間出世間生殺定亂而不繇於神妙先著哉且道承誰恩力聻諸公還見太祖高皇帝遺下千古不易之公案麼定鼎之初即于金陵敕建大靈谷寺為天下第一禪林及建諸大梵剎詔請禪講律論淨觀諸大沙門而主其教是以天下英奇各相求而成志古今道術總殊途而同歸蓋深知佛氏之學誠有以陰翼王度之不逮也嗣是成祖列宗歷世相承崇奉不替法久成弊內外難生皇上御極以來無日不焦勞求治求之不已乃感九蓮聖母陰俾皇五子啓迪聖心紹隆佛法萃祖宗未渙之精神集國家永興之祥瑞於是天下臣民益自知身心性命之道為天下國家之根本也使世間人皆知此身心性命為重則何有名位勢利爭奪殺害以壞天下國家之大經大法哉況三百年來養天下臣民豈無忠臣烈士一旦奮發展生平經濟為國驅除戮力者乎三百年來養天下僧道豈無真僧高道一旦奮發展生平機用為國說法破迷者乎山僧何幸得遇金陵諸大護法及諸法侶目擊時危心傷類慘人人有忠孝之心個個求佛祖之力延山僧登此大靈谷三百年虛席之座舉揚直指人心見性成佛之旨以銷此鋒鏑慘殺還彼本來平正之心庶使赤符靈應有臣有僧能不負洪永建剎之意以佛法能陰翼王度之語非虛誑也即世間人家庭有難父母有災為人子者不勝泣血籲天求醫割股凡有可以解危救命雖肝腦塗地無不為也今山僧身受君父之恩深恨未全道力不能如康僧會求舍利於空中不能如寶志公懸剪鏡於象外不能如金碧峰現神變于國初第此一念痛心為法為國深歷刀兵水火之中不啻嘗啼大士賣心肝以求般若於天下也此中般若如何可求聻祗是人心正則天地之心亦正人氣平則天地之氣亦平但求此正平之心見在一念靈明不可自昧不可自欺底參而證之擴而充之則格致誠正修齊治平即在是而施戒忍進定慧機用亦在是諸忠孝直下便好參證擴克此正平之心以祝聖明則萬壽無疆以此推文武則天下協和以此及萬民則天下太平豈非盡世界享此甘露瓶亙古今不逃大圓寶鏡哉秪如今日特地舉揚護國又作麼生收場耶萬代金輪全妙密不彰寶印定乾坤維那結椎下座天界寺三方丈禪堂暨耆宿無蘊大休一味崇麓澄心善權得一若無諸法侶設供請上堂師擊如意云一真印現大法門開超日月之光華透乾坤之祕密萬化不能逃其性群機無所遁其情蓋善逝世間之有主則妙盡身心性命之無虧也故我太祖高皇帝統百王之至治集三教之大乘以如來萬德十號而敕建天界禪寺為善世法門豈非會盡千聖之真宗以致天下之太平乎議者以佛之戒律足以弼世為不治不亂佛之禪定足以正身為不言而信佛之智慧足以正心為不化自行所以三即一一即三神而明之存乎其人此蓋吾震旦孔子稱贊吾佛西方大聖人之意也秪如吾祖宗門下如鸞鳳沖霄其誰能睹光彩如羚羊挂角何處能覓蹤繇正當覿面全提即三世諸佛不敢正眼覷著覷著則瞎卻渠眼歷代祖師不敢赤體承當承當則殃及兒孫直得海底塵生山頭浪起木人拍掌石女謳歌庶幾通得箇太平消息諸法侶還見昔日天界宗泐禪師初參天竺廣智和尚智問國師三呼侍者三應意作麼生泐曰何得好肉刲瘡智曰將謂你有甚奇特元來無所得也泐便喝智擬棒泐拂袖而出於是頓見祕密法門而後大闡宗風以助無為之化此非千古之大奇特哉古即今也今即古也如今善世諸法侶英材拔萃不讓當仁拶入此宗其誰能敵特來設供請我舉揚宗旨畢竟作麼生是相為處乃呼云諸法侶會麼撥轉上頭關捩子大千法界現全機下座桐城吳雪崖農部張坤安兵憲暨吳聖修吳豹文吳敬伯諸居士及法侶九一設供請上堂師升座僧問法王正令師已全提某甲今日無問請師不答師云千峰頂上起清風進云且喜和尚現大人相師云十字街頭石人舞進云恁麼則禮拜去也師乃云向上全提十方坐斷施大機用展殺活鋒始能掃清魔外定奪聖凡變大地作黃金攪長河為酥酪且道祕密關鍵是甚麼人才通得昔妙喜和尚說法于徑山張子韶侍郎與馮濟川給事諸公議格物妙喜曰公秪知格物而不知有物格子韶茫然妙喜大笑子韶曰師能開諭乎妙喜曰公見小說載唐人有與安祿山謀叛者其人先為閬守有畫像存焉明皇幸蜀見之怒令侍臣以劍擊像首時閬守居陝西首忽墮地子韶聞之頓領深旨題不動軒壁曰子韶格物妙喜物格欲識一貫兩個五百喜乃許可之諸仁者還通得遮個消息麼若向遮裏透得不妨一賽兩彩其或未然山僧打葛藤去也物是何物格是誰格二公秪知有物有格而不知無物無格如明皇當時秪見閬守為冤對更不知此是畫像而人且在千里若謂必能斬其像首則祿山亦可以畫像而擊之矣又安能以不思議之神力擊其冤對之首乎不見耿恭拜井而湧泉李廣射虎而入石王祥臥冰而得鯉商丘奪錦于火中此蓋以一念忠孝誠信之心所成也使彼當時有知識道理生死利害之想則自心已陷於物纍又何足以感格天地哉昔山僧閉關時有奇禍驟至建州柯賓明居士乃寄偈云釋迦牟尼佛歌利割截身一刀斷不斷能忍是真心山僧答云欲截牟尼體揮刀斬太虛本來非幻化能忍者遭誅居士見之大驚曰我以能忍為真心而浪公以能忍為生死根本吾令乃知悟道人了生死在先了能所之心矣諸公皆鼎鉉重器忠孝天成尤能會世出世為不二法方今天下多難能為朝廷扶其元氣即此至誠足以感格天地矣又何內外殺亂不化為清平哉雖然山僧又作麼生振起全機聻宗風吹醒乾坤夢佛日昭回聖主心下座博山碧潭遠覺雪琪一如靜休默觀諸上座請上堂約素問色身不入法身不住畢竟在何處安身立命師云大衆眼睛在你舌頭上進云謝和尚慈悲畢竟作麼生會師云你底舌頭在大衆眼睛裏進云承和尚指示師云閉著眼睛看取素禮拜師云若向上舉去直得黃頭碧眼忍氣吞聲若向下舉去直得白牯黧奴歡天喜地若總不與麼卻使法堂前草深丈二土曠人稀相逢者少若總皆與麼未免胡張三黑李四分疏不下到遮裏作麼生為人也須是有縱有奪宜假宜真殺人不見血痕活人便有生意始得不見我博山先師初於此宗自視甚易及閲船子囑夾山云直須藏身沒蹤跡沒蹤跡處莫藏身吾在藥山三十年始明此事乃大驚曰古人尚自如此我何敢輕視乃痛自苦參久之忽於有佛處不得住無佛處急走過語下打失布袋趨見寶方先祖恰如方木逗圓孔了不相入自此再加逼拶偶一日見人上樹始大豁然方能於先祖處通箇消息然山僧曾親從祖父參證過來今於靈谷開法汝等諸兄弟特地入山設供請我舉揚大事且作麼生是相為處諸兄弟既曾親近博山先師當必能參究此事如有入處正好出衆舉似為爾證明其或不敢輕視直須於祖父行履處參究箇透徹不然狹路撞著個沒面目漢把斷你咽喉大喝你速道一口氣不來畢究向何處去你到遮裏也須是有轉身吐氣始得且道秪今又作麼生不是冤家不聚頭各須拔出吹毛劍下座牛首融悟接引閣體玄淨業堂見朴三上座暨傅仁宇鍾弘儀孫啓南胡耳門諸居士請上堂師擊如意云會麼過去心不可得萬里山河憑點墨未來心不可得千古老鴉一樣黑現在心不可得天上有星皆拱北取不得捨不得相逢誰是知音客雖然向下文長須看一則兩則世尊乞食歸空生特地歎希有德山托鉢出巖頭皮裏作陽秋一箇感悟流涕寒谷生春一箇撫掌呵呵吹毛露刃雖則是法平等無有高下爭奈車不橫推理無曲斷今天下多是兔馬有角犬羊無頭到遮裏誰能作主得大自繇良久云有意氣時無意氣不風流處是風流下座獨峰竹山禪師請上堂師云壽昌先祖平生為人壁立萬仞如一大好山相似即我博山東苑二先師秪瞻仰有分此分雖有伶俐衲僧求窺其光影不可得故博山先師云山僧平生得壽昌老人一箇不肯東苑先師亦云壽昌老人如一箇鐵橛子相似所以二先師一顯一隱各立先祖家風又非天下衲子所能造詣山僧為他兒孫蓋親從祖父堂奧中來去秋到天界遇張興公居士問曰弟子聞古今師資授受必親承許可何博山和尚自謂得壽昌一箇不肯便出世為人山僧曰你知壽昌不許天下衲僧還有衲僧能如博山得壽昌一箇不肯者麼又問聞和尚昔曾親見壽昌不知得個甚麼山僧曰得箇不肯壽昌居士乃驚愕禮拜今山僧寓靈谷獨峰竹公先曾見山僧因問公於何處曾見博山先師竹曰在天界寺山僧曰何不親到博山竹曰某家多病近於獨峰住靜山僧震聲曰死水不藏龍竹曰因先師今日得見和尚山僧曰見我且止何不掃先師靈塔竹曰某甲要約陳旻昭居士同往山僧曰此是你本分事何得扯他人作伴竹曰也要扯他一把山僧曰是你腳跟不得力也竹曰因自無力所以扯他山僧曰敗也竹公今復入山請山僧上堂山僧見其欲出世為人恐其離師太早未盡其妙須於人天衆前與他決擇果於先師有得力處一一舉出與之質明其或不然正好如巖頭鏟削雪峰成今日之鰲山公案也竹公出衆看竹出禮云適勞和尚神用大衆證明已竟師云你自己本分一著作麼生竹云瞞和尚不得師云你當時從何處得入竹云不從他得師云遮箇還是現成話你別道一句來竹進一步豎兩指云遮裏怎瞞得和尚師云看你腳跟未點地在竹云佛祖也放不過師云何處見佛祖竹禮拜云謝和尚慈悲師云也須再深參始得下座鳳林語録甲申重九師到杭州護法葛屺瞻徐大玉吳若谷徐九知張顧存嚴認公嚴無敕宋孔章王昭平洪載之方子凡龔華茂宋子野嚴子餐沈冠東錢亢子王以中洪玉衡姚愚谷偕子期兩設供請入鳳林寺院師禮佛拈香畢升座良久云會麼相逢不拈出舉意便知有知有個甚麼直下會取好復云二十七年中兩度曾到此今還特地來誰是舊知己莫是吹布毛底古鳥窠麼須是會通侍者始得莫是問佛法底白侍郎麼須是八十老翁始得莫是重陽九日菊花新麼須是汾陽老漢始得莫是牛頭一枝今當重於鳳林橫出麼須向杖人良久處透過不觸不背始得雖然今日得到鳳林全是姚愚谷居士前年於廬山先與諸公通一消息相挽始得從金陵一路來此以酬勝願其鴛鴦繡出妙在金針不落文彩更須著眼秪如杖人既已親到與諸公親見了也就中還有親切提持事也無復云會麼明聖湖中龍躍起越王臺上鳳飛來珍重下座師到龍門寺石雨大師偕諸法侶請上堂石雨大師問云君臣未定賓主未分賓主協和如何開示師云彩霞籠玉像個裏自分明進云秪如低處低平高處高平又作麼生師云顧鑒木天然成照用雨大師顧大衆云畢竟是遮老漢師云也須師兄證明僧問佛祖近傍不得的人未審和尚如何與他相見師云腦後著雙眉進云莫遮便是相見處麼師云蹉過了也進云此邦不入彼邦不居且道他居何國土師云頂門突出進云杲日當空又作麼生師云誰敢妄自瞻仰又僧問青青翠竹片片白雲賓主相逢合論何事師云獨許當機作者知進云龍吟鳳舞是何祥瑞師云可中消息誰能會進云恁麼則月色四時好秋光君獨知師云且莫閒說話又僧問古云任他風浪起只是不開船不開且置假如船至江心風浪倏起時如何師震聲云把舵人在那裏僧禮拜師云險進云但看中流橫擊楫直教海外不揚波師云須是其人始得乃卓拄杖云為訪同人度遠峰龍門聳峻賴孤笻相逢不更傾心膽共看浮雲弄太空諸仁者正當浮雲弄太空時作麼生到遮裏縱是明眼作家誠難話會在今日徑山特訪龍門承堂頭石雨法兄及諸禪侶深用激揚宗旨命登此座不免客聽主裁相席打令去也諸仁者還見龍門風景殊特麼蓋主人立處高巍會同雲月溪山之同異可中嚴密妙盡君臣偏正之尊卑孰有門庭施設堂奧深微能過於是以故門下英才濟濟克紹芳規此後大法振興正未艾也又何有浮雲之弄太空哉雖然如是古人云萬里無雲青天亦須喫棒今此浮雲弄空我與法兄將何處分使彼為霖為雨去好知淵默有真龍甲申仲冬南浙諸大護法宰官偕餘杭邑侯諸鄉紳居士及闔山耆宿大衆請師住持徑山入院上堂師到山門喝一喝云入門須辨主端的此中明如何是端的全身拶入始得到彌勒殿云大坐當軒等阿那箇特地撞著知音我唱須是你和到大殿禮拜起指法座云正令全提當央直示更有向上一路麼千聖不傳聻且看新徑山長老為汝大衆通箇消息去乃升座祝聖拈香訖維那白椎竟師以如意畫圓相云會麼大圓照內凡聖交參雙徑峰頭人天圍繞到遮裏文不加點新長老秪好證明雖然如是也須是頂門具眼肘後懸符底人始承當得昔唐朝本寺開山法欽禪師道風聞於京師代宗皇帝遣中使詔至闕廷咨詢法要同弟子之禮一日欽師見帝乃起身帝曰禪師如何起身欽師曰大檀越何得以四威儀見貧道帝大悅謂南陽忠國師曰朕欲賜欽禪師一號國師欣然奉詔賜國一焉欽師辭歸山帝曰彼地衆生當得度與此地衆生何殊欽師曰實無有一法可度衆生者帝益深重之師云諸仁者你看他一個佛心天子一個法眼宗師一唱一酬兩鏡相照是法平等妙密圓明山僧既膺法席正當於黃金殿上揭開日月之光華白玉毫中指出古今之主宰始不負一人有慶千載同風敲如意云若於遮裏會得是法住法位世間相常住又何有世法出世法彼此先後之不平等哉秪如今日諸護法特請開堂祝聖共致太平作麼生道金輪迥出中天照萬世謳歌頌聖明結椎下座結制上堂師舉妙喜禪師云金佛不度爐木佛不度火泥佛不度水真佛屋裏坐趙州和尚吐心吐膽恁麼告報也還有知恩報恩者麼師云大小妙喜不識好惡盡大地人被趙州老漢刳了眼睛鼻孔將個無位真人推下萬丈深坑至今求出頭不得徑山別出隻手救拔他去且作麼生救拔他金佛須度爐木佛須度火泥佛須度水真佛不許他在黑山下作鬼家活計直教他劍刃上行火焰裏走入生死流闢聖凡路顯全機大用向如意子頭上續佛慧命去會麼換骨洗腸重整頓通身手眼更須參臘八日上堂今日正是二千年前黃面老人在雪山於此夜觀星自謂悟道之時也殊不知當時已打失一隻眼直得四十九年撈天摸地無有尋處忽於糞掃堆頭拾得一個泥彈子於靈山會上百萬衆中驀爾拈出獨迦葉不知好惡破顏微笑特地被渠將眼換去卻道吾有正法眼藏付囑於汝勿令斷絶從此西天束土被遮彈子換了多少人眼也且道世尊初生時指天指地顧視四方稱我獨尊是個甚麼眼如何更到雪山始稱悟道又是甚麼眼再至末後拈花付囑迦葉遮又是甚麼眼如此簡點還有同別否遮個法眼還是本有耶本無耶若是本有何更分付若是本無雖付何用秪遮淆訛如何辨別須知諸佛悟處是衆生迷處衆生悟處是諸佛迷處若向遮迷悟關頭透得過始可與佛祖為師開人天眼縱橫凡聖隨類投機雖然如是我試問諸人衆生迷處即是諸佛悟處人皆易會及究其衆生之所以迷諸佛之所以悟未免昏天黑地更問彼衆生悟處即是諸佛迷處衆生既悟則不得為衆生諸佛既迷則不得為諸佛矣秪遮個迷悟畢竟作麼生此不惟未開眼者決擇不下即有已悟此事而未透末後牢關者亦未免認影迷頭也況其餘乎不見古人云須知迷中迷悟中悟迷中悟悟中迷若向遮裏一一透得過始能勘破從上佛祖敗闕更不向從上佛祖納敗闕也秪如今日徑山全提一句又作麼生擊如意云擊開劫外無私眼印破古今凡聖心太倉惠明禪人設供請上堂舉南泉和尚云王老師自小養一頭水牯牛擬向溪東牧不免犯國王水草擬向溪西牧不免犯國王水草不如隨分納些些總不見得師云遮偷懶撈天漢好與一頓痛棒既有個牛兒便當隨處放牧但勿犯人苗稼使他水足草足自然不東觸西觸矣如我山中許多大衆必求饑餐渴飲豈可空腹高心強謂隨分納些些即飽足也又況國王水土如天地養物曾不限人孰不取足以負其大檀施乎還有為南泉雪屈者麼惠明禪人從太倉來於此設供請山僧與他舉出本願尚欲為闔山作財法等施之會雖然更須知有普供養意旨始得如何是普供養意旨五臺山上雲蒸飯佛殿階前狗尿天剎幡竿上煎鎚子三尾猢孫夜𥳽錢若于此薦得則供養也足俵嚫也足無佛性狗子喫得飽地撒糞撒溺去才是平等也會麼欲得不招無間業須轉如來正法輪淨慈語録方書田相國張坤安撫臺偕諸宰官居士四月八請于淨慈寺上堂師拱手云恭喜諸公人人頭頂天腳踏地眼放光口出氣從古以至如今未曾絲毫變異道個本來是佛自已糊塗更若向外馳求轉成鈍置當年悉達太子才生下來不守本分誇張尊貴遭他傍觀不肯卻成一場笑具既然如此今日方相國諸公為甚請來淨慈發揮大事不見道藥因病險製尤奇劍為仇深磨更利喝一喝下座丁亥夏陳旻昭同宋其武呂霖生石象雲談梁生董孔昭朱成之趙蓲伯施元引周仍叔王穆如朱允升周吳昉王奕文顧與治謝載之王爾玉余未也張季筏胡星卿紀伯紫曹梁父張僧持監院耆舊諸法侶請于大報恩寺結制上堂師良久云會麼黃閣簾垂誰通密意紫羅帳合謾擬真音可中別有生機天上人間罔測所以尼山耳順已曾知命而來百丈耳聾卻因捲席之後到遮裏也須是親的透過始得諸公還知耳順消息麼敲香案云一擊忘所知更不假修持動容揚古路不墮悄然機此正是孔子見溫伯雪目擊道存時也還知耳聾消息麼震聲喝云虛空俄粉碎大地忽平沈威音王未睡彌勒豈惺惺此正是海公被馬大師喝倒雄峰時也若不是進步竿頭全身透脫安能橫身异路到處稱尊今為陳旻翁壽諸大護法合請山僧舉揚向上還知所以壽佛祖慧命底意旨麼旻昭居士夙承願力以法界莊嚴作老萊子班衣妙舞供奉十方慈父各各破顏而笑曰善哉我此正法眼賴汝護持者之增年即使我佛生之慧命常住不滅也如此妙舞現在諸公目前露地矣於此薦得何待剔起眉毛始存道妙耳聾三日乃振全機也耶復擊如意云特地豁開千聖眼大千花笑法王機劉良弼翰林為薦封翁爾敬居士請上堂世間多少英奇誰知自家主使自家主使不知如何了得生死試問是誰使汝生死誰是了生死者誰能入聖超凡又誰了無取捨須知吾宗有賓中賓賓中主主中賓主中主如何是賓中賓眼迷徒自墮風塵如何是賓中主百花叢裏有歸趣如何是主中賓垂手街頭等箇人如何是主中主不動聲光動寰宇於此一一能發明頭頭各有稱尊處諸仁者今日是劉良弼太史為薦揚封翁爾敬居士請山僧升座封公昔皈依博山先和尚即參究父母未生前事後受華山昧師大戒而操履益精嘗與余未也居士同參互相激發客秋偕賢橋梓參豫于濟生菴呈見請益自謂於良知性善有契入處豫曰此孟氏之學固不易到據吾教既為良善正是六識功勳邊事至于知見立知是無明本必須參透向上活句始得本地風光封君於是執計頓消大有省發先是其弟司馬公嘗夢封君手持五燈會元一卷訝之至今春俄然坐逝即命司馬書偈曰身心本來清淨父母未生可證夢幻泡影一空依舊青天明鏡始于此徵其平生參究之得力正余所謂百花叢裏有歸趣是也使公更假數年自當深參諸祖門庭堂奧如裴公美楊大年振大機用也雖然太史能承父志不讓當機直下勇鋭向上全力荷擔則扶樹吾宗傳燈千古豈非遭際之奇特哉且更作麼生薦揚聻偈曰風光匝匝回埃塵就路還家妙轉身空劫那邊移一步大鵬生下玉麒麟孝廉巫瞿庵薦父思真公母孫氏文學孫仲長薦父益繁公母陶氏李仲審薦父懋庵少參公請上堂人非法不行法非人不立人法兩相成超然還獨出如何是獨出底消息卓拄杖云向遮裏薦取遮裏薦得不惟扶過斷橋水伴歸明月村亦可攪長河為酥酪指大地作黃金茲有巫瞿庵孫仲長李仲審三居士為薦嚴慈求超生出死與存亡兩利之法此須人子有至誠心方能感通父母如何是至誠感通處復卓拄杖云向遮杖子上感通得便知自己性命落處知得自己性命落處則知父母性命落處亦足以感佛祖通鬼神參天地贊化育所謂你有拄杖我與你拄杖你無拄杖我奪你拄杖忽然𨁝跳上三十三天觸著帝釋鼻孔東海鯉魚打一棒雨似盆傾又作麼生復卓拄杖云咦向道是龍曾不信天田飛舞始驚人珍重高玉鉉同繆華閭吳台衡居士請上堂師云有時相逢不相見有時相見不相逢東山起雲西山雨南山燒炭北山紅無位真人面門出入沒縫塔子透徹玲瓏現成公案好與痛棒三十禮拜了退一任齊立下風吽吽太平景象無人識大坐當軒笑浪公珍重獨峰竹山禪師請上堂師升座獨峰禮拜問云先師在昔一登天界和尚於此四坐道場佛祖盡力道不出的和尚作麼生為人師云一箭透威音當機誰中的進云即今宗風大振英傑堂堂和尚未出方丈全身已露誰是知恩報恩者師云拍拍是令少能和進云恁麼則博山之道應隆壽昌之脈愈遠也師云性命卻在杖人手裏進云和尚不得孤負他人師云別有一機去向在進云和尚也須珍重始得師云當知有辨驗處峰禮拜歸位師乃云一片月生海幾家人上樓何勞重指點各自應開眸雖然清光照眼似迷家明白轉身猶墮位到遮裏直須知有出就入就底宗旨始得博山先師一枝輝天照地底法道自雪關師兄示寂後此事耿耿在我心中前年在靈谷開期獨峰竹公特來相見請我上堂曾於人天衆前大為激勵竹公亦深為感發嗣後竊念先師法道不可斷絶乃勉自應世為人然尚有數人出博山門者皆各化導一方亦是使先師門風不致寂寥其誰親承付囑覿體承當者哉今豫主報恩法席竹公復來請豫上堂足見虛懷就正之誠豫既不忍負先師寧忍自負負公而不為光揚前後之事乎昔巴陵鑒答僧三語僧舉似雲門門云老僧今日忌辰只消舉此以為供養杖人亦有三語今問竹公若答得的當正好于此供養先師竹公出衆答話竹進前師問推倒興善大好山如何是壽昌祖翁田地峰云今日與和尚親相見又問擊碎船子沒蹤跡如何是博山先師法身進云道嚴特為先師來又問喝斷洞上逆流水如何是曹溪正脈進云大衆俱有分師云答也答得恰好只是門庭邊事堂奧中事還須問取杖人峰云道嚴親從祖父堂奧中來師云腳跟下地深三尺渤海難將雨露酬進云總瞞和尚不得師云白浪滔天須著力持鍬歸去骨毛寒進云困龍飛上天去也師云好好在遮裏著竹禮拜師下座雪嶠大師示寂訃聞金陵譂梁生司成同張如盤太史錢文青兵憲黃玉耳總戎蔡二白職方黃觀之解元劉今度明經薛更生謝在之顧與治姚伯右余未也諸文學請上堂從上東西老古錐更無一法奈何伊渠儂卻得超心法欺盡世人人莫欺噫嘻嘻有誰知天上人間儘著疑疑情脫許他悟此超心法諸仁者還知徑山雪嶠大師行狀麼其生平參悟已自希奇出世為人偏生怪異以故不落諸方格套使依門傍戶者無能湊泊乃目之為散聖正是他凡聖不測處不妨惑亂天下人賺殺天下人留此一種毒氣于千百世下有人向遮裏死得活得許他與大師相見不見唐宋二支五派正盛之時有丹霞燒木佛玉泉書布褌蜆子臥錢爐普化翻筋斗輩縱橫格外傍打正敲破盡五大宗師門庭施設之執計雖彼承接難得其人然其法乳風流自足潤沃千古如談梁生居士親大師四十年來自謂不能不疑不敢不敬始終覷他不破山僧謂此正是他超心活法若使人覷得破何處見得他不落聖凡之機今當大師蛻然示寂公深有感激乃偕諸公請山僧舉揚大師末後祕旨諸公直須向遮裏親得大解脫法始不相孤負也會麼紅爐焰裏看飛雪白刃霜前拂大旗藥師庵法侶暨諸居士請上堂師指如意云會麼門迎柳色黃金嫩院送梨花白玉香特地東君能自薦肯如蜂蝶去來忙諸仁者那箇是東君聻果能于此薦得則隨緣作主遇物明宗出入自繇縱橫無礙擲大千于方外納須彌于芥中何有凡聖死生世出世法而不歸此大圓鏡智雖然也須是開得頂門眼提得肘後符始得不見儒門高弟如子貢尚乃末年始窺得孔子堂奧中事乃曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也蓋此道深微非見聞所及而學者不失于深正昧于淺也何故聖人之道形色即是天性事人所以達天曾無內外淺深之分何有文章性道之異若非親見此旨安能一貫天人哉此惟我佛說法嘗于聲色塵勞示人本分大事故文殊末後乃請佛再轉法輪佛咄云文殊汝將謂吾曾轉法輪耶吾四十九年未曾說一字若于此薦得則知孔子之言文章與世尊之轉法輪皆不可以語言文字會也秪如山僧今日升座指出現前人境還與孔子世尊有同別也無莫將間解會埋沒本來人乃擊如意下座桐城倪資生臣北伯姪夏廣生生生兄弟設供薦親請上堂師舉如意云會麼當機不昧透徹古今一念現前迥超夢覺親莫親乎父母大莫大于死生若欲頓拔生死開悟性靈不從參證過關何能報此罔極不見宋時有樞密師川徐公每侍先龍圖謁法昌及靈源語論終日徐聞之藐如也及法昌歸寂在談笑間徐異之始信此道後丁父憂念無以報罔極因請靈源歸孝址說法源登座曰諸仁者秪如龍圖平日讀萬卷書如水傳器涓滴不遺且道尋常著在甚麼處而今捨識之後遮著萬卷書底又向甚麼處著徐聞灑然有得遂曰吾無憾矣源曰學士見箇甚麼道理便恁麼道徐曰若有所見則鈍置和尚去也源曰恁麼則老僧不如徐曰和尚是何心行源大笑于是徐公嘗與朝士同志者挂鉢于天寧參究此旨以故傳燈至今煥然不昧今桐城倪資生臣北伯姪夏廣生生生兄弟昔常侍其先人參朗目憨山博山諸大師深參性命故倪司空致仕林下與雪琪上座為方外友臨終八十歲握手談笑而逝其夏明府與倪處士皆超然獨脫而終此鄉黨中人人瞻仰發心以佛法為有靈也今資生居士長齊繡佛誓心與諸君從山僧挂鉢于祖堂求明自己著落不鈍置豫則諸君與徐樞密千載同風且與世出世間法身慧命妙密相傳為至親至孝也山僧更為頌曰夜半方明朝不露劫前消息孰能知于斯不昧真宗旨彩鳳繽紛天外飛下座
