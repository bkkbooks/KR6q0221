body:
  text: 門人大璽大寧大杲大權較說古今決不可一日無師友說植聖草世間法與出世間法皆有三要一要知有自己身心性命之事二要師其能明身心性命之人三要求其參悟身心性命之道三法雖皆要領其所重尤在得真師友為難也所謂世間法者此界自有乾坤已來三皇氏出仰觀焉俯察焉中審焉而得法天之文效地之理會人之事所以開天下之物成天下之務通天下之志達天下之情俾其方以類聚物以群分生得其安死得其順由是天因之以清地因之以寧人因之以貞物因之以平至於世久事變類或不得聚群或不得分生或不得安死或不得順而聖人遞出制治救其不逮仍使夫夫婦婦父父子子長長幼幼以及萬物各得其所堯舜禹湯文武周孔出生自相師友無非因其天地人物生成之理而裁輔養正焉或因治其心所以安其身安其身所以適其世或因治其世所以安其身安其身所以樂其心故有精一慎獨為治心之統有仁義禮智為治身之統有禮樂刑政為治世之統總而較之皆欲完全其天地人物以生後之一段大法也而所謂出世間法者又豈捨此世別有所謂出世乎自古聖賢遞出制治人之身心性命使其生安死順於天地間亦已至矣然彼尚未發明天地人物從何而生身心性命從何而有是故我佛因其生安死順之中發其生死之所自來始知有生無所生死無所死者為天地人物之根本也請試論之蓋一切人等皆有本來不生不滅靈明妙性非名非相非事非理非根身器界非夢想顛倒良由真常不守自性不覺不知一念妄動故有無明無明者即自己妙明性中妄立覺明遂有能所對待互相轉搖變出三細六粗而成根身器界夢想顛倒復於夢中妄見有憎愛生死種種業境所以生生世世夢中作夢識上生識不能頓斷命根㘞地惺悟去也我大覺世尊悟此覺明為咎是知見立知為無明生死之根本故教人返己自求頓惺夢業或使人忘情破相而見性或使人悟心了妄而歸真或使人不迷於三界之空花或使人不執於四聖之妙法所謂即世間而出世間也我佛教法最廣無有一機不利種種方便設經律論無非欲人知此一念未生前了無一法可得所謂元明照生所所立照性亡迷妄有虛空依空立世界想澄成國土知覺乃衆生空生大覺中如海一漚發漚滅空本無況復諸三有而世人孰知十方虛空生我心內如片雲點太清哉又孰知一人發真歸元十方虛空一時消殞哉故永嘉大師云夢裏明明有六趣覺後空空無大千遊江海涉山川尋師訪友為參禪自從識得曹溪路了知生死不相干夫人之于生死亦大矣若實不能了知孰能於生死不相干哉是故不辭跋涉遍求明師決擇死生頓超法界痛念生死不能了脫則萬劫長迷昏睡之途何日能自憤自惺而不假師友之推乎哉所以歷代祖師不敢一念自欺欺人盤根錯節敲骨打髓參遍諸方門奧透盡向上宗風始能為人釋縛拔橛秉殺活鋒游生死道超出名言事理之障回開玄微妙密之關自非訪求師友而得其參悟之法安能住世間不為世間之所縛游法海不為法海之所沉哉烏乎當此世運衰微法道凌替苟於一日無真師友一日不自參求則此幾希之脈亦幾乎息矣或謂世人必以聖賢為師而不知聖賢乃以天地人物為師夫天地人物之師是古今不可昧滅不可自欺欺人之真師也又孰知於一念未生前求此心師以自參悟自印證哉宗門以不肯自欺相授受說達磨西來初未嘗將禪與東土人參神光斷臂亦未嘗要參西來人禪秖曰我心未寧乞師為我安心師曰將心來與汝安及乎覓心了不可得乃云為汝安心竟因是豁然自悟師資密符當此時也實有法可傳乎實無法可傳乎若實有達磨以何法傳彼若實無神光如何因此始悟雖然直須親到遮般時節始得不爾終是自欺欺人也又何貴於西來而為此土之初祖哉試問當時此土更有一人如彼不從心外求法者否若有達磨不必西來若無達磨徒爾西來蓋斯時秖有義學最興粗則執文字道理細則執玄妙知見尚未離文字相及心緣相又安知有向上不傳之旨邪故初祖有教外別傳不立文字直指人心見性成佛之語也豫嘗論古人生平只是不肯自欺欺人所以徹上徹下絶無一毫委曲隱昧即最初欲明自己生死大事不知性命落處至有數十年求此中一問頭不得及痛切不已發得一問雖萬里銀山衝開求決若未遇真具殺活手眼者畢竟剖擊不破設剖得破則如巖崩石裂海晏河清盡大地人把捉不住千佛出世沒奈伊何所謂懸崖撒手自肯承當絶後再蘇欺君不得且古人真參實悟境界如擊石火真有火迸似閃電光真有光爍非若今日無火說熱無冰說寒不悲而哭不癢而搔達磨再來不第折蘆去矣如梁武帝初見大師即問朕建立寺宇寫經度僧有何功德曰並無功德又問如何是聖諦第一義曰廓然無聖看他如握一把金剛王寶劍世間法來不消一揮出世間法來不消一揮及問對朕者誰曰不識末後遮一揮即使從上佛祖也無躲跟處況其餘乎當時不遇其人便乃渡江而去於此亦何曾自欺欺人耶嗣後三四五祖如針芥不爽及六祖於黃梅夜半乃曰何期自性本自清淨何期自性本自解脫若未親到不疑之地但向此語容易領略不啻見彈而求梟炙安從夢見古人故六祖接南嶽但問甚麼物恁麼來曰說似一物即不中曰還假修證否曰修證即不無染污即不得祖曰如是如是善自護持接青原但問曾作甚麼來曰聖諦亦不為曰落何階級曰聖諦尚不為何階級之有祖曰如是如是善自護持秖遮便如寶鑑臨人形影畢見何曾費纖毫氣力亦何曾虛設唱酬至南嶽接馬祖則曰磨磚既不成鏡坐禪豈可作佛而良駟已見鞭影而去矣若是劣蹄徒受痛策青原接石頭則曰曹溪還有遮箇麼曰非但曹溪西天亦無而靈龜已先卦兆而通矣若是頑殼枉下深錐乃若溈山踢百丈之淨瓶臨濟捋黃檗之虎鬚洞山睹雲巖之鏡影雲門攛雪峰之鱉鼻法眼奪地藏之指頭各各如五行交錯感激成文生剋制化天然妙協宗風顯密莫斯盛矣後世不知好惡不透幾微接嚮乘虛迷心逐跡參悟不真而欲決擇宗旨寧不喪身失命於古人之典刑哉審夫古人大徹之後橫機所觸倒用所通未有不能為人抽釘拔橛去縛解粘者以其師資授受之際自有一段真切之心奮起不可思議業用默默鼓舞作興亦何曾參他人口頭之禪與授冊子上之法邪試觀五宗之上師資雖少其綱宗正大作用弘深龍峻脈長源高流遠迄五宗之末如宋元輩豈無卓犖丈夫哉按其主張教人看死語執死法或偏以評騭拈頌為提唱宗旨者雖則乘時穿鑿不無見小速成即彼嗣人之數不在馬石之下求其如百丈藥山丹霞龐蘊之大機大用何人哉於此亦可概見世愈降而風愈下脈愈微而氣愈澆矣安得過量大漢本色真人重振向上不傳之風規復還唐宋天然之氣象哉即如治世之道自堯舜為正始至文武為正終設非集衆聖之大成孔子倔起則堯舜文武之道未免喪其渾全矣仲尼直自祖述堯舜憲章文武明大易刪詩書定禮樂作春秋標萬世帝王不易之師法建終古天地不壞之綱維真可謂成始成終時中之大聖人也後世雖有聖智復起亦必守其成法以救其偏弊而已矣孰能於此加焉於戲我此法門至於五宗以下亦猶世運之值周末也安得若而人振此亂緒之綱哉大法有內外護說護法者護吾人身心性命之法也即所謂王法與佛法相表裏也世人不知以為護佛之法又何異愚民曰我亦行堯舜之道哉或謂佛教虛無護之亦何補於修齊治平曰非然吾亦有身心性命之人也能獨舍此家國天下之法乎佛有三大藏法曰經律論更有教外別傳曰正法眼且始置勿舉如佛最初為十方剎土國王大臣長者居士所授三皈五戒之法亦自奇特非常也其三皈者一皈依佛即自皈本覺靈心如天下人先知有君父之當尊則夙夜匪懈以事一人更無悖逆以自犯也二皈依法即自皈本明妙智如天下人先知有國制之當欽則禮樂征伐自天子出更無僭越以自棄也三皈依僧即自皈本淨妙行如天下人先知有王事之當從則鞠躬盡瘁死而後已更無欺罔以自墮也其五戒者一不殺生即不斷自己慧命也如天下之慘傷莫過於中外屠戮而佛戒不但禁其弒害君親即蜎飛蠕動猶不敢損則以慈悲絶其殺幾有甚於威刑矣二不偷盜即不虧自己幽靈也如天下之強暴莫過於劫奪邦位而佛戒不但禁其竊取神器即無主花卉猶不敢折則以喜捨絶其偷心有甚於嚴憲矣三不邪淫即不喪自己真精也如天下之迷亂莫過於姦辱倫理而佛戒不但禁其穢污閨幃即隔壁叉聲猶不敢擬則以堅貞絶其欲朕有甚於肅典矣四不妄語即不欺自己至誠也如天下之讒佞莫過於誣滅經綸而佛戒不但禁其飾僞侮文即意言綺二猶不敢恣則以嚴密絶其妄隙有甚於聖制矣五不飲酒即不壞自己淨明也如天下之失誤莫過於昏惑治政而佛戒不但禁其酗酒敗事即酣醉之人猶不敢近則以智慧絶其昧緣有甚於明誥矣即此三皈五戒為在俗入道之初門施之於修齊治平尚有餘地矣使天下之人皆能遵此三皈五戒隨次推而行之則萬國永無干戈僭竊亂倫敗理之事常如唐虞揖讓之世也況能以根本具足及菩薩大戒與三德四智六度萬行而成就此莊嚴法宇哉又況能以直指人心之全機大用使人立地可以頓悟成佛之知見哉故吾之所謂護法者即所以自護其身心性命與王法佛法相表裏也何嘗執虛無寂滅而無補哉或謂今天下人多護持三寶而不聞有以補治政者何也曰三代已上人心淳朴易於教化降於秦漢人物奸強至難調御乃若人情物理有先儒所未明性命身心有聖教所未發希奇作用有王法所不加祕密威靈有國制所不逮者有富貴聰明之至極非警以性命之大事無以折其貢高有懷憤瞞激烈之不平非喻以因果之深緣無以消其鬱結有生於邊地下賤之陋劣非設以神道之教化無以格其顓頑有伏於深山窮谷之妖邪非感以平等之哀憐無以攝其不測幸此佛法推廣於震旦令其自肯自切以自悟自度即使遍諸海嶽以甲兵鎮守勞民傷財又何若分其教化各自相忘於道術而共致太平哉或謂今人亦有歸護此法而復進鋭退速者何也曰此蓋信道不篤雖護門庭設化於中尚未深參或遇明眼而正見暫生或值邪師而真機反謬或自恃其尊貴不能取善從人或夙負其才名弗肯折心受鍛或執先入之言如毒食不化或局小道之智似蹄涔未充或各主其師承而疑信交戰或私諱其標本而藥病相持更有說似是而行實非陽為此而陰在彼有以名利佞佛傷殘功德之林有以酒色逃禪破壞定慧之脈有以採藥迷坑而投爐失汞何由值固命之金仙有以登峰折屐而逐岐亡羊焉得逢長春之肉佛進之有為法忘軀者雖亦有彼作略但以慧睫未開或認人不真未免被他移轉其大權方便之力未能於無中猶唱出絶後亦吹蘇者之神妙唯全身擔荷之人乃能於無佛法處建立無上法幢無真僧中推出人天眼目或起法師於故地或延宗匠於他方或誘引其不知生心仰慕或激揚其未學憤智參承或屈尊就卑而提攜弱喪或攀高俯下而光闡玄微或振作其殊途摩蕩為象或鼓舞其同類交錯成文或陰發聖賢之心傳以資至治或密挽乾坤之氣運以致太平蓋機權之已在我而旋幹之應臨時也吾所謂聞法必藉大因緣發機猶須真種性者豈非欲人於此法門當生奇特難遭之想哉故靈山付囑諸大士發深誓願而現此國王大臣長者居士等身為內外護者正欲其同道化同懤以入世援出世斯可使正法久住表裏兼持也或謂表裏兼持之法從上亦有不易之常式乎曰有若欲使此正法兼持而久住者莫過於華嚴圓頓法門之綱要其普賢長子之十大願王也一曰禮敬諸佛即此開頭一著便欲人折伏身心全體受命更無凌鑠上下向外馳求也二曰稱讚如來即此便欲人頓發心花光生長舌更無欺罔之言變亂聖訓也三曰廣修供養即此便欲人胸襟迸出蓋地遮天更無隱昧不顯偏執冤親也四曰懺悔業障即此便欲人掀翻業識剖露空王更無包藏禍胎雲生日面也五曰隨喜功德即此便欲人兩睫生光遍照塵剎更無草野遺珠特地按劍也六曰請轉法輪即此便欲人揭開日月朗行中天更無霜露所墜不聞雷霆也七日請佛住世即此便欲人直見此心各自成佛更無不安生理肯作非為也八日常隨佛學即此便欲人對鏡照顏自見眉目更無播揚糠秕昧己昧人也九曰恆順衆生即此便欲人一體神明群靈效用更無燮理不和萬物失性也十曰普皆回向即此便欲人大緣性合全體圓同更無一微塵理不參兩間異類中行不顯正用也如是十願大法樞機一舉則一切舉一成則一切成以其自性現量稱性法門繁興大用全體即真而諸佛菩薩不發此願決不能成就一真法界圓滿毗盧藏身也噫世出世間有此法門誰能盡此報身行此十願而自護世身心性命與法佛法相表裏以紹隆十方慧命而常住不滅哉人法必交相重說觀夫佛祖出世始終設化惟有人與法而已矣即佛初坐菩提座於一切法成最正覺而說大方廣佛華嚴經是則以人為重乃稱性之法其全體盧舍不動寂場處華藏海而智入三世都無來住與十方塵剎諸佛菩薩主伴交參重重涉入實惟一真法界故普賢文殊為長次子出入藏身三昧全子即父身裏出門得大機大用以向上全提也所以有發菩提心學菩薩行之善財童子而稱童子者是最初一念真機即圓成實智而頓成正覺故其遍參離明之五十三善知識造端即得根本性智而後步步入佛自性現量境中無論僧俗正偏尊卑貴賤曾不動著根身器界儼然得證差別性智諸大三昧不彈指間入彌勒樓閣全成華藏莊嚴則又不同彼法華三變淨土龍女更轉男身始往南方無垢界成佛度生也故開品即名世主妙嚴至於七處九會佛惟放光證明諸大菩薩互相酬唱皆是承佛威神如諸侯之號令皆出於天王始無僭越所以一切禮樂征伐悉名曰天蓋此經乃自性現量之法非心外比較所知所以二乘在座如瞽如聾益顯圓頓之妙非彼淺小所得領略也佛乃於是曲垂接引於鹿苑方等及般若會開示衆生漸入佛慧而最後涅槃將至先為付囑家業乃說大乘妙法蓮華經是則以法為重使彼轉身就父有運載歸大寂場之義所謂諸法寂滅相也而授記作佛使彼行菩薩行莊嚴佛土而後始得有如是因果本末究竟等耳不然如世主道欲以帝王寶位直授庸夫安可以服天下之心而行天下之令哉即堯舉舜於側陋亦必考功見蹟而後攝位傳此天德也又況舉此法王大位可以直授其博地凡小而為圓滿菩提之主哉吾所謂必須得人得法之真庶可荷擔如來大事因緣而出現於世耳近世稱知識者孰不自謂傳佛心印據法王位圖彼名聞利養與賤賣佛法至於廁坑頭屠沽舍爭逞機鋒鬥尚棒喝不惟鼠竊狗偷而為生計抑且以魚目燕石為希有之珍而濫相傳授故有一等未聞真法之人為彼所眩生輕慢心作苟且計便去聚衆白椎如梨園子弟之演戲如教坊娼妓之作歌所謂打鼓弄琵琶還他一會假也嗚呼悲哉夫如是還可謂之法王法正法眼乎夫如是還使達摩馬祖再來又別作如何激揚乎正以末俗不有真求法者安有真說法者不有真說法者安有真聽法而得真開悟者哉惟古人色心全勝故於語默舉止使人望之意消豈直於登座之顧鑑嚬呻能使人天感格如經中所謂是時若干人遠塵離垢若干人得法眼淨若干人悟無生忍發菩提心獲陀羅尼與夫某得吾皮某得吾骨及髓者又豈似今人猜三枚道兩謊之乾打油也哉當此凋弊穢亂之時孰能知廉恥覺惡羞而不敢自欺不敢欺佛不敢欺法不敢欺僧不敢欺人不敢欺天下後世哉又孰能識法而懼於此法門忘身為法捨己求人忍難持經使身為床座身為奴僕身為犬馬身為塗炭而扶植大法尊重法王護惜慧命奮發人心而報大法之恩哉又孰能以法為重以人為重以建立設化為重使此諸佛眼目人天眼目衆生眼目不致昧滅而常照於世間出世間哉豫嘗見近世有宰官居士深心欲建立法化每多未具擇人正見徒事名相枝葉不知宗旨根本所謂徒善不足以為政也即如三代之道沿至於今未有得人而不興未有不得人而不敗者吾此法門自禪宗之盛於曹溪馬祖石頭再盛於五大宗師之制作雜出則宋元之流弊吾不欲觀之矣雖然豈今日之人法實異昔日之人法哉蓋人不得真法而人非真人法不得真人而法非真法有一人如神光馬祖之流者出或當別有手眼而返擲此天下後世於先佛之法界則非吾所得而知也且先佛之法界雖不可思議不可比況然有神而明之者亦未有不因其本來見成之法式得以設喻而開悟之耳豫試舉易象以況之或有可以會盡天下之異同乎或亦有可以於此知建立之法式乎夫所謂佛法者即世間法也佛如易之有太極而普賢文殊猶乾坤之具全體大用純粹不雜至於諸大菩薩如坎離六子之破體而摩蕩交錯成八八六十四卦以至經天緯地無有餘爻其究竟指歸不過一奇一耦之謂道也所謂剛柔相濟以吉凶而生大業者豈非明暗交參正偏回互君臣一體功位雙超之妙協哉所以五行之生剋制化相生即所以相剋相剋即所以相生使此太極不能發揮此五行生剋制化之道則太極是為死物不得名為無生法忍不得名為如來藏性不得為天地人物之始身心性命之宗也故吾洞上推此向上一位為無著真宗始知尊貴一路自別於君臣五位者其在茲乎聖君一位正配太極之清寧無為所謂不顯惟德百辟其刑居其所而衆星拱是則輔弼之大臣配乾坤六部公卿配六象與百官宰執之配諸卦則始終本末舒卷一氣也昔堯命官先以義和治曆明時舜初即位即齊七政者蓋此乃天地人物之首務故曰易之為道廣大悉備雜物撰德開物成務冒天下之事成天下之亹亹者皆以此道為萬世君師建中立極而範圍天地曲成萬物知此繫辭之旨則天下古今之道思過半矣故儒獨以易為天地人物不易之法至於餘經皆因時制宜之事也苟諸經一有不合大易之大經大法者則皆異端曲學誣世惑民之術又安足與天人一貫而建諸天地而不悖百世以俟聖人而無惑哉知聖人制易之意則知吾所謂得人得法之真如五家宗師之標宗立旨以使正法久住而非人不得破壞也有一人焉觀此而興起者則豫當身為床座而供養之豫惟日望之矣建剎以扶植人心鞏鴻圖說有懷杞憂者曰世語天下名山僧占多亦知其利害乎曰自古天下名山非僧占也是世人自有所繫不能到耳何也即今五嶽群巒窮海絶島不是龍蛇之所蟄即是鬼怪之所棲不為逃亡之所依即是奸盜之所伏自非離塵拔俗不求聲色貨利之人忘形死心弗戀恩愛名位之士安能孤蹤隻影入無煙火之鄉涉嶮躋危造不耕織之地或於此縛茅就樹草衣木食以窮年或傍石為巢火種刀耕而畢世或致天人送供或來猿鹿銜花或感獵人而捨業或激賊輩而改途或啓鄉頑而惡羞或發村懦而悚惕或使憤瞞而悔悟或令迷悶而開明或布施以格劫奪而無害國害民之幾或持戒以消淫訛而無敗俗敗倫之朕或忍辱以攝瞋恨而無弒尊弒親之端或精進以鼓惰愚而無甘暴甘棄之疾或禪定以折僭亂而無大逆大叛之萌或智慧以廓英奇而無索隱行怪之異或權力以救邪僻而無跳梁猖獗之狂或悲願以贊經綸而無太過不及之弊是故能使富者知盈而捐財植福使貧者知乏而效力立功使智者知本而興言歎仰使信者知性而委命參承或聞道行於朝廷而三詔不起或播宗風於巖谷而異域皆從或使蠻貊皈依自遵約束而免守衛之勞或使邊方寧靜不見征誅而省敕命之費乃至默成聖制之無加陰振治綱之不紊亦何曾非大同無我之創立哉亦何曾非至公無私之尊尚哉普天之下莫非王土率土之濱莫非王臣能使一介之民自安生理不作非為即是一草莽之忠臣也能使一尺之土自守本分不生踰越即是一太平之治地也世徒見一僧不法即欲革天下之僧不知僧乃民作賊亦民為耳造妖孽為顯異惑衆之事創淫祠倡殺生害命之幾自當除滅以正憲章乃今有處拒僧出入城隍有處禁寺講演宗教即有聽講宗教之僧不軌乃此僧之不軌也豈宗教令僧之不軌哉若以一人犯法連罪天下之人欲使天下平良不作悖逆之忿亂者未之有也若以一僧不法連廢天下之寺欲使天下名山不為盜賊之資棲者安可得乎於戲況我佛法以慈悲為教以智行為門內無主不立外不正不行或授戒有嚴於國律或講法有奧於聖經或立論有高於尊王或傳燈有超於盡性豈曰小補之哉即國制有爵賞之誘且未能使百姓盡思立功有刑罰之威亦未能使庶民盡懷懲惡安能強以苦空寂寞之法妄欲鼓簧弄影於民乎而世人欲以異端為闢異廬而焚異教而禁異人而驅竟不知何異之不同於大中至正之道哉竟不知何異之無益於身心性命之理哉吾所謂真金不怕火者正以得火而愈精也真佛不怕排者正以得排而愈顯也自古及今迭否迭泰何世不因排僧而佛道明何人不因闢佛而僧行振吾但患僧徒之不真不患世人之攻衆但患佛剎之不密不患名山之占多所謂有佛住處龍天喜無僧說法鬼神愁也豈有盛德大業之世而患其佛剎之壯鴻圖耶齊僧以自尊法行續佛慧說自金身入夢漢明帝遣使西迎得摩騰竺法二尊者以白馬馱四十二章經特來此土因與諸道士設壇焚驗而我震旦始知有釋氏佛法僧三寶故當時王公宰輔異道九流等乃於法天制地之教別得天地從我所生之旨乃于生順死歸之道別得性命自我所造之因而超超乎悟此三界唯心萬法唯識深幾神哉故有了生死而證真常者有即塵勞而獲解脫者有即王道而行佛道者有即權教而明實教者自是歷代帝王異世賢聖悉親佛法之微得拓內外之化雖國位之無常皆尊信之不二所以西來之僧法迭至重譯之教藏彌隆梵行遍入於人心不待誘而自信微言深參於世典不假思而自成佛剎與鴻圖共麗三代之禮樂斯存僧伽與像法同嚴十界之性修具在所以僧因佛而成儀法依僧而成教故僧種即是佛種僧身即是法身也世人所以尊敬三寶者正尊敬自心本性之智行耳供養僧者非直以飲食衣服臥具醫藥四事具足而資給之使彼得免經營安身辦道之為我有功德也正以能使我等發希有心生難遭想忘軀為法決擇死生或因此知苦斷集得出恩愛名利之纏或因此慕滅修道得悟因緣依正之業或因此從佛通儒得世出世間不二之道或因此明心見性得向上一路不傳之宗或因我供一真僧而天下之妄僧俱振或因我建一正法而天下之邪法皆皈或因我續一僧之微命即續三世諸佛不絶之慧命或因我護一僧之初心即護十方衆生常住之真心如是齊僧是名供十方法身之父如是護法是名保三世含識之靈也故昔日我佛親以大法付囑諸大菩薩於此十方剎土示現國王大臣長者居士及四衆人等之身為內外護成就莊嚴此世出世間法所以不致斷滅也如趙州禪師住院之日燕趙二王感其道行息兩國之爭睦州尊宿以大草屨掛於城門巢賊入境見之因感悟而救其擾亂靈樹禪師預知廣主有興兵用武之心即時坐化遺命以消其隱慝永明壽禪師以一言勸錢王俶納土於宋太宗使浙江一軍十三州俱免血刃皆是僧法之力互相制治而成其至化也又況能以律制天下殺盜篡逆之幾與消奸淫僭奪之微又況能以教拓天下忠孝廉節之心與充仁義禮智之性又況能以禪開天下生死性命之關與明天地人物之主乎豫忝生末法幸廁僧倫豈敢以我為僧而自贊我僧之法蓋我亦此世間之人也知有僧之可尊可敬可以自度度人可以報國主之深恩可以酬檀護之厚德是故即以此法普告同一佛性同一智行之人共相自尊自重自行供養使此正法常住於世云耳刻經以自護心法續佛慧說三世諸佛一皆以法為師而得成道即說法度生衆生雖曰師佛其實師佛之法也三寶之以佛為尊者蓋重其法由佛說僧依法行故也使佛與僧非如法說行則佛不名其為佛而僧不成其為僧矣其法又何足貴亦何能孤起而獨立哉故佛僧之必依法而成其覺道是法必因佛僧而得常住不滅者正所謂一體三寶是也所以從上佛祖始終說法及相授受之際必至囑曰善自護持毋令斷絶至再囑諸大開士於十方剎土示現國王大臣長者居士四衆等身為內外護是故不忘付囑之人普現色身建法幢於處處破疑網於重重或捨全身以求半偈或斷隻臂而乞片言或入海藏而憶餘詮或造異域而請重譯或弘法而罹禍難或忍法而雜寇讎如此苦心苦行無非使諸佛正法眼藏常住於世以開示悟入一切衆生佛之知見耳余嘗慨近世佛法荒涼師宗昧滅幸有達觀雲棲壽昌三大師鼎立宇內使法流傳余已作不二門發揚雲壽二大師矣但未得達大師行實故未之及耳然聞大師挺身為法振起頽風刻方冊藏板於徑山表諸佛法身於末世至於城邑巖穴莫不深沾法恩誠可謂功齊諸聖行越三祗也豫昔往徑山禮塔尋杖履鎚拂所過化處求其行實語録並不能得因低徊三歎曰大師能使從上佛祖法身常住於世即大師之法身也奈何知尊重供養之名像者獨不知其語録行實真大師不滅之全身乎安得天下知法感恩之人繼述其志事急為修葺雙徑藏板之所更於化城鼎建大藏樓閣及諸僧堂剞劂守護奉此經板如諸佛法身現在擁諸梵王帝釋天人等衆儼然未散而為轉法度生禮拜尊重乎余嘗笑天下叢林之徒每自建立靜室極其巧妙精工置彼玩好器具不知動費若干至於尊重經法與安措十方僧堂不但如積故紙與養犬馬也悲哉余昔以親柩野寄未葬不忍此身立簷屋下況我法身父母生靈親依忍使暴露不顧而自安精美哉且我等今日受此清貴之福不有十方僧法之力又安得享此國王檀護之庇乎余聞宋元之間藏板尚有二十餘副以遭兵火燬滅之矣方今止有南北二藏非遇我二祖降詔禮部並咨天下高僧重新較正翻刻遍印諸剎流通加以列聖頒賜護持則此正法眼藏不幾於湮滅歟余於耿玉齊案見達大師録乃蹴起嗟嗟曰吾不藉此録又安見大師雄心猛力荷擔此大法哉即此可見剝皮析骨與漆書壁經等輩之心至今在也使三皇五帝之典墳及文武周孔之誥籍不有漆壁之人則一經秦火已無餘矣安復見上古聖人之心膽骨色與大經大法之妙密而堯舜周孔亦土苴糠秕耳何足以聞見神交於後世哉審如是則天下名山洞府皆當刻木鐫石乃至金匱玉函而藏之使山靈鬼神呵護防其湮滅以垂不朽可也悲夫法末道降聖賢感化他方世間誣世惑民之書誤心喪志之說恨無秦火盡為之燬燒苟不藉此正法眼藏開示群迷則日暮途窮而彼未歸之客爭免墮落於無救也哉即我壽昌祖未參訪時因讀金剛經而開解後因閲傳燈而悟心則此刻經之功豈不同活佛說法度生之力乎則此見聞之利寧不同親承佛祖授受之益乎豫於是述茲見聞大法之緣為刻經之勸放生以感悟群機祝太平說法界種性只是一生以凡聖分故有戒殺放生四字衆生之本業只一殺機諸佛之本業只一生機度衆生之迷業只一戒機成諸佛之覺業只一放機殺則迷情自墮戒則悟理自升放則種智自充生則覺心自妙夫天地之道長且久者只是生生不息不曰滅滅不生不惟歲次之春夏是生即秋冬亦生不惟晝之日轉是生即夜之月運亦生所以太極陰陽五行八卦度數無有一時一刻不生即吾人從父母未生前以來至有此身四肢百骸未有一呼一吸不是生也稍有一氣不生則此四肢百骸皆潰滅矣修此幻身之術者尚不可一氣不保全此生而此至靈之性至妙之智何可一念不常住此生哉故戒放二字曲盡三藏玄微透出別傳機用蓋戒是遮旨放是表宗遮則凡聖兩分表則性相平等放表之義的是直指天機橫身異類之妙密也時有士曰此未曾有從來以戒放為佛教之初機然未聞為妙密別傳之旨也請更詳示之杖人曰世人多以戒放只為憐彼刀砧烹煮之苦遂彼恩愛身命之樂或更藉說法以超度之為至耳然未細剖其所以能使彼憤發感悟之機速於超凡入聖也何則一切衆生皆死於安樂多生於憂患皆迷於情欲多感於死生至於下劣衆生黑業深重多不知文字道理知見及參悟之法所謂鬼神沉憂愁之苦鳥獸懷獝狘之悲修羅方嗔諸天正樂可以整思虞趣菩提惟人道為能人為萬物之靈能知文字道理知見參悟尚不能直下令彼戒殺放生何能速使直趣無上菩提哉所謂人而不為吾末如之何也此裴公深有望於人獨恨諸天之樂與四惡之苦難度然則四惡既已難度今之所謂戒放者不只是戒放吾人本心之生自足以消此殺業充此生機歟是則猶未盡善也豫正妙在四惡道衆生迷到至極之處全不知文字道理獨有一念貪生惡死之心雖至蚤虱蜎蠕若捉之害之必驚走而竄伏也以故有一人殺彼害彼則彼惡死之心恨入藏識生生世世必冤報不已必無能自解也有一人救彼放彼則貪生之心感透藏識念念心心必恩報不已亦必無能自障也既彼有此感激報恩之心透出藏識則彼無始積習深業皆不能為障為迷反因一念報恩之良心良能頓發良知良行如一星之火能燃萬劫之稠林以一念之靈能豁萬德之光藏豈不一念放生之機超於諸天之死於欲樂人道之死於寬閒而頓破萬劫之鐵圍銷亡無間之地獄哉所以有雀之銜環龜之載溺與種種出類生天及悟道證果又有如鶴勒龍樹諸祖之傳佛正法眼藏者皆是放其本來自性之生生種智也不見古來有許大聖人如解網易牛是心足以為王等皆推天下不可欺之好惡為格致治平故能救人情欲之死命放人心性之生機雖至惡至奸至愚至劣之徒一念憤其感激之良而成天下國家不世之功業何可指數哉此皆戒放之機而充之也吾所謂法界只是一生而妙有別傳之旨而續慧命者不於此見乎念佛以全提一心成淨土說法界一切含生元同一心只因一念妄動遂自各成異途所以念善則從善念惡則從惡念有則墮有念空則沉空念妄則逐妄輪回念真則歸真常住故說心之前謂之性而與情俱來謂之識轉識成智是教家之所以指縱也念者今心也就今心而提撕之衆生因念動處而向外流轉諸佛亦因念動處而向己歸還馳之遠者愈散而愈迷返之近者愈收而愈悟所以迷者亦有深淺悟者亦有頓漸救者亦有權實求者亦有速遲種種設化投機無非即念接引然百千三昧法門其最捷最頓直指全提之法莫過於自心念自佛自佛念自心為因果不二本始同源之妙也蓋十界依正報相皆循一心之業而得發現所謂情生智隔想變體殊心生則種種法生心滅則種種法滅既一切衆生有此若干種性色心情識欲念名言習氣計著妄想惡知惡覺邪見邪緣則此不可思議業用自不得不如是也是故我佛出世說法四十九年亦因其業用或談空破有或談有破空乃至百千方便互相攻擊無非欲令衆生發真歸元不為妄想之所轉耳至於說彌陀經更不分真別妄較實論權並無頓漸偏圓之可拘亦無始終大小之可判直是全提一心不亂清淨解脫之法使彼一切有見無見常見斷見之凡夫小乘邪人外道一一皆得頓發自心超越世出世法而成就不可思議功德也世人孰知此經大旨妙在不立依真起妄返妄歸真之語但敘彼佛現在說法其極樂世界依正報相有如是樓閣階道水鳥行樹有如是聲聞緣覺菩薩衆會皆是如來一心清淨行願之所作也若有善根之人發願往生執持名號毋論一日七日但能一心不亂自然頓斷生死命根現前感應道交即時親見彼佛及諸聖衆豈非臨終西方境分明在目前乃吾自心佛性現量所成就之功德莊嚴哉而六方諸佛恐此土衆生深信不及蓋以一向聞佛說法種種教人觀察修省六度萬行然後始得到佛境界如何此會但教一心持名不假方便即得成就如是莊嚴所以出廣長舌異口同音稱讚我佛所說一心持名之法是衆生難信之法是諸佛難行之事汝等衆生當信一心念佛是諸佛已曾成就不可思議功德之所護念者也若能深信一心持名則心心清淨念念解脫根根塵塵周遍法界皆成莊嚴淨土矣豈非十世古今始終不離於當念微塵剎海自他不隔於毫端哉雲棲大師彌陀疏鈔其中融通藏海透徹化機廣大悉備無不極至余此全提之說直聊與能信自心之人與不疑禪淨之人與博觀約取之人與竿頭進步之人為一前矛而助其一㘞地可也持戒以當當心地證法身說夫轉凡成聖密在雄力之大權發覺出塵機在猛省之始念故本師和尚曰力生小子沙彌曰勤策惟力能生含識之真心惟勤能策後心之發覺所以世出世法妙在一念生機如火之始燃妙在益薪以助發如泉之始達妙在撥沙以疏通又如亡子之思親始有歸家之念迷途之覓路始有悟道之由故我盧舍那佛與諸佛說心地法門如毛頭許須知秪遮一毛便是十世古今微塵剎海之種性也令諸佛轉我所說與一切衆生開心地道如我於心地中初發心中嘗所誦一戒光明金剛寶戒是一切諸佛本源是一切菩薩種子一切衆生皆有佛性一切意識色心皆入佛性戒中當當常有因故有當當常住法身有緣非無因故念念不去其心如是心地十波羅提木叉無盡藏品是一切衆生戒本源自性清淨嗚呼只此一段便是三世諸佛菩薩直指人心當當見性成佛之妙旨也乃至談經三百餘會說法四十九年以至末後拈花亦何曾出此心地法門最初一念發心之當當本源佛性哉良以衆生覺性無常不自知有所以背覺合塵不自知返是故諸佛種種方便秪欲使人發此一念覺心返本還源歸無所得而後已也故曰我是已成佛汝是當成佛一切有心者皆應受佛戒衆生受佛戒即入諸佛位位同大覺已真是諸佛子只遮子之一字便是發覺初心從覺性起如帝王子是王所生必須長養護持使戒相具足戒德圓成方能使此始覺王子還證本覺王位也或云但能發此戒心不作不犯自成性戒又何必具足戒相與圓成戒德乎曰是不然所謂戒心者即此一念發覺初心勇猛奮烈者是也若不有戒相如有力男子欲往京師尋求父母不知前路險夷之相徒恃己力不免觸途成滯也有戒相而無戒德又如有力男子已知路途而未有資糧給使亦不免半途而廢也即有相德俱圓者不悟戒性是猶雖到京師未知父母落處及其本分受用亦不免錯認它阿爺也又況能承顏色而奉甘旨哉所謂孝名為戒亦名制止苟持戒不知戒性之所止尚得制欲而順其覺性哉若欲知其性戒之所止直須自知遮念覺心從何而起則知遮念覺心從何而止也知其所止則知釋迦牟尼佛從體性虛空華光三昧而入亦復從體性虛空華光三昧而出不知自己覺心出入之所又安知諸佛安身立命之所又安知衆生安身立命之所哉故曰戒性如虛空持者自顛倒若不悟虛空戒性正是門外打之繞也是故諸佛愍此心外求法之人始揭出心地法門一毛頭許令汝自參自悟令自作皈依自求超越所以最初入門必先令三自皈依者何正以行人求戒遮念覺心既從覺起還從覺歸使彼自求落處於此知所自歸則知所自依之清淨佛也蓋覺性無常感善法則從善感惡法則從惡欲使覺性常住妙體常明必須自發真智決了性真則自不起覺明分別之心亦不為善惡業緣所惑又如寶鏡當空萬形俱照於此知所自歸則知所自依之微妙法也智本虛明非行不顯必須自起真行行起則知解情空行起則智覺性滿於此全性成真全真成性繁興大用舉體無它是為真知所自皈依之解脫僧也吾嘗謂若有一法不能了不名法身若有一法不能入不名般若若有一法不能捨不名解脫豈非三自皈而三聚淨乎於此透得則五根本戒皆以一念發覺而圓證之矣若能發覺自歸則自無不忍之心世無可殺之命所謂一念忿起即是自傷法身慧命也可不純仁而自持乎若能發覺自歸則自無不足之神世無有餘之物所謂一念偷生即是自棄法身慧命也可不純義而自持乎若能發覺自歸則自無能泄之情亦無可惑之色所謂一念欲萌即是自喪法身慧命也可不純禮而自持乎若能發覺自歸則自無能欺之辭亦無可誑之事所謂一念妄動即是自誣法身慧命也可不純智而自持乎若能發覺自歸則自無可昧之靈亦無能困之味所謂一念酣發即是自顛法身慧命也可不純信而自持乎此三皈亦猶克己存誠五戒亦猶間邪四勿雖淺深之有別實正助之無殊然此一念發覺始心又何但能成三皈五戒之宗本直將超越六度萬行而圓滿四智三身也誠以初心行人深知奉重則性業遮業自然不作不犯不執身而二乘之戒相自精不執心而大士之戒德自備不執性而諸佛之戒體自虛吾之所謂當當常有因故有當當常住法身者豈非頓證此始覺而成本覺哉故我博山大師云戒有大小體非異同戒有廣略理無分析戒有斷續性絶開遮自非利生大士不無犯於塵勞有力行人何難行於頃刻審如是也能於頃刻聞思而修奮烈而行則此一毛頭許可以含吐十虛融通法界也可不自尊自重獨秉此發覺真心徹證本源佛性之金剛三昧哉參證以激發精微透千聖說盤山云向上一路千聖不傳汾陽云向上一路千聖不然即此不傳不然二語已劈腹刳心為千萬世道破矣雖然如是若不曾親向懸崖撒手絶後重蘇得來依舊屋裏販楊州有甚理會處不是徹底掀翻打破漆桶又安得立地搆去可中須遇真正大手眼作家始得不則縱抱荊山之璧誰能賞鑒而剖示之哉余嘗有語云不慮英奇之不頓悟特患無全機大用之師不慮宗匠之不奇逢特患無深參徹究之士然則師資之真相遇者誠千古之未易得也即如達摩未曾西來此土豈真無祖意哉然達摩未來而直指人心見性成佛之旨何六朝已前絶無一人承當耶不惟達摩未來此土不知立地成佛之旨使摩騰未來而此土亦先知有生死輪回之說也乎是則佛本自心非人指授不見心本是佛非人參悟不明而參悟之中更有淺深其指授之中尤有邪正不然世出世法安得有聖凡之異類大小之多乘哉是故參須參向上之人證須證莫大之法庶不偏落邪外自陷於坑阱也或問西天之外道甚多何也曰彼方以大法流布之廣遠故也如此方初未有佛之正法又安有邪外之法哉其邪外之法非別有種性正以學佛正法之未盡其廣大精微而各執其小見偏知遂各成其邪外之異端耳不惟出世之法為然即世間文章六藝工巧百技凡有一人得其真正之法則必有無限倣效習學者其倣效之不似與習學之未成或傳於世世復以未真者為真法傳未成者為成法學以謬傳謬以訛學訛則蔓延滿天下矣故世間之名世如唐詩晉字漢文章千百年來學者滿天下有幾人能詩如李杜字如二王文如史遷乎故善學者須學其已成之法不學其未成之法亦在學者之下人心精則其得道必真也自斷臂求法已來為法忘軀者往往皆是總以致其精誠自成變化絶非有一毫假飾而可得也禪宗之盛莫過馬祖石頭之世已自有邪外妖孽故德山黃檗每切齒痛恨而欲敲其骨出其髓也不道無禪直是無師耳夾山開法竹林幸有祖師骨性才聞道吾譏笑立時棄衆而參船子黃龍南已受泐潭澄之分座遇雲峰悅之憤激而重鍛煉於慈明兜率悅已獲真淨文之旨訣值清素老之錐劄而重透脫其瞞頇若此數老何可指屈使生今世得一知半解已出世為人矣天下寥寥孰能窺其破綻攻其敗缺與激其肯心服其私意哉又孰能如諸師之下已虛懷不顧名位不惜身命獨求大法哉余又竊思古人之誤非今人之欺也古人至有冒濫非彼成心故作稍一知非便乃翻然改過究竟不失其奇偉俊傑抑且愈見其赫奕光明今則不然明知心行之非了見疾疚之過不肯棄捨一時之名利專以回互四衆之譏嫌故故不肯虛心下氣故故不願了死出生使佛祖親執鍵鎚考其虛實明辨是非彼寧甘心碎身供塵土矣孰肯憤然自怨自艾而自透露乎宋丞相張無盡初作無佛論幸夫人激入此道閲維摩經有省復過廬山謁東林總密與盤錯大為印可及見兜率悅遭其毒手再過歸宗又蹉過真淨之熱罵後洪覺掩鼻笑曰葉公好龍及見真龍乃怖走耳噫如此一人見如此諸大宗師受如此鍵鎚鍛煉尚有如此曲折疑昧又況曾未見人與未經爐鎚者乎即大慧杲遍參諸方誰不許可惟杲不肯自欺乃曰彼皆證我奈我自心不然何後見圓悟勤而平日知見冰消始為到家時節吁今人非此種性無此決定又安得巖崩石裂天回地轉之受用哉從上諸祖於師資兩相求有如此之難古今較參證有如此之異使真正有血性為生死者聞此憤發當何如耶著述以密傳心神授萬世說中庸稱仲尼祖述堯舜憲章文武蓋孔子生於周衰世道當秋如天地萬物發生暢茂之極而將凋零之時也自非孔子以大經大法集成始終一貫之大成則從上聖聖之文章性道精一神明有不勝支離散落者矣至孟氏時復有楊墨之仁義荊榛塞路蓋聖人之道如天地之高厚山海之峻深彼曲學小見不能盡窺其廣大精微盲人摸象耳鼻蹄脊各得一端遂成異端之偏執而全體大用失矣孟子以能言拒楊墨者為孔子之徒豈容己乎即吾出世法固有類此不容己者我佛生西域將千年此土尚未聞其名字及摩騰尊者入漢始傳佛之聲教至達摩大師來梁始傳佛之心宗則此聲教之關於世也大矣初禪宗之來輒呵斥執文字名相其教律諸家互相作難賴有法力神通而顯化折服之其教雖迭廢迭興而天下學者紛綸異議猶自梗其正化唐末有永明壽禪師出而會通解息之乃作宗鏡録百卷此書初出即為外國師奉矣嘉祐中有繼韓排佛者明教嵩禪師起而作正宗記及定祖圖輔教編伏闕上書仁宗大喜旌以明教大師賜其書入藏一時士夫如歐陽修輩見其文咸色驚心折而歸敬焉然自馬祖石頭二支分為溈仰臨濟曹洞雲門法眼五大宗派而天下枝葉蔓衍其中學人冒濫師承參證無據者往往僭竊公行而壞正法於是有道原禪師深為此懼乃披奕世之祖圖集諸家之語録由七佛以至法眼之嗣凡五十二世一千七百一人成三十卷目之曰景德傳燈録詣闕上進章聖皇帝詔翰林學士臣楊億等同加裁定敕賜流通自是師承源流乃有證據亡賴之徒亦不敢篡亂矣沿宋元之末以及今時漸見師法日微邪外昌熾胠篋祖道者不可勝數而此宗之正脈離散欲絶未見有能大振而反正者即間有餘波末流自謂參究得悟復以提演示人何曾有不以死語死法而綴繫於人者哉正如宋之竊竊說道學仁義者雖有功於澆漓傾險之俗至於臆解聖經胼擬性命不能不獲罪於孔孟也嗟乎法運值此尚何言哉余每念宗風之不振正以祖道之正脈不行於世故邪外乘隙以蒙蔽其法而不通明也苟有能自明悟之人先定其宗旨正其門庭嚴其號令密其關鍵斥其邪說絶其跛行闢其道途端其向往則天下有血性英靈之徒未有不共相振刷而望風自立者矣夫如是則千聖之師法不容不急為之先舉也余於歷祖宗燈欲編集五種書其一較正諸祖語録不論多少各以全部流行其二續傳燈録凡有語録者精擇其事無語録者單詞片句若碑記所載凡有師承者皆不敢遺以為統紀備參證也其三作選祖傳以具全機大用堪為萬世宗門作法印者如洪覺範之僧寶傳而評贊之抑揚斷論略倣史法其四單集五家宗旨為五部指出師承源流而定其門庭堂奧貴在識真僞辨正邪使此五家子孫有所證據不復亂統失宗其五撰十法集以足為十大法中所列之法印者各取其所長而入集中評斷激揚永為灶鑑此亦有大一統正名分之意乎嗟乎不欺夙願而隨薪火之緣果能集成以質天下後世斯亦不負區區繼述之一報也
