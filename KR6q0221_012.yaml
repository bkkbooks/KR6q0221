body:
  text: 門人大機大忍大寧大別較頌古文佛指地指天成賣小觀星說悟更無慚平生伎倆至窮處冷把花枝對衆看達磨冒命西來已負機那堪梁殿失便宜此時不肯空歸去雪裏拗他半臂兒六祖應無所住而生心去去黃梅受苦辛畢竟一塵無著處卻將衣法付何人馬祖牛不打兮徒坐佛磨磚成鏡果神明照開心地無門路的的從他腳下行石頭南嶽高登書不達天生強項不堪親翻然更作參同契別置青原鈯斧斤溈山大雄言下偷心死踢倒瓶兒贏了山驀地忽成頭角去故園風月更間關臨濟三頓蒿枝赤肉招老婆徹困不相饒惜乎舌上通些子脅下還拳恨怎消洞山臨行乞得巖良久睹影方知不是渠卻自無中能唱出一門偏正孰分疏雲門拼命挨傷睦老鋒如王氣宇絶中通再來象骨呈機變北斗藏身趣更濃法眼地藏門前百雜碎大千沙界太森森唯心唯識天機泄誰解鴛鴦見密針六祖行狀十頌放下柴擔試一聽曩生習氣忽通明謝他布施堪供母轍向東山驀直行佛性何嘗有北南獦獠根器已非凡著渠糟廠深安置贏得黃梅冷眼看菩提無樹鏡非臺以己妨人太賣乖最好皮鞋都擦了聽他豆自爆寒灰米熟也未缺篩在碓頭三下真可怪何期半夜入袈圍付了衣囊吾自載大庾嶺頭提不起就中何幸茲消息翻言不為衣鉢來授首與人求活計善惡不思何面目老盧開口齒先寒饒他直下便明去未必能超百尺竿汝若返照密在汝如人飲水自家知會須撲破秦時鏡解使泥牛顛倒騎不是風幡動自心無端插觜強錐針一朝瞥爾知羞澀始信真鋀不博金獵衣卸下便登壇灼灼婆心示肺肝生得克家原嶽子兩峰爽出一溪寒歸根亦復來無口大庾嶺上網張取曹溪末後句深深特地浪花為一吼五家宗旨頌溈仰宗寒灰策出井中儂柴頭吹起還源焰兩箇蟭蟟吞大蟲臨濟宗痛棒痕痕絶路通赤肉團頭心膽裂冤冤相報立家風曹洞宗渠我相參迥不同透去可中無變易玄關金鎖密重重雲門宗腳跟拶斷始英雄翻身擲出秦時鑽驚倒南山鱉鼻翁法眼宗豎起指頭奪別同直下頓明心地印一簾捲落兩機鋒溈仰三生六種寶鏡三生靈焰發超超圓相六名通沙彌續得主中主妙用縱橫展至宗臨濟三玄四喝棒頭突出喝中玄句句金剛作用全探草輒成獅子踞許誰擬議迅雷前曹洞四墮四禁秪這是誰能變易類隨何處不稱尊為憐顛倒成緇素墮禁深深解脫門雲門三句一鏃捉住推開生殺急拈來便用太狼心等閒三句收天下一鏃輕輕喪古今法眼一滴六相信手才沾一滴水儼然六相此交參本來成現風光好誰把牛頭尾上安師因挺瞳石遠諸子請問從上源流及五家宗旨門庭事師乃拈前隱夢筆時所作七十頌示之挺等拜受謹録出以公同參足見我師久默斯要如此學人大瞳録洞山五位正偏頌正中偏大會孟津盟誓言受命觀商誅厥罪同心同德敢違天偏中正一戎衣而天下定乃反舊章復釋封大賚庶邦安萬姓正中來武王即位祀燔柴追親及遠崇明德成命尊周休震哉偏中至訪於箕子咨收敘重推洪範九疇言皇極之敷帝訓是兼中到文武聖明已大告垂拱端然四海清熙熙天下知誰造曹山五位君臣頌正位君穆穆緝熙已自申克配上天終弗易嗚呼不顯德之純偏為臣西伯從來有至勳開國承家膺錫命獨能翼翼致其身君視臣忍使如傷赤子均枯骨沾思禽獸若廓然胞與一成仁臣奉君盡瘁鞠躬服事殷三分天下有其二聖明咫尺敬尤勤君臣合天命人心一周匝文王至德誠自然武王周公孝其達石霜五位王子頌誕王子天生虞舜正斯紀濬哲文明足有臨大孝終身慕弗止朝王子完廩浚井何憂喜蒸蒸又以不格姦瞽瞍豫哉天下底末王子麋鹿山中偕樂只耕稼陶漁自若焉明明揚側有鰥氏化王子玄德升聞師錫亹詢事考言續可嗣受終文祖於茲始內王子重華協帝至尊矣恭己無為自太平韶樂雍容盡美矣臨濟四賓主頌賓中賓子路停車試問津沮溺自耰渾不輟途窮況復厄於陳賓中主制作自是天王事知我罪我惟春秋萬世亂臣賊子懼主中賓斯文未喪漫沉吟天將夫子為木鐸獨使周流作正音主中主杏壇設教尊尼父王振金聲集大成百王千聖齊師魯四賓主一自從心不踰矩大哉博學無成名吾執射乎吾執御臨濟人境四料揀頌奪人不奪境世危不足整誅彼一亂魁天下自安枕奪境不奪人舊邦維命新有王能大賚萬國自來賓人境兩俱奪正令一時發列爵更封疆天下靡侵越人境俱不奪世治無征伐端拱自平章朝野忘休烈人境四料揀切忌刻死版當機覿面提好生透心眼師坐夢筆倚杖室時潘雪生大嗣偕諸儒者請問禪門以性命為歸趣何諸祖以正偏君臣王子主賓人境立為宗旨豈出世間法亦合於處世間法乎師曰此皆托世法有貴賤尊卑內外親疏正依之道為喻使人易於因名思義以法求心不使邪外僭越失宗亂統參究之久自當悟入玄旨迥超名言也遂以武王頌正偏文王頌君臣大舜頌王子仲尼頌主賓以周頌人境此亦借事明宗隨機設化幸勿以無泥牛木馬為太異也潘生等大喜曰吾師以四大聖頌此四宗旨讀其題者當於世出世法思過半矣乃拜而識之瞳録洞山正偏五位頌正中偏木人揮掌拍蒼天虛空墮地毗嵐起吹落舍那眉半邊偏中正消磨大地渾如鏡單單照見瞎王婆手把無星屈曲稱正中來夜半誤穿沒底鞋踏著茄子呱聲叫驚得蝦蟆輒活埋偏中至八十翁翁報毬氣可憐費盡老無明白眼看他兒仔戲兼中到一條拄杖床前靠忽然狂狗來探頭不覺笑曰可知道其一以類墮披毛戴角頌正偏五位正中偏折角泥牛露地眠覿面牧童尋不得卻隨芳草過晴川偏中正忽爾一吽山水靜正擬回頭把索穿寥寥復失渠蹤影正中來夜深亦自出林隈踏踏不知何處去長安一徑絶塵埃偏中至狹路相逢曾不避信手牽來勿用鞭聲聲邃向前村吹兼中到人牛各適忘幽躁月落潭空天色沉家家密邇休相報其二以隨墮不斷聲色頌正偏五位正中偏獨倚欄杆淚潛然無限傷心難卻寄花啼鳥笑又經年偏中正斂衽簾前喜定定夜來親夢夫壻歸精繡鏡囊謝神聖正中來特地八門忽見猜自是別離情思久相逢猶怯夢時回偏中至魚鴈音書重展視肝腸片片可憐人面目分明渾不是兼中到琴瑟不調元自好閨閣風流人莫知春花狼藉長安道其三以尊貴墮禮絶百僚頌正偏五位正中偏才出頭來便指天目顧四方行七步十分尊特向誰憐偏中正英英意氣能傳令四門遊罷獨傷心半夜踰城求究竟正中來冷冷雪嶺勿疑猜驀地抬眸星獨朗不禁這點叫奇哉偏中至落草為他尋便利四十九年舌斷根拍盲拽轉娘生鼻兼中到滿口於茲難自道試把花枝對衆看飲光一瞥隨傾倒世尊初生指天指地龍湖才子出頭來便恁逞奇特要省力為人卻自不省力世尊雪山觀星悟道六載雪壓眉一夜星破眼何似我聞貓㘞地一聲喊世尊升座文殊白椎是誰迫上堂是誰迫下座不知我迫人不知人迫我世尊拈花迦葉微笑我拈如意子亦嘗全提此不遇這般人自起還自止文殊罔明女子出定誰謂物理齊種麻還得粟莊周為蝴蝶蘧蘧夢初足迦葉阿難倒卻剎竿身外無長物片衲如懸絲呼來還自諾推倒復何疑達磨面壁西也壁東也壁來也壁去也壁梁王壁也神光壁二祖安心覓心不可得又得甚麼髓雖非關我事也要我相許馬祖日面兩眼星飛四蹄電閃閃殺天下不見血濺百丈野鴨出門是草何處尋討信手拈來恰好恰好洞山睹影邈之不真悟來太切平步丹霄拈弄日月雲門損足引上懸崖一手推倒特地翻身如獅子吼德山托鉢翻卻面皮下這毒手末後全提自揚家醜趙州勘婆子明知山有虎偏向虎山行捨命陪君子以表此生平玄沙諦當劍客既呈劍詩人復獻詩欲開千古眼更剔兩莖眉香嚴樹枝口咬樹枝不敢相欺分明道了你知不知婆子拋兒秪這不消大地水漲浸殺法身全無伎倆大隨覆鞋脫鞋覆龜鬼見鍾馗計較不成皮骨如縻一歸何處絶好這一拶拶拶百雜碎虛空喟然曰未有是處在經首以字不成八不是春風拂檻花猶睡王孫何去未歸來芳草凄凄愁滿地黃龍三關我手何似佛手特地出乖弄醜早已勘破禿奴快須合取狗口我腳何似驢腳扁頭無異木杓逢人撒屎撒沙便好大棒打卻人人有箇生緣從來活計失錢只得唱這囉哩到處討些盤纏趙州四佛金佛不度爐擲刀廣額屠自稱千佛數不覺面糊塗木佛不度火丹霞卻脫灑賺殺住菴僧一任眉鬚墮泥佛不度水青原垂足指可惜住山人無風波浪起真佛屋裏坐南陽招箭垛塔樣描紛紛千古成滯貨雲門三句函蓋乾坤句臺山驀直去趙州也恁麼勘破何容易截斷衆流句猛虎當路踞大家看首座獨得黃檗住隨波逐浪句如藤還倚樹千里賣布單一笑歸何處圓通作悉達才生好勝橫行如今老大天崩不爭世尊升座生意易做不遇知音卻成滯貨趙州布衫駁駁斑斑皮穿骨露也勝金襴五臺問路有故無故喫盡鹹酸不知鹽醋洞山邈真佛面剝金下手不得忽然失心玄沙𡎺指回瞋作喜笑倒達摩平起堆起曹山不異即秖這是慣發酒顛全無諱忌圓通貓頭太煞崎嶢死口才開天下魂消洞山邈師真洋銅熱鐵家常食今特拈來供十方莫怪知恩人少有秖今渠我滾如湯德山不答話死人平地已無數把火齊驅作夜行險絶還教吹滅去新羅日午打三更臨濟思蒿枝生平別有一深心撫景觀時自不禁慷慨悲歌如識得何勞琴劍寄知音興化擯維那誰云虎不食其子爭奈恩冤業在中舂打爛泥誇好手忍心雌伏見飛雄再參獨眼龍誰知矮子善觀場度刃衝流異類行沒尾大蟲牙爪怪倒屙惱亂好人腸洞山初喫棒再三問處涉鉤錐棒下驚來石火遲飯袋忽然開口笑幾多平地受人欺僧問巴陵如何是道陵云明眼人落井爭雄弓馬最危微背手能拈囓鏃機自笑老來忘意氣看他雲鳥自閒飛僧問巴陵如何是吹毛劍陵云珊瑚枝上撐著月驀劄相逢各展眉此心千古孰能欺可憐一句全生殺劍挂徐君墓上枝僧問巴陵如何是提婆宗陵云銀碗裏盛雪吾宗無語若為人東土西天負墮深明月蘆花閒索索臨風何處覓秋砧僧問那吒太子析骨析肉還父母然後現本身為父母說法如何是那吒本身師撫掌三下又云天花吹不盡處處鳥銜飛不假胞胎未是親曹山一笑起風塵夜來玉笛從何發惱亂深閨夢裏人中天竺雲屋珂禪師以宋鼎遷即謝事金山默菴言於伯顏請珂公住靈隱親持疏叩其門珂抽關露半面曰汝是誰默菴曰和上故人某甲也珂落關曰我不識你後斷江恩公贊曰雲屋今支四十年高風凜凜尚依然徒令丞相拜床下不肯為渠來冷泉師別珂公落關語曰我已識你也雲屋曾將宋紀年落關一語自危然故人多已不相識更有何顏對冷泉僧問南泉師歸丈室將何指示泉云昨夜三更失卻牛天明起來失卻火師云恁麼則住持不易雖然須是南泉始得野老忘機事事閒柴門雖設未嘗關偶然拾得無鬚鎖依舊拋他途路間舉禾山普參黃龍南問阿難問迦葉金襴袈裟之外別傳箇甚麼迦葉呼阿難難應諾迦葉云倒卻門前剎竿著意旨如何南云上人出蜀曾到玉泉否云曾到南云曾掛搭否曰一夕便發南云智者道場關將軍打供與結緣幾時普座主良久理前問南公免首主趨出大驚云兩川義虎不消此老一唾師云大小黃龍一生弄佛手驢腳特地被遮座主捉敗舉世皆聞蜀道難誰知平地有牢關假雞任叫休瞞我一唾千門萬戶閒舉太陽托浮山接投子公案師云浮山的不是欺心漢又誰知接得投子青滅太陽正法眼藏勝於平侍者鑿出塔中頂骨雖然如今天下能有幾人不於三叉路口喪身失命者乎虎口翻身也是奇青鷹夢裏已驚飛大陽頂履今何在謾向胡僧問故衣舉南院示啐啄同時至僧再來舉似風穴云遮漢會也師云南院棒頭已折此僧擔板過高就中燈影裏行風穴太煞逗湊若是杖人當別有處分啐啄同時用卻奇移星換斗許誰知騎牛海上穿衫子十字街頭放鷂兒舉興化到大覺至言下薦得臨濟於黃蘗喫棒的道理師云興化的是個亡賴賊以一條杖子撥出三聖大覺與他作箇對頭無端要討痛棒喫才好公然燒炷香豪傑無王亦自興難兄難弟作宗盟當時法眼誰能滅磨出吹毛決不平舉西院因天平漪下四錯至漪住後自云發足行腳時早是錯了師云西院寸鐵殺人不容喘息共汝商量兩錯別有鉤錐天平跌後思痛開眼說夢爭奈知恩者少負恩者多天下干戈共戰爭朝秦暮楚盡求名不知真命將何屬那識真人有主盟舉佛印元入室次蘇子瞻適至印云此處無內翰座子蘇云借和尚四大作禪床印云我有一問道得即坐道不得解下玉帶蘇云便請印云四大本空五蘊非有內翰向何處坐蘇無語印即命侍者解下玉帶以鎮山門代蘇答云若恁麼則被某坐斷也又云遮箇破禪床我不坐佛印禪床信手推七花八裂墮塵埃如今多少往來客丈室門前滑似苔舉玉泉皓因蘇子瞻過訪泉問官人高姓曰姓稱泉曰甚麼稱曰稱天下衲僧稱泉喝一聲云重多少蘇無語代蘇撫掌云果然是個野干鳴又云草賊大敗偶因撥動玉泉喝稱得果然野干鳴千古禪流高著眼莫教錯認定盤星國一禪師初登徑山頂上於龍湫邊宴坐五百龍神不安因讓其窟宅湧為寺基且道國一宴坐何得令龍神不安而徙其宅龍代云密移一步看天機若不同床睡焉知被底穿遮些消息子不與外人傳巾子山人參國一求剃度往京救佛法之難國一試其神通彼因大喝一聲將坐後大石震為三斷如今滿天下許多吠聲之徒還有能一喝使彼髑髏粉碎者麼代云婆心徹困為阿誰不聞遮老馬踏殺天下人饒是白拈賊無處著渾身妙喜室中不許人下喝下一喝者罰十金了明長老先將庫司銀十兩放方丈几上大喝一聲而出且道下遮一喝堪作甚麼事代云禍不入慎家之門養子不及父家門一世衰須知今日事古佛莫安排昧劣莫過於毛禽如何徑山大殿鴉叫得甚則大殿有人做供觀音殿鴉叫得甚則觀音殿有人做供代云何我到山不聞此事鬼窟作活計添得鴉臭氣八十翁登場豈比小兒戲杖人前日上堂云迷中有悟悟中有迷迷中有迷悟中有悟此四句中各有意旨一一道來看代云不許夜行設明須到不辭向汝道恐瞎天下眼透過向上機自不遭人點妙喜嘗以竹篦子驗人杖人以如意子驗人喚作如意子則觸不喚作如意子則背不得有語不得無語且作麼生得個出身活路代云要識真金火裡看當機覿面提關捩如何轉奮迅獅子兒須防此中險此徑山時師垂問復自代自頌破籃莖草頌有序癸巳孟冬書付竹關文殊與善財採藥殊曰是藥者採將來財曰盡大地無有是藥者殊曰不是藥者採將來財曰盡天地無有不是藥者殊信手拈起一莖草曰只此能殺人能活人杖人曰從上手眼自別一挨一拶直要控人於生死得箇入處又要控人於性命上得箇出處門裏出得身身裏出得門然後自能作主破格為人一切聖凡只是不知出入之機故於變異不得自在也故吾宗獨貴知有惟知有者始解入作如藥山與雲巖伐木次巖問腰間響底是甚麼山拔刀作砍勢巖悚然此藏鋒出入殺活無痕大用全提佛祖難搆也僧問洞山和尚于雲巖處有何所得洞曰無所得我不重先師道德只重先師不為我說破又問先師還知有也無洞曰若知有爭肯恁麼道不知有爭解恁麼道只此便是金鎖玄關全無肯路人能於此如生冤家相似疑憤不已傷盡偷心自有出身機用如寶之明暗形影嬰兒之哆和去住莖草之味味五金剛杵之殺活諸見重離之回互交參此大似死法而存活機使此法式不毀有足揀別真僞也如水火是名濕熱是實而實用之神化豈名言所可執或又藥物之辨性味其殺人活人原在人而不在藥出入之機各有親切溈山入於撥火德山入於吹燈臨濟入於喫棒洞山入於睹影雲門入於損足法眼入於豎指若是其入即是其出又何妨於妙盡淆訛乎故豫於綱宗有明暗句入出句雜毒句百怨句殺活句向上句與之拔屑抽釘敲骨打髓擊碎悟門別行一路始能呵佛罵祖異類縱橫然此控人之機不先使之傷心痛憤何能絶後重蘇此師子教兒迷子法從緣薦得始相應也豫今年倚杖天界無可智公從生死危難中來皈命于豫受大法戒乃掩關高座深求少林服毒得髓之宗披吾參同燈熱之旨喜其能隱忍堅利真足大吾好山之脈豫時歸博山武夷掃二先師之塔特潛為別豫因囑之曰聖人無夢不能神大海無波不生寶使聖凡無怨艾之毒則皆無出身之機也子當以大法自命痛此懸絲寧不自憤乎智曰不肖何人且在鬼門關上賣破藍耳豫笑曰此非吾家毒草能出入乎正好打殺死蛇吞活龍以大闡提行無間行作常不輕起吾三墮之密不負此一驀劄乎因更為破藍莖草頌以識之頌曰秖這一莖太綽約神農曾未親嘗著大地迷茫無處尋文殊拈出露鋒鍔殺活爭如老藥翁雲巖驀劄眉毛矍楊廣山頭翻異苗無底藍兒盛諾諾鬼門關裏賣危疑五逆撩之驚雀啄探竿影毒常不輕後園驢喫三禪樂緊箍咒發曹酒顛佛祖魂消魔膽落醉向夢中勸石人切忌醒來空索摸
