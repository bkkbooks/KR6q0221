body:
  text: 門人大奇大忍大健大寧較序合刻四當參序豫嘗欲以楞嚴僧寶傳大易南華四種合刻題其名曰四當參先自作序以發明其合刻當參之意使學者知其要領有所師承而後參究始得宗旨不致亂統無所歸也今夏陳旻昭侍御延于三藏閣避暑薛更生亦下榻其中一夕明月在樹爽氣拂空因談及莊子天游豫曰此老游戲處無人窺得正儒者之教外別傳也薛翁喜動眉宇請豫更痛快言之豫曰儒之有大易即佛之有楞嚴也儒之有南華即佛之有禪宗也治世之法莫尚于五經獨大易為諸經之本蓋聖人之道皆取法于易也聖人未作易則此易理具在天地人物中聖人既作易則天地人物之理具在大易之中所謂先天不違後天奉時範圍曲成無先無後者也諸經皆因時事而作其宗旨皆法乎易至于明天地之幾微通生死之變化豈諸經所幾及乎雖然易之為易全在規矩準繩之中自非神而明之未免滯于名相而不獲超超千言意之外莊子憂徇名執相者不達大道之原往往自陷陷人或流為刑名術數或流為輐斷鬼窟或流于謑髁矯亂至于生心害事僭竊鬥爭豈不為贅疣桎梏者乎故特作寓言詆訾羲軒譏議孔子正以不有帝王乃能為帝王不有天下乃能為天下其解膠釋縛也正正奇奇不可測度大似吾宗之呵佛罵祖別出全機大用以激揚向上者諸子之中更孰能立言祕密寓意高深如莊子者乎此正與五經相為表裏而實深為大易標先天上載之真指歸也五經後決不可少此一種奇特之書世人徒以文章微渺誕怪而忽其立言宗旨未免似乎毀謗先聖耳若吾佛之藏海浩瀚無涯其指歸宗旨無尚于楞嚴蓋楞嚴所攝十界聖凡之依正若性若相若事若理乃至始終本末大小偏圓無不備具又況言簡義豐旨深趣遠大含華嚴統該三藏更無有過此經之廣博精微也然此但能言中顯無言而未及于無言中顯無言至于直指人心見性成佛之旨又莫過于禪宗禪宗之備又莫過于傳燈諸語録吾獨拈出洪覺範所著僧寶傳八十一人其人雖少而二支五派門庭堂奧無不精攝洪公大才傳各為贊激揚此旨其筆如太史公得春秋遺意大有關于宗門又況此卷帙不多足以配楞嚴而便于參究吾故曰大易有南華則天人之學通楞嚴有僧寶則宗教之旨徹四種合刻則內聖外王先佛後祖上下一致表裏縱橫而天下古今之道從此擴充更無遺漏矣此刻人人皆當置之案頭日夕研究簡而易入要而易從無論治世出世如如當當皆不可一日無此以自參證也若不自參無有是處蓮峰紀事序人生難得者知己然貴自立始能知人不患人不己知也不獨人也天地萬物皆然如吾廬山屹立於江湖之間控吳楚而引甌粵摩蕩日月吞吐風雲神聖為之棲游英靈為之萃止故能與五嶽比宗萬峰作祖正以其自立之體才雄偉而奇勝甲天下也自匡續廬于此山而山有姓矣自晉大元慧遠法師興東林而過江之宗雷劉張依之以蓮社勝陶淵明以風節勝白樂天蘇子瞻以文行勝劉道原李公擇以藏書勝周濂溪以道學勝赤眼諸公以禪宗勝此皆有以自立故能取勝於名山而山亦因以取勝於天下夫自古聖賢生於世必與天地相參然未有不能自立而能受知於人也至如蓮花峰祥菴主才聞洞山聰公答泗州大聖揚州出現一語便知雲門兒孫猶在千古稱知人者未有不推祥公之知人為尤異也而周濂溪先生獨能探祥公之祕與作方外游結室於蓮峰之下至今想見孤峰獨秀中有光風霽月之襟懷泠然善也如泗州聖祖能以帝王之道自立而取勝匡廬湖蠡之間其天眼尊者周顛仙赤腳僧輩便能相與酬唱互為知己而取勝於茲山天池之間是非自立之能雄奇也哉嘉靖間有大安公慕祥公遺址重為開創嗣有澄捨上座以此深固幽遠直欲活埋此中以期大徹江州萬寓菴虞部繼先人之志追古宿之風以周子蓮而自標致以祥公眼而自空明此其志則兼握世出世法之機而結秀於蓮峰又將流光於天宇也今特以紀事屬豫一言表之吾讀諸作是皆迸破慧心別寫蓮峰面目就中指點天地之離奇拈提山靈之知己如顧虎頭傳神寫照使人見毫楮間有起舞之蓮峰足以開示人之心胸青青欲滴矣靈山固難孤負知己又難解逅今澄公萬公超然獨立坐進此道又何患靈山知己不合兩采于斯乎壽世篇序耿孝廉九一先生古之隱君子乎人咸擬之五柳北窗羲皇上人嗣君玉齊去秋金陵一見心協即挽豫同歸天臺山於是日夕與先生激揚向上事機鋒峭拔有似楊大年惜豫妙密鉗鎚不及唐明嵩耳始竊怪先生負天縱之資何於世法出世法一若付之天然久之乃見先生深心正所謂默成旋幹之幾密移造化之柄者也夫先生秉性之清而貞介易於方世乃不輕其仕使又安肯拖泥帶水為此法門之纍哉故寧徜徉龍山梅水間曲肱高臥敲水煮茶未常不為木鐸之振毒鼓之撾也今先生年方耳順道貌瑩徹如朝旭之初升其長養於金剛無住心中有不期然而然者矣居士欲為先生壽商其至處無一毫可加於先生獨先生一念好生之心不能自已豫曰善哉先生一家已躋仁壽之域矣且集諸戒殺放生之事以壽天下則孝亦達諸上下矣武林士夫為雲棲壽共贖西湖為放生池亦同此意今居士以此壽世即以壽先生慧命如是莊嚴何可思議豫又安能出廣長舌為讚歎哉居士立將雲棲諸作及豫推衍擇採成篇題以壽世豫因讚曰龍山梅水音合鐘鐸仁者之壽仁者之樂樂與人同千古酬酢錫類不匱大開樓閣大觀馮席之遠復齊稿序昔者仲尼之徒常以天以日月以山海以麟鳳以賢於堯舜以自生民以來未有比擬其師稱尊其師非漫然也至孔子問禮於老聃而聃以去淫志驕態與聰明深察近於死者為勉時孔子退與諸門人歎為猶龍夫以淫志驕態加於溫良恭儉讓之孔子何其太逼乎杖人曰非老聃之聖必不能出此語非孔子之聖必不能受此語此惟聖人能遇聖人耳香嚴閒禪師智慧辨才一日參溈山山逼以父母未生前事窘不能對遂棄平生所得後因擊竹大悟始向溈山禮拜曰當日非承激勵安有今日事乎此千古殺人見血刻骨相成者也吾故謂天下有真人始有真性情有真性情始有真知見有真知見始有真事業有真事業始有真文章孔子於干戈隱几時而歎文不在茲是何等性情乎呼天呼死逼出一真而已西陵馮席之博學強識雖當搶攘未嘗廢筆墨也一日持所著遠復齊稿問序于豫并求指示向上事豫讀李冢宰序已概見其志有足以語向上受本色鉗鎚者因欲益其所未益損其所未損淫志驕態深察近死孰能免乎乃以斬截性命之語投之居士立地欿然不啻香嚴初參溈老時也山水聶公在坐撫几曰此吾師已為遠復齊序矣已為擊竹發雷聲矣便直下翻然而起則後死之斯文尚未喪也大輪高篤生舉餘編序文字之通神明其來已久自蒼頡後展轉變更至程邈隸楷而書法定矣古人觀天地萬物草木鳥獸而得其自然之文如河圖洛書即一物可以窮盡兩閒之精微在人神而明之無不洽通造化妙協性情也至樂性餘惟有本者善用其餘耳屬文苟偷六書訛失矣而人各逞其臆窖縵鋒銛無所不至古來渾噩之意已殆盡無餘矣乃於印章中尚見有一二可存古意者其雕而不雕琢而不琢猶足以悟天地造化之心焉西陵高篤生好古博考尤善印章才一見即問先天造命事余曰未篆一畫未下一刀自己本印落在何處如其茫茫且請靜坐返其不足勿論有餘也高子曰陳石弘先生示豫兀坐荒齊自看直下今得吾師竿頭進步退尚敢欺耶一日以舉餘編印章稿質豫并乞一題豫乃拈古人作字之意并示之以未雕未琢先天之文倘一朝神解則天地人物皆不出吾靈印縱衡也宗門三印特為之洗磨耳法名大輪字以玄照進退且置印出誰造為周子彝立存存號序甲戌春余之穎州次南詔正擬訪周元之居士而居士先知之已偕諸弟子群從遇豫於三皇閣一見握手挽豫天樂丈室徹夜劇談居士自謂生平潦倒一痛快事也豫亦感其精誠喜其風雅乃不自知其一夕之晤而翱翔百年矣其長公繼善子彝者於團圞頭邊囊錐忽露質豫以大易之旨豫良久乃彈指曰若向此處徹去則伏羲畫後之卦可以加一倍法而通之矣長公跫然而喜曰此希有也即先聖未易措辭直寄微意於象外耳某雖不敏敢不謀事於造次顛沛間哉請以一號顏其齊則時時提命矣豫曰易以生生為蘊存存為門開閉之樞惟竭卓而知之夫繼成而存其存者豈非卓然古今者乎呼則應扣則靈操則存舍則亡此一幾希敢不戒懼博約在我才竭而性如卓立矣雖欲仰鑽瞻忽末由也已豫曰存存卓然立否不竭才無回避也嘻良馬已隨鞭影去阿難仍在世尊前公喜曰踏殺天下請書一紙重刻僧寶傳序劉少師是庵公當阿衡大任嘗留心宗教極深研幾豫一日寓泰定會嗣公西佩居士談及唐宋宗風之盛而元末已來寂寥之極豫曰彼時諸大宗師建立法幢於此列剎相望故所遇皆是爐鞴鉗鎚之所安得不人人激烈皆成利器哉今求古人典刑亦不可得又安知有宗門向上事耶豫前日正與諸公敘及宗教中最要二書楞嚴經僧寶傳刻出流通使此方常得見聞如先壽昌閲五燈大好山一語便足以中興此祖道也況此楞嚴一經妙盡性相之旨此經一通可以貫徹三藏之微僧寶一傳妙盡禪宗之旨此傳一通可以烹化五燈之祕我公為心法主盟而倡布之使西乾東震慧命常昭昭然豈不幸甚西公蹴然起曰此吾先少師之遺志也先少師嘗手自點閲僧寶傳不肖寶惜不啻佛祖符印因即捧以示豫乃焚香披覽見其精心鋭意不特能發揮宗旨機鋒之密即一點最間如圭如珠毫無懈怠之筆足見深入精進三昧能使讀者洞徹法源無少昧滅也豫即請而梓之西公曰先人以點𪐴乙止自一其心耳宗門不比教法有定式可以描摹不肖不敢忘先人之志敬授之梓以公天下其讚歎點最處則別存之墨欄外可耳余大喜曰是日日白椎而犍鐘也駭雞犀枕能破人夢八面奇止烏可一向示人又何不可示人也乎如此白椎犍鐘是誰側耳湯季雲拈花社序季雲湯公正將卜臨川山水佳處欲結廬以放天真適浪杖人自匡山至乃與景陵談擬陶欣然相顧曰異哉此非天所授耶因特造豫而問旨焉豫攸然而笑曰方今天下非無奇貨可居非無奇標可射惟是不能以道術相忘漸使天下互相異同以機智相攻而世與道交相喪矣天真不存雖欲放奚以放仲尼有川上之歎莊生有濠濮之思忽然歎忽然思何為者耶將謂大覺於末後始有拈花之示則前此者非花乎古今之密藏于何處傳不傳別不別詎有奇貨可居奇標可射哉知其無奇是為真奇一笑而已公等儼然何不豁然豁然此一笑而已則何復有天真之不放道術之不忘哉山川一花也廬一花也試自拈之自笑之如天下復有拈我之拈笑我之笑是則與我同參即失之亦不遠也而天下又何思何慮哉二公果然相視而笑豫因命其社曰拈花唐集生大參集序孔子以思無邪一言敝詩三百果以魯頌駉駉而斷章取之乎端木之以貧富磋磨卜氏之于繪事禮後皆斷章之別傳也可與言詩即可與言道也已一草一木一喙一羽無不可以引觸而用為素繪寓其磋磨焉亦視其人之正志所感何專耳性情橐於心而籥於思思無邪而正用之則性其情而旁通曲成之情皆正矣聖人同患至密其幾惟在間以為存而存其存者誠也誠與思誠果二乎哉行無事必有事思本無思非憧憧也不出其位非死浸也天下何思惟悟思無邪者享之不然執無思以契同而不知正用即得則中外橫裂而反致危熏矣又不然苟非頑石槁木則狂逞鴟張矣是誰能集思之正以享何思之天下哉豫前居廬山圓通時李夢白大宰以豫集說通唐集生徵君而徵君大為賞鑒已與豫作標竿之先手矣今始親晤于金陵快談不二法門公歎曰昔有拙集失於兵火偶一苾芻拾而藏之近得還吾故物喜而奇之而不忘其固陋豫與師神交想慕之久今獲心眼相照創我未聞其喜而奇孰更過此請師一言附之方外庶亦無負千古之旦暮也豫何言哉請拈孔子一言以贈公丁蓮侶郡伯仗劍歌并序蓮侶先生異人也居於世能不染於世而超超乎出於世此所以似蓮而異於人也先生天資粹拔有俠心劍氣雅自號為劍虹此何等等歟生平忠孝能讀書善文章其於功名富貴且斬然無所纍此劍俠之利用也自皈心於雲棲得淨業直指之法此心愈俠劍氣愈精進乎技矣截無始之愛根斷見生之結使剖心佛之祕旨決品類之靈機如所行事與著述若菂商慈燃出世芥火淡話蓮漏清音故鄉消息等數十種皆妙盡直指傍提恢恢乎遊刃有餘地矣昔年訪豫質正蓮社宗旨豫與盤錯之久大快公心謂得未曾有豫亦為作序證據之其嗣君菡生夙承父志而又篤於禪宗亦嘗偕李小有問法於豫大有激勵去年先生西逝菡生以深知先生無如豫者乃徵豫一言并光末後豫讀素法師贊與唐宜翁傳見其始終露布隱顯畢羅誠震旦異人西方蓮侶也豫又何贅哉多生種此蓮花而享其報人或言之始終用此劍氣而成其異人不能知也後世有慕蓮侶者當先得所仗之劍則所向無前矣以故無能為辭而別為之歌歌曰心何為而俠兮如劍之雄誰能得其柄兮凡聖不通排雲棲之密闥兮直奪其鋒一句兀然兮誰敢以怪為籠橫拈倒用兮披剝法界之蹤追歸于吾金剛上師兮令人齊拜下風咦嘻一劍兮誰欲知公請剔雙眉兮觀公始終吳二公半峰吟序唐人之詩不言禪而可禪以其意句俱活不死於法而機趣躍躍然在言外故夫子稱詩可以興觀群怨蓋深有味乎性情之隱微也而吾宗門每每引用下語頌古以發明別傳是又禪不言詩而自有詩矣荊溪吳二公久參性命事偶寄跡於天界半峰而有吟焉其邁往之氣感慨之情乃在言句之表然居士方鋭志向上一見豫即絶倒將知異日進步竿頭則咳唾掉臂皆無聲之詩活句之禪更當坐斷唐人使無舌者唱和可乎半峰居士更勉其半古人幾序豫倚杖匡廬時已識陳子伯璣矣嘗與其嶽翁劉西佩稱其才又於泰定寺與論雷澤之所以事親牖里之所以事君喪家之所以感麟為萬古格致真宗主而伯璣憬然感焉又進之以吾宗示以偈曰大用當前無軌則縱橫誰辨往來源就中受得痛蹄踏便解木頭與碌磚此又不特以天下才士天下理窟望伯璣也別來九載伯璣偶至金陵先寄自著古人幾部二冊請正自唐虞以迄宋元上下幾千年間得數百十人皆以一幾字評斷之余乃喟然曰伯璣其進於好學乎夫幾莫尚於易豫嘗以易為幾書知幾其神乎古今才性皆出天定惟聖人功在知幾德在無我惟好學則能格致清明在躬雷雨出雲研幾如燧應幾如鏡誰謂知幾而猶自欺其好惡自昧其短長乎稱物平施謙之所以繼同人大有也引而伸之觸類而長之古今皆可與酬酢矣夫人學焉而不能格者欲纍之人之不能無欲者我蔽之人之不能無我者不知真我也知有真我則萬物皆我也天下有何不平也哉無欲而知幾無我而物格皆從格致研極入此獨知之樂而遊此同患之密非恍惚影響可以決擇聖凡迷悟而遽託之浮沉游戲者向上一路非親過關決不易言其為真知幾真無我也昔豫望之以辨往來源與受痛蹄踏正在乎此如或未然人間世大險阻場何往而不顛蹶耶伯璣其勉之豫欲去卻部字如余五燈熱直謂之古人幾序金剛般若經修行會義序豫癸未秋從匡廬來倚杖長干方與諸公提唱向上事唐宜之居士以夙負才名精心佛學為雲棲授記弟子嘗遍參諸家尊宿獨決志於淨業一日過訪即問金剛經中凡一切句皆云即非是名為何義豫視曰只今是何義士曰此宗門不問但請示教義豫曰秪此即非宗門是名宗門即非教義是名教義士不語豫曰太煞郎當也且請吃茶士默然嗣後豫主靈谷天界報恩諸期及武林橫山士皆過從每發問意在剖折名義豫不忍鈍置輒以本分事錐拶之使其直下自見也今己丑冬復從姑孰來石城方園居士乃持所集金剛般若經修行會義屬豫為序豫曰居士曾見豫金剛別拈否曰韓聖秋曾示某看矣豫曰看到何處曰看到空生感泣處豫曰居士意作麼生曰某不獨不知空生感泣即所拈漢高祖歸豐沛會諸父老悲歌慷慨泣數行下不知其故豫曰漢高祖仗三尺劍定天下到此大快志時是何以泣又豈可以項羽迫於烏江亦悲歌而泣比之也知漢高之泣則知空生之泣不異於迦葉見拈花而微笑矣然則世尊托鉢而歸空生出歎希有是真金剛般若是真修行樂處也又何煩更問如何護念如何付囑如何應住如何降伏與打葛藤至如如不動而後如幻如夢也哉豫道世尊面皮厚三尺那堪更遭此惡水潑乎雖知三世諸佛不知有狸奴白牯卻知有到恁麼時節設使補處大士與無著天親及圭峰長水諸師各出手眼論頌注釋更與此會義修行之法正須親自透悟始得不然空中鳥跡水底魚蹤決非人之所能描摸也雖然若非居士善入般若波濤又安能別出一頭與格外人相見哉復呼云居士只今是何義會麼如湧録序高名美器造物不與人全友蒼庭公天何獨以不世之奇如諄諄然命之而不惜抑且巧獻其幾以快成其事噫此豈冥冥之天哉蓋是友公能以法當自任乃必有為之志故其事事皆天然妙協又誰能不全而奪之乎友公前之所為未問即近自都門不避斧鉞圖存大藏經板於不壞又值紫柏尊者石像湊送龍子歸潭一事又尋得笑崖月心和尚塔而重修之又預聞祖心將至即設法救護其死命此四者皆法門所繫不歸於他人而獨歸於友公得非公之手眼異常乃能自取之乎鄙夫不知義之與比而兩容頰適以消適莫放利多怨徒增患苦耳何能成一事耶夫但成得一事者雖若靳于神化而神化如嚮以命之見義之勇水火不敢與匹夫爭焉一事即神化也此如湧録專為笑崖老人塔事友公始終具述於前祖心諸子唱酬之詩隨附于後讀此者足以風世矣笑崖子孫且滿天下必有感慨末世之尚有人能不以親疏而自輕其大法之心者不亦幸哉吳瑟黃竹山歸來吟序陶靖節能不為五斗折腰而賦歸去來門栽五桃獨以不汲汲於富貴不戚戚於貧賤儼然羲皇上人故其衝口清真古邁直凌漢魏追三百篇令人讀之蛻出塵埃之表以為千古最樂人也周濂溪嘗教人尋孔顏樂處是真有味乎大歸者夫馳騖一世而不知性命落處可謂大歸乎吳瑟黃今處士也瑟彼玉瓚黃流在中其器何如乃能見幾而作從遠遊歸卜居於桃溪竹山躬耕畝畝樂志潛修不敢多求於造物不可得而為者則造化亦無從操縱其所以自為也異哉今且進於性命以為大歸樂以忘憂有不可以己者豫不徒以潔身獨善而高其志也薛那谷孝經通箋序孝之時義大矣哉先聖以此呼出人性命之本源天下古今無逃避處特世人汩汩不自覺而不能自孝其本心耳孝即覺也覺即效也效即教也人不自覺而本覺固然雖在茫茫中原自不昧滅也隔壁有人呼其名未有不覺而應者雖則兩不相見既呼而應則此身心性命有無情域又何能逃此覺耶大庭廣衆中或尊或親或主或賓忽呼其人獨此人起而應之則禮義儼然不言而喻矣良乎哉夢人醒人兩相懸絶忽于連床各寢中呼其人即驚起而應之則此迷悟之關如未生之前從何來已生之後身何屬見今之身何所對異日何所歸何所全皆儼然無能逃此覺中也人能自孝其本心即自孝其天矣覺萬世之天以事其親其達孝何如耶故曰孝則覺覺則處處見天則焉不孝則不覺不覺則處處傷犯處處悖逆又何能自享此身心性命而不觸不背于世出世法之折攝哉那谷翁年八十不能一日忘孝乃集孝經通箋以其精一自覺覺人屬豫一語以呼醒之豫不敢以成佛成聖加于孝字之上特拈出唯孝能覺覺能效效能教以發先聖之命意云爾薛旻曰六朝瑗禪師于定林寺講孝經禮記廬山遠公箋釋孝經誠有見于迦文以一大事出世與東土聖人不隔絲毫耳余故拈契經之言孝者曰佛說孝經如明教嵩禪師孝論暨蓮池大士闡繹孝義陶靖節作孝傳羅近溪諸公以向上發明皆附于此大人不失赤子之心正以最初方便為諸佛密因而已更生請杖人序之示愚讀之怵然痛曰孝無終始通於神明孝無始則在髮膚之前孝無終則在身世之後身從何來心從何來天從何來怵然先覺灼然神明自孝本心即孝其天若辱其天即傷其親一呼孝字大地同應閭巷皆樂孔邇盜跖難忘遺德明發不寐熏赫消歸天人神鬼趨庭供養是知禮樂文章不過孝子之舞蹈兵刑地獄豈比孝經之迅利乎故曰覺萬世之天以孝吾親此謂大報恩天界學人弘智謹記杖人曾序釋門真孝録又為邢開初橋梓放生養親作致孝篇一析世出世之孝為六種一述感通親切之故由六種而析之可以豁三藏之剝芭蕉由感切而怵之誰不欲報恩耶杖人一呼大地震動矣天界學人陳丹衷謹識高玄期先生明水軒筆記序諱道素原名斗光天下乃古今人所公共之天下此可能為者彼亦能為也然而天下是非好惡未有不同亦未有不異雖萬有不齊亦不能出此公共之同異也以故有神聖出世為人立極以道德功行制作文章與天地均其是非通其好惡為安身立命處世為人之法是亦因其是非好惡以成公共使天下萬世不可以各自異同而外此公共之異同也神聖則能通其變於古今賢哲則能定其變於一世而愚迷者既不能通變又不能學定則自陷其身世矣故天下萬世獨賴神聖之法為之定制可變通也其言定制者不知變通言變通者抹摋定制喙嗚鬥勝迷人愈深夫豈知讀書學道成己成物蓋有要焉易言幽明之故感而遂通天下之故求其故蓋有要焉今閲高玄期先生明水軒筆記獨能推明古人而得其五要上可通於神聖下可變其愚迷自一身推之天下自一物而通三才本自如是何患其異同無不本如是也先生之平日發心為何如哉豫不能贅請以此帙刮目讀之當自有躍然起者高寓公先生示兒語序諱承埏今之天地日月與古之天地日月無異今之世界人物與古之世界人物亦無異獨今之所謂聖賢仁義真僞虛實與古大不相同者其弊端安在今之弊正如假死汞銀雖亦可觀一入爐火其形神立時俱喪若古之百煉真金雖經折挫更入爐烹愈見其精神堅密不可昧滅何則古之君子其於立身處世必以戒慎恐懼為主決不敢肆無忌憚為放僻邪侈也三代之後無真聖人學術者凡一切稱為功名事業制作文章多出於外騖不肯研極不知物則又飾虛高之詞遂無忌憚所以真聖賢仁義少見於世而風俗靡靡愈趨愈下有不可挽回者雖然豈天下真絶無能戒慎者哉豫因高子念祖父遺稿屬豫為序既述其祖復讀其父寓公先生之示兒語引用古人之格言以警策子孫之倣效真可謂戒慎恐懼有得於聖賢之啍啍者矣子輿氏有云大人者不失其赤子之心發願為大人者請事斯語壽嵩乳密和上七秩序法門有時決不可無此一人有時決不可有此一人何以見得如此利害哉決不可有者如演祖下開聖覺胸前似搗太陽下平侍者手丫難逃輩使一有此則亂統滅宗不勝危殆也不可無者如興化先侍臨濟次依三聖後于大覺言下始悟臨濟於黃檗處三頓道理而不顧三聖之孤大覺之賒直嗣法臨濟孰謂此一瓣香燒得不親切乎浮山先已師葉縣後與琅琊覺同依太陽密有契證適太陽諸嗣早逝乃托浮山以接青鷹代承其後孰謂浮山不可為太陽之嗣以續洞宗乎使當年濟洞無此二人則不致有今日矣即近世吾洞宗自我廩山忠翁承宗鏡書老祖付囑後埋光鏟彩於盱江不啻石霜之隱瓦窯大隨之藏枯樹使不有我壽昌祖一人智過于師者自能物色而取法之又誰見大好山之能突出如須彌之立太虛而得博山東苑如日月之輔而轉哉豫初出即參扣博山如攀乘雲之龍後印囑東苑如撩瞌睡之虎既喜二師雙乘法乳尤幸親證壽祖獨接宗源則豫之遇祖父真萬世旦暮也何敢自負此哉博山先大師有雪關誾首座為人天眼目如扶桑初旭已不可掩獨師太煞孤峻無能扳躋輒于急水灘頭拋卻竹篙溺殺無限英雄之客使無雪關繼其法席與今嵩乳密公承其後則豫又何忍袖手坐視而不為浮山之痛於寤寐為求異苗翻茂者以酬祖父一脈之法乳哉雪關逝矣日夕為博山求人到處採訪其有潛符密契者雖愧仰山之奉塵剎又何敢忘大風欲止之懼乎丙戌始于淮上遇嵩公挽豫結制因得敘及見博山有投機之語并讀其語夢集有拈百丈耳聾大顛首座諸公案與豫答問之語真有殺活之機鋒出於風影之外豫蹴然而喜曰博山先師之正法眼有所屬也乃撾鼓集衆痛加責勵並囑諸護法相推出之更促其到山掃塔何忍使先師潑天熱焰之門庭坐致如死灰乎豫復改其集為語録特述其原委為之序自此又十餘年幸而強起開堂諸方尊宿如鼓山天童愚菴南澗靈巖諸老無不推揚之近日衲子濟濟嗣其法者皆真參實履之英邁公雖古稀涵養自粹信其為從上祖父法身慧命將興高厚悠久矣豫特推明法門幸有決不可無此一人者而為之壽更賦詩一章淋漓一紙以識之於不可淄磷云書義全提序天地之道生成聖人之道教養開闢以來皆因民生日用制其養為教即此身心性命制其教為養教莫大於慎獨以致中和養莫大於至誠以成位育致人物之中和成天地之位育者非教養之道有主不能也三代之上有聖人作主教養法少而能治三代之後無聖人作主教養法多而愈亂天下古今何可一日無聖人作主也耶主教養者自三皇五帝而三王五霸不有孔子時集大成則中和位育無所統紀矣孔子後有顏曾思孟相繼申明孔子為天地人物之師宗以故後之千聖百王皆得取法此慎獨至誠為教養之道不致流為無忌憚者率禽獸而荒之誰之力歟宋儒多墨守其法不知變通不免又流為執計穿鑿矣至姚江良知之學一出大掃支離惜未有幾人能述此教養時中之道精至慎獨神於至誠原於天命為天地人物之宗旨以定平此世界也所賴有大易五經四書之微言尚可尋繹故豫自知有此道無時不全提此教養宗旨以統會三教九流百工人物歸於慎獨至誠以克此精一中和勤儉簡易為標的使天下古今曉然不敢大過不及為無忌憚以亂千聖之心法蓋切切也雖然求此一肩擔荷為向上全提者豈易得哉前在天界值楚黃二毛誠心至意特師宗於余余見其根器授昆仲名大準大斧期以準天地之始終斧古今之祕密使吾石頭一宗妙得參同聖學而積年乃究各得逢源今尊素以書義全提質正余讀之蹴然起曰吾此聖宗密旨果授受有在乎其見知聞知自肯自慊一口吸盡無敢或欺故能定易書眼目辨聖哲源流儼如佛法大科禪門普說痛快直捷殺活縱橫它手不能及也癸甲全提原道諸論劍川二刻啍啍在茲既當仁不讓之道在躬體道而行更何避焉天下自有至神至明之良不能掩此至公者在老子騎青牛出函關圖贊序余於皋亭山中機有所觸因與石道者曰老子甚奇獨能跨青牛出函谷關不知果何所往孔子嘗稱為猶龍卻乃化為牛去此又見孔子之奇矣石公曰千古無人疑此故亦無人能道此末後句也余曰益可引申矣洞山所參之老龍山似之問賓中主曰長年不出戶又曰見兩泥牛鬥入海直至如今不見蹤其謂何耶至若懶殘之不與俗人拭涕華亭之踏翻船子亮公之入千巖萬壑無尋處此不特為自了漢行履其孤風絶侶正為坐高廣大床不肯下執生像寶物不能捨者鏟去非時食尊貴墮之命根也惟善用九六不為首尾所纍者始能堯舜周孔用九六於揖讓謙退而不致悔疑如老子者即不出關何嘗不讓退莊生以老聃死秦失弔之此別立薪盡火傳之妙不必考其事果何如我奇彼人能以老了騎牛出關表而圖之獨見其神不可測以迥異群聖耳明日偕石溪友蒼觀濤虛量諸子到安廬精舍見壁間挂李次公畫老子騎牛圖石公訝曰昨和上才舉此今日即見異哉友公請余贊并敘其事贊曰尼山嘗問禮於柱下史退而不敢加以博古君子道德真人輒稱之為猶龍固已先知其神聖不可測矣果然末後騎青牛出函谷則千萬古下又孰知其首尾所從於玄牝之門為天地根乎咦堯舜之能揖讓周孔之能退藏豫特引而申之皆於猶龍有光寶壽位中符禪師拈頌序法界雜毒海禪林百怨門不是曾捨此窮性命與之上天下地出死入生神面鬼頭魔來佛去斷盡怪異偷心透過淆訛活路者要做箇沒巴鼻漢子與脫空弄影之狂迷隨其顛倒以逗其自肯未有不互相誣陷也位中符姪親從吾龍門方法兄處奮頭角而乘風雷翻怨毒而出雲海以故機用縱橫變化迥拔而出世為人振作於法門者有年今特以拈頌一冊質余并屬一言余笑曰杖人到遮裏亦摸索你首尾不著也何足以定當其妙密哉即此便是怨毒於人自應有捨性命者作報復去在義山且拙訥禪師語録序余丙寅年在夢筆值雲門澄老和上入閩特迎於山中聚談三日皆吾宗大要領更從爾密兄詢及同門各有標致以知瑞白兄是堅確認真者將來出世必能得人後以麥浪兄倡諸昆弟和豫夢筆三頌人見瑞兄語句不事華藻未以為異豫獨知其棒打石人頭能本色也逮豫住匡廬圓通而瑞兄正隱崆峒其門人孤崖元潔輩來相見皆一時傑出乃知認真者果能多得人也今豫又二十年來浙住事亭歇翁祖庭會雲門下子孫尤茂吾門人青原笑峰南嶽竺菴來書言江西湖南獨是瑞和上之分枝列秀深喜吾宗有人不致孤寂為可慰也茲楚衡義山且拙訥姪亦遣弟子來訊愚菴法兄及同門并到皋亭貽我以義山語録法華直指乃曰直指序已承三和上作此語録辨言須求和上豫笑曰我未面義山何足以序義山時正病目聊閲數篇已見大意遂強為之亦猶昔聞瑞兄為人見其語句即知其解行相應也耶如義山録及自述行繇亦徹見其家風不墜其語不滯正偏機鋒活脫於門庭宗旨自能不讓前人則光大此宗正未艾也豫以法脈相關不辭固陋直敘其三世相親爾爾木本水源誰能忘之報恩南菴依禪師語録序豫住徑山時南菴依子從竹林特來參扣見其風神穩密亦嘗有以策勵之方其與竺菴眉生喏喏諸于相盤錯已默識其異日向誰虀甕裏淹殺迄今十四年來果已各擎頭角客秋麗中來皋亭述其師嵩乳和上近日得人因出依子報恩院結制語録見其超逸縱橫乃大異之昔我博山先大師生平勘驗學人獨於生死性命處控扼以故天下英奇難於搆附使雪關首座與嵩公不自崛起幾不盡溺殺於急水灘頭拋竹篙乎今者依子實是英奇衲僧嵩公實是本色尊宿一旦英奇能死心於本色而本色能授法於英奇此非師資之妙合更自親得博山家法獨有取於生死性命之不可欺者乎不則方今天下人正在門庭施設中鬥機智本色英奇多於生死性命了不相協而二師資啐啄處乃爾正所以能使博山之家風復振也豫忍俊不禁為助喜云新安仇氏家譜序世法出世法皆有譜也同乎異乎曰可載自同不可載自異何則人莫逃於有身身莫大於尊親既有此身可同尊親何有世出世法之能異雖然必如何能使此身同於尊親必如何能使尊親同於有身試觀天下林林總總孰不各有宗族幾人能以此身同尊親者語云不孝有三無後為大豫云不孝有三無前為大使吾身前未修已盡倫可尊親於祖宗何吾身後能存道垂法可譜載於繼述此前後達孝無間然矣所謂可載者曾不擇三教九流百工技藝愚夫愚婦能以忠孝節義立身揚名垂三不朽者皆足以表章也或家譜載之郡志有不載郡志載之國史有不載國史有不載或外典載之同此心寓身中雖時位事例或異而尊親之道世出世法何嘗不互相發明此隱揚用中乎吾法孫虛量越者歙人也偶持其仇氏宗譜乞一言辨之豫笑曰子固天性孝植乃能以此光大其族氏乎昔釋迦生西域中天竺為淨飯王太子達磨生於南天竺為香至國王三太子以出生死性命之道尊親而法流東土諸祖皆知木本水源表諸墳典傳記使非此法則吾東土亦不知有西天宗族矣如此則吾孫之立身明志必有可述而不愧於宗譜使仇氏亦因此不敢以子孫出家能立身正性命為無後又不敢以子孫相承不盡倫失尊親為有前也仇氏之大也不更進乎僧祥馬培元近稿序自古之言詩也莫過於孔子或言樂而不淫哀而不傷或言思無邪或言可以興觀群怨事父事君豫以怨之一字尤為造化之玄樞性命之祕藏凡天下之事到於群處不能無怨到無邪處乃能歸根復命貞下起元也此非千聖不傳之妙密乎須知有性命者必有形色有形色者須有造化有造化者須有事功有事功者必有文章辭令為天下之風教然此中之節次未易窺破也子貢多學強識末年乃大悟曰我昔以夫子之文章與性道作兩截看不知夫子所言之文章即夫子所言之性與天道也使夫子非性與天道為不可得聞又何必提出以贅人之知見此正為世人徒見時行物生而不見天命流行之妙也彼時七十子從事夫子無行不與尚未有幾人領略又況風斯再下者乎雖然聖人之大德敦化諸子之小德川流亦何嘗不與天地交錯而成其變化哉豫讀僧祥馬公近槁蓋有感於聖賢素逝者深矣公負不世之資值天下屯否而不遂其志然忠孝性情益見於杖履間其所寓言著述又深有興觀群怨於歸根復命處固有世人所不可得而聞者在也夫不聞何病如莊屈與孟子同時言論各不相及其發於性命事業足為萬世之風教中節一也公素以名教自任更深參性命之事於雪竇諸尊宿以故妙得活句活法有時影草隨身有時入廛垂手有時孤峰頂上有時異類中行以為龐裴楊李善法喜遊又何讓焉公與豫神交有年客臘特孤棹來皋亭度歲一見莫逆空走磨盤因山近稿相視乃擊節而題此以識一日之千古云
