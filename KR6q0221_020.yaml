body:
  text: 門人大成大奇大然大寧較論各安生理論高皇聖訓略曰各安生理毋作非為秖此二語如揭日月行於太空普天之下三教九流萬國人民無不照被而教誡之雖傳與天地終窮亦無弊也何以知其然哉洪荒之世神聖未生雖有人物滋茂而品類未分身世無制不免有人物互相噉食之混亂及至聖人迭作萬類區分三教乃興九流斯備使民各安生理勤儉自足而不作非為矣夫三教九流豈彼人民之生成哉是皆聖人各因其材而教授之使其勤儉自勸各有所收則天地無棄物而天下無棄人也後世人事多亂而不治者亦以聖人務本之教戒未嚴遂有無救無歸之徒作非為以致世人之不得安生理也使聖人務本之教戒能嚴則天下之人士為儒者皆能調制禮樂刑政則世無不治矣道者皆能存養精神意氣則身無不壽矣釋者皆能明悟生死性命則心無不真矣如三教之大綱既舉則九流之衆目自彰故為農者皆能苦力耕種五穀則食無不足矣工者皆能精勤營作器使則用無不利矣商者皆能交易出入貨物則資無不給矣醫者皆能燮理方脈藥病則生無不衛矣卜者皆能洞究卦兆吉凶則幾無不見矣相者皆能明辨骨氣貴賤則分無不定矣算者皆能推詳造化窮通則命無不安矣曆者皆能仰觀星象變遷則天無不敬矣輿者皆能俯察形勢聚散則地無不順矣知是三教九流之道無非為天下務本安生之術若以事實核之秖有士農工商四者可以通攝三九之術蓋士之一類足以通儒釋道醫卜相算曆輿之術而不可代農工商三民之業何則理術乃通虛之妙事業乃執實之精虛通則三教九流可以互收執實則士農工商當以自治所以古聖立士農工商為四民者是皆以務實之事而虛通三教九流之術也故豫以為立天下之事當以四民為王通天下之道當以三九為經是則天下之農當倍於工則天下之食足工當倍於商則天下之用利商當倍於士則天下之資給而士又當倍於釋道及醫卜相算曆輿則足以收攝其諸術矣試以近世天下民戶推之食粟穿衣需器資貨而惰奢者嘗有七八其為士農工商而勤儉事業者嘗無二三孰能使二三之實事以充足天下七八之虛用而不困乏爭亂也哉禮義生於富足富足生於勤儉天下本弱支繫而致敗亂者正以聖人勤儉務本之教戒未嚴使天下人民惰奢趨末之所致也使天下人民各各自嚴聖人勤儉務本之教以安生理則自然各正性命保合太和矣繇此言之則立天下之事莫過於四民治天下之道莫過於儒釋範圍天地而不過曲成萬物而不遺教雖名三實以世出世法回互內外而收攝之聖祖御製文集亦嘗以老莊之學為儒術第三教之名已久不可廢故特以玄學養生以成其教至於推重釋教陰翼王度之不逮密輔至治之無為以罪福因果而警醒其諸術以生死性命而開悟其通儒其補於聖帝明王之道豈鮮哉是則儒教能悟心性又足以統攝釋道之教而儒類當倍於釋釋類當倍於道類勢固然也其道甚大百物不廢而本末知所先後條理自有始終嵞山聖人首舉各安生理一句正是徹生死無始終而一貫者乎今謹捐出縣之中天更當編次崇儒崇釋崇道三集振其三綱士首三民挈其四紀曆算醫卜相表形家收其六目端本條達邪説不能矯亂則中和易簡精一勤儉盡在其中矣士為治本論古立四民以類天下而士獨統天下之治農工商實所攝焉蓋士為出治之本使農知所以耕工知所以製商知所以貨百姓知所以能各安厥止守人倫而有常通物理而有變群居方而不亂雜處分而不違生有養而終年死有歸而順命世界賴而不壞道法因而得傳更於生死知所以悟聖凡知所以超是皆士之能治也夫士也者聖賢之通稱也三教九流能以道術主輔治化者皆名為士所謂儒士學士道士高士禪士大士無上士皆足以互相為治也使農工商等能通道術又何莫非士哉但士獨以出治屬之耳是故古今之治獨統於士古今之亂亦責於士而農工商不與焉夫農工商等之能各安生理不作非為者非彼自能也治之教之化之者士也治賴於教教神於化故王者勸農來工通商而先教士凡治教化之理皆士主之士之責蓋其重哉農工商等得以自食其力實各得食士之功也士得以自食其功實全得食民之力也士非民不得食其功民非士不得食其力今日之士果能出治於民而食其功乎果能不亂其民而食其力乎嗚呼誰知今日之士全食先聖先賢出治之功全食窮民苦民出死之力也使今日無繼治之功則先聖先賢亦無功可食而窮民苦民亦無力可食矣安能繼遺功於後子孫世世享之繼遺力於後百姓世世食之乎士之所以為士可一日虛食此名哉名無實不成不成之名誰能久保若欲久保此名必須真實出治以扶天下之危以安天下之生以成天下之業以固天下之本則天下萬世皆食士之功也若更坐使亂臣賊子竊士治之威福敲天下之骨髓害天下之性命壞聖賢之治法滅國家之本元當此之際不出真方而救危亡尚可自謂能為士哉自生民以來未聞有無功食力而能自全於天地間也士乎士乎真今日赤子之父母乎真今日大旱之甘霖乎真今日飢寒之衣食乎真今日刀兵之放赦乎真今日苦海之慈航乎真今日火宅之寶車乎豫上不能預出治之賢聖下不能預食力之農商深愧乎不能為士也敢以士自勉并勗同人凡主世法出世法者各當竭力盡忠輔治始不負食此國王之水土也法為國本論開闢之初先聖與生民立法漸次皆從根本而成惟慮其不備不均必使人倫物理有常條衣食作息有受用生老病死有調度身心性命有依歸除此之外不敢添設恐因養生反害生也及其法之備也或因法而生弊聖人又出而立救弊之法去其先聖本法外之甚者奢者泰者救其本法中之變者失者壞者自後聖救弊之法一出而後人又於救弊之法而生弊焉或執救法為本法而捨本法為末法或於救法而生弊復於弊法而生弊而本法救法弊法交相混亂無所揀擇天下顛倒無所適從矣治心治身治世是三大本法也其法最易最簡人能反己求之有何難哉飲食充飢耳食中生出浮巧百端窮其財力亂也衣服禦寒耳衣中生出浮巧百端窮其財力亂也房舍庇身耳房中生出浮巧百端窮其財力亂也夫以身外一法尚生百端而亂天下之性又況三教九流外更有異邪妖怪遊手偷心壞國家務本安生之法窮汗血奪性命而不互相為亂哉今欲追先王易簡之大治者莫先於明三教九流務本之正法而去其本法外之甚者奢者泰者則後聖救弊之法亦可以去而救法上所生之弊亦無從而借影也本法者係生民世界之性命也聖人未有不死世界未有不壞獨此三教聖人之本法與九流之本法決不可一日壞於世間也此法一壞則天地無定位人物無安生古今無統紀矣是故儒氏之法在世可治也老氏之法在身可治也佛氏之法在心可治也士人之法在教可治也農夫之法在食可治也工匠之法在器可治也商賈之法在貨可治也醫藥之法在病可治也堪與之法在居可治也星學之法在命可治也卜筮之法在數可治也風鑑之法在相可治也帝王師相之法在則古今三教之道化天下萬民之身命皆可得而治也夫天下者天下人共成之天下也非一人獨成之天下也惟能以天下人共成天下為天下者乃為獨成天下所共成之天下第一人也天下一法不在則天下人人分上壞去一事矣試觀天下人人分上何事可壞世法可壞乎身法可壞乎心法可壞乎教法可壞乎衣食可壞乎器用可壞乎貨財可壞乎乃至醫藥造化吉凶趨避氣數之法可壞乎或小法不在因而壞大事有之未有大法不在而小事能保其不弊也是故君師為大綱教養為治本衣食足而四維張禮樂行而刑罰措大同小康亦在其人舉之耳舉之必知天人性命之故而發一體均平之願安得此中正之法以使富貴者不欺凌貧賤不剝削貧賤不劫奪貧賤不激亂貧賤不受害於貧賤又安得此廣大之法以使富貴者憐愛貧賤謙敬貧賤賑濟貧賤教育貧賤化之而忘其貧賤共相贊成胞與以致天下之至治哉富貴貧賤元無定相言之似粗而行之甚細自古聖賢豪傑初陷于貧賤不得明其志而汲汲遑遑求行道於君侯宰輔之門亦似為富貴謀也求其在我素位自得因民好惡揚遏裁成非固達者孰能知之不然貴為天子富有四海居萬乘之尊無道法而徒擁虛器則天下危如纍卵幻如朝露又何足以恃哉惟能以聖人中正廣大之經法而求天下聖賢豪傑領之與天下富貴貧賤務本安生各正性命則萬世無弊之道也管仲曰各用所長使民不爭蘇軾曰材辨勇力齊之以學談峭曰大人之幾鬼神莫窺忍俊譨譨亦不得已聖人始終條理就事言事而已初不露也君以統臣而化及於民師以化民而并以化君上古君兼師統後來師潛君德可曰民使由而我亦不致知乎知其故而基命宥密藏於同患矣神深於幾但請學易道治宗旨論道貴中和治貴易簡勤儉安生精一傳心不息法天主靜法地善用在人此千聖不易之宗旨也易簡知險阻險阻皆易簡誰信之乎自反最易簡因物則而用物最易簡徵晝夜呼吸而知死生之故最易簡徵宇宙統類而知身心之故最易簡誰信之乎故必以大畏知本戒懼見獨學問格通薪火鼓舞而後知好學致道享其中和非以苟且為易簡也博我以勤勤法春夏約我以儉儉法秋冬誰信之乎窮盡惟精定靜惟一精義入神參兩貞一誰信之乎真心細心知泯於事非以俗纍為勤護慳為儉也史遷稱孔子傳疑為慎斷自唐虞而至文武以立人極尊為明證其所以建天地合外內貫古今而集大成則衡宇縱宙身心性命本自彌綸者也惟天生民有欲無主則亂故觀會通以行典禮制數度以議德行三立四教倫倫物物此其藏天下於天下泯知能於當務者也知乃能行知即是行同別何如神不可知日用不知同別何如知之為知之不知為不知是知也又況知而無知知本無知知即無知豈齒舌所能及乎默識而已既然不知在與知中吾言其可知者而已孔子棲棲轍環知道不行於當世故老以志事託之斯文曾子曰夫子之道始於詩書終於禮樂詩以情興性書以事立政禮以表其中樂以和其節春秋以律行其忠恕易則統御而無後先大學中庸傳為禮經之心孟子七篇稱為得易之用經正綱舉時即乘權信得及乎噫今日之五經非昔日之五經也遭秦火之焚傳漆壁之漏兼以編集差錯儳言謬訛又為傳注所昧晦師説所紊亂學者又無精心參討又無正眼揀擇遂使此學陷於曲學陋見卒至不明不行嗚呼安得有仲尼再生於世重為刪定而集其大成哉而孔孟之後無超孔孟者萬萬無能重為刪定而集孔孟之大成也雖然莫謂今人無制作古人制作目何來人能求諸自心天然之法則自我作祖中和易簡皆備於我矣人既知堯舜之後乃有孔子又安知孔子之後不更有其人哉所謂舜何人也豫何人也有為者亦若是則學道者不可自畫而謂後起更無有孔孟也豫不敏深有望於後起而續此宗旨者生死重超論世人只知重生不知重死即知重生死未必知超生死孔子云未知生焉知死生固死之本也生豈易知哉又云朝聞道夕死可矣此道非了生死之道何一聞之便可死乎莊子所謂善乎生者即所以善乎死也然則莊子知生死之貫處否大覺氏曰知生之來處則知死之去處知生本無生可生則知死本無死可死此超然悟心之道也其孰能深知之世人知生可重未必知生之所以既不能重且將害之知生之所以則老之所以病之所以死之所以無不知之也如不知生之所以則不知養生又安知養老養病與盡死之道乎老病難於著力死不可著力所可著力者獨於生為易耳生能著力則老也病也死也不期得力而自得力也得力云者猶是幻妄相中作得主云耳真達本心無生之道又何著力與得力云乎生時可著力者只在一念旋機便足超生死聖凡之幻相其次于立命安身之事有如種植之法得好種子好地土好時節好溉灌則異日生芽抽枝開花結果不卜可知也死時著不得力者如睡夢中行事與所遇境界皆不能作主為業力轉也所能作主者皆是惺寤時旋機行事與所遇境界能繇自己也惺時作得主則夢中自得力少時作得主則老時自得力好時作得主則病時自得力生時作得主則死時自得力學時著得力用時自得力參時著得力悟時自得力行時著得力證時自得力間時著得力忙時自得力病時著得力死時自得力此必然之理非強致也儒者以世善生亦可善老病死而不暴棄此身命也道者以身善生正能善老病死而不損壞此精神也佛者以心善生獨超於老病死而能圓淨此靈性也世人信儒則能以生行世信道則能以生度身信佛則能以生悟心捨儒者是捨生於世也斥道者是斥生於身也闢佛者是闢生於心也人生天地自不容生於世不保生於身不超生於心是真自暴自棄也雖三教大聖如此諄諄善誘切切為人爭奈其自捨自斥自闢其心身世哉自古伏羲神農黃帝堯舜禹湯文武周孔遞代致中和之道制易簡之治無非與人善其生老病死此四大事而已至於分其人倫別其種類定其方隅辨其貴賤與制飲食衣服宮室醫藥生有教老有養病有治死有歸尊其尊親其親仁其民愛其物參天地之全功贊化育之能事無不盡禮盡敬盡人盡天也是故聖人之道獨重在生所謂天地之大德曰生而生生不息曰命不重此生則天地人物之性命於斯絶矣苟能克此生生之機在心養此一念生機自無妄想之亂也在身養此四大生機自無夭折之亂也在家養此骨肉生機自無悖逆之亂也在國養此胞與生機自無爭奪之亂也在天下養此神化生機自無敗壞之亂也是故王者興必先誠身明善而後家齊國治以教養天下之生以恩養天下之老以德養天下之病以澤慰天下之死所謂視民如傷問民疾苦仁沾枯骨化及昆蟲此文王善養天下生老病死之德之純者也今欲王天下者可不師古聖養生之道哉雖然人之有生也久矣幾能盡生生之理以超天下萬世生死之道而圓淨靈性之妙者苟不深參大覺氏了悟生死圓證真心之旨恐終未有超生死之大道也豫見世人徒知重生不知孔老與佛之所以超生重生之旨適足為窮生害生之事又安知有即身世而超生死即生死而超性命之大道乎故豫特地拈出以示天下後世必有真能以性命為重者相與使此正法不斷絶也聖主當興世出世法論或曰帝王宰輔崇尚佛教史多不取或有疑似於世儒者多作意分別之以彼不純法王道而以荒唐不稽者誣世惑民吾師何獨不懼異端之闢乃挺然以佛教會聖道而主其説乎雖可使後世有法王真子能令正法常住又安能使後世儒者翻然點筆稱為世出世法之功臣乎曰此蓋世人見道有淺深耳豫孩提時全不知有天地人事但聽吾親所呼我亦呼之長而見人之貪競貨財名色見人之讚毀古今見人求之有得失而生榮辱我亦以為固然何故蓋據日用者指實而名之至有自不曾深造而親證之者如説古人之心與神人之境不免隨人言語淺深而托之想像矣以故求聖賢之典墳始知人倫物理之親疏而人復有智愚賢不肖之太過不及賴有聖人作之君師教以節情率性之道安身處世之方禮樂刑政以為勸懲平治豫於是有思齊聖賢之志焉不意俄遭疾病生死之苦雖亦知壽夭不二安時委命之理奈何驚擾吾人之靈心妙性豈可冒昧於生死去來而不自知其主宰乎再求於書而不得其旨趣求之世儒益不知其根繇轉見痛切如喪考妣亡子無依乃聞佛法使人自參一念未生前誰是我本來心性自是日夕自參自疑俄而有感悟焉始知生死皆妄想顛倒所使而常住真性古今曾不昧滅乃少自慰然猶未達天地人物善惡凡聖之差別遂入空門誓死掩關尋求佛祖教典及諸知識反而參之以至疑疑而參之以至悟始於凡聖根因淆訛宗旨一一穿徹乃有大安樂處然又自念幸得人身生此中國初遇聖賢之教又獲佛祖之緣此君親佛祖之恩又將何以報焉乃思古聖皆謂若不傳法利生無有報恩德者於是晝夜自思古人云達道容易信道難信道容易參道難參道容易悟道難悟道容易行道難行道容易使世人同信同參同悟同行同證為難中至難也故吾佛雪山悟曰奇哉一切衆生皆具如來智慧德相但以妄想執著而不證得我今既得此道當以種種智慧善巧方便譬喻言辭開示一切衆生解其妄想執著使同證同得也吾受大法之恩敢自負哉亦當如佛於此堪忍世界説此難信之法行此難行之事雖虛空界盡終不敢自委矣是故從世間易見者而思之曰上古之人遠矣人不能知太極之理微矣人不能知外國異域渺矣人不能知生死幽明幻矣人不能知吾乃俯仰此身於日用倫常物理之間細而推之上古之人如今人也太極之理如今理也外國異域如今世也生死幽明如今身也何以知其然哉洪荒忽闢古聖人仰觀天之有文俯察地之有理中審人之有倫本如是也為耒耜教耕種以免茹毛飲血與禽獸爭製藥餌以療治疾病使人保身延命列廛交易以通百姓之用修德教以撫萬民習干戈以征不享立五官以敘五事占五星以推五行作算數定律呂作冕裳定章服制陶木以利器用通水陸以造舟車規天條地畫野分州順天地山川之經達生死存亡之故我則親見古羲軒諸聖矣至於讀易詩書禮春秋諸書而見內聖外王之大經法如天地之無不覆載如日月之代明如四時之錯行如鬼神之誠不可掩我則又於此親見堯舜禹湯文武周孔顏曾思孟諸大聖賢也夫如是則我亦嘗試求聖賢墳典始能於此世界人倫物理禮樂刑政種種制度之中而得親見上古之神聖焉故吾曰是亦在人見道之有淺深耳蓋天之職秪能懸象其日月星辰也地之職秪能載象其海嶽山川也山之職秪能容草木禽獸也水之職秪能涵魚龍珍寶也若夫聖賢之職則能明天地之理通萬物之情安人民之身制倫常之教而已至於窮天地陰陽之所繇生究萬物性情之所自出明身心性命之所以然悟生死聖凡之所以異雖推之於盤古三皇之前荒唐不可稽也推之於堯舜周孔之後隱密無能測也使荒唐而可稽則世人不毀佛氏之微妙矣隱密而能測則世人不毀佛氏為邪異矣今世人之毀佛法為荒唐邪異者亦猶愚夫愚婦不知神聖創制之密而指盤古有巢燧人伏羲神農軒轅與夫堯舜禹湯文武周孔等之為荒唐邪異不可稽何以異哉或曰先聖既能知立人安生之法何不知立人出死之法而獨留與西域佛氏言之何也是非此方先聖一人之所能為也即三皇五帝三王之制作亦漸因時而制宜耳孰能以一時即盡備其制作哉如天地之大不能一時成熟萬物亦必春生夏長秋收冬藏歷八節二十四氣以成周歲之運也故就治世之道言之盤古以來其荒唐有不可稽孔子亦但祖述堯舜憲章文武則制治之道於周始備其前此者疑則缺之已耳孔子刪詩書定禮樂述大易作春秋始終條理以集大成質鬼神而無疑俟百世而不惑雖法舊章而實創自神智後世雖有作者孰能過哉然此設教亦不過人世已成後之道也至於天地人物未成之先天地人物已壞之後及人父母未生前性命投胎之因繇與人四大敗壞後聖凡生死之報應非佛神明又誰提之或曰然則盤古三皇與堯舜周孔猶未盡生死之道歟曰非此之謂也姑以治世而斷之耳然此神聖皆超悟生死性命之人特以大權示現安身世而治天下故未遑以出生死之道教世間也曰然則先聖何不早開此超生死之道以示後世乎曰有之但今人心粗未嘗窮徹其精微耳易傳曰原始反終故知生死之説精氣為物遊魂為變故知鬼神之情狀論語曰朝聞道夕死可矣皆密示其概此方之外存而弗論未盡闡其旨也況彼神聖出世不能頓立教化至於周末而春秋之法倫常之道尚未盡行若非我佛弟子不辭跋涉以生死性命之道傳至震旦以驚覺之則此震旦之人又安知有超生死顯性命之道哉或曰誠如所言使彼西方佛教不來豈我中國之人皆沉迷生死不復為人世乎曰非此之謂也吾佛示現於中天竺國其教化流布已充塞於三千大千世界視我震旦如京師視閩越之鄉邑也我之以震旦為中國而視四夷則如吾閩越之視小聚落耳我震旦人不審國之大小乃以東視為西即將中天竺國為西域乃夷狄胡人豈不謬哉若是則我閩越視京師已在西北亦可指京師為邊外乎又以吾震旦自有堯舜周孔之道足以安身處世矣何復用佛氏超生死顯性命之教為擾亂哉是則有巢氏燧人氏之民乃曰我此世界自盤古渾沌開闢以來茹毛飲血以皮蔽身與禽獸相狎木石為群亦足以終天年度歲月矣何復用伏羲神農黃帝堯舜之徒以道德仁義而攖人心以創制造作而亂世界哉所謂亂天之經悖地之理害人之事皆此道德仁義之徒也自盤古至有巢燧人之世不知經幾何年不見虛空墜地春夏倒行何用此亂人之徒哉我等當相與斥之逐之而後相安於無事為快也誠果如是則今日世界猶然與禽獸為群矣何復見三代之禮樂乎誠不如是則堯舜周孔以安身處世之法而治天下之後又何求而得此佛氏之超生死顯性命之法完全此身心性命以成其世法出世法哉井蛙不可以語東海誠何怪焉或曰佛教以三千大千世界為教化之地彼諸弟子何必拘拘欲以此教垂念吾此方乎豫笑曰是何言與夫佛以大覺慈尊見大千世界衆生同一體性有一衆生陷溺其性命於生死猶自己陷溺於生死也不見禹稷之聖人乎見百姓之溺於洪水也如己溺之見百姓之飢於無食也如己飢之故不辭焦心勞力為疏濬九州而教種五穀初非有求於世人知之德之而後為也又不見唐堯之民擊壤而歌曰日出而作日入而息鑿井而飲耕田而食帝力何有於我哉我佛氏弟子不辭勞苦重譯來貢蓋欲使此出世之教行於震旦以開悟其人心耳或曰如此異域之人知他真是佛國來否或托辭為佛而文其説取此方之名聲利養以度活也豈必真有是奇特之事乎曰彼異域人既能不辭勞苦又能具此聰明駕其説以超出此方粵古神聖之文字義理使此方人攻之不破摧之不折辨之不及思之不到又能使此方絶大聰明者心服而神往極大凶暴者心畏而情枯則彼奇特移來闡揚堯舜周孔致治之教不亦能取將相公卿之爵位乎又何苦自捐其妻子之情欲捨其財貨之富貴所食者不過穀粟菜果而非有肴饌珍饈之美味所披者不過緇衣壞色而非有錦繡羅綺之麗身或居千峰絶壑木食草衣或居城市都甸托鉢乞食無敕賜印劍生殺之權又無官爵品位尊卑之職於心則恬淡無為於身則孤潔無欲如此名聲利養何求不有乃區區入東土以大法濟人而反受此方之詆毀哉或曰吾東土人正以佛氏之入我東土不耕而食不織而衣建宮殿之莊嚴如朝廷奉佛法之尊貴如敕旨敬僧徒之儀軌如官府所有經律論禪之教門各自標榜而行化至於糜費國家錢糧混同天下士類專以教人絶夫婦父子之恩愛背君臣朋友之禮義是為可闢可斥以清天下之至治也曰此蓋未之思耳夫佛之教以離欲清淨教化衆生使彼開示悟入身心性命之根源不致認色身幻世之名利恩愛以自墮其靈心妙性於生死業纍也使佛不以神道設教建清淨宮殿奉微妙佛法敬梵行僧伽以戒定慧而化貪瞋癡以正法眼而存真慧命則安能漸使世人斷殺盜淫妄嫉妒爭奪之事又安能漸使世人悟超越生死契證心性之道哉正以世人不知大道之源而利天下國家輒以糜費國家錢糧與混同天下士類為闢也況今聖帝明王神道設教而治天下使萬物各安身命即今僧徒在此國中皆此國中之人民也一人不安於衣食教化則是帝王不安此一人也況此人能以道法自安性命復以道法而助安天下人民其衣食於天下人民亦未為過也如天下人民豈人人皆衣食其自力乎士農工商九流百技皆交相食養於天下如朝廷官府之滿天下也皆衣食於教化治政文章禮樂之類而工商技藝則各衣食於天下是豈盡天下皆耕織之徒哉即我僧於此國中較人民之類蓋千中之一而衣食於道法教化者亦千中之一其自食力於耕作工用者不少如天下名山大嶽世人有妻子親屬與功名恩愛所繫而不能到者則僧開闢之創制之使彼寇盜不仁之人不敢據占其地居其國則化其國居其鄉則化其鄉居曠野則化其曠野居邊方則化其邊方遇功名富貴者與言因果以悟之遇恩愛利欲者與言生死以悟之遇盜賊不仁者與言善惡報應以悟之遇孤苦貧窮者與言三世罪福以悟之故凡所遇如觀音大士應以帝王宰官長者居士婦女等皆為説法以悟之如此道化不受朝庭爵祿不有官守民責而能到處與人民為善其陰翼王化之不逮密助至治之無為雖與言堯舜周孔之禮樂未必如此教化之易入人心易救風俗也百氏九流孰有道化如佛教之大小偏圓粗細俱化之妙密哉即使天下受爵位之官膺敕命之寄者鎮守天下名山大川以制曠野邊方靡費國家俸祿糧餉之輸運未必有此道術之能與天下百姓兩相忘於治化也佛氏何負於朝廷何負於百姓而欲闢之除之為快哉況佛教以性命之法教人且使人於世不敢造業以亂世間勤修善事以助王化以至超生死出苦輸而人不知此莫大之恩有過於天地君親師也天地以一氣而養人民父母以生育而養人民君師以教化而養人民此不過養此色身居此幻世也孰有如佛大慈大悲能以出生死苦輪之道教化人民即色身而證法身之慧命即幻世而證法界之莊嚴哉或曰漢晉以來如元魏孝文之修齋聽講石勒之於佛圖澄符堅之於沙門道安姚興之於鳩摩羅什梁武之奉佛餓臺城而皆國祚不永身家滅亡何佛法之有靈哉曰數君者皆於篡弒之後畏殺戮之罪而信佛原未能盡信佛法之教化也使早信佛則自無暴虐篡弒之事以取人之國為己有矣若不由仁義行而但以奉佛即保國祚則佛亦為佞人矣按三代之後國祚之長莫如漢唐宋佛教初興於漢明帝再盛於唐太宗又盛於宋太宗如數君奉佛最篤何獨不歸功於佛乃以亂世之君而責諸僧乎蓋自古君臣有天下以來誰不習知堯舜之道而堯舜之道亦未能盡使君臣人人成唐虞之治也即黃帝之神不能化蚩尤而不戰堯舜之聖不能化四凶而不誅伊尹終吉不能化桀而事湯微比箕子不能化紂而去國文武周公不能化管蔡天生仲尼為萬世師棲棲轍環至無所容孟氏浩然克塞老作七篇皆不能行道於當世由此觀之可謂諸帝王聖賢有不足以化人行道者則亦闢而除之如秦始皇盡一坑乎殊不知神聖之道其教化微密而成就世人者人不自知之謂帝力於我何有也豈真帝力之無加於民乎或曰如佛法之大人固有所不見爭奈如古來亦有不法之僧及殺盜淫穢身居梵剎心在利名口誦佛經心行垢濁乃至慳貪嫉妒貢高我慢不知因果罪福此等不軌安得使世人見之不生瞋恨欲除滅之曰誠可恨矣固不可以責佛教也此或讀書不成學武不就工商不利技藝不售或犯王法而無所逃或敗人倫而無所倚或官法為之漏網或家教為之墮綱以致此敗壞之人竊入法門混為僧侶包藏禍心仍縱惡業不親知識不近高明以故於戒律不能約束於禪慧不知歸依遂為肆無忌憚之行所謂賊人假我衣服破我律儀而壞我法門也此豈天竺國來者哉是亦王正家法所不及教化而逋逃以壞我教門也使有如我佛棄金輪王位及我諸祖見世道之虛幻悟生死之無嘗捨功名恩愛而入空門慕性命智慧而歸覺道者寧有如此可瞋恨可除滅之賊人乎或曰既有如此賊人入此法門何不以微妙方便攝化此種類乎曰然須知佛教慈悲於此等人未常不攝化也蓋彼雖假托為僧實不曾入真知識門中受其攝化即或有之終難容彼非類彼自相容納自成其非類也豈真與法門有薰染哉即歷代聖世亦不能全無此人但教化之綱紀不壞雖間有不作法者亦不足盡責於教化也如朝庭官府之治化大權不移即少有不法置之刑憲則亦懲惡勸善之道豈聖王之世全無刑罰若是則聖王不制兵刑但制禮樂矣蓋明刑正以弼教即吾佛戒律之嚴罪責之重亦所以弼教化也不然賞善罰惡之教廢矣天地有日月風雲不能無雷霆霜雪又況於人乎聖人作春秋之大義正以明賞罰而行上天之正道也今有聖天子以天下為一家以萬民為一體為當以三教治化之綱宗九流百技為治化之綱目使三教聖人之法相與攝授九流百技之事相與維持即於佛道之教正者崇之尚之異者闢之除之如朝廷之官府有升降黜陟之法舉賢退不肖則教化行風俗美矣能使佛教亦如官府之敕命職掌使有道德者主其經律論禪淨土止觀功行等教以禁制之則不法者法不軌者軌又何有亂法亂僧以壞王化哉如有聖主賢臣能相與主持佛教如主儒教並行於世則互相為理豈不大翼王化為至治哉或曰此議甚善豫竊有疑焉使聖君賢臣專立佛法將使天下人盡趣為僧而廢人倫乎豫笑曰吾佛氏之教非欲盡使人削髮為僧而棄人倫之道也經云應以佛菩薩身得度者即現佛菩薩身而為説法乃至應現長老身居士身比丘身優婆塞夷身阿修羅人非人等身而為説法如華嚴善財童子參五十三善知識皆各類中人曾無數人是僧也即佛菩薩緣覺聲聞之稱者非盡削髮之僧也佛者覺也如此方稱聖人也菩薩者覺有情也如此方稱大賢也緣覺聲聞者二乘小果也如此方稱君子賢人也況僧者衆也亦非以削髮為僧但此方僧與俗異故以此削髮者稱為僧耳以法義而論僧乃梵行清白為名非特圓頂方袍也即佛法入東土悟入此法者亦多帝王宰官居士豈人盡欲削髮為僧然後始可入佛道乎毗盧佛皆有髮有冠而菩薩位中各各皆有寶冠纓絡何嘗有僧俗哉使世主能尊重佛法而行之則世間出世間原不相隔礙又況學佛之心獨寬於順俗出家之行尤凜於禁僧先必絶欲枯情不食衆生之肉不行殺盜淫妄之事今世間人孰能盡驅之不愛功名利祿捨其恩愛欲樂而盡為僧哉放心放心不必如此過慮也或曰成佛之道貴證一心正覺原不分僧俗也何從上佛祖必以出家而成正果如釋迦文佛先自捨父母妻子王位國城於雪山修苦行而悟道此非獨以出家教後世乎曰此正所謂並行不悖也使天下皆以名利恩愛幻妄身世為實證則天下古今無一人能捨妄想執著矣惟佛能捨世間倫常恩愛之執著則世間人始知妄想執著為生死結縛必須於倫常恩愛而不執倫常恩愛始得心寓根身器界中而不為根身器界之所迷昧也不見堯之蕩蕩民無能名舜禹之有而不與乎正所謂外其身而身存不有天下而能治天下者也如世間人好財者不可臨財好色者不可親色好氣者不可平氣好酒者不可監酒然則有勢利恩愛而結心者孰能即勢利恩愛而超然不執著哉故必如佛祖能捨勢利恩愛以證自心性始可復於勢利恩愛中示現以度人也如觀世音初於聞中入流忘所寂滅現前而後㘞地一聲絶後重蘇忽然超越世出世間獲二種殊勝上合諸佛同一慈力下合衆生同一悲仰所以能隨應一切身而為説法夫能天能人者豈天人之所能哉惟非天非人乃能天能人是則觀自在照見五蘊皆空所以不自有其身乃能普見一切色身也世人不達五蘊本空以為皆學佛則無人倫豈悟超宗過關者止有一實乎析言人倫恩愛乃色受二蘊所攝色受蘊破則四惡道與人天二道之分段生死皆了不可得又安知有超出胎卵濕化等十二類身如二乘菩薩有戒身定身慧身願身意生身自覺聖智身不屬諸情識報應哉悟本空而發大願乃可語耳土蟲不知水魚水魚不知空鳥空鳥不知山獸山獸不知人民人民中有貧賤不知富貴愚癡不知聰慧地獄不知天堂邊方不知中國村邑不知京都凡夫不知聖人處世不知出世色相不知法身小乘不知大乘何故各自陷於心境所差分矣何可互相責備求其逆幾順理費隱彌綸皆如通儒大聖之妙盡此旨哉使豫當年不親參此出世法透過向上宗旨不特與世法人難言即於出世法中人與言向上事亦猶與夢人説覺也何能使直下即頓悟哉入我宗門更須知有尊貴一路自別何況於世人乎故吾特舉從來神聖道治而發其終始本末蓋於先天不違後天奉時之中拈出向上一路千聖不傳之密以待頂門具眼者神而明之天下幸甚法門幸甚三教會同論或問師欲會同三教有是説乎曰三教之道原本自同豫何人敢會之哉昔之為萬世師者集群聖之大成惟周孔子今之為萬世君者會三教之統宗惟我太祖也或曰孔子前有堯舜禹湯文武周公豈有所未及歟曰非此之謂也天地定位文明方興堯舜授受是開宗明道之聖人也禹湯文武平水土定禍害乃撥亂反正之聖人也武王周公繼志述事制禮作樂乃參贊化成之君師也此時方成一王之法更無異道又何復有會同之事哉至孔子時伯夷伊尹柳下惠諸聖各得一道迹有異同獨孔子祖述堯舜憲章文武始終條理玉振金聲無可無不可之時中集群聖之大成自生民以來未有如孔子者此天地所以為大也老聃隱於周為柱下史世無人識亦不能見用於世獨孔子屈身問禮乃退與門人稱為猶龍而老聃潛出函關關令尹瞻紫氣留著道德五千言後世以孔子尊稱老子如此故道家別立門庭尊始祖也至於釋迦主於西域萬國外人何得而知之太宰嚭問聖人於孔子推及五帝從容謙讓乃曰西方有大聖人焉不治不亂不言而信不化自行嗣後千年至漢明帝獲金人之夢而佛教始入東土使當時孔子不親問禮於老聃誰知老氏其猶龍乎孔子不答太宰嚭問又誰知西方有大聖人乎夫老聃雖未出道德五千言釋迦雖未流教藏於東土而孔子乃能逆知老為猶龍佛為大聖則天下之能會同三教稱尊佛老者莫過於孔子矣故曰為萬世師者獨孔子一人非敢下堯舜禹湯文武周公也使七聖生與佛老同時安知不如孔子之稱老為猶龍稱佛為大聖乎蓋求其當機有據證者為標的耳或曰老聃亦嘗稱西竺有古聖先生善入無為真吾師也乃獨稱孔子而遺老聃之言何也曰老聃當時未顯世道獨尊孔子唯得孔子一人知佛老二人則天下萬世莫不信服又何必拘老聃乎然則亦須問釋迦當時不知能會同三教否耶而佛教中亦曰遣二大士為之前矛故有迦葉儒童二菩薩先往東震示現不然何老聃孔子一稱真吾師一稱大聖人乃儼合符節哉要不必舉老聃釋迦能會同直以世儒所尊尚之孔子言為足徵則天下萬世未有不足徵也既徵信於大儒則老氏佛氏之徒不必求其信而又不敢不信也故曰三教之道原本自同豫何人敢會之哉或人踴躍而稽首曰此萬世不易之言也非師如此直剖本色孰能令天下人消其攻擊領其精微即以三聖之言為會同之真旨此真所謂建天地而不悖俟百世而不惑也但今世人尚有未聞師論者不免竊疑太祖神聖何乃先得三聖之同然乎曰子不聞吾前言乎大凡聖帝明王御極能正人心成世道者莫非皆佛聖示現為君為師始能會通至聖之教以參贊位育而化成萬物不然雖出世為君為師未有不雜於偏僻之教而遺害於世道也故聖人迭出皆神明其故而因時制宜補偏救弊三代之後惟孔子顏曾思孟能維持三才之道後來君師不過循倣其郛廓而為學為治或倣之未善循之不精未免流為雜霸異端後來生心亂政流毒日深天下國家幾化為賊盜禽獸洪荒垢穢之域矣嗚呼使佛聖不重出生而龍飛九五現帝王身總三教之統宗則今日無復漢官威儀矣安望重瞻三代之禮樂哉且夫赤手開天成此德業復堯舜之世於已壞之時言豈容易是惟嵞山聖人乘夙願力以慈悲喜捨四無量心而憐愍濟度此蒼生赤子也所謂能尊三教正所以為三教之尊也自生民以來孰能握其樞紐以君臨天下若是者哉一為大成之孔子一為時乘之聖帝統宗既定雖千聖復起不能易也孔子知佛老於前而千年之後未有能知佛老與孔子原本自同能會其原者孔子曰吾從周則今日之鼎定三教者誰之力耶門庭堂奧世皆茫然各恃所知互爭強闢轉使天下萬世疑惑而亂其道治開闢至今有開必先既有三教之名應當盡三教之實而究心其源順理其委先立其大自反諸己乃能率循其固然之條理以順大同無我之至治不則人人私其學家家異其教遂使天下是非紛紛雖聖賢屢出扶偏救弊之不暇又何暇責天下相忘於大同無我之化哉吁以時乘統御之神聖洞徹古今鼎足三教而天下萬世尚有未知其微者盛為此懼故不辭僭議之罪斧鉞之誅以闡發之寧得罪於無知不敢得罪於諸聖人也或人曰尚有意外之疑請更決焉如師云孔子稱老聃為猶龍此蓋孔子問禮見其超忽世教不可以度數拘束如龍之變化無常耳老子之道當身未試後世去聖已遠又安能效用於實事猶學屠龍者雖能曲盡其妙其如無所適用於人間世乎今師謂後世好猶龍之稱者遂尊之為道家之祖則可直謂孔子必取以適世用為會同之道則恐未盡然也又孔子答太宰嚭以大聖人為不治不亂不言而信此秪可行之於西域如中國自黃帝有涿鹿之戰堯舜有四凶之除湯武有南巢孟津之舉周公有管蔡之變即孔子亦有三都之墮又安所用大聖人之不治不亂不言乎今謂後世好佞聖之稱者遂以為釋氏之祖則可直謂孔子必取以適世用為會同之道則亦恐未盡然也太祖以道教可以治身佛教可以治心即如度數可以觀天時堪輿可以察地理醫之可以療病卜之可以知幾相之可以識神算之可以定分凡有利於于民用亦使民各安生理而已如必曰深知孔子有必取佛老之道能會同儒教之治世而鼎定三教以垂繞宗則不惟妄測神聖之淵涵亦且厚誣先聖之立極聞吾師之論者如河漢徑庭無乃使天下後世復為不可論而重重翻案遂致異端紛紛不可以制止乎況孔子嘗云道不同不相為謀今師必欲捏合之不太多事歟曰善哉子之問子不見同人先號咷而後笑乎子曰君子之道或出或處或默或語二人同心同乎善而不貴同乎不善也夫孔子之云道不同者蓋曰聖人之道若不能同諸天地人物則天地人物之性情氣化皆不相謀於一人矣世儒不達聖人正言似反耳聖人無己而無所不己故曰會萬物以為己者其惟聖人乎乾九五曰大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天不違後天而奉天時天且不違而況於人乎況於鬼神乎使孔子不能知來藏往內祕外現則近不聞老聃之賢有資大用何肯委質問禮於彼而稱為猶龍遠不知西方之化深於至治何肯退讓當仁而且稱為大聖高於五帝耶鶴鳴在陰其子和之在大人之神明先天地通六合貫古今蘊寂感而冒其如斯蓋體度本如是也且聖人學無常師即三人同行必有一言一行之善可以擇為我師者況自稱為猶龍為天聖治而肯昧心以憚勝己不師而從之哉是蓋確有據證為可徵信非漫言欲捏合之也至高皇以神武不殺而掃亂還治創業之正大自古未有天生命世之聖固非世人黭淺所能窺測者又肯以佛老清淨無為不適世用之教與孔子會同為鼎定之統宗哉若以清淨無為即謂之不適世用則上天之載無聲無臭不顯之德端拱無為與不見而彰不動而變無為而成惟天為大蕩蕩無名亦當稱之為不適世用不足以會同孔子之教也耶若以戰涿鹿除四凶墮三都等謂非無為之治則天地亦不應有霜雪雷霆之肅殺但當有風日雲雨之生長也禮樂征伐因二以濟刑一勸百小懲大誡正小人之福君子之慶也夫又安知易之包決兩端用中如日月之代明如四時之錯行而享無為之化哉夫中國之異於異域者以有聖人倫物禮樂身心性命之道交錯成此人文而後鴻圖大業於斯為盛也不然何以為重輪繼照之昭代何以為並行不悖之天地亦何以盡此文仁覺之廣大精微也乎或人再拜曰豫亦痛心於三教大聖之道世無知者不究天人費隱輒敢詆訾大聖為世亂階故豫不惜狂愚之言扣擊廣大精微之論以為天下美利庶不負佛聖示現欲此道大同天下使之洋溢覆載凡有血氣者莫不相謀此大公無私之道而各自尊親以高厚悠久無疆也曰有是哉豫今與爾亦可謂同心斷金矣戊子冬因江院王公屢慕師道化求師語録因閲師原道七論謂不應稱明太祖三字遂坐師獄中師不辨後陳太宰聞命一吏省師索偈師援筆書云問豫何事棲碧山笑而不答心自間桃花流水杳然去別有天地非人間太宰得偈嘉歎不已旻昭居士嘗問師安師見惟談向上事不及寒暄故居獄一年未嘗有一字干王公大人日於獄中著金剛心經周易衍義以明內聖外王之道成自匡山圓通禮師足問云不因漁父引爭得見波瀾某甲到這裏請問和上這是甚麼所在師曰看腳下進云鑊湯無冷處和尚憑何立命安身師曰還要別求麼進云曹山三墮和尚即今居那一墮師曰此中無人到進云風前吹玉笛那箇是知音師曰要他知作麼成禮退師微笑己丑秋操江李公艽過太平入獄詢其事道府諸當事一時畢集因索原道七論閲之李公云此論道書也明太祖豈可不許人稱耶明亦稱元世祖也況其書刻在明崇禎時耶遂一笑而釋之師出李公顧諸當事曰禁之無慍釋之無喜此真道人也法子大成記管東溟志道曰迦文聖之聖者也老子聖之智者也孔子聖之仁者也高皇聖之時者也周六德曰知仁聖義中和豈有次第哉吾直以年歲舉之耳郭青螺子章吳觀我應賓從而暢發之吾師此論正猶日月星辰常照天地間午會人法齊彰有開必先信夫門弟子大中陳丹衷謹跋
