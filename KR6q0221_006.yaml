物外別出殺活之機昔玄沙和尚一日見三人新到遂自打普請鼓三下卻歸方丈新到具威儀了亦去打普請鼓三下卻入僧堂久住來白沙云新到輕欺和尚沙云打鐘集衆勘過衆集新到不赴沙令侍者去喚新到才至法堂卻向侍者背上拍一下云和尚喚你侍者至沙處新到便歸堂久住乃問和尚何不勘新到沙云我與你勘了也師云玄沙門庭雖峻自有高賓其落節不少然而爐鞴之所鈍鐵尤多博山遮裏則不然今日亦有故人新到一見即勘過了也何必大驚小怪擊鼓敲鐘於雪上加霜且道博山有甚長處寰中天子無私敕塞外將軍令更嚴山下設供小參舉龍潭一日問天皇云某自到來不蒙和尚指示心要皇云自汝到來吾未嘗不指示汝心要潭曰何處是指示皇曰汝擎茶來吾與汝接汝行食來吾與汝受汝禮拜時吾與汝合掌汝更疑何處不是示汝心要潭忽然大悟笑巖拈云龍潭恁麼問天皇恁麼答若不悟去幾成世諦若實會得凡聖秪有虛名迷悟皆為剩法若實未會不可瞎驢趁大隊師云大小天皇雖則一期點化爭奈將石頭一宗打破狼藉那堪笑巖又向糞掃堆頭添了許多臭穢熏人博山恁麼道汝等又向何處措手足衆無對師云各自散去切忌磕破瞎驢鼻孔落堂小參卓拄杖云我有一句到你不如拄杖子一句到你拄杖子一句到你不如你一句到拄杖子如何得你一句到拄杖子良久復卓拄杖云擬議打折你驢腰你又作麼生𨁝跳得夜參達磨獨自面壁魯祖逢人面壁杖人與汝等每日面面相見還與古人有同別也無若是同則古人恁麼生無乃多事若是別杖人恁麼道其意謂何汝等還簡點得出麼若撿點不出放待冷時看半期小參紫湖禪師一夜大叫有賊大衆皆驚起紫湖於法堂前捉住一僧曰賊在遮裏僧曰某甲不是湖日是即是你不肯承當師曰我聞紫湖有惡狗善能咬人性命原來也只是吠聲無能啀實雖然做賊人心虛暗地裏咬死一箇半箇也不見得我博山門庭廣大不養此物只有一把吹毛利劍挂在冷處有不識好惡者犯其鋒芒教他自喪身命我遮裏不動聲色坐致太平汝等大衆也須防慎始得立兩堂小參南泉兩堂衲子爭貓不知爭箇甚麼南泉提起貓云道得即不斬衆無語泉即斬卻師云大小南泉沒奈船何打破戽斗貓子有甚麼罪晚間舉似趙州州脫草鞋頭戴而出泉云子若在救得貓兒且道果救得救不得趙州是甚麼心行大似箇幫惡的秪如貓兒已斬也草鞋已戴也兩堂僧又作麼生杖人今日重新舉似放過則不可一時趁散晚參明鏡當臺纖毫不隱靈鋒出匣凡聖不存須知向上一機如擊石火閃電光相似還有轉得身吐得氣者麼良久云沒孔鎚禮拜了退避暑菴請小參洞山門下寒暑到來寒則寒殺闍黎熱則熱殺闍黎遮老漢太煞利害若恁麼則盡大地皆無一活人也曹山門下天時熱極卻教人鑊湯爐炭裏回避使衆苦不能到遮老漢太煞偷心秪遮鑊湯爐炭還容你躲根麼若於此二則公案透得許汝等向東山水上行與諸佛共一出身處若也不能透過秪恐八苦交煎教你求生不得求死不得縱有薰風自南來殿閣下那到你乘涼在秪如博山門下又作麼生金鏃慣調曾百戰鐵鞭多力孰能仇六月晦小參解白玉大連環開黃金無縫鎖也須是箇超絶佛祖底妙手今日六月小盡一年已瓜分半箇去也雞足山中飲光尊者作麼生思量兜率天上逸多大士又如何計較秪如壁上挂錢財老鼠咬腰帶遮箇消息也須透過若透不過問取西樓笑長老師歸方丈笑公隨進師曰如有人問長老壁上挂錢財老鼠咬腰帶是甚麼消息如何答他笑曰直得禪床震動師曰秪如天上無彌勒地下無彌勒時是誰禪床震動笑曰多煩和尚挂齒師曰恁麼那笑曰誰敢擊雷門師微笑徐門請小參菴提遮女問文殊明知生是不生之義死是不死之義如何又被生死之所流轉文殊云其力未充杖人云當時只合扣齒三下進山主亦以此義問修山主修云筍畢竟成竹去如今作篾用得麼進云老兄欠悟在杖人云我只將一把稻草與他修云老兄又作麼生進以手指云遮箇是監院房遮箇是典座房修即禮拜杖人云我只震聲一喝大衆汝等若於此三轉語薦得許你與古人各有出身活路汝若不薦且一坑埋卻室參巖頭云大統綱宗先須識句杖人云識得句門裏有出身之路識得宗身裏有出門之機僧問巖頭古帆未挂時如何小魚吞大魚進云已挂後時如何後園驢喫草杖人云且道此僧具何知見能恁麼問巖頭具何宗旨能恁麼答在吾人分上還有交涉也無有交涉試拈出意旨來看無交涉則古人如何敲唱既在我博山門下也須出些手眼始得忽有問杖人古帆未挂時如何向他道錦繡銀香囊風吹滿路香古帆已挂後時如何杖人云寄言十八子好好事潘即重陽解制小參卓拄杖云兔老冰盤光滴露鳥棲瓊樹影翻空重陽桂菊交相發倚杖看來笑獨濃笑箇甚麼博山夏中結制火傘炎炎飛冷雪白玉駒兒流汗血博山秋深解制霜輪寂寂散香彩黃金索子須自擺就中更有末後牢關須知有時解期不解人有時解人不解期有時人期兩不解有時人期兩俱解於此一一透得拄杖子不妨當堂分付其或徘徊未免羝羊觸籓徒望沖霄鸞鳳復卓拄杖僧問如何是期解人不解師云花開葉落渾間事縱目其誰與己親進云如何是人解期不解師云煙雲渺渺關山隔能作生涯孰敢欺進云如何是人期兩不解師云折角鐵牛鞭不起無腔牧笛漫相催進云如何是人期兩俱解師云浩蕩乾坤隨放步吹毛不露太希奇丁酉主皋亭崇先寺小參敲如意云此事如擊石火閃電光無論搆得搆不得不免喪身失命舉紫湖和尚夜半大叫有賊一衆皆驚走湖驀遇一僧捉住曰賊在遮裏僧駭曰某甲不是湖放手曰是則是只你不肯承當師云大小紫湖龍頭蛇尾無殺活手無端與賊過梯若是崇先待他道不是即便推倒曰你遮賊走向那裏去亦不負下手一場也雖然秪如今日捉住汝等又作麼生好乃喝云饒你度刃衝流早落遮箇坑裏近菴請小參英雄不作欺人語英雄不作欺人事秪如世尊於諸佛大集會處絶世英奇不知多少獨一女人得近佛座入定文殊稱為大智乃不知其得何三昧世尊既命文殊自出其定問之及文殊用盡神力竟不能出世尊卻云非但一箇文殊直饒百千文殊亦出不得遮黃面瞿曇豈不將人玩弄復曰下方有罔明菩薩始能出之罔明至果一彈指便出彼定汝等看遮一棚傀儡各有線索當在何處世間英雄尚不肯欺人而出世佛祖肯自欺欺人乎設使現前有一衲僧突出道老漢不得東扯西拽或喝一喝或彈指一下或拂袖打之繞如此還了得此淆訛麼不如此畢竟遮段公案如何剖判汝等試自簡別看若簡別得出不負我崇先杖子與汝點頭如簡別不出更須猛著精彩莫被自己瞞頇好薦亡小參向上去高且清向下去厚且寧中間去和且平迷時去縱橫皆惑亂悟時去逆順盡神明夫如是安得透脫迷悟貫徹聖解凡情顧大衆云大千世界拈來如栗米大打鼓普請看漆桶不會忽有燈籠沿壁上天台大叫曰通玄峰頭不是人間心外無法滿目青山左邊被寒山打一巴掌右邊被拾得打一苕帚翻箇筋斗下平地復叫曰灼然三世諸佛不知有黧奴白牯卻知有又遇著騎虎老豐干笑云莫道山僧饒舌汝蔡示橋一隊居士也須吞得浪杖人棘栗蓬透得金剛圈始可與你向毗盧頂上逍遙去呵呵覿面相逢何處去知音知後更誰知一七小參一二三四五六七萬仞峰頭獨足立翻身撞倒老空王捉敗真贓還叫屈誰見此真贓誰雪此冤屈欲識精金火裏看杖頭有眼明如日室參趙州在廁坑上呼文遠此處不可與説佛法文遠於狹路傍把斷趙州要討箇公驗此是鎮州蘿蔔頭開花青州布衫裏石被皋亭拋向東洋大海底惹得鐵牛背上蚊子飛到十字街頭自歌自唱云土曠人稀相逢者少汝等遮隊沒料掉禪和子在長連床上打瞌春那知有恁麼事堂中小參昨夜三更失卻牛天明起來失卻火王老師賣身無人酬價未遇甘贄行者到留得灶上箇破鍋不見山門前御龍橋畔草離離金家堰每有賣糖人打鑼子向遮裏過此中有一僧聞此鑼聲卻於糖上著到將一文大光錢托道友買一塊來壓饞此友過手擲地曰若作一文錢會入地獄如箭射此僧猛省曰捉敗我偷心也杖人聞之乃呼此友來問曰是你恁麼點發他麼曰是被杖人一頓打趁出去汝等還有知此消息者麼結七小參三七日前釋迦掩室於摩竭三七日內海底波斯嚼生鐵三七日後大家笑龜不成鱉無論是七後七前只要你自奮自烈不有傷心人爭解死冤結説甚麼為人須為徹殺人須見血若作一場鬼戲徒自掉棒打月照空領葛龍泉衆士請小參梅花未發謾取影於臨水橫斜春色如分任尋芳而乘與傲岸此時霜風雖凜且喜參謁猶多近鄉金堰更奇特能問西來意若何欲指彼庭前柏樹子恐賺他缺齒老達磨何似相逢開口笑敲得寒冰煮活茶呵呵呵痛快麼千古風流屬作家室參異方穿心國有一好事自以出人頭地者忽被大鵬金翅鳥擒向虛空拋擲尋落下我震旦國中彼陡見此中人箇箇胸次嚴密渾無縫隙乃詫曰原來遮夥人皆是一竅不通者中有箇眼光爍破四天下漢迎風與一痛掌直使血流披面疾奔杖人處叫屈杖人曰你道遮一掌打著阿誰彼人目瞪口呿杖人曰徒自仰寒空那討金翅影除夕小參百丈老漢不識好惡卻於臘月三十日夜始問人作麼生折合大似老鼠尾上繫研鎚若是趁狗迫牆掉過頭來性命卻在他口裏雲門道日日是好日時時是好時也是錦井限人壽昌云是遮等過日子不是遮等過時光未免金鎞刮目北禪欲烹露地白牛與人分歲正是窮人多詐遮隊老古錐多處添些子少處減些兒自謂有殺活手眼消不得杖人一笑薦得此笑許他做箇本色衲僧脫脫灑灑去若也不薦明年更有新條在引得春風笑不休晚參舉秀才問長沙弟子只見千佛名經不知居何國土亦化物也無沙云秀才曾到黃鶴樓否曰曾到沙曰崔皓題詩後還有人題否曰無沙曰得間題取一篇好師曰岑大蟲灑食大地皮毛有滴血落處可成甘蔗種族若是我但呼秀才待應喏便向道你好箇彩頭一試便中狀元頌曰飽腹文章半字無儼然殿試便傅臚春風得意馬蹄疾一日觀花滿帝都
