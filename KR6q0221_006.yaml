body:
  text: 門人大嵩大權大韶大麟較小參師於萬曆丁巳冬從江西壽昌到金陵寓天界西方丈孫千枝居士傳壽昌老和尚像求授記小參師據座良久云會麼雲巖不著便洞山邈不真誰知親入蒼龍窟儼然臨水影頓省定盤星何如吹滅瞎驢眼居士於此薦得則能不與萬法為侶一口吸盡西江直得赤身拶入大好山應見東苑花獨秀又何讓他龐老鐵船浮水韻徹青霄也哉會麼當機展出娘生手好把旃檀日夕燒覺悟老宿請於毗盧閣為弟子祝髮授戒小參毗盧頂上高拂吹毛古佛殿前橫鏟荒草直下掩耳而去鐘聲已挂七條更能坐斷聖僧愈見天然有在雖則如是果要高高峰頂立深深海底行閨閣中物一毫捨不盡未免成滲漏去至於向上向下大有事在到遮裏直須拔足荊棘林轉身明白地始堪來討我底棒喫黃檗山乙亥主楚龍湖小參師云峰巒峭異鶴不停棲靈鳳無依獨翀宵漢且道是何人境界以如意畫破云會麼大煞天然漆桶不快太煞淆訛野狐作怪真機不發枉匿死生正眼不開徒償業債秪如真機如何得發正眼如何得開復舉如意云大衆看看如意子𨁝跳上三十三天觸著帝釋鼻孔十殿閻王打一鐵棒怒氣不禁直得南山起雲北山下雨黃檗山上月白風清法眼寺中紅爐飛雪會麼良久顧視大衆云隴上梅花開也未我將先寄有心人李太宰有書到山小參師振尺云天開治象誰得太平先聲衆無語師復云彩毫現出人間喜靈鷲銜來天上春會麼太宰書云聖主宵衣惻然下詔普天之下重滌肺腸試問我諸法王子法戰亦有何消息耶乃以手加額作望勢云月似彎弓少雨多風半鉤猶有三星拱大地山河掩映中復振尺云珍重夜參師舉昔日長慶禪師悟道頌云萬象之中獨露身要人自肯乃方親昔時謬向途中覓今日方知火裏冰大衆其中有自肯者麼且道如何是火裏冰聻獨露身是如何是獨露身聻火裏冰是獨露身與火裏冰是同是別你大衆各自簡點看衆下語不契師乃云古人云承言須會宗不是亂統説得如實不會宗旨但將自己痛切處出求決擇發問不起便好痛自討箇落處不可捏怪造語熱鬧人耳目也我要人各各發明自己本分事然後始有酬唱分你看自己本分上還容得三藏十二部底元字腳麼還容得一千七百底公案麼還容得生死涅槃種種名相麼還容得成佛作祖底道理麼若皆容不得如何佛祖又設了許多機緣聻你試仔細自看從無始來在那裏安身立命得恁麼堅密從十二類中受了許多磨折如何還有我遮箇你如何反不自知聻你若向遮裏直下看透方許你聊通一線方許你判斷古今機緣如自己尚不知自己落處強欲分別古今之事何異狂狗逐塊乎僧問狗子有佛性也無師云你有佛性也無進云萬法歸一一歸何處師云那箇教你恁麼問進云不知師云我遮裏棒不輕打人底乃云各各立地欠箇甚麼莫向別人討好別人豈有剩物與人我不要你參佛祖禪只要你參取你自己本分事果有生死可了也無果有佛祖禪道也無參透了始知我不肯輕欺你也噫可惜了遮一對好明燭孤負了遮一瓶好蓮花僧向前提起花瓶便行師云提起那裏去僧云請和尚歸方丈師叱云你偏好恁麼捏怪堂中小參師方坐次恆鑒問云雜念紛飛時如何師云放下著進云一念不生時如何師云提起著進云如何行履不犯國王水草師以如意畫一畫云截斷路頭著鑒無語師云會麼進云不會師乃云大衆立地自看畢竟是箇甚麼得恁麼難見難會也須是親向其中逼拶到無可逼拶處始有自肯分所謂萬古碧潭空界月再三撈摝始應知秪如我遮如意子若不是真的識得如何要提起即提起要放下即放下要截斷凡聖路頭即截斷凡聖路頭要殺即殺要活即活蓋繇我知得用得始不為他所欺也不然總是業識忙忙有何可據如人自己不知自己鼻孔向人曰我有鼻孔我無鼻孔我即有即無鼻孔我非即有非即無鼻孔此豈真知鼻孔也哉若果一朝親自摸得始信從前皆是自己妄想顛倒也故從上佛祖出世種種方便無非助人發機使人自求自己落處一朝親見始知佛祖無實法與人也如當時慈明偕諸同志於兵戈中混為廝養直造汾州參無德昭禪師昭知彼中有大法器更不為彼説法一味以世諦㛱媟之事以毒發其毒業密置於烈焰猛鎚之中直要煆盡他無始習氣命根然後始知臨濟之道迥出常流也所以大愚芝密激雲峰悅葉縣省煆煉浮山遠皆非常手眼近世學處不玄師宗不妙類以死語死法接人如按牛頭喫草令無傷人舉哀又安得有真性情之激烈哉今日參學之弊皆是參言語文字禪非參了生脫死禪皆是參知解機鋒禪非參見性明心禪所以秪圖説得頌得心意識卜度得更不求身心性命落處畢竟如何始了生脫死也雖然如是直須知有三種喫緊事始得一要痛惜光陰不可蹉誤一要依止師友恐墮迷途一要親自痛切始有生機所謂欲知佛法當觀時節因緣時節若至其理自彰然此時節因緣不是自肯自切雖遇佛祖現前安得有啄啐同時之機用哉是以佛祖出世百千方便亦不過為此肯切二字著力耳肯切二字即是你話頭即是你疑情即是你發機即是你入路即是你百千三昧法門即是出生死取心性之金剛王寶劍從始至終超凡越聖直是此肯切二字你若肯切三世佛祖也沒奈你何你若不肯切三世佛祖亦不奈你何何故聻把手教他行不得要人自肯乃方親豫有何言哉夜參衆請師堂中小參陳司寇公偕入禮拜坐次建幢問衆手淘金誰是得者師云直公牙齒疼進云寒暑煎逼學人向何處回避師云去著幢禮拜而退師曰昔富鄭公見投子顒禪師升座顒舉目作象王回顧勢富公特地有省及下座隨入方丈顒見公即勵聲曰相公已入室富弼還在門外公直得汗下師曰秪如陳司寇公昨日從刀兵中來為箇甚麼聻我道公已入堂汝等還在門外其中亦有出白汗者麼覺空問渠無國土何處逢渠師曰大光明中那容罔兩進云恁麼則請和尚歸方丈師曰要且不見我在司寇公問昔有何心隱講學時張江陵相公忽來耿天臺出接入何不起座揖手曰方外人不為禮張公曰你見在方內如何説方外適大師謂某在堂內諸人在堂外何也師哂曰公猶作堂外會那公曰元無內外師曰公只今在那裏公曰在遮裏向火師曰尚隔一案在公曰師只今是坐是立師展兩手示之復曰善財於妙高峰為甚麼不見德雲乃向別峰相見公無語師曰衆中還有道得者麼覺空出禮拜師曰鷂子過新羅也陳公又問撥盡寒爐如何愈撥愈不見一星子師曰火焰正滔天公無語師曰大衆切弗回頭轉腦燒卻眉毛也建幢云和尚向何處回避師呵呵大笑曰我即熱勝婆羅門也幢曰莫瞞人好師曰癡者自癡懞者自懞因有輕出問話者陳公云今蒙大師直指如金剛王劍著著斬人知見正為不肖輩因病下藥不與尋常接引人也如大師欲因機利導不妨説他人話我輩參學只須説自己話若也説他人話便失自己參學事也師曰古人欲直下發明自己事決不隨人語脈所轉若是信口領略與本分有甚相干復舉杜順大師懷州牛喫禾益州馬腹脹遍界覓醫人炙豬左膊上及傅大士空手把鉏頭步行騎水牛人從橋上過橋流水不流二頌及皓布褌將諸佛名號寫褲上有人效之立得惡報皓嘗謂杜傅二頌秪明得法身邊事尚未明法身向上事因示衆曰昨夜雨滂滂打倒葡萄棚知事叫行人拄底拄撑底撑撑撑拄拄到天明依舊可憐生若於此薦得始知有向上事師復曰向上事且置且道如何是法身邊事良久喝一喝便歸方丈丙子到峨峰小參師良久策起眉毛云見麼某甲曾親見峨峰和尚來莫道今日始到此中也秪如踏斷千峰轉身就父更將箇甚麼呈似諸法親聻乃舉如意云噫無影枝頭凝玉露滴滴能開五葉花壽昌小參師入堂坐定召云大衆是甚麼良久云莫被人瞞好復良久云還有一箇不受人瞞底麼復良久云動著即三十棒衆無語師乃起身縱步一匝而立項佩日出從東過西從西過東師云誰恁麼穿堂直過佩掩耳歸位師云苕帚柄聊與三十佩云和尚莫瞞人好師云隨人腳跟轉有甚麼來繇進云請和尚歸方丈師云遮裏沒有你開口處進云和尚也不可道破師云是你耳聾佩一喝師咄云你遮野干進云過在甚麼處師云罪不重科佩云恁麼則折角泥牛翻白浪衝開海底起紅煙師云還叫喚那乃云一堂風冷淡千古意分明秪為分明極翻成八不成且道如何得十成去顧視云也須仔細始得遂歸方丈堂中小參過去心已過去電光石火杳難追未來心又未來兔角龜毛挑不出現在心雖現在水月鏡花爭摸捉良以昏沉成國土散亂作衆生釋迦從無始劫刻畫晦昧之空彌勒盡末後際鉤鎖色雜之妄仔細簡點將來大是開眼作夢秪如今日壽昌又教人參究箇甚麼雖然如是肯心未許難清業惑之狂倒想不除誰享本來之妙且道作麼生參究得肯心自許去一語頓消千古恨自教天下免干戈良久復曰堂中連日亦有省發與有疑情者麼首座擬開口師大喝曰看劍便起座曰大衆有疑出來問師以如意驀頭便打曰頭落也不知小參一性融通一切性文殊莫出女子定一法遍舍一切法罔明彈指便超脫一身普現一切身瞿曇弄假卻成真一命永證一切命坐斷聖凡行正令性法身命曾無別日可冷兮月可熱不是死中得活人誰能解此問心結遮箇結甚奇絶饒是德山托鉢與巖頭雪峰遮般毒口蛇心畢竟三人證龜不成鱉小參僧問德山小參不答話和尚今夜還答話否師云把髺投衙進云昨夜不期山上雨滿溪流出落花香師云擔枷過狀趕出去進云行行不借雙關路鉤鎖從教直下拋師云罪不重科進云採葉弗將題姓字恐隨流水到人間遂禮拜師云一箇大禪堂兩邊列長床一箇聖僧一爐香日有日光夜有夜光三時粥飯叮噹響四時止靜響叮噹一任剔起眉毛豎著脊梁捏緊拳頭釘定腳樁你要行也不妨立也不妨坐也不妨臥也不妨只有一事汝等也須仔細承當且道承當箇甚麼良久云黃連樹上出生薑復顧衆云是事且置只如汝等久在此中畢竟于自己分上事作麼生僧答語狂亂師切齒痛責云汝等在此所為何事肯自欺瞞作此大妄誑語汝等正如新官上任一等無賴之徒偏去告哄狀考問將來何曾有一點真情若遇清正之官豈容汝如此姦偽是必處汝以重法也知麼況從上古人出世種種施設無非欲使人發明本分大事如有對頭人閉門在屋裏坐有人必欲與彼主人相見一回或用瓦子敲其門或用石用木用棒用喝或叫喚其名或好言誘引或惡口罵詈或投名刺或傳書柬或親抵其門或差官擒捉或圍屋搜拿種種施設不過要他屋裏主人相見一回便了何曾有實法哉是故古人或良久默默或揚眉瞬目或拈鎚豎拂或打鼓吹毛百般拈弄正打傍敲全機密用亦無非欲人發明自己主人本命元辰一回親見便了豈可執定一法為何如乎然古人師資相求皆是一段真實心不欺誑心不瞞昧心始得機教相投針炙中病不是妄呈妖異互相惑亂也汝不見世人欲聽響卜與祈神夢者乎亦必齋明盛服端肅身心或求功名或求子息或求貨財或求仕進必須明告其心謹白其事以我精氣合神人之精氣以我靈機動神人之靈機始得感應道交朕兆發見雖其言似吉似凶似好似惡當下不可測度及其機緣時至明彰較著毫髮不爽乃知神人不我欺也又有一等欺心罔聖之徒不畏鬼神恣行姦偽每欲托夢於神人而神人安肯授汝之正夢哉即使神人授以屎尿令彼食啖而彼心亦自知其為惡或有問之乃佯為大喜曰昨夜夢神君延我明堂揖我上座奉我以如意之珠贈我以彩毫之筆歡喜褎讚而慰諭我將來有大顯貴有大受用此必他日有靈驗乎世間癡人聞其神人待彼如此是必大顯貴也乃為捧擁奉承無所不至矣嗚呼如此等人豈非天地間之大妖孽大姦險天地鬼神之必誅戮者哉彼自以為得計又安知惡不積不足以滅身乎噫慎之慎之生死海中不能奮然自出者正以自欺自昧自沉自沒不受人之提拔也誰奈之何誰奈之何為福山大衆授記早參師升座為大衆命名畢黃司理問云真佛無名為甚麼安名立字師云聖聖相傳緣生無性進云天上無彌勒地下無彌勒且道誰與安名師舉手云謝居士好箇問頭進云靈山一會儼然未散師合掌云我不敢輕於汝等汝等皆已作佛公便禮拜師下座塔樓峰小參師云會麼雨打虛空溼自愁無曬朗急敲石火烘汗滴龜毛上遮一滴西天東土真消息匡山圓通夜參藏舟於壑藏山於澤夜半有力者負之而趨其昧昧者渾不知也又安知藏天下於天下旦能握其機乎其機是甚麼人能握良久云崑崙騎象藕絲御就裏抽牽意自殊除夕小參師卓拄杖云百丈大師云今朝臘月三十日到來大衆作麼生折合去僧問年盡月盡日盡時盡恰好一句請師速道師云爆天驚碎五須彌進云馬耳峰高雲不斷一溪流水古今然師云劃斷千峰更許誰進云等間識得東風面萬紫千紅總是春師云太早生師復云同門出入夙世冤家末後牢關如何透脫透與不透今日總要向圓通手裏乞命衆無對師云會麼抽刀不入鞘萬里髑髏寒卓拄杖入方丈癸未主靈谷堂中小參師入堂衆禮拜立定師良久云正當與麼時何如復云剔起眉毛復云立定腳跟復云是甚麼復云動著三十棒復云還有入得虎穴者麼還有下得龍潭者麼還有登得刀山者麼還有上得劍樹者麼復云動著喪身失命復云是甚麼得恁麼利害聻直須向遮裏透過始得消此業識始得了此生死復云萬古碧潭空界月再三撈摝始應知有僧欲出問師曰若要我説破須啞卻我口若要你領會須壞卻你心畢竟作麼生不許夜行剛把火大家吹滅暗中行良久復云到遮裏雖則忍氣吞聲必須得箇出身活路始得不然自欺自陷又爭怪得山僧大衆須猛力斬截你自心上底偷心活路與向外馳求底心則單刀直入不顧危亡殺出生死重圍始保你有箇出身活路始保你有箇完全性命猛之猛之毋自失誤除夕小參末後一句始透牢關今當臘月三十夜汝等諸人作麼生折合去良久云若在遮裏透去始有轉身吐氣分不然如世間人到今夜業債纏身安能自繇自在而結此局汝等既于此參究果於本分上透得生死聖凡善惡苦樂底心境麼若透不得則妄想顛倒將法身流轉五道無有已時何日折合得去直饒如靜夜鐘聲寒潭月影猶是生死岸頭事直饒你因果歷然不落不昧亦未脫得野狐身直饒一絲不挂徹底無依如萬里無雲青天也須喫棒直饒四至分明中心樹子不得為我動著正是垛生招箭未免爭端直饒破衲蒙頭萬事休此時一切都不會遮瞌睡漢正好爛熟打醒推出門去秪如到恁麼田地在我遮裏尚折合不得況生死業識未空聖凡情境未透又如何免得閻家老子考較哉秪如在山僧今夜又如何處分此參禪事如軍國之事必須考其虛實或有血戰汗馬之勞或有復土開疆之績然後享士椎牛論功行賞今到遮裏總無甚功績可見何有北禪之牛可烹何有曹山之酒可飲何有禾山之鼓可打何有德嶠之歌可唱以冒昧法喜哉雖然如是不可一例抹殺我靈谷今日結制已至半期肯自施功於無用之地乎若欲珍重其事且放過諸人一著秪如山僧自己為人處又作麼生折合去聻路逢死蛇莫打殺無底籃子盛將歸甲申徑山堂中小參師顧云還有上天無路入地無門無棲泊無奈何者麼此正是汝等放身捨命去處僧出禮拜師便打僧云六橋俱斷時如何師打云還斷不斷僧又進語師又打云你又捏怪作麼連打退復云若要急切打發直須拼卻性命始得山僧今日見磬山録中有示衆舉雪峰問僧甚麼處來僧云浙中峰云船來陸來僧云二途俱不涉徑山看到遮裏謂雪峰行棒已遲也峰云爭得到遮裏僧云有甚麼隔礙峰打趁出去僧過十年後再來徑山道遮僧又來是甚麼心行峰又問甚處來僧云湖南峰云湖南與遮裏相去多少僧云不隔徑山道遮裏虧了雪峰又放過他峰豎起拂子云還隔遮箇麼僧云若隔即不到也峰又打趁出徑山道天下參學人往往向遮裏打失眼睛此僧往後凡見人便罵雪峰徑山到遮裏卻疑著遮僧得恁麼痛入骨髓那一日有同行者聞之特去訪乃問兄到雪峰有何言句便如是罵徑山道遮僧果的親見雪峰來遮裏便好與雪峰報冤以一頓痛棒將同行打出豈不勝於痛罵哉他遂舉前話乃被同行詬叱與他説破徑山云卻反被人坑陷遮僧乃自悲泣嘗向中夜焚香向雪峰遙禮徑山道遮裏更是坑殺人磬山云雪峰老漢行其正令遮一條白棒不添德山之風可惜當時不遇其人重重蹉過遮僧既不憚勞苦撥草瞻風何其鹵莽以至如斯及遇同參通箇消息悔之晚矣雖然此猶是君子禪也若是今時不服善者寧招謗法之愆永無悲泣之事可見今人不如古人多矣大凡參學須自具眼目莫當面蹉過以貽後日之悔今日有新到者麼衆無語乃復頌云憧憧往返隔千山覿面相承與話難不得知音痛呵叱到頭終是一顢頇師云大衆汝等還見磬山和尚今日特地痛相錐拶麼所謂大事未明如喪考妣同門出入夙世冤家汝等真箇為己躬事肯如此僧頭頭痛切乎真箇為生死心切必須不顧性命始有透脫一路徑山亦有一頌好生聽取父母之仇不共天提刀必報此深冤忽然撞著真頭對性命元來不值錢衆中還有性命不值錢者麼出來為雪峰與遮僧雪屈衆無語師擲下拄杖良久一僧拈起遞與師師接過便打僧云和尚打某甲作麼師又打云你是那箇衆俱禮拜師云放過即不可一齊打赦而出堂中小參參學須先有箇痛切心傷感心如雪恥報仇底人始能斬截生死頓明心性不見德山號周金剛為蜀中義虎聞南方有直指人心成佛之説乃謂魔鬼子敢自妄言吾當往摟其巢穴滅其種類以報佛恩遮箇便是能與佛祖為生死冤家者也及遇婆子買點心被他問金剛經以三心不可得上座要點那箇心直下便打折了金剛擔子矣若是如今弄虛頭禪客便好劈面一掌或推倒點心架子去何肯輕放過他此古人不親見得決不肯自欺也乃到龍潭正以不見自己落處問云久嚮龍潭及乎到來潭既不見龍又不現龍潭不合為他下注腳曰子親到龍潭若是今人便拍盲領會曰不見處便是我親見也即死在他語下瞎弄將去又安肯必須親自見得乎於是乃親依龍潭一夜因接紙燭驀被潭吹滅乃大悟曰從今不被天下老和尚瞞也以故龍潭大稱之曰可中有箇漢牙如利劍口似血盆於孤峰頂上呵佛罵祖去在使德山當時無摟人巢穴滅人種類之痛心到此焉能為婆子摟其巢穴又為龍潭滅其種類而立地如獅子之出窟寶劍之揮空乎此皆其痛心傷心不欺心之所致也又豈別有參禪之法乎又如臨濟亦無別參禪法只是一箇不肯自欺當三遭痛棒不得㘞地痛快終不肯妄意領略必須於大愚言下頓悟老婆心切然後得大痛快始能於黃檗面上捋虎鬚也是彼何曾因參玄要賓主人境照用而後始頓悟哉他大徹後得座披衣自解作活而生擒活捉天下英雄全是遮些子鋒芒彼又何曾以死語死法繫綴於人乎今人皮下無血無為生死心不去本分上一口咬斷卻如狂狗逐塊咬他語言文字道理機鋒以為參禪真箇掩彩殺人如何得到德山臨濟底大用不見古人頌他一拳拳倒黃鶴樓一踢踢翻鸚鵡洲有意氣時增意氣不風流處亦風流蓋從上諸祖只是與人助得發機如放大銃炮相似你腹中無許多猛烈火藥我雖有火引如何點發其驚天動地之勢你果有古人如此痛憤傷感自能觸發得大徹大悟也只此一箇痛憤感傷便是撥亂反正定國安邦之真作略也乃喝一喝而起振宗傑禪人為父鄭仲翁五旬請小參頂天履地須知身自何來立意成人應識本之所在識本於一念未生之前則生死聖凡全機超越知身於父母正生之際則世間出世當體圓明所謂識心達本源是則為沙門豈尋嘗之所能哉今日是大傑禪人生父鄭仲翁知命之辰自念少入空宗未酬罔極特求徑山為父母授記命名大高大厚蓋欲報其雙親如覆載也秪如傑禪人在浙其父親在蜀不啻數千里之隔況此身心本不相代如何能使其父增此慧命若于此有箇透露乃知天地與我同根萬物與我一體豈有骨肉天性不可以當體感通雖然更須知吾宗別有不傳之旨昔僧問曹山子歸就父如何父全不顧山云理合如是僧云何成父子之恩山云始成父子之恩僧云如何是父子之恩山云刀斧砍不開諸仁者你看他古人敲唱同時著著皆是親悟親證若非全機超越安見得有斧斫不開之妙密乎乃説偈曰祖父從來不出門兒孫得力始為尊了知斧斫不開處厚地高天共報恩丁亥報恩結制堂中小參良久云正當恁麼時何如杖人性命在汝諸人手裏汝諸人性命在杖人手裏我要與你生作麼得同我生我要與你死作麼得同我死直饒能同我生同我死我要與你打箇開交你又作麼得同我打箇開交擊竹篦子云點即不到復擊竹篦云到即不點度刃衝流雷揮電卷到遮裏也須是拼得性命底絶後重蘇始許他通此消息復舉僧問趙州狗子有佛性也無州云無忽然絶後蘇來又作麼生復云險僧問趙州狗子有佛性也無州云有忽然絶後蘇來又作麼生復云險僧問趙州如何是西來大意州云庭前柏樹子忽然絶後蘇來又作麼生復云險僧問趙州萬法歸一一歸何處州云我在青州作領布衫重七斤忽然絶後蘇來又作麼生復云險忽有箇漢聞我恁麼舉不惜性命向前掀倒杖人禪床又作麼生乃拈竹篦拍地復打云放過即不可復云險拋下竹篦歸方丈遁菴隨入方丈禮拜師擒住云狗子有佛性也無速道遁云道甚麼有無師云你猶作道理在速道遁云道不得師云為甚道不得遁云道不得師云你為甚又道得遁云領師便打云領箇甚麼遁擬對師又打云我要你向遮裏絶後蘇來許你親見趙州遁禮拜師又打云直須向遮裏跳出始得師復顧出之旻昭蓲伯幼仁諸公云趙州一任道有道無杖人不許你等道有道無別道一句來看不然汝等也須防我杖人毒手始得衆禮退遁菴即笑峰楊龍友監軍太夫人作五十三參會設供請小參時天正亢忽得雨師云一句全提超今越古六種震動吟龍嘯虎忽爾南山起雲北山下雨且喜點點滴滴不落別處與法流相接而黧奴白牯卻似知有耕翻故園田地使一切種智得生實性淨土盧舍那如來與十方諸佛不動寂場坐普光明殿卻不知有文殊普賢及十方塵剎大菩薩各各獅子哮吼象王起舞誰知遮箇蓮華藏世界根源皆生於香水海中全是遮一法雨之所傅哉善財童子承佛威神而稱讚曰奇哉世尊自我一念圓明遊歷三千大千世界乃至南詢一百餘城遍參五十三大善知識教我觀察若聖若凡若僧若俗若男若女是皆稱性平等法門自本自枝自花自果乃至法身慧命功德相好眷屬劫數國界莊嚴壽量差等皆是一點圓明無今無古且問在會諸公曾會否樓閣重重是誰吞吐丁亥主天界慈秀法侶偕趙梧岡徐祥宇衆居士請小參坐久卻成勞出門又是草風吹瓊樹枝紅日碎杲杲昔夾山與定山同行言話次定山曰生死中無佛即無生死夾山曰生死中有佛即不迷生死互相不肯同上大梅山見常公夾山便舉問未審二人見處那箇較親梅曰一親一疏夾山復問那箇親梅曰且去明日來夾山明日再上問梅曰親者不問問者不親