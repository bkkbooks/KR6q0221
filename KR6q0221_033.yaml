body:
  text: 古吳弟子楊廷樞古宣弟子湯斯祜評較雜紀學庸宗旨大學總綱只在明明德一句其親民止善二句只是完其明明德之功用也其原始要終之血脈工夫全在致知格物四字此四字只當在本文上看教貫徹不必別尋枝指也果能貫徹此四字則明明德於天下能事畢矣豈更有內聖外王之道學哉何則自古帝王若無格致之功則與人同在昧昧安能明明德於天下所謂天生蒸民有物有則民之秉彝好是懿德雖則人皆性具明德莫不有知惟是聖人學道始有致知之功知即明德之明也致知即明明德也即顧諟天命克明峻德皆自明也如無聖人之學推而致之誰能知吾明德中之意當誠心當正身當修家當齊國當治天下當平哉人皆性具天則莫不因物而用之惟是聖人學道始有格物之功物即明德中至善之則而隨處皆見也格物者格通其故而止於至善之天則也即敬止帥仁潔矩之道也如無聖人之學止而格之誰能使吾明德中之意必誠心必正身必修家必齊國必治天下必平哉所以不曰致知必先格物而曰致知在格物者須推明德中至善之天則才是良知以顯良能也又不曰知至而后物格而曰物格而后知至者正以平心窮理神而明之不為物蔽亦不廢物故能止明德中至善之天則才是良能以顯良知之至也所以大學之道是知能不二之全德也在明明德是先致其知也在親民是致知在格物也在止於至善是物格而后知至也知止是知至而意誠也止而定是心正也定而靜是身修也靜而安是家齊也安而慮是國治也慮而得是天下平也如此致知才是使無訟才是毋自欺才是自慊才是慎獨才是必誠其意而德潤心廣也如此格物才是大畏民志才是如惡惡臭如好好色才是好而知惡惡而知美才是藏身以恕而能喻諸人才是同民好惡為天下潔矩也自天子以至於庶人一是皆以致知格物為修身之本也所以致知即明德格物即親民格致合一即止於至善康誥章首舉聖帝明王皆不外此明德三代之君皆能自明其德與民相親故親之而已傳中以桀紂失其為君之德不能親民且陷民於濁亂故湯武出而新之蓋新民即新君也新命即自新也是故君子親以處常新以處變而無所不用其明德至善之極也邦畿丘隅章正引之以明知所當止如文王乃真知止者也緝熙即明明德也敬止即止至善也為人君臣父子與國人交皆得所止即親民也此非三在之宗旨乎其次如武公道學自修即明明德也恂栗威儀即止至善也道盛德至善與賢親樂利即親民之不能忘也於此亦可曲盡其微旨矣至於聽訟乃格致之功也迷亂之情莫過於訟內則意之善惡不分外則民之爭搆莫決皆是訟也能通天下之情以定天下之志非知之至物之格何能必也使無訟乎故誠意章以毋自欺為致知點眼以惡臭好色為格物定衡夫自慊莫慊於毋欺意誠莫誠於慎獨慊則惟自欺亦惟自然小人掩著一念明知有善可好不善可惡并亦無能自欺正良知良能不容泯滅處豈待十目十指其加嚴乎此德潤心廣必誠其意是皆格致之力也夫格致誠意之功也誠意正心之用也正心修齊治平之體也此三者同德異事雖分不分蓋意者心之所發發非格致而不誠心者意之所主主非意誠而不正心主正則發與未發皆得乎中而不偏於有無故有所則偏於有矣不在則偏於無矣身心各偏何從得正內外無偏則心自中正矣此孔門傳授心法之祕旨也自天子以至於庶人若不深明此體用功以何為修身之本哉蓋一身之好惡關家國天下一有不修而辟焉則家不可齊矣安能不出家以孝弟慈而成教於國以及天下乎正以心誠則好惡胥正而民聿從堯舜之治治以此也心不誠則所令反其所好而民不從桀紂之暴暴以此也夫齊家治國平天下只在能推一人之好惡以及上下前後左右即是潔矩之道即是民之父母故君子先慎乎德慎德者慎格致也格致慎則好惡明好惡明則人土財用皆不悖於常道得衆得國足以保我子孫黎民矣又何有命過拂人之性與小人不以義為利使災害並至以亂天下之治哉誠意章以好惡別君子小人之慊欺即平天下亦只以好惡定君子小人之義利此吾所謂格致為原始要終之血脈工夫正於此可以見大道之學之全功在能知止於至善以明明德於天下也湯斯祜曰以明明德為顱格致為目好惡為骨即三綱八目不煩注疏一經九傳一齊挈出一部中庸之大宗旨全在性道教三句性之一字乃天然本有不屬修成特標之為宗本也道教二字乃屬率修而率修之功全在慎獨致中和五字蓋性非率而天命不中道非修而性命不和中和之道非慎獨不致提起慎獨則率修之功在其中矣子思作中庸之意正見得天地人物不中和則不能成位育以使各正性命致中和之道非慎獨之功不能慎獨之旨非修道之教不知修道之旨非率性之宗於天命則無本是故率修之宗旨全在不睹不聞處以慎其獨而不徇喜怒哀樂之情以致中和則天地人物皆得位育而各率性命之正也故其第二章首節即提仲尼曰君子中庸小人反中庸中庸即率性而中和也反中庸即不率性而不中和也君子時中即能慎獨率性而無太過不及之道也小人無忌憚即不能戒懼慎獨各自徇情成太過不及而反中和之道也故孔子曰中庸其至乎民鮮能久矣此數等人皆各有君臣父子之倫皆各有智仁勇之德日用倫常何曾須臾離此道但彼未聞修道之教未有慎獨之功故習焉而不察耳欲斯道之明與斯道之行必須如舜之問察用中回之能擇中和服膺勿失方謂之飲食其中悠然知味耳一有豫智之心正自陷於意見而不能擇守安能如舜之大智若愚回之大仁若訥而虛下拳拳乎此所謂中庸之智仁勇終不可能也若子路之問強尚於南北有不相及敢望君子和不流中不倚之強乎素隱行怪之太過偏執隱也半途而廢之不及偏執費也唯聖者夫焉有所倚而能依率性之中庸此夫子不自居看前之吾弗為吾弗已則知此實夫子始能之也故夫子又提出費而隱以顯天地聖人同一中和位育之道本乎最微而夫婦之愚不肖可以與知與能此正聖人如天地之能與鳶飛魚躍各遂其天命之機人能上下察之豈不與聖人天地同其大哉故君子之道必造端於夫婦之能知能行始能察到聖人至誠神化與天地之化育同功真費而隱也夫如是則天地本無知能所可知能者時行物生鳶飛魚躍各遂其趣即天地之大德即生生不易之機即至誠無息之化也人能如此察到聖人與天地相同處則聖人亦無知能所可知能者與夫婦同知夫婦同能使彼各遂其倫常日用正是求己治己以人治人之道初不曾以君父兄朋求全責備於子臣弟友也此夫子之求未能正如天地之有所不知有所不能始能與人物同其化育而相忘於至誠之大道也蓋此費隱之道原不遠人惟戒懼慎獨反求諸己者之言行相顧素位自安則自不願外自無怨尤無入而不自得焉此雖於費行隱而實於隱行費也夫隱之費微之顯即造高遠自卑邇格父母自妻子也豈非鬼神之德誠之不可掩者乎不見不聞孰為體之上下與左右之如在孰為使之此處是真隱微真見顯可見鬼神即獨獨止一誠誠不可掩即是致中和而成位育其惟舜之大孝大德乃能感天地徵鬼神而受天佑命也蓋舜能以至誠慎獨求己盡孝不求於父母兄弟所謂行隱於察以至察乎天地鬼神而德位與天地化育參同神化又豈復有遺憾乎其次則莫如文王也文王亦以至誠慎獨而求諸己不求君臣父子而自能純德如天使武王纘緒而有天下使周公繼述成文武之德其達孝之道全在有志可繼有事可述所以制禮作樂事帝祀先孝無不至是非文武周公之慎獨而致中和成位育乎然此舜文之道皆是誠者自誠明謂之性乃天之道也所以不勉而中不思而得從容中道因性而垂教於天下者也此下哀公問政孔子以文武之政具在人舉正是誠之者人之道也使其擇善固執因教率性而正天命也故先告以取人以身之道須知人知天以三達德行五達道而列生知學困安行利勉為修身治人之本其為天下國家提九經為要領其行九經之本又在一修身故又告之以誠身明善必學問思辨篤行而後能致此中和之道也故惟至誠而後始能盡己盡人盡物與天地參然則必須次第推而致之始能曲盡其誠也所謂曲能有誠以誠則著是能盡其性也著則明是能盡人之性也明則動是能盡物之性也動則變是可以贊天地之化育也變則化是可以與天地參也故唯天下至誠為能化如此又何國家之興亡禍福有不先知如神乎所以誠非自成自道乃成物之終始為可貴也使其不誠則天地人物之幾亦息矣何有博厚高明悠久之可徵哉如此則為物不二之獨生物不測之中豈不可以一言至誠盡天地人物之無窮廣厚乎蓋天地人物統於一誠而合於聖人之至誠於穆不己所以為天之至誠不顯之德之純亦於穆不已所以為文之至誠大哉之道至育物峻天必須待至德之人始凝至道豈可苟哉故君子尊德性而道問學知性命也致廣大而盡精微知天人也極高明而道中庸知修道也溫故而知新知慎獨也敦厚以崇禮知致中和也知此則不驕不倍既明且哲何身之不可保哉然愚賤不知聖人修道慎獨之教故無忌憚而自用自專又不知聖人率性中和之道故儹越妄作而災及其身可不慎乎是故非德位時之三重安敢議禮度文與斯民同寡過乎此唯明善誠身之君子參天俟聖為世所信從始能永譽於天下也繇是推之自生民以來獨有仲尼乃為道教之主天人之師故能祖述堯舜為中道之正始憲章文武為和道之正終小德川流大德敦化此仲尼與天地之所以為大也夫至聖之至誠有不聞之聰不睹之明不顯見之睿智焉於獨中而正己於有臨而正天下故能溥博淵泉而洋溢尊親此亦唯仲尼之至誠足與天地同其神化也亦唯天下至誠慎獨為能經綸大經立大本知大化故曰配天至誠至於配天又焉有所倚乎所謂達天者正於慎獨之中暗然而日章非的然而有疚也故於暗室屋漏自能不動而敬不言而信非不顯之德中和之至安能使百辟其刑篤恭而天下平哉統而收之不外於慎獨致中和返於吾之至誠而神化於不睹不聞無聲無臭以達上天之載天命之性為萬化之統宗也可見天即是性性即是誠誠即是獨慎獨者人盡而天不能外故自天而之人誠之者則自人而之天凡人不知藉聖人始知故言教聖人之道不遠於人故言道道之大原出於天故言天豈非聖人立教知天知人天人合一之原本哉湯斯祜曰發明天人合一頓漸二門俱可不立戴記四十九篇先儒程朱獨表章大學中庸二篇為之章句遂與論孟列為四書於是聖門相傳授受之心法其旨具備宋儒之功所以大於漢儒也二書同異亦有可得而言大學言德中庸言性大學言格物中庸言致中和大學言知中庸言能大學言止中庸言行大學言治其言近而顯極巨而無外中庸言道其言遠而微極細而無間此其異也大學言慎獨中庸亦言慎獨大學言至善中庸亦言明善大學言誠意中庸亦言誠身大學言本中庸亦言大本大學言仁中庸兼言仁知勇大學言恕中庸兼言忠恕大學言齊家治國平天下中庸亦言夫婦子臣弟友九經三重以及篤恭而天下平此其同也大學言大雖身心意知之事不為小中庸言庸雖鬼神百世之事不為奇大學始人而終天故明德新民以至於新命中庸始天而終人故天命率性以至於立教此其同而異異而同也雖然舉世童而習之白首而不窺其閫奧矧夫三教既分末流逾遠詘佛而伸儒與夫抑儒而崇佛者其徒若東西易轂燕越背塗交馳而不知所極孰與論宗旨之同異哉徑山覺大師植根香國授莂靈山三乘夙圓十地齊攝雷音轟於震旦法雨並於曹溪拈花擊竹無非微妙之宗豎拂擎拳盡是神明之教顧心通萬法智會一原不以佛道之幽玄而笑儒門之淡泊謂此學庸二書非獨治世之準繩而亦出世之心印也為儒不可不知為僧亦不可不知特自拈為宗旨以示後學其上座屬余為序余不辭固陋竊效丹鉛輒辨數言於首大師尚有論易論學及講學道治諸篇其言皆中正易簡始終條貫揭明天人性命之宗而無玄虛似是之説昔張無垢為論語作頌乃儒而禪也今大師宗旨直起孔顏於旦暮覿曾思於同堂能發程朱諸大儒所未發佛學之有功聖學詎不於此見哉丙戌居廬復菴弟子楊廷樞題於真如塢中圜中衍義儒宗三寶圖渾沌未分時獨賴此盤古老子出大手眼而開闢之於是兩儀既判三皇之才始立五帝之行始全化育之道始足至此天運如日方中其有生必有剋人物始得反情復性故禹以平水土而成天地之功湯武以用征誅而應天人之變至周末有孔子始終一貫以收拾造化之權而天地人物之道至此大備無復加矣夫古人之所以為聖神者直在自為之而已矣今人之性靈中莫不有一盤古統此十二聖心周旋于時中苟能覺察之則於生動時不為狂陽發散其精氣且能慎獨以致中和至死靜時不為幽鬼沉迷其誠明且能率性以歸天命夫如是又何古今之同異哉因倣出世法特揭出聖教師作三寶為天下萬世之當皈依者為圖以配四衍義誠儒宗始終之標旨也有具手眼君子當必有自寶者在戊子師在太平圜中拈心經金剛後又著河圖洛書先後天八卦衍義而先作三寶圖歸于一圓圖大哉旨乎正欲人即行布是圓融而與民同患乃其所以為至密也小子入候録此以歸學人大中陳丹衷識教寶聖寶師寶自開闢來神聖繼天立極參贊位育者始終不過盤古統十二人如一日有十二時一年有十二月推之萬古常不忒也特立此圖懸象昭示則吾與萬世聖神儼然同堂未散可不自觀自察而奮勵之哉今人所以不能為神聖者以心幾不能精一師法不能時中知行不能大成所以人心愈殘治道愈亂世情愈迷終難反古也神聖能善用易道而自治治人以知陰陽偏勝而成迷亂乃使剛柔相濟水火交資故性情中和而天地化育也使人能一心皈依此聖教師于十二時中不至偏勝則人心可純道術可正長夜可以復旦矣孟子云養心莫善于寡欲正以世人多欲而自雜亂故不能帥一其志氣以充塞乎天地所以古之欲明明德於天下者必先專其格致而寡其所欲始能充此大欲以從心而不踰矩也噫此九一之宗庸詎非萬古寡君寡師之所以寡欲寡過于天下之道也哉人者天地之心人不立極而用時宜則立天之道立地之道又是誰耶易曰天下之理得而成位乎中溥博淵泉而時出之時中之幾深哉神哉十二時藏閏為十三則數度之幾也門人大然識河圖河圖衍義河圖洛書各具先天後天體用互相參兩錯綜而成太極之性德即人心中皆具太極陰陽五行互相生成秩序變化本性天然如是也如為君為師者必須于未發之前省察一念才動皆當互具五德而不偏陷則能致中和而參贊位育使天下古今皆得成此性命之正矣河圖天包地也一六三八二七四九運于四方五與十居中以圓涵方天道下降陽生于下始北次東故一與三生數居之自內而外歷南終西故七與九成數居之地道上升陰生于上始南次西故二與四生數居之自內而外歷北終東故六與八成數居之一六水表智之淵二七火表禮之明三八木表仁之生四九金表義之成五十土表信之蘊此概也一行各具五行一德各具五德隨舉可見而言不頓彰故不得不配以表之乾止言四德而藏中旋邊元亨利貞以信土而居智水之位下襲即以上律而乾知大始之智以統之故曰乾元亨利貞孔子以春夏秋冬表之而坤以西南東北盤之實則縱橫上下無中無邊而宇中有宙宙中有宇合觀而總別一際矣聰明睿智至誠有臨非天藏中土人受中生一點靈明本不可欺為信知大始之乾乎文理密察智能折攝蓋致廣大必盡精微蒙泉習坎潛用之幾貴過冬關而十二時皆子時也齋莊中正禮以相見合內外而適品節克復之後交泰文明矣寬裕溫柔春和長養帝出震而轉巽風金木相刑以克制為成器而學問冥升全樹全仁享其花實矣發強剛毅義能裁成執精一而措時宜金剛純粹即博即約麗澤收成大矣哉大抵卯酉日月之門仁包義決所以藏智用于北而顯復禮于南也子午南北之樞智崇而潛于下學禮卑而峻極光明所以主春秋之中和而享其生成也天藏土中人受其蘊中以旁通坤艮補二氣之有餘不足而燥潤交濟號曰環中苟舍四時寧有歲乎此河洛以中五約示而統類皆備惜人習不察耳就天地生成之數而衍之一多費隱先後妙協顯仁藏用代明錯行中邊回互歷然寂然先聖表出使人觀玩引觸原始反終而慎危微精一之幾也德性本具但不能終日乾乾以自尊之修辭立誠而問學知味耳去聖時遙賴此神象微言或有觀感而興起也夫洛書洛書衍義洛書以九為宗以中為體以一為元一是陽之始智水初生為始覺乃潛龍之來復三是陽之少仁木方長為自覺乃見龍之帝出七是陽之壯義金正堅為覺他乃惕躍之乘時九是陽之終禮火還原為滿覺乃亢龍之用九上位乃後天離先天乾聖人居之則尊高無輔小人居之則過亢傲驕是以動而有悔惟能用九使天道下濟則位育光明矣故五為陽之中信土大成為正覺乃飛龍之出治蓋陰為陽所統陽能始終用九以見天則陰必能始終用六順承天行故陰以從九君而喪其陰朋為陽之用臣以終于東北之有慶二是陰之始而側居西南以九陽終于午中而陰承午中生之為姤而側居傍隅在河圖雖居正午而在上九之下為臣奉君之象故乘得陽火之餘如月之無光以承日之陽為光故地二屬火于洛書側居西南為先天巽後天坤皆得臣子遜順之義以非禮勿視輔禮而履霜四是陰之少側居東南為先天兌後天巽以非禮勿言輔仁而括囊八是陰之壯側居東北為先天震後天艮以非禮勿動輔信而含章六是陰之中側居西北為先天艮後天乾以非禮勿聽輔智而直方十是陰之終伏而不見在河圖則具十而輔五居中在洛書用九而攝之故十陰有美而推之于君不敢自居為德蓋臣子為股肱之任惟暢于四支而成事業故孔子以大哉乾元之君稱唐堯虞舜能則天以至哉坤元之德稱泰伯文王能忠孝而天尊地卑八卦成列於人倫之道各有定位矣吾以尊火為宗蓋火乃乾陽上載之九無極之元是天之明命為先天資始之主潛于太極為九五之黃中以能通理而資生萬物故後天之陰陽五行皆從此為時出故中庸以至誠為經綸天下之大經立天下之大本知天地之化育所謂肫肫其仁者指此中體為潛龍勿用之地是未發之中也淵淵其淵者是此陽龍之進德修業欲乘時而上升也浩浩其天者是此龍飛于九五與天地合其德位而化育萬物正為君以治天下為師以教天下之時也學聖人者必以上天之九為宗太極之中為體以坎中一陽為元則致知慎獨不昧天地之心矣故古之欲明明德于天下必先自致其知能知此天一之智水所自出則能生仁木生禮火生信土生義金以至全五性之德今人不能逆知未發之中安知危微精一之本于慎獨哉能知獨中有此神明之火為吾上載無聲無臭之天心則知天道必須下降為二五之衷然後溥博淵泉而時出之則可為民秉彝之有物有則也人既不知未發又烏知方發之仁義禮智為喜怒哀樂而發皆能中節哉十化為一用九于中圖四破而書加八邊常顯而中常隱河洛本不二也吾先就人指之九為天命本覺之性中為率性之德一為慎獨之幾雖然如是須時時觀象玩辭返躬省習以至得意忘言神純功化千聖不傳之密天地造化之權皆備于我九一之宗旨矣準伏羲先天八卦會孔聖配大學宗旨準文王後天八卦會乾象配中庸宗旨先天明體而用卦爻自內而生後天明用而體卦爻自外而生此太極兩儀四象八卦及六十四爻爻皆具太極體用在人之性命心身與物形世界無論太小正偏亦莫不全具太極體用以人不自知故念念昧此體用惟聖人於念念爻爻知慎此獨故能率修而參天地於念念爻爻精一此中故能致格而享天命也有畫以後皆後天也先何在乎神明者即此後天而先天不違也綱宗既明其本自立時行擊節善用者誰世以羲文分先天後天八卦久矣故因而衍之是甚麼聖人未作易此易理具在天地造物人生性情之中既作易則天地造物人生性情具在易理之內既已具在彼中何更作此易乎善哉正欲人知作易之故也天地造物是氣化所成雖歷古今之變而不忒人生則有性情私欲或變為狂為迷為僭為逆有至滅身滅頂敗國者聖人憂之故法天地造化之無私準陰陽變易之不忒設象繫辭使人觀玩以返情而化私率性以合道而還天命之真常是則聖人之功高天地以能設教也易者古今設教之祖也易不設太極而首設乾坤者太極乃天命真常之體本無為也人生之私欲以情也乾坤能率情于性則太極本自天然于其中矣是故設乾坤以明天地人物因性情之動靜為變易性元不變而情變情有動靜有善惡有吉凶有逆順以故繼善官天而設教祗是收攝調治其情欲使千變萬化不失其性之本常而已以故乾坤為八八始終綱領乾坤綱領惟在用九用六之一用字能用此一用字則千聖設教之本率性之功皆在是矣百姓小人又何知有此用哉如乾初九不能用九則潛龍既為妄所用不能慎獨于未發則不能于九二出見有利見之文明也二不能用九則于三不能乾乾行事以至于躍也四不能用九以進退修德則不能于九五飛天而出治也五不能用九則不能于亢而無悔也上亢能用九則不以尊貴自傲禮絶百僚而為頂墮又能以乾道下濟為復泰姤坤以承順天行也坤初六不能用六則不免于履霜為堅冰如臣子不能以微漸自戒而弒逆滅身矣惟初六能用則于二為直方于三為含章于四為括囊于五為元吉于六則無嫌疑也龍戰之象天道人事皆有勢極之候惟藏用九于用六者能知而調御之故曰六十四卦卦卦是一大公案爻爻是一小公案能用于未發而神純者乃大聖大賢為元亨利亨也用于方發而中節者乃賢人君子之吉利貞無咎也用于已發而遷改者乃善人平人可悔吝之災不害也不能用者則無忌憚行險小人小則為悔為吝大則為凶災為敗亡也蓋有百姓之慎修焉有宰輔之慎修焉有善人君子之慎修焉有大聖大賢為君為師之慎修焉有一世君師之慎修焉有為天下萬世君師之慎修焉此作易之諸大聖蓋與天地古今而無息者也其道甚大百物不廢懼以終始其要無咎此中條理歷然寂然誰是靜正而神明其故者乎靈山公衍李盤問曰伏羲止畫方圓圖不説太極何也師曰大易不説太極首説乾坤者太極不離陰陽離陰陽無太極也舉陽則陰在陽中舉陰則陽在陰中惟乾坤無變易純一統天其餘六子則破體不純而有變易然亦不離乎陰陽太極欲深明此宗旨須先明太極為第一層陰陽為第二層有悟一不成二不是者乎不必語矣此話且住今就第二層中當約二儀四象八卦為內三層十六卦三十二卦六十四卦為外三層是謂六虛實無內外過此已往則重重涉入巧曆所不能計也雖然饒有千層萬層祗是兼三才而交其三其兩秪是第一層中沖深含攝之寂感也寂感之妙即出于如來藏心能妙悟之何分儒釋郝子荊曰如我輩圍老人坐豈非各各占一卦耶師曰人人物物各具大易全體不特一身具一太極即一毛孔亦具一太極汝才發一兆便落一卦動一爻矣汝一念未兆即伏羲神禹文王周孔亦無處窺測得汝亦無處彖象得汝亦無一毫端可名太極者況彼孫臏鬼谷空搖龜殼其奈汝何所謂吉凶悔吝生乎動幾者動之微也幾微不動何生死吉凶善惡苦樂之有是故聖人慎獨於未發絶對待於睹聞聲臭之前今人既不慎獨則隱微無主肆念妄行徒被他卦爻彖象吉凶悔吝之所顛倒錯亂而已是故聖帝明王之道皆取法于易以致中和易有不易則得中不易有易則得和惟堯舜能允執厥中而和平故能知人心之危道心之微危微乃出入之幾即天人之際也可但以人欲為險危解耶天而不人則能位而不能育人而不天則能育而不能位惟位乎中則能育乎和惟位乎和則能育乎中吾嘗曰堯舜之前法度不齊荒唐不可述也文武之後法度大亂支離不可憲也惟堯舜為中道之正始故孔子祖述之惟文武為和道之正終故孔子憲章之上律下襲于易已見河洛卦策皆本然之條理一貫可徵者也俯仰遠近莫不同然所謂法住法位一切見成代明錯行覆載本具豈人力可造作哉孔子生于周末功高堯舜文武正在此時顏曾思孟繼其後使孔子之道大明亦不愧為弟子三代而後無幾人能窺其門墻況有能窺其堂奧者乎盤再拜請曰孔子之集大成猶今日吾師之明大易也吾師開佛祖之面目儒者未見為奇惟吾師開周孔之面目儒者乃見為奇幸勿吝慈悲再示大易之道了此身心性命之法師曰諸公知大易之道本末不異體用一如乎體中有用人不能見其用感而後見其用用中有體人不能見其體寂而後見其體所謂寂然不動體也心性之理也感而遂通用也生死之法也即感而寂無生死之用不為心性之體即寂而感無心性之體不為生死之用感而非感生死寂然寂而非寂心性明妙但世人只知後天六層八八六十四卦盤面上趨避進退不知即卦即爻上透底一針刺到根柢先天一層太極上一幾未動之先則本無陰陽八八淆然也惟吾真宗不於盤面上橫蕩而行遇一卦遇一爻只是一針透底則彼吉者不能吉凶者不能凶陰者不能陰陽者不能陽處處逢歸路頭頭達故鄉一根既返源六根成解脫又何根根塵塵非常住真心哉又何千波萬浪非一水千器萬皿非一金哉能如此透悟根宗先天自我立命而天不違後天自我順命而奉天時矣雖然不可以我透針之言瞎錐亂刺不向自己性命上透脫如今人之用棒喝是底也一棒喝非底也一棒喝更無展事投機生殺與奪之妙如此瞎亂相欺則千古佛祖聖賢之大經大法皆是一個儱侗東瓜禪盲瞽泥塊法何有精一微危之妙道能致中和位育乎嗚呼安得洗心于密極深研幾者相與發明此道以報先聖之恩也耶諸公大喜禮謝伏羲圓圖伏羲止畫此圖未嘗標出太極孔子標出之而隨即曰一陰一陽之謂道繼之者善也成之者性也祗如此圖何者是道何者是善何者是性耶綸之則一卦有一卦之時義一爻有一爻之時義絲毫不亂彌之則渾淪周遍隨舉一物皆全具也神無方而物有則本自方圓同時非默成神明者孰能知之方圓費隱同時總別先後一際天界浪杖人全録序何為而有天地何為而有日月何為而有山川草木人物牝牡之類此理耶事耶誰為之甄陶點染而色相萬殊不可名象不可方物不可治齊耶又誰於不可名象中而強名之曰天地日月山川草木人物牝牡分之則庶其類而合之則一其致耶又誰於不可方物中而方物之不可治齊中而治齊之此伏羲神農堯舜禹湯文武之所由作也故君相者所以裁成天地之道輔相天地之宜以左右民者也自天道有所不行不得已而立之君君道有所不行又不得已而立之師君以佐天道之窮而師又以佐君道之窮誰為為之道是也誰為任之孔子是也乃孔子之道亦有時而窮而佛氏之教又起而翼之斯道遂無復有遺恨矣斯道無遺恨而天地始有遺快也説者謂佛氏興而孔子之道衰不知孔子之道不衰於秦漢之後而衰於戰國之初不衰於佛氏之興而衰於異端之盛異端者誰楊墨鄉願之屬是也今天下之學鄉願者衆矣學楊朱者又衆矣即求一墨子且不可得乃硬坐後起之佛氏以當之曰此即異端也豈不冤哉或曰若如言則儒者之説非乎曰果為程朱之儒則闢之可也不闢亦可也程朱懼儒門之淡泊也故闢佛以存儒然使天下之儒皆如程朱則佛且不作矣又何闢焉天地仁愛之心知後世之儒必不皆如程朱也故復生一佛教以翼之佛氏之有功於孔門者大矣儒者苟不能如程朱不必闢佛且不妨學佛學佛而有得於吾道自有妙協之理非必捐棄父母妻子披緇入山而後為佛也但今佛氏之教抑又窮耳或執滯於因果輪回或偷息於幽間冥漠豈唯未窺其堂奧亦且未入其籓籬也豈唯士大夫即秉其傳者講師座主既死於言下拈椎豎拂亦逐於聲影求一大徹悟大休歇人曹溪而下若德山巖頭汾陽慈明之流已如披沙揀金又安望其立言垂世若釋迦當年與孔氏之教並垂不朽乎明啓禎間覺浪盛禪師起於八閩嗣法東苑決幾壽昌手挈祖印肩荷佛乘年三十即開法於興化道風遠振海內傾仰名公巨卿莫不入室扣擊俯首皈心而笑峰然藥地智二大士則以宰官身現比丘相稱師之嫡骨真子也豈不盛哉夫師於佛法凋落之日能使斯道復興天下士大夫氣宇如王不可一世者莫不折節師事之以至兒童婦女販鬻屠沽之流亦莫不知天下有覺浪和尚者蓋由其雙選之法足以佐斯道之窮也鳴弱冠時讀唐荊川左編始知有宗門下事遂讀之不忍釋手及見洞山價祖傳有喜則不無譬如糞掃堆頭拾得一顆明珠話胸中躍然然無從質問偶洞山募僧至示以孤岩和尚語録乃作書舉以問岩岩答云巒峰奇秀鶴不停機余於此有省後參煦杲照禪師相隨數載每於一棒一喝中見臨濟之大機大用壬辰客白門謁杖人於天界蒙許入室咨決種種妙論快所未曾從此廓然四達於儒釋分合之際及古人言句了然無疑矣故自六經四子之書以至三藏十二部諸子百家與神仙養生之術略一寓目略一拈提即有水乳之妙然後知杖人之為我至也嗣後見諸善知識不可勝記然更求如杖人者未有也辛亥春入青原與藥地和上坐語移日和上命作杖人全録序余以杖人語録遍天下諸先達長者如梅長公李夢白輩序之詳矣余小子復何辭但以余親見杖人於二十年之前今讀其全録於二十年之後宛若面談即不能如梅李諸先生親炙之久然視彼聞而知者則有分矣故不辭固陋輒辨數言於簡端使天下後世知釋迦而後又有若杖人者振起斯道於不墜且合儒釋為一家視今日諸狂禪瞬目揚眉裝神嚇鬼者不大相徑庭也哉有志者學儒學佛當必知所興起矣時康熙辛亥孟夏之月青原學人李鶴鳴拜題杖人翁全録集要序于百千光中日為光大于百千水中海為水大于百千善知識中浪杖人為善知識大此非余之臆説也余嘗聞諸竺老和尚而知其不至阿所好也浪杖人斯可以為過量大人已乎然而人有過量語無過量惟及量耳蓋由乎度越尋常謂之過由乎適如本分而要歸切近謂之及之兩也其實一致今夫杖人其書滿家其門目至于百有數十豈不曰文彩全彰乃終日言而盡道亦終日言而未始出吾宗此則南華聖人之先得其然者矣如徒以簡帙褒重有類夫取精多用物弘之為貴者即彼怪尤或能勉爾顧狐之嗚呼似人聲非人聲也曷足聽聞今日者獅絃既張毒鼓更震一唱三歎偏正回互靡不逢之嘗試攬其篇章以循其經緯本末雖使九變復貫畢竟語忌十成洞上流風于斯固為增華加厲焉耳且如潔淨精微易之教也先儒第謂之能不犯手安在其有喙三尺而必為前朝斷舌之才也乎若夫宋人立尊堯之題晉代高注莊之作則杖人亦嘗從同惟托孤一語于斯道絶續之際恫乎其言之不獨以資談柄也中天午運所不至與倏欻俱淪者吾言將繫其九鼎必如是而後可以至于精矣亦必如是而後可以至于大矣世稱文章卓詭但為名家其廣博而無涯際始為大家名家之不及大家甚遠即于不立文字而有文字從有文字而發揮其無文字者何獨不然此向來明教永明覺範大慧諸老之所由尚也麻三斤乾矢橛庭前柏樹子等雖曰咬嚼不破亦往往作避鋒藏拙之地有如文身句身一為無量無量為一即豈得于此躲根昔者三佛之門並高矣而漸成窠窟佛鑑佛眼座下有為狗子叫鵓鳩鳴者有覷燈籠露柱指東畫西者則佛果譏之且自幸其無是病夫狗子鵓鳩燈籠露柱無論不可為佛法恐併不可為世諦杖人書都不若是談性命則湥以出語事理則洽以該三教既與為總持兩戒復極其關切于是而欲以廉纖訿之不得欲以綿密稱之抑猶未盡是誠壽昌古佛之內紹而五宗諸大老之集成遂入藏流通進名家而大家由此其選也竊伏聞雙徑祖席群衆歸重奠以不遷此亦大日來仰大海來朝之常事已耳而今乎青原青原者七祖道場也自笑峰大師起之無可大師承之其山益峻兩大師固與竺和尚鼎足而全録集要之刻則無大師董其成無大師高足弟子為余好友洪浪遂興雙嶺以應之得髓之義及于膚功則是其為日光九重若海之前後左右際者不又多乎哉余亦在杖人子光孫水之列而浮遊他日失所依歸顧十指中猶見佛面孟子曰豫未得為孔子徒也豫私淑諸人也爰恭無大師之命而序之其言有止亦姑以志其欣愧焉在道凡夫黎元寬法名興遠拜題杖門隨集附全録後天界學人大中陳丹衷大斧毛燦編天界紀聞三大恩人丁亥清和積陰新霽偶過丈室適有少年求師開示師笑曰世間有三大恩人一切衆生當面蹉過不免辜負他甘墮下流少年問云何是三大恩人師曰極貧多病大苦添上個死字是煆煉我身心的大爐鞴千金難買萬劫難逢不向此中打破關頭巍巍堂堂做個知恩報恩頂天立地的好漢反視如生冤家百計求脫露盡醜拙將貪瞋癡種種毒藥滿口吞下縱饒得金高北斗五欲目恣也是生鐵鑄就臭髑髏諸佛拱手無可奈何窮究病根紙緣昧卻勤儉兩字或問止如勤儉中下根人亦盡識得師云世人作勤盡是業識世人作儉一味慳毒今為真勤儉下個注腳曰公勤而公則為禹惜寸陰周公待旦儉而公則為顏子之庶乎屢空武侯之淡泊明志死則死盡一切偷心根塵消隕六用不行庶幾是動心忍性增益不能世出世大任一肩挑起不負三位大恩人煆煉我做人一番汝亦知勤儉公三字是化難生恩之造物佛祖聖賢總跳不出此三者秪如聖學博我以文勤也約我以禮儉也一日克復天下歸仁非公而何造化之有春夏博我以文勤也造化之有秋冬約我以禮儉也各正性命德合無疆又公到極處矣一切聰明男子遇此三大化難生恩之人若肯拽轉鼻頭來定知老僧不是賺汝薛正平紀孔子棒人只知宗門用棒不知孔子善用棒而棒棒見血且無痕如君子之道四丘未能一焉開頭遮一棒直將人才生下地來便打透也又散開棒打出四個未能來如父未能求子君未能求臣兄未能求弟朋友未能求先施卻先棒棒打著為君為父為兄為朋者而實棒棒打著為臣為子為弟為友者然而夫婦一倫不打著何不見此四者皆出於一夫婦乎孔子所以棒棒皆打著求己不求人則人皆有己所以明頭來也打著暗頭來也打著連架來也打著直走入古廟裏去如閨閣中夫婦在黑鬼窟裏也憑空打著呵呵痛快麼又誰知死版上孔夫子解打此活棒乎一字法門孔子懼作春秋即此懼字能使萬世亂臣賊子懼孟子為此懼故能距楊墨闢邪説使王道廓如功不在禹下一部中庸全在戒慎恐懼中提出此性道教底廣大光明震爍天地小人無忌憚又何知懼哉懼正是小人良藥能用此一字即寸鐵殺人活人開天闢地也如孝親孝字恭己恭字敬己敬字皆千聖傳心之學又變為孔子之言詩可以怨怨字莊生怒而飛怒字與孟子文王一怒安天下怒字皆是自心中創出造化來變易天地人物即此一字為吹毛劍也可為塗毒鼓也可為獅子吼也可為九轉丹也可若武庫中利器但能用得慣如一指頭禪便一生用之不盡千古人不能成大事者只是不精一雜用心故寸鐵殺人之語也須是大猛烈漢子始得拈重閬薛正平少誦南華胞有重閬心有天遊極愛其語與老氏合三十輻共一轂當其無有車之用殆謂此也與學人語都不能了適宣州翟孝廉羽侯禮師師云向南昌曾與君拈胞有重聞義尚能記否翟悚然余問當時云何舉似師云幼見雞抱卵識得此義卵殼中著頂空處是為重閬人疑其不足處正其有餘處天地化醇生生之妙盡從此出卵胎皆然卵特易見耳莊生欲示人天遊於未始有物之初寄之重閬故又云人之知者恃息歸根以踵孟子表之夜氣九萬里之怒飛以六月息故云生物以息相吹試觀世人負重遠行氣急殺人放下擔子低頭合眼得剎那之息聳肩便起師作挑擔勢中添邪許聲復作歇擔勢笑云為莊生盡情吐露矣余聞躍然曰今日因師得悟中孚一卦乃大易關紐坡公解易亦云卵生為之孚孚之傳曰柔在內而剛得中孰知在內之柔坎一真陽重重包裹流行兌澤巽風之中變化生焉子雲之玄從中孚而起良有以也摩耶夫人腹中諸佛菩薩往來問法又極重閬之虛空不可思量矣於此悟入則大衍之虛一不用與叫不響山谷一切都了非師委曲譬喻不能剖塵拈出師頷之曰子可謂善於引伸也周子無極而太極與邵子未嘗有無而未嘗離乎有無圓此一句有同異否智曰人身頂腦虛者靈醫經心不用而用小心喉以管竅吐聲鼓以閉空為響草木之核仁皆兩片也而生命藏其中誰知質測具通幾耶曾格此否拈先著世出世間法只爭個先後著易云幾者動之微吉之先見者也天下事原有吉無凶不認得吉之先見便變出凶來師少年有詩云大聖有隱憂乃知天下故坐折英雄心能先其後步妙旨可參陳旻昭與一奕客到師方丈通云是國手也師笑曰我雖不善奕卻識得碁中旨趣遂舉向詩乃徐云世稱碁家國手謂著著是先著妙在先存結兩個眼地步若一個眼便是死局太極之不死妙在陰陽之交錯而不相奪其陰陽之不死全在太極非虛非實也蓋彼未下子時已識得末後得力著子便緩緩地放在冷處對局者不知其殺活在手只管東衝西突到得應手不迭方悟其妙已箭過新羅矣故曰國手先著妙在占得兩個眼地步其後步自不可破也萬法皆然學易者謂之逆數沛公與項王之成敗也只爭遮些子老氏有言圖難於易為大於細非識得後步何以下手第世人不易曉耳唯十九行碁路上幾點黑白子將下未下處可以神而明之便是英雄默而成之了向上句與末後句矣一等拍盲禪但問黑白未分前遮一著子落在何處卻以掀卻棋盤者是豈不為撥無因果之外道哉他又安知未分前在何處乎旻昭勇躍嘆為聞所未聞它日竹關又舉旻昭因曰長生變勢以三個劫而兩持其幾更妙師笑曰人妙在兩個鼻孔便可合口而坐捏卻鼻孔時能不開口吐氣耶信近於義章三代以上有孝字無學字蓋學統於上即覺字即親字猶先天之良知能親切可為宗可以宗也甚矣有若之似孔子也既拈孝弟為仁之本復從仁本中拈出民生日用最親切處之親字為禮義之宗本孔子告哀公曰仁者人也親親為大義者宜也尊賢為大親親之殺尊賢之等禮所生也夫尊親與親民是皆因其天然而不失其民生日用最親切處立出種種名以為千聖制禮作樂所因之宗也義豈遠乎哉信一近之便言可復禮豈遠乎哉恭一近之便遠恥辱近與親對而義與禮與仁俱從近中寫來乃是吾人最親切處信因於義恭因於禮而此禮義又皆因不失其親亦可立為宗旨亦可與人師宗云爾非是不失可親之人也唯識指出親見分親緣緣分言心外無法可作耳後來子夏子遊子張欲以所事孔子事有若亦欲與商確舊聞結集遺言如阿難現佛身説法如是我聞亦有與人師宗處使此宗旨不墜也曾子便拈出江漢秋陽又無異九峰侍者遍殺首座此更有親切處遂各建立有子夏之儒子張之儒有若之儒漆雕氏之儒而統遂散百年而孟子出提出夫子集大成以收歸大統反復歎見知無人以聞知自許而昌黎謂軻死無得其傳有以也余有感於因不失三字與亦可宗三字以見聖人制心制義處學者之親切苦心處故曰因包因果宗包統類統包破立類包寂歷親包親疏主此者誰惟善用心即得樂其可知孔子聞韶三月不知肉味曰不圖為樂之至於斯也看為字不圖字上形容豁然此豈是悟得聲音哉正如香嚴聞擊竹豁然而悟實不圖在聲音邊也師摯是上流人孔子欲就聲音中指出向上所以為樂之宗樂其可知非謂樂可知蓋欲其知所以為樂之至於斯也故告之曰爾固自謂樂可知也然亦知千聖未作樂之先此樂從何而生乎知樂之為樂不知樂之所以為樂若始作知其翕如從之知其純如皎如繹如樂至此成矣爾之知如是止已未始之前有翕如爾知之乎未從之先有純如皎如繹如爾知之乎先王作樂崇德聽之不聞是誰於雷出地奮而薦取夫子微意乎莊生曰有成與虧者昭文氏之鼓琴也簫韶九成成於歷山之號泣洋洋盈耳成於敬止之緝熙若軒轅氏何待張樂洞庭七聖俱迷大地變作琴聲矣師摯於此徹去遂逃之無何有之鄉不識者以為適齊云儀封人封人見地最高不惟荷簣諸人彀不及即聖門高弟亦當避三舍弟子中識見超卓顏子猶謂不容然後見君子如子貢卻虛擬一綏來動和功勳邊事描寫子之不可及猶天之不可階而升何異盲人摸象乃封人一見尼山面目便識得天載鼻孔想其平日憂天憫人一副肝腸無處告人天下無道久矣隱隱想著個木鐸自堯舜以來高懸天上無人承當卻落在孔子手裏無限慶幸措辭不及便欲向二三子吐出自家肝腸不免怪笑諸人止具一隻眼為得喪兩字熱顢余故曰封人不特孔子之知己亦天之知己晏平仲晏子善交得力全在與之一字便有擇交不輕交不苟且意在故能始終其交久不忘敬若於夫子不免有纍世之疑遂畏而不敢與交也夫子識其短處不掩其長處故特拈出想平仲雖好賢定因石父告絶是以見賢益惕執蓋同升倘所交非壁立千仞之人不免曲江軟美一路求其久而愛則有之求其如臨父師久而敬不可必也雖然交固難言善交如晏子猶屢失之去齊別北郭騷騷曰勉之上車歎曰嬰之亡不知士甚矣逮反國聞騷之自殺以白己也復驚歎曰嬰之亡也宜哉愈不知士甚矣善財五十三善友亦從展轉得來非伸兩手便能摸著鼻孔擇交者不可不知馮鳳山云見執蓋者則薦之遇孔子則沮之勘到鼻端挧挧然矣旻昭曰孔子忘其沮而稱之此所以為聖人也管鮑乃是過情之事獨舉此者以久敬為無弊耳孰謂微生高直夫子歎世人不識直特借微生乞醯點醒世人耳此非舉微生之過亦非為微生雪屈也人之生也直直者率性之謂似乎拈來便是乃子又云敬以直內則直不在徑情天之大生曰動直君子之安人安百姓在集義敬禮而合觀之直之中有不可思議妙用即如父為子隱與直相反子則云直在其中矣若微生高乞醯一事子以為無害其直試味孰謂二字無限嗟嘆非捉得其敗缺想當時或之乞必有不得已而乞故高之應亦不得已而應子蓋委婉其詞曰那個説微生高是直人乃於其乞醯一事婉轉若此政喜其任行胸臆不在區區形迹上矯情鎮物如世間所稱直是故好直者必須好學於此可思正平云嘗看世説裴叔則歲請二國租錢恤中表之貧或議其乞物行惠裴曰不然損其餘補不足天之道也名士傳謂叔則行已取豫任心而動不顧毀譽皆此類知此便識夫子不抹殺微生高意師微笑舜禹之有天下章師笑曰與之一字千古未夢見孟子略識得曰君子有三樂而王天下不與存焉與作與奪之與試為問曰舜禹之有天下也孰與之曰舜禹之有天下不待耕稼陶漁胼手胝足時便已具足由是而觀湯有天下非關放伐武有天下不待征誅桀紂失天下原自不曾有非是被人奪卻如此則不特人不能與天亦不能與也是知君子有三樂皆是自己性命作得主中來的即與木石居與鹿豕遊未嘗不與舜禹把臂共行也事君數章數非頻數之數乃煩數之數謂微細瑣碎不關係事大臣以道事君責難陳善君子處友忠告善道必具大手眼大展演自然水乳合方為忠臣為益友即云不可則止亦不是冷眼覷他直重下針盤別尋龍穴耳若只瑣瑣屑屑小處去賣直沽名辱與疏隨之矣如孔子與原壤友壤方母死而歌罪不勝責正於夷俟時訶責之幼而不孫弟禮不為我輩設也長而無述為溪為谷也老而不死出死入生也三者乃原壤生平大得意處此不過自了漢故呼之為賊狄梁公事女主日夜苦心指天誓日只有廬陵一案若貌似蓮花之六郎一切穢濁不堪直視之狗彘此大聖大賢事主處友之機權故曰君子見其遠者大者小人見其小者近者即衲子輩事師交友亦須別具一隻參學眼潘達曰亦有小處近處極關係者仰之彌高章高堅前後認為歎道者固錯謂歎自家工夫無捉摸者亦錯顏子初時不知道之在我只將我去求道又認作聖人可以一蹴而至嘗自云夫子步亦步趨亦趨夫子絶塵而奔回且瞪乎其後只遮瞪乎其後處正是出身活路不知卻坐在此處反以為不及此是學道通病待得夫子拽轉他鼻頭來始覺開眼也是合眼也是方悟夫子循循善誘博我者還是我自家的文約我者還是我自家的禮到遮裏不能親自見我便罷手不得直是聰明才智一毫用不著斯時於山窮水盡處瞥地開眼原來只在遮裏所謂渠今正是我我今不是渠如有所立卓爾雖欲從而末由正是放身命處不復如從前向外馳求乃知為人由己而由人乎底意方透可謂極善形容自述悟由始終得力行狀特地與夫子拈此一瓣香以酬直指我心一點法乳之恩耳使非萬分勇猛於反己何能至是哉是以顏氏子歿夫子不勝歎息曰惜乎吾見其進未見其止使顏子不死而遇人逢時又不知作何大事業以德報怨章以德報怨此大聖人事亦老氏之言也彼見當時瞋毒熾盛睚眥殺人思以救之譬如人患熱病將冷水當頭一潑暫時得蘇熱終內伏不若夫子先與提清脈絡曰何以報德又向德中揭出直直中揭出德又妙於怨中揭出直來不揭出直來則天下盡陷於不仁不義無一人能存性生之直也夫子嘗云詩可以怨怨者天地之義氣立己處人有一毫不合於德義則自怨自艾自不容己艾藥也人無恥而不自怨則是大聖拱手不可救藥之人也不知怨則不知興并不知德矣立個方便曰以直報怨以德報德蓋犯而無校橫逆必反此克己強恕事不可以恩怨一概溷濫記曰君父之仇不共戴天兄弟之仇不反兵而鬥朋友之仇主人能則執兵隨其後是之為直直是吾心之天理生性不可滅也人無此則彼此倫常絶矣賴天有怨報之直故天下多不敢行不義且使不義者知有義也即如戒經瞋不報瞋獨於君親云不加報不加者亦適相當亦不可更有加於君父即子之所云直也雲棲大師梵網發隱亦於此分疏明白云佛法不曾教忠臣孝子忘了君親余嘗謂堯薦舜舜薦禹而天受之方當得德報湯之鳴條武之牧野順天休命方當得直報復笑云老僧今日太直又不忌口善人之道章莊生云絶迹易無行地難古人有踐迹而入室者有不踐迹而入室者孔子蓋提迹室架起兩頭善人遊行其中所謂香象渡河擺脫纏鎖不惟迹之一字不肯黏著即室之一字亦欲掃除似與狂簡相類而絶不同狂簡以氣魄用事善人以清明純粹用事是以聖人思之不置如云善人為邦至於百年之後其遺風餘烈亦足以勝殘去殺善人教民七年可以即戎煞有作略善人所有似乎狂簡所無惟孟子解得善字最親切曰可欲之謂善可欲二字從孔子繼之者善也來是善人者乃善繼天之志者也豈不可欲若止質美猶是孟子所謂未免鄉人君子憂之何可欲之有只因善字不明誤殺世上多少人子張一問大奇孔子答他可謂不負來機同鄉林子過訪因問和尚何時還鄉去師笑曰歸恐作鄉願曰何故又笑曰狂狷中行各有本色欲學進取為狂則是狂之鄉願欲學有所不敢為之狷即狷之鄉願學不狂不狷為中行即中行之鄉願故孔子以為亂德德者本色也即同人於宗亦吝所謂認著法身即墮也況其他乎林子訝之師曰待我還鄉時向汝道破戒慎恐懼是作聖宗旨師云聖人之學關於性命者獨是有個戒慎恐懼無論未發已發皆可以致中和而成位育如不知有戒慎便是無忌憚之人不待到放僻邪侈也不見堯舜只是個競競業業所以成堯舜即如曾子到啓手足時只云戰戰競競如臨深淵如履薄冰所以能全其始終既謂之如則非有深淵而能臨之戰戰非有薄冰而能履之競競世人全身沒在深淵墮在薄冰而且放肆無忌所謂人皆曰豫智驅而納諸罟獲陷阱之中而莫之知避也豈不重可哀乎孟子善於警策曰人之所以異於禽獸者幾希君子存之小人去之存去二字尤嚴於斧鉞一存便是戒懼於時中一去便是無忌憚而乖戾此正是克念作聖罔念作狂之幾希也世人雖曰讀書習禮設教行道於此中心稍無戒慎之密縱有一切經綸事業無非是雜霸無忌憚之虛詐何曾知有精一中和勤儉易簡之宗旨既不知此則不免相習虛詐舉世如狂而載胥及溺何曾於生死性命有可救援哉欲求救援之法亦不過戒慎恐懼而已矣旻於是驚起而問曰只如能戒懼而致位育後更作何保任師笑曰那得輕易到此如果到得位育境界正好十分戒懼也不見道橫按鏌耶傳正令太平寰宇斬癡頑乎論怨孔子言詩雖興觀群怨並發其祕密藏而純歸於一怨字此怨乃能以天地人物不平之氣保合天人性情之太和則怨字又愈於元亨利貞貞字元亨利貞明天性自然流行之氣此怨字發人情後天之密非到怨處不足以興不足以觀不足以群到群又不能不怨不怨則不能歸根復命於絶後重蘇亦不能使貞下起元為可興可觀也豫以莊生善怒字屈原善怨字孟子尤善怨怒二字蓋未有怨而不怒怒而不怨也莊子以怒而飛怒者其誰草木怒生達其怒心即達其怒心尤妙盡怒者其誰也屈子怨而不怨則怨即怒也不見離騷皆不平之怨耶孟子云一怒而安天下又以舜如怨如暴以自求其不得於父母之故太甲自怨自艾終得阿衡之意凡皆以怨怒成此浩然之氣如大易以地雷復為見天地之心怒莫若雷至於雷電敕法帝出乎震震驚百里摩蕩八八六十四卦皆從震發怒機此大易又為一部怨怒之府即堯不得其子而舉於舜非怨怒而何能如此神遠哉舜以怨而得底豫禹以父鯀殛死而治平水土何怨如之即湯武以臣伐君不避慚德何等怨怒耶文王拘於羑里口無怨言而此中之怨艾至以一怒安天下何如若周公以大義滅親流言居東怨可知也春秋怨史也孔子懼作春秋擅天王之進退褒貶孟子距楊墨只此一懼乃不肯避萬世亂賊之諱忌此又何等怨怒哉凡此以正直之氣發天地人物不平之氣以會歸於天地中和者皆怨怒功也世間法如此參禪學道視此生死性命之怨怒果何物乎賢賢易色賢賢易色者言賢人之賢不是空空企慕直將彼之賢陶汰自己脫胎換骨把舊時色相盡底變易一番何等勇猛遮樣人事親必孝事君必忠交友必信或以其一味誠朴不加粧點疑為未學不知人生除了大本達道更有何學故曰吾必謂之學或疑何以不及師蓋賢即師也子夏居西河不忘弟子職故列師於君親之上哀公問社章哀公聵聵已甚曾不知德政為國之本驀問社於宰我豈亦知山川社稷為天地神人之主所關乎宰我善言語乃知松柏栗為社不説所以為社之意又以使民戰栗為辭至今千古經幾存亡尚無人疑悟所對之微意哀公又何能直下即悟乎宰我所對三句已如鐵饅頭咬嚼不破孔子又放出金彈子又誰能自透心腑知聖賢苦心深心有如此者公昔問政夫子以人存政舉分明露布己漠然不能信行及與之語此應自揣曰我問社他如何説個使民戰栗民尚能使之戰栗矧我有國家社稷之所寄者聞此反不能戰栗何也如此自疑必能自悟孔子聞此答得奇險彼必不能疑悟卻乃箭上加尖曰此松柏栗是夏殷周之成事是時人不能説者今已明説之而不省此夏殷周之興亡是分明可警者時人遂安意而不能諫今已為諷諫之而不悟又誰知既往可以鑒誠將來而君人者不能藉既往者早自引咎鑒誡如此社稷安望長久而不為人所易哉故豫笑宰我於以栗後繼曰戰栗賺殺天下人誤殺自己語是此栗字相同之毒也論賁卦説者以賁是山間之火其明幾何噬嗑乃雷電之火其明始大此泥於小利與無敢之言而未察其命意之深也蓋聖人必先禮樂而後刑罰刑罰可措而禮不可措禮者文明以止者也明而能止故小利有攸往而亨此小正天下莫能破也況兵刑皆聖人所忌不欲以利見天下如攝生者不輕於用藥聖人以師藏水於地中又以賁藏火於山中不特兵之利器不可示人即文之利器亦不可示人聖人所貴於天真如黃裳通理美在其中不得已朿帛箋箋至於白賁則聖人所尚之志得矣於此可見小利有攸往不敢張大其辭如露布之毒天下也東坡以致飾授賁與孔子筮賁愀然皆所以傳斯文也知之乎四聖心易村野之民嘗於屋壁私以灰晝長短積之以自識世人一毫瞞昧不得此學是村民之心易也因悟伏羲當初於天地人物燦然冥然處忽而窺得其妙乃撩空而畫之無文字道理之名言而造化祕密之機盡具此伏羲之心眼中先有此易經俯仰遠近不定中定所謂先天而不能違也文王又何所見便能名其畫象字其卦爻而曲盡其奉天時義乎亦惟文王自信其寂感秩序之故始悟伏羲與天地人物同此先天不變易之體而後因之為後天變易之用正以盡後天變易之用而後不違其先天不變易之體也周公孔子自悟皆然故曰先須知自心之易始知天地之易伏羲文王周孔之易即如村民之出私意非結繩之易乎天地之易無言而四時行百物生此天命之流行雖有變化無生死也伏羲之易有畫象而無名言乃代天地人物收其性情之祕密而藏諸卦爻之中雖有變化亦無死生文王之易本於天命發於至情以人物後天之易推其情偽相感故有喜怒哀樂吉凶悔吝之交易移易翻易變易轉易與決不可易之道此雖全體居於變易之用其全用之道亦實無生死也周孔述而不作顯微闡幽使民生日用身心性命知先後天之體用有原始反終之故順流逆轉之機先後豈相違哉先天畫象之易如生成孩子之全體後天繫辭之易如教養食息之全用非此全體無資全用非此全用不享全體文王周孔三聖之贊易乃亙古今教養民生之慧命也何卦何爻非教養身心性命之法又何卦何爻有吉凶悔吝之法又何卦何爻無吉凶悔吝之法哉即如一身六根本自聰明本自互用本自渾同本自差別各各不相知而自知各各不相到而自到親疏自得天然渾忘於大化中也如此然生民既有情偽交作矣安得無教養哉教養之法全在一幾之通變見於幾先無往不吉一不知幾而錯亂用心則不免於自陷此中固自有吉凶之太少也如視聽言動原無吉凶悔吝但以不知正己為元吉而逐其私欲則視聽言動便有非體之凶悔吝也使能正己之元吉動止中節則又何有視聽言動而非天然之禮哉即民生日用飲食衣服草木寒暑原無吉凶悔吝正以未得教養變通之法未免奇偶誤用負此生成恩德反不如野人不自欺不為人欺也欲為天下萬世之君親師友與為天下萬世之子民者孰可不知自心具有生成教養之大易哉如此視之使先天不與後天交則先天墮於死劫後天陷於生緣正以先天後天之能交則先天活而不死後天寂而常生也看透此先後天之交易自於易而不易生死不能遷流不易而易造化自能任運又何禪道佛法之不可以參入哉欲知安身立命而能常變化以超生死者又何可不知此四聖自心之易義哉智曰伏羲畫易亦是後天亦用占幾文周孔子都具先天自能格致須知中無先後靜正不禦俯仰遠近內外一本秩序變化歷然寂然格物之則即天之則即心之則四聖原不求無為於恍惚也因舉五位綱宗而論及象數端幾古人之立法立言正如大易之立象立辭也使無大易之象辭則天下萬世何從而得天地造化之幾微人物生死之性命哉所貴於觀象玩辭而顯仁藏用也人每以理為活數為死不知理雖活或以意見自用而反落於怪邪數雖死能存法則而可悟其天然有不得於象則求之於辭有不得於辭則求之於象或於言辭有盡而得象意無窮是法住法位世間相常住不於此可悟耶象數有法則而無情識或曰不墮諸數矣又論數乎曰數數者非數邵子亦云一非數也從二起數師因屈指曰一二三四五伸指曰六七八九十此處容得一毫情識造作安排也乎推而行之化而裁之極其變通乎神體物而不可遺百姓日用而不知耳單執一句不墮諸數乃是剔出之法身執之是為理障不見道舍第二句第三句別無第一句乎不則執名相與掃名相皆不能會通依然各守所知愚耳神而明之存乎其人會通不礙名相姚愚谷曰西來以破名相為宗何樂於存像教以自泥其宗旨乎杖人曰人知名相之為名相抑不知名相之為全機大用也佛初生指天指地周行七步目顧四方與末後拈花亦何非名相乎五備五明何謂五備曰羅什答遠公云五備者福也戒也博聞也辨才也深智也仁者備之善弘其事何謂佛學五明曰聲明巧明醫明謂因明內明也四明是資生用物法制名義也內明乃身心性命之理也壽祠平術則四吠陀外道也華嚴五地菩薩無所不知能於曆律學藝莫不通曉故能涉俗利生誰謂文佛入中土而不能讀此土之書乎達磨對彼時經論支蔓福禱功德之病而藥救之指出心體尊正法眼藏也將以不通文字為不立文字乎哉盡兩問是文字海伏羲自合俯仰遠近而讀天地之書即是讀自己之書觸馬龜畫卦圖乃是抄造化之文章衍自心之秩序一多相貫總別同時特世眼自障耳折攝正欲備明不礙三番兩折根本智易得差別智難窮分心分識豈得已乎佛見舁豬者問之舁者曰佛具一切智豬亦不識佛曰正須問過然則好問察邇者入太廟每事問者可以通觀矣六合周行初生即備物物皆然但不自知耳不因鏡水誰見自己面目不徵三才誰信自心條理慎獨格致仁智交圓何外何內而自裂其夤哉然習俗浮濁不能清明自須從靜正入金鎞才三岐伯對黃帝曰言天者求之本言地者求之位言人者求之氣交范蠡曰持盈者與天定傾者與人節事者與地孟子曰地有肥碻雨露之養人事之不齊也杖人曰無處不具三才無處不是三不齊惟心統天地人之用而物示天地人之則見破者時用之即時統之矣知天即能用天知地即能用地格物即能知天地而各正性命百物不廢惟我裁之惟我才之宗門無所不統超一切而入一切若膠一橛猶是枯椿才真不可假有假道以自匿者而真才必不可假也處於才不才之間似之而非也必盡其變知其故而後不枉其才不負其才顯仁藏用則才即道也劍室燈帷正所以善用其才耳道德法體道凝德而明法則三者分而本一也學者不析以顯之則有乍聞偏舉而爭者矣法主於明德主於暗道在默識或離法以言至德離德以言天道將謂制度果為末務而四時與誠明無與乎比興賦比興賦何處不具有比中之興賦焉興中之比賦焉賦中之比興焉猶之函蓋乾坤截斷衆流隨波逐浪之可九也圓覺二十五清淨輪乃禪那妙奢三摩之所衍也華嚴之旨別即是圓尚有疑耶因兩而後用參鯤鵬者淵天也北南者冬夏也習坎心亨而離明麗化也高深潛飛莫非是也培風者下學而上達也中庸首之戒懼論語首之悅樂同耶異耶特創筆以寫之而破其名言之滯執耳因兩而後用參此所以貞夫一也執其兩端用其中於民若執一端死法必不能用中矣故曰道寓於器亦泯於器情節於法而泯其法過而不及乃知用中中而旁行乃能會通平奇互藥俗不可醫非奇不能出類拔萃好奇成病以平實消歸之鄙田碻阪一望黃茅忽有古木危石寧不一徘徊耶千人有英一州有豪役人自養執所必然學者卓犖不凡或伉行或文鋒或淹洽或高逸皆喬楚也是真畸人不依廡下別路孤行寧可禁乎惟遇聖人乃能賞鑑而煆化之故曰怨怒致中和奇特造平淡道善性一陰一陽之謂道繼之者善也成之者性也此舉天命之性而三句衍之乎道之泯善性也性之藏善道也善之統性道也三而一也官天繼善人道總持則由擇善得一善以止至善故曰善用貫有無則全天委化造命俟命皆止至善中之固然者也非知其故則此三句離微且角爭矣知惟心識矣知物自獻其天則矣器自具有良法矣統類時宜本不變也更有何説可以惑我絲毫若疑請自反復偏藥正用須知其故主於斷欲其藥多偏主於明理其用自正要惟知其故乃能旁行不流而時宜用中夫三才性命費隱秩序一多宇宙寂感橐籥所謂故也聖人知其故而質建不惑不惑乃是真不動心時正烹茶杖人笑曰破蒲葵扇臘月亦有用處不斷滅而變化丹曰如灰覆火此亦一故也杖人曰此謂終不可斷滅耳非謂不可變化也禮樂薰蒸學問陶寫正如剡矢探輪者然又如移花接木者然如法制之如法養之乃得其用豈曰如灰覆火終不得斷而置之諉之乎欲知此故非真參遍參不決也心自本靈受命如響興公言一友夢神言同學張生初五死李生初十死驚醒記之至期果然此何故耶杖人曰心自本靈切勿昧滅易言受命如嚮尚不信乎筳篿者鏡聽者總以至誠為驗靜專一心觸幾成識況叩之靜正神明者哉大道慧足而不欲為慧所使故正訓不詳耳理有顯晦原無斷滅如晦夜不見山林而山林如故也末流每倚心不自知而荒之噫報不忘維摩經曰無我無作無受者善惡之報亦不忘此正顯虛靈不昧之本體此正顯法住法位為固然正己晏逝謂之無作無受業力強弱自作自受原無所逃也惡空強自解説臨終迫乃情見與正己晏逝者宵壞懸隔矣辟如口作大言空房毛侸業報隨現更何諉哉以易徵之一不壞二亦不壞決無二外之一千里應違始於一念因果歷然本不可昧豈必臨終乃知之乎故曰知無我則不違理知不忘則不壞事依法而住即是脫體無依不可以剝蕉之語而昧其實際也研極徵信本為盲修故須勉其參究往往錯仞又復蹉過不可語上誤而可乎若人欲了知日日念誦猶不破生死之疑乎真參見性猶不破心識之疑城乎緣生無性猶不破恍惚而安法位乎中庸言盡性盡人盡物易言至精至變至神自非研極徵信安能決疑末流無真願力道聽説鈴八風一吹毫無主宰受用不及曼語紿人又不如荷鉏磨研自食其力者之為無欺也杖門隨集天界學人大幬何三省劉邦胤較雙選社六十四種當如事此事當如事選事選當如事射事射當如事中事中當如事卜事卜當如事佛事佛當如事感事感當如事天事天當如事君事君當如事鏡事鏡當如事親事親當如事燈事燈當如事暗事暗當如事心事心當如事師事師當如事眼事眼當如事夢事夢當如事友事友當如事想事想當如事子事子當如事病事病當如事冤事冤當如事救事救當如事毒事毒當如事情事情當如事偶事偶當如事繡事繡當如事春事春當如事園事園當如事種事種當如事名事名當如事仇事仇當如事利事利當如事罪事罪當如事欲事欲當如事刑事刑當如事革事革當如事誠事誠當如事鬼事鬼當如事民事民當如事神事神當如事群事群當如事怨事怨當如事貞事貞當如事元事元當如事險事險當如事蒙事蒙當如事畏事畏當如事影事影當如事欺事欺當如事意事意當如事智事智當如事惑事惑當如事法事法當如事行事行當如事變事變當如事悟事悟當如事窮事窮當如事證事證當如事迷事迷當如事覺事覺當如事密事密當如事藏事藏當如事誰誰是其人咄咄名教宗旨之大端天地之能長生不死者在二氣之中和佛聖之能長生不死者在此心之精一範圍天地之化而不過者在易簡曲成萬物之業而不遺者在勤儉精一非勤儉則不成勤儉非精一則不當易簡非勤儉則不能範圍中和非勤儉則不能位育唯勤於聖人之名教則天下有功於生發唯儉於聖人之名教則天下有德於收成勤而不儉則虛花不果儉而不勤則死煞無為天行健而勤不息於博施地載厚而儉有餘於濟衆民不務易簡則浮蕩於生死皆無結實民不務精一則雜亂於性命皆無歸根聖學不精一則天人之道不明聖治不易簡則倫常之道不行修身齊家不勤儉則敗亡正心誠意不精一則茫昧三教九流百工技藝治世出世教人養人不於精一中和易簡勤儉中八字而得其宗旨則終是雜用形神徒勞生死不當於身心性命之法以精一而參悟於宗門則證金剛上師以勤儉而修證於教法則成華嚴密藏六十四種妙于參雙選妙于促參促參妙于杖易杖易妙于機創機創妙于交隔交隔妙于兩責兩責妙于不白不白妙于爻觸爻觸妙于見獨見獨妙于四迷四迷妙于夢駭夢駭妙于路亡路亡妙于踏毒踏毒妙于眼瞥眼瞥妙于伏符伏符妙于對背對背妙于脫屣脫屣妙于升刺升刺妙于計殺計殺妙于奪空奪空妙于隙死隙死妙于活橫活橫妙于解橛解橛妙于滅垛滅垛妙于鋒的鋒的妙于破立破立妙于谷函谷函妙于飛幻飛幻妙于勿與勿與妙于兼收兼收妙于群放群放妙于驅疏驅疏妙于不逃不逃妙于宥宗宥宗妙于格拜格拜妙于訂拆訂拆妙于逆成逆成妙于傷出傷出妙于風入風入妙于木先木先妙于火薦火薦妙于革金革金妙于食句食句妙于神示神示妙于春甘春甘妙于偷絶偷絶妙于花語花語妙于石頷石頷妙于天故天故妙于笑逗笑逗妙于竿倒竿倒妙于不指不指妙于古在古在妙于傳賺傳賺妙于今無今無妙于不敢不敢妙于蟄申蟄申妙于試多試多妙于森愚森愚妙于不印不印妙于文草文草妙于衆謀衆謀妙于葵帝葵帝妙于拱眉拱眉妙于命命丹衷曰八八交參咄咄命命當妙者誰參悟宗旨之大端杖人已序結社之意尚未拈出雙選之宗旨當如何下手始能全身拶入不致於互相鈍置也夫選佛選儒之舉古人從來如此結社間亦有深於不二之名教者然此不傳之密久在二宗之故紙堆頭爛藤套裏又有幾人能自夢發疑情求其妙協而無遺憾哉今杖人特地創起此機何當仍以故爛埋沒諸英奇耶且二宗故爛非二宗咎也直是無真師友深錐痛劄以了生死證性命之宗旨使彼真參實究自悟此向上不傳之密耳果有真師友又何患乎不立見斬新之條令哉先此已示六十四種當如事更續示六十四種妙於參并使同社者深心拶入必期於同轉變同悟證庶不負矢上加尖之神疾亦不致杖人徒於大庾嶺頭以網張取此沒勾當也咦還有性燥漢子來相叫喚使此天下萬世之真種草不昧滅乎杖人望甚丹衷曰總以欲忿油麵刳洗浸激乃中節耳又為偏高執幡故因生成之易而化裁之苦心哉正決欲為英雄豪傑賢聖佛祖必先降伏自心然後始能降伏天下必要作佛聖英豪則此心自能降伏世界是個洪爐人人都被世界磨壞是個漢始被世界磨成造化必奪英雄之志始能化英雄英雄必奪造化之權始能雄造化若能為千古傷心之人則能作萬世快心之事人如比干心可剖是何等心心如比干人可友作麼生友人誰不有此心誰是有此心人常啼菩薩賣心肝求般若賣底是甚麼心肝更求甚麼般若誰要買此個心買此心來將何用耶一星真火能成天下之烈焰一滴真水能收天下之狂瀾一念真誠能感天地之化機一念真心能全法界之種性欺一星之火必為天下烈焰所燒欺一滴之水必為天下狂瀾所沒欺師友之一法必為邪異無救之迷徒欺言行之一幾必為萬世自心之劫賊欲求超生死性命何憚而不肯存真盡天下人弄假只成就了個作真之人作真底人既不怕作真底人又豈怕弄假底人故曰天地鬼神刀兵水火極怕至誠猶信不及耶事事物物皆有個天然絶妙只是當機蹉過便成迷倒真工夫只是間忙逆順中無可奈何處自己參究久之自入自開斧鐸問曰不知盤古一斧從何處來的曰我於不得已處忽然感觸著此物耳問感觸後又何如曰我終不敢輕此一問問儀封人中途替天拋出一個木鐸有知其來處麼曰答在問處曰何故用此曰心無師法則不能使六識嚴密如六部之臣服以統六根六塵如六合之泰寧古人曰寧作心師不可師心此心師法又從何出耶將謂衆人師賢人賢人師聖人聖人師萬物耶萬物即天地也天地萬物皆於穆之斧鐸也斧鐸者能造規矩傳規矩而斧鐸即規矩也惟志於公則能致真知而立其大者故物格而無惑物格無惑處處皆天命之流行使初志之不公不大又何能學而不厭誨人不倦如天之行健地之效順而至誠無息哉唯君與師能得此斧鐸則能主教養之道姑析而言之以衣食之教養身以倫常之教養世以仁義之教養情以道德之教養心以天命之教養性以向上不傳之教養神化但標仁義則萬物一體仁也各得其所義也若曰於穆不已則一切皆歸不可思議矣君師授天下臣民以規矩天下各時習其規矩而成天下之巧善取法則自省力善讀書則自會通能戒慎則自悅樂能專精則自入神蓋以習其所知其所不知自悟行其所能其所不能者自成也能盡子道則父母在其中若以養子方知父母恩則為子時皆不能盡孝道矣真忠孝人決不謂自己是忠孝孔子是立極聖人學易可以無過顏子是克復亞聖知幾能不違仁尼山以萬世為國土顏子易短命為長年聖人責君子甚忠責小人甚恕不敢抹殺小人一念之良不忍姑息君子一念之過在君子心上挽救出小人在小人心上挑剔出君子善立義則自貴善集義則豫定不為己甚則大能留後手則昌求人之短雖古聖賢亦有過用人之長雖下流者無可棄口業最利害小則關一人一家大則關天下萬世學道自不妄語始口無擇言者時然後言言為心苗一勘便知不見大慧呵默照之邪禪陽明之言默有四偽乎言語通親眷屬此千古丹頭識得破忍不過是天下通病聖賢必須善讀書能戒懼中來約節得中守約則施博知節則得中浮奢作俑是教法總弊既不慎獨即無忌憚務為太過不及以亂勤儉簡易之道使民不知率從若圖漸次禁制必自主治政者始佛教之制以身心性命為務能就禪經律論觀淨諸宗而參悟取證之又何有濫浮之亂且使俗人看看天半峨眉一陳松風時時過耳其為陰翊王化何如況更有煆煉向上之中道乎救安救樂拈三世諸佛來供養六道輪回之衆生不過此喜懼中發機然贊得人歡喜徹骨不如罵得人刻骨傷心人盡知念菩薩能救苦救難更不知念菩薩能救安救樂苦難易於救人安樂難於救世救得世則出得世出得世則救得世如今還有能救安救樂者乎喫得痾得不特盧扁用不著即草茅庸醫亦用不著然而窮理驗症采藥之醫王終不自空過也普門云念念不空過能滅諸有苦杖人云念念不空過北斗裏翻身或問如何是夢筆曰千峰驢覷花中影進云如何是境中人曰一杖風生天下痕恁麼則恩歸有地也曰馳書不到家如何是選佛曰倒騎玉象趁麒麟金鞭指盡東西路如何是選儒曰春風得意馬蹄疾一日看遍長安花如何是雙選底向上宗風振杖云待你夢見遮一棒著妙協師與丁仲陽王於一諸公曰世法不兼出世法則人多為利欲恩愛所纍更不知有生死性命常樂我淨之妙出世法不兼世法則人多為枯稿寂滅所纍更不知有福智莊嚴學問遊養之事所以世法賴有佛法則性命心親而情欲心遠自不致鬥爭劫殺水火刀兵之競起於人間也佛法賴有世法則福慧心圓利濟道廣自不礙山林朝市凡聖龍蛇之互忘於法化也此言雖淺可以喻深而吾洞上宗旨特立君臣正偏以發明世法出世法之妙協真足陰翊王化密旋神幾信蓮花之法位垂萬古之經綸享帝網之珠宮繼千聖之照用諸公幸同參究自到兼中佛祖聖賢果有二道乎哉譬如甲子一起甲於東方一起子於北方譬如宇宙一衡而平列之一縱而豎窮之實一際也不語怪力以亂神杖人嘗謂盧子繇曰子不語怪力以亂神也神出至誠怪力乃妄其不語嚴矣旦氣世法出世法如一枰棋相似處處能占地步則頭頭皆有先著惟在善應變耳道人知得活子時之妙則念念皆第一念時時皆初子時可信女偊之朝徹孟氏之旦氣亦秪尊此清明一念之能鋭然在躬者自不落昏散之暮氣而通乎晝夜嘗如神矣敬義先難佛法無多久長難得自己主人公立得定造得妙守之不渝執之能變如敬鬼神而務之至密永遠如是雖先難必後獲也雖然義之當為無計得失必乘時行之老聃不云乎執大象而天下往往而不害安平泰此正以能自執其大者而爭天下先也孰謂老氏不敢先此天下之大象乎求道不先於性命急切而自立恐猶未免為泛泛浮鷗隨波而上下矣三驗關子曰視其所以可以得其心之發機矣觀其所由可以得其心之流注矣察其所安可以得其心之落處矣以此三法勘證人之始終豈不毒於莊子之九徵乎傳心丹頭聖賢之功在立教而道在傳心心學不傳惟傳此名教漸變為功利爭奪何以救之使無傳心立命之學為之運斤施鑿終不免以粳秕而陶鑄堯舜之事業矣古人以粳秕陶鑄堯舜者正恐人滯於名教變為功利爭奪也孔子自敘志學而立者知止也從心不踰矩者物格也朝聞夕可而超超大覺不為所知愚矣或曰孔孟之道不能行於當世何歟曰聖人以萬世為土木鐸至今在耳薪盡火傳鑽燧析薪又何嘗不行於天地間耶神而明之存乎其人如能採草為藥煉藥為毒煉毒為丹聚丹為神則能變化天地人物而照耀今古也子知之乎雕像大匠得一良材欲雕佛像必先得佛像之名義如佛有垂手者有擎拳者有高冠莊嚴如觀音者有坦腹散誕如彌勒者既先得此名義在心而立其性命然後運斤施鑿任其橫斜曲直始有數存焉雖未即見容儀之精與慈威之狀而彼匠心應手一一皆率神明而化成之矣至於已成形像則落乎今時名教節義之數矣其立心造命於未形像之先是豈人之見聞所能及至於功成像見於有名義之後人之聲色皆可擬矣是故將發未發之際神聖之所獨慎而不敢自欺者也情見之微凡聖情見之幾乃微細生滅之妄妄惑之起卒不易除或以聖見而去凡情或以凡情而去聖見或復以情激烈其情或復以見摧折其見或以非情見而神悟其情見或以即情見而頓證其情見故有文殊仗劍罔明出定婆子燒菴德山托鉢等機緣正所謂隨其顛倒以緇為素顛倒想滅肯心自許與夫三墮滲漏之語真先聖大悲為法檀度之妙旨也自非深入生死透出聖凡安能入此如幻解脫之金剛三昧哉丹曰衆生勞之乃安安乃肯勞少有一得蚖蛇戀窟或委之天或其力或淺視之不過如此或深畏之非我所及竟亦茫茫喚鐘作甕故必以楔去楔以疑去疑親到乃見其誠然歷過乃知其利害力竭半途因而退步究不知也隴斷迷飲藉以牢籠幾能破之故深入門中之症轉變如此不似世味世斃之易辨也老人苦心哉今之見性多泥神我透脫一路多屬冥諦迷於本覺生滅徒然不了目前有無俱妄猶不感和盤托出之恩乎真切金剛義不見古之英雄如漢高祖以布衣提三尺劍假為義帝發喪之師於諸暴虐王侯手中奪得天下及見沙中偶語殿上擊劍乃思制作法度始於今日識天子之尊又於沛豐見諸父老乃悲歌慷慨泣數行下此皆真英雄到真切所在始有此真憤激真畏懼真慷慨決非後人扭捏得出描寫得出如漢高到此豈能即了帝王之局哉縱於後來殺叛臣困白登屈后妃囑平勃安劉氏恐此心尚未能即盡也夫高祖不過為雜霸之業萬一不能企及三代之聖明尚自如是況此大法時機可一言一行一事一緣即能盡哉然此時機惟佛聖英雄乃能言言步步推緊將去始見大業之盛弘願之深也空生不是關初一番希有請法後此一番悲泣希有則何以見深聞此經者必須説到行到始能曲盡門庭堂奧之妙密哉噫嘻英雄不遇真知己寶劍磨來付與誰知命不知命無以為君子吾亦謂不知命亦無以為小人蓋小人實托命於君子也此命豈易知哉知命知天也知禮知地也知言知人也知故夢筆詩曰天下藏所以時與機自翻知此所以則知天下之故知此故則仁無不明明無不誠誠則無有不能盡己盡人盡物以參天地贊化育皆此時機之自輪翻也學易者本諸心徵諸俯仰遠近故不為爻象所迷明心者本諸易以定時位條理故不為情偽所亂凡此皆有其故知其故而慎其感則分合之幾不起離岐生死之變不生疑炫且能以分合贊化育以生死利性命焉知此故則能通乎晝夜而知即知此陰陽分合為原始反終即知此生死之故皆天命流行之妙也此故全在原反二字即用九用六之用如不知生死之故如何能用原反如不知原反之故如何能用生死如能用生死則能用九之奇用六之偶用九用六即所以旋天幹地而用天地人物使各自正其性命矣裁成因宜天地之生如桃之種自為桃李之種自為李火之熱自炎上水之濕自潤下不能使桃李為水火使水火為桃李即有能使桃李易種水火相濟亦其氣機之自然也又天地之能生此草木金石也不能使為宮室器物之用雖有可為官室器物之用亦必聖人之學乃能使之而裁成其用也又如草木金石有寒熱補泄之性情可為藥石要亦不能自治必聖人之學始能察其性情制其氣味而用以卻疾延年起死回生乃助發其身心性情之靈妙也觀此則其可能不可能可與不可與是誰所致不恍然耶徵信莊子曰聖人之靜非曰靜也善故靜也非所謂靜而無靜者乎六祖曰若要真不動動上有不動非所謂動而無動者乎理外之事是為事障事外之理是為理障猶不信事理不二而事圓理畢耶向上圓滿歸無所得而首楞嚴譯為一切事究竟堅固猶不信本來證空而日用安理也耶一有多種二無兩般是法住法位世間相常住猶不信一多之相貫而秩序永不壞耶能隨境沉智與理泯猶不信素位即無妄想而中節之為兩忘耶本末盡歸宗尊卑用其語萬物各有功當知用及處猶不信物皆是我謂之無物心泯於物謂之無心耶然則宗門之燈籠露柱庭柏布衫果何謂乎然則易經之龍狐鬼豕杞瓜梯楊果何謂乎神明者見一而知萬故會通象宜而賾不惡動不亂也世人見賾為多所迷見一又為一所迷矣安望位中而時出之學者須自徵信乃能致用杏花影人宰天地藏悟於學學而時習之一篇開口揭盡人宰天地之宗旨矣若無此習雖有此時亦不能得此心學之悅惟得此悅乃能有以及人而同得此樂也不到與人同樂又安能使人於生死性命不可知之處而不慍其無所倚以相冥於無聲無臭之天哉即此是夫子作而能述之行狀亦是述而不作之張本也此章三節首節是為未知學者示其為學之心法即在明明德也次節是為已能學者表其為人之化功即在親民也末節是為學已成者指其歸宗之密旨即在止於至善也天地人物安身立命其以此學為祕藏乎物則心矩無外無內日作日息消息偕行生生不息乘龍御天成位乎中而時出之時義大哉故曰性在習中時習者所以享其不習之性也未致未格學為功力已格已格學乃茶飯也丹曰下學而上達達上而學下無上無下一見永不再見直下素行藏萬世於學時學而不厭誨人不倦固是其緣不得已亦正是其隨緣放曠樂以忘憂耳習坎八卦單名而坎獨言習何也習坎維心亨乃行有尚非習之於心則不能亨惟心必以能習坎始悅也惟習乃知學之有生死性命吉凶悔吝之險也必先迷而後得也必先難而後獲也必於亢而能有悔而不失其正也必朝聞此道而後夕可死也必於死中得此不死之道乃為可死也如忠臣孝子義夫節婦必能知此義命之可死而後能死也亦必能知此義命之不可死而後能生也知此然後於生中能死其心於死中能生其心也如於生死性命尚未有能行故不免借水火刀毒而後能死未能得原始返終之故知時知幾獨往獨來談笑而化也如紅銅欲出其血白銅欲出其鐵空中欲出其火水中欲取其金豈無故而能然乎此人所不知之處如未曾習此生死性命之險何能入險出險行有尚而不慍此旨哉此莊生所謂疑始之學是其險也惟以疑始而創發乃能攖寧所謂攖而後寧疑而後悟撥亂乾坤後見太平雷雨滿盈經綸乃建是妙在使人先迷後得又妙於先得而後能入迷夫豈世人之所知乎所以天地無情不與聖人同憂聖人有情能與百姓同其患難同彼習此諸險而後共濟此生死性命也聖人不能自濟而悅則此心命尚不能自有何能有父母兄弟妻子與有朋友自遠方來而就我而共濟此險為心亨之樂哉所謂樂得天下英材而教育之而於從政乎何有亦可使不識不知者相與順帝之則也如夫子之轍環天下至於削迹伐木畏匡厄陳栖栖遑遑無非樂天知命如乘六龍以御天也人不知習坎之妙視之為喪家之狗而夫子自習其坎中之心與天一之水泛於八八卦爻風波之上信其中樞旋機不動感通天下衆星拱之南面聽政亦是習坎繼明故禮記曰政者聖人所以藏身之固也格物致知需於酒食也大畏其民是非之志使善惡之無情者不得盡其辭豈不是人自不能知而我使其得不慍之祕乃為知本之學哉夫子亦無知也有鄙夫問於我是彼已有知也我則空空如也扣其所知之兩端而自竭焉則彼有知亦還無知與我相冥於空空又何慍之有此聖人神化不可傳之學也必先得而後能迷也必悟了還同未悟也夫婦之愚與知與行是順帝之則也及其至也雖聖人亦有所不知不能此中容不得知能也知能是性命之隱怪是生死之結根也知能是毒天下之毒也惟聖人能用之以毒天下之隱怪亦以不知不能而亭毒天下之生死也如天地之大常自無情而運行其生育萬物之多亦常自無情而承受其功化兩皆無情而未嘗不各自安其性命之正也彼又何嘗相知與相慍哉聖人以我忘天下易使天下忘我難擊壤而歌帝力何有而堯始可相忘而無憂也人不知天地之大自有太過不及故猶有所憾實於天地與己性命何加損之有哉是以語小而無內天下莫能破也語大而無外天下莫能載也此正是人不能知而自不慍之祕旨也如鳶飛魚躍之機孰使之能然哉卻能與天淵兩相忘也此何習乎能使魚習於天乎能使鳶習於淵乎此知能之所不及也魚鳶亦何嘗自慍其無此知能為不及哉天淵是鳶魚之天乎能飛能躍是鳶魚之天命流行乎習坎而心亨不習無不利有異同否習察之祕食鮮知味然矣將以不知冷熱甘苦為不知味乎將以不敢噉石吞鐵咽火服毒為不知味乎聖人惟自習習人察至夫婦鳶魚無知無能處乃能放身捨命與無情天地同流故無適而非此中也而小人於此視聽言動尚無忌憚而不戒慎又何能習心於喜怒哀樂未發之前而慎其莫見莫顯之幾哉世人之所以陷於二陰險昧之中者正是陷其知能於知能卻乃慍聖人不能如鬼畜之迷於五行以為知能故終無自悟性命之天而享其時中之主人公也毛燦曰且有襲倚其不知不能慍聖人之學習為多事者是其陷於二陰又何等哉禮會仁智學擴仁智易繫傳言智崇效天禮卑法地為成性存存道義之門矣又舉道善性而曰仁者見之謂之仁智者見之謂之智其下即曰顯諸仁藏諸用但表仁而不言智何哉藏諸用即智之事也博文約禮則顯諸仁矣故曰易有仁智而無情識非無情也節情率性而不違其秩序天則也非無識也破識用智而享其神明鏡照也好仁弊愚好智弊蕩而問學者用識化識遊心養心者也禮則會仁智而使民共由者也水可析可合火因膏因薪體物者誠物格則神禮也學也聖人與萬世析合膏薪烹蒸麗化之藏用者也大心精心戒慎恐懼惟危也不睹不聞惟微也有物有則惟精也無聲無臭惟一也大心欲統天地而不踰即邊是中之矩精心裁成四時而造此參兩貞一之命鑑針春秋季彭山曰春秋之所謂懼者不逆之於勃然動者之不可忍而牖之於隱然在者之不容息非懼其書我而不敢為之謂也丹舉以問杖人曰因是非還是非即謂之無是非不必復為之回避矣然如推論不日以為刻核則郭公夏五亦寓譏貶耶何怪斷爛之姍乎春秋懷之故是忠恕之書也丹曰司馬談宗道家無為而遷史記倣春秋不與其父旨違乎杖人曰談執遷手云周衰孔子修舊起廢至今五百歲有能紹明之正易傳繼春秋本詩書禮樂之際意在斯乎是遷奉父命也遷之大孝也又所以申明道家之大用也曰草野作春秋亢乎曰時亢而亢則悔亦龍也宰相非天子政府即朝廷尚有疑耶假馬孔子侍座於季孫季孫之宰通曰君使八假馬其與之乎孔子曰吾聞取於臣謂之取不曰假季孫悟告宰曰自今以來君有取謂之取無曰假杖人曰聖人救正天下萬世只在一字愚謂君取於臣不曰假則臣進於君可曰與乎黃坤五因言名為五欲之一達人視聖人舍身立名教大似生銀入銅乃可用耳杖人曰聲聞為我便欲斷滅且問此欲成聲聞乘之我非名根乎福果則利根也立教必正名故曰名不可得而好不可得而避此中道而立之教綱也入道真實須全放下才著名想便為名鬼所噉矣果熟香飄隨緣行化故曰名空不避名聖人立命不落因緣之見聖人裁成不落自然之見故知其所以然行乎不得不然即嘗泯於當然是名教即自然也但未過屢空卓立之關者未可同日語矣陳不占齊崔杼弒莊公有陳不占者聞君難將赴之比去餐則失匕上車失軾御者曰怯如是去有益乎不占曰死君義也勇怯氣也遂往聞鼓聲而死杖人曰特地離微其義乃著孟子以兩不謂發揮中庸之三謂水中鹽味色裏膠青不於此剔一燈乎智曰藥止可以醫血氣心病還須治神此可悟全盂全水全清全光不二不一之故矣丹曰晏嬰於莊公之難曰獨吾君也乎哉非其親昵誰敢任之弘演則曰安得選無過之君而後死之二者孰是杖人曰既能舍身何不平日引君于道之為得乎然君亦有諫而不聽者自視其職何如可以引去則獲明夷之心於出門庭亦一道也論事之書且快發其一節焉已耳丹曰卓吾謂趙苞溫嶠為殺母逆賊然乎杖人曰迫於重親猶一丸藥之決曰救父耳苞全城而歸死墓下復何咎乎溫嶠為國固自有辭然不能臥薪嘗膽以感激同朝臣子而乃以紗障謀豔煽又何辭以逭責乎徐庶曰今失老母方寸亂矣入魏而不獻一策以老是亦一道也智曰先廷尉公言觀趙苞之苦凡仕危地不當迎養沛公先迎太公居漢中豈有俎上之事哉後周宇文護以毋在齊而緩之馬超棄父擇主固何如李璀也無故使人縮高其親豈能望竇建德赦李績之父乎何可不審獨孤寒曰達人知事執之固然先幾遠引不受人之職即可不殉人之難此莊子休所謂養親盡年者乎杖人歎曰既落人間業緣難避隱讓環中堂曰田單可以有齊而不有郭子儀可以有唐而不有朱虛侯可以有漢而不有皆隱讓也杖人曰隱讓自泰伯始非孔子稱之誰知其為至德吾故謂丹朱為大孝子甘心不才而以天下讓人成父之志亦隱讓也莊子首表堯讓天下與許由是為讓書高人達士不與天下爭而別行一路且以自娛亦隱讓也正諷奇諷光武欲廢郭后以問郅惲惲曰床第之間父尚不能得之於子況臣能得之於君乎然古來廢后奪嫡往往亡國願陛下慎之其對太子復勸以順為孝此最善處人骨肉者語正而婉真可法也唐讓皇之遜明皇蓋觀此乎何魏徵之智不及此李泌之爭太子迎刃而解藏鋒應機得庖丁之神者乎然終不能救建寧王倓事固有不可盡論者諫有五孔子取諷有旨哉魏武立後不決以問賈詡詡不對曰何以不言曰有所思曰何思曰思袁本初劉景升父子耳此奇諷也德宗欲復用盧杞以廷爭而止轉別駕泌曰連日比陛下於桓靈今日此舉則堯舜不如也胡致堂乃曰何得以堯舜獻媚迂哉程伊川有方長不折之諫司馬溫公曰它日使主上不欲親賢殆此故也內黃舍人兒項兵欲屠內黃舍人兒十三歲數語救之范增坐視坑秦卒屠新安乃不如此十三歲兒耶鴻門舉玦長沙之毒背疽早自此發矣矢人函人擇術烏能無感營脫鸞傭曰阮思曠以虛譽無實王敦出之於外劉伯倫為建武參軍以無用罷鄭綮歇後亦此類也費貽漆癩郭文不妻不肉袁閎土室非故為己甚以為非此無以營脫環中堂終懷詩曰熊道生掃門韋祖思誤拜辛謐甘不食王尼車早壞龔壯稱耳聾王嘉竟負債古人善支離神仙亦針繲變名棄妻子不知其所在采藥亦遇毒針砭莫驚怪獨有華山翁一墮何如快杖人曰德充符以王駘一輩寫魯國申夭之化身其上律下襲之針繲支離遊於列國是誰知之正為時乘六龍別峰異類隨處肥遁自非世人之所測也簡傲非道丹曰舐痔兼車鳴鳶吝腐以茲自口於焉玩物殊異虛舟有同攘臂此晉史之論莊子也自參曰老子謙退莊子簡傲然乎杖人曰讀書須善讀古人之書不則誣古人且自陷矣隱居遣放郭象以為放而不傲阮籍所謂致意之詞也讀莊子如讀樂府乃以告示例之乎韓非解老慈故能勇遂流潛礉將以罪老子耶言因救弊法久必弊在後人之善用以濟之非委於至理之弊也老子言亦刻峭而當時自處謙退接人以禮故孔子問禮於老聃約禮為仁遜以出之遁象不惡而嚴以禮故也莊子亦曰以刑為體以禮為翼謂內嘗戒懼不起妄念而外以禮隨順世緣者也戴安道宗老莊而履禮深以放達為非可謂有見而奉重者達士取快往往置愚不肖為不足論而專責賢智故出口若與經訓相翻耳形容孤硬便似簡傲形容不犯鋒芒便似波靡況以鬼神寫照乎況加以才人之賞怪而搆虛乎故曰善讀書者貴知實際王尼王尼見何綏簡傲之書曰伯蔚居亂世而矜豪乃爾其能免乎或曰伯蔚聞此言必相危害尼曰伯蔚比聞我言自已死矣及永嘉之亂何氏無遺種管輅見何晏夏侯湛而規之人或以何等勢盛輅曰鬼燥鬼幽其能久乎丹曰管輅亦夭而王尼且死車牛之下矣杖人曰世亂不可概責而風尚確有其幾定數固莫能逃而君子貴乎自盡嵇叔夜以倨鍛致殺豈莊子之旨哉昔慚柳下今愧孫登此其回光語也不可以廣陵散之從容與夏侯太初之霹靂倚柱而為之解也馬伏波竹開嘗舉馬伏波戒兄子不得言人過失然書中述杜季良之行非過乎其後季良仇人據援書以訟季良梁松因救季良不得遂恨援而搆之禍則援亦有以取之不獨受松之拜也杖人曰雖然果能瘖乎或責援以老不知休則彼受之耳在毒霧中自念少遊語乘下澤車何可得也據鞍矍鑠未免見長殷深源王安石殷浩北伐既敗廢居東陽桓溫遺書示引用合僕之意殷開閉十數竟達空函史蓋譏之杖人曰其玄沙之白紙乎兵非高士所能一試不中摧幢折牙深源豈不自知而乃與流俗同醜吾知其必無是事也一日閲湧幢曰殷答空函斥之也咄咄書空蓋已超凡界入初地矣道生之對亦是至情後溫果殺其子涓以報辱桓玄得志痛詆浩以成父志劉裕建義止競武功何暇改正故晉書有二大冤屈事桓氏之於殷浩王庾之於陶士行是也丹曰相如通西南夷陸機入洛建功殷浩房琯之敗皆不欲以文士自居亦因世不憐才而以文士輕之遂爾強談經濟賈生治安策著於長沙將以陰折絳灌三蘇之策揣摩可觀未必可行也杖人曰經濟不可強營固也士子居恆安得不講求經濟近代陽明能作事者以悟得實際故人情物理不能惑之吾嘗惜王安石遇天子知己而為國無功者正如參得一橛禪不知差別智所以全昧物理而辦事不效也世豈有官吏與民貿易而不侵牟者乎豈有欲收青苗錢而弛禁令人私鑄者乎曹孟德初置校事魏文因之程曉言其弊王安石欲箝口乃置京城邏卒其智不及程曉遠矣形神相離不得不騷離騷者言乎形神相離而不得不騷也卜居漁父反復自盡道法時位安於所傷緣不得已也太史公非屈何以知其志與日月爭光原其救少卿一事真為國家非為朋友其志不得自明且得罪焉是以悲屈而自悲耳學道者亦有形神相離不得不騷者乎亦有悲人而自悲者乎噫元亮靖節作乞食詩無非一念所激恥食世粟其曰愧我非韓才蓋自傷也子美曰淵明未聞道達生豈是足黃山谷曰世執此詩以貶陶非癡人説夢耶縱浪人化中不喜亦不懼而葉夢得亦不肯陶何也杖人曰不妨癡人説夢杖人全集跋道法之時乘也代錯之本不二也自非靜正不禦專入甚深窮盡上下四維而止有一實者未易語其故也事以時起道以法行教立尊幢為衆所射百家蜂午關責互起烏能免乎智嘗以醫學喻醫王而表醫醫之願焉運氣經脈三才同符靈素舉之而人不盡達也張仲景提出傷寒為重而論之劉河間以傷寒為熱病治用寒涼而張子和汗吐下實宗之李東垣辨外感內傷而闡扶陽之論朱丹溪謂人身陽有餘陰不足而貴滋陰之方薛立齋則發揮腎中有真水火其説各別似乎冰炭非欲為異也務發明前人之所未發者則專言之其已發明者則略之合觀而體究焉皆本具者非人力所可誣飾也後人不知集大成而後能應病豫藥乃囂囂然倚一家而執之豈不蔽哉況以偷心便其苟簡易以歡門以婪心縱其恣睢詭以障世又挾單方燒靈素乎我杖人橫身于刀兵水火求天下大傷心人與之擔荷傳真宗旨時至此時喙鳴矯亂必通其故必集大成方能知天下分科專門之利害而用之各隨其類就材食力固也待其人而後行具大過人之資發公願力窮盡而統御之乃其所望也欲集大成正知遍知徹上徹下何可以己格物之則內外互徵目不敵日盆水映之無逃也恃自直之箭則中鵠無矢恃自圓之木則行地無輪規繩檃括而得法者簡矣蘿必不可以箭樗必不可以輪盡性而善因之順理者易矣每歎言法言性二者聚訟言守成言盡變二者詎免齟齬耶夫信得先天之仁智而真性不死自知後天之奉順而妄心不生猶乾道之健行而無息坤道之有功而無成也猶有一吷焉聖人見古今備萬之大獨而知宙合混闢之貫幾天無先後中具條理更何疑乎末流學者速於見利規矩偭錯不盡其誠巧於護短怙氣矜勝奇幢尊我易失毫釐匿以埋伏使敵開戶以奪為捽使不及距急口之直執硫使炊無星之權向空筈箭袛為利器示之故流弊用罔耳破庸籠破空籠破疑籠忽開參膺旋覆頂門還其重瞳隨宜鏡照口司飲食言語時有開閉而鼻下垂二孔本無開閉也蓏理相齒倫脊忘言是尚為綴旒所縛而犛靬所炫哉嗟乎時哉鳳山杖人忽發堯孔托孤之論而鹿湖老父亦致竹關下宮之辭時節因緣無容回避土木同緯歷天適然安於所傷習坎自盡業已一門深入豁其通幾公因反因藏于代錯各一本事即是共一本分直下原無岐見復何噥噥本于無私而遇緣即宗同患至密而決于中節夫豈憂本來於穆之缺少乎杖人觸處創發而中切脈之針經反因痛刺而順新硎之刀理非許常人可以濁識浮情學之者也如無其人何敢漫責一橛者一橛別路者別路約於不欺而泯於薪火識大識小道自不愁斷絶藏天下于天下已矣故就杖人三彙稿而芟煩去復歸決於此此固午會全彰集大成之雷雨也安知無傷盡偷心觸此自奮者乎鳳山孝人弘智謹識天界覺浪老和上全録佛弟子王梅張伯升倡首流通伏願皇風洋溢佛日增輝天下太平法輪常轉佛弟子熊進學助刻天界覺浪老和上全録伏願皇風洋溢佛日增輝天下太平法輪常轉信官耿繼善繼美助刻天界覺浪老和上全録伏願皇風洋溢佛日增輝天下太平法輪常轉佛弟子呂應陽夏有德繼旺廖廷貴王惟明高世勳金有登朱雲登董一奇楊樂平徐弘勳鄭正詢孫元禔申振祖劉士惀助刻天界覺浪老和上全録伏願皇風洋溢佛日增輝天下太平法輪常轉
