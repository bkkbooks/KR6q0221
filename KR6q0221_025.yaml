body:
  text: 門人大然弘智大中大充較説麗化説余昔於匡廬作五燈熱序發明吾宗傳燈命名之意蓋火藏光無體因物續焰而師資投機之際各自得此熱焰始能傳受此神不則徒於光影門頭妄自玩弄於心性何有發揮哉嗣於桐城與諸公談易嘗以先天之火為神妙在附麗於薪燈始能脫化此薪燈之神亦惟此火神之能脫化乃能附麗於萬物而轉轉脫化此神自不斷絶如麗而不化則成執妄之迷化而不麗則成墮空之失矣火之分合能傳而成生生不息也大矣哉因作尊火為宗論參合華嚴法華以借象取義而闡發之或曰從古謂土為五行之主今以火為宗無乃矯先聖乎曰以土為主者會天地已成之數定位而為中極也天地未成之先則當以火為宗而陰陽五行始皆得成就也何則先天之初無聲無臭獨有此點覺明之火為造物主運陰陽之所以變化五行之所以相生皆此火為神也如水木土金皆有形質自守可以執作玩狎獨火為神操存舍亡出入無時莫知其鄉此心之所以屬火也然五行之火猶有相可見至於藏為太極使靜極生陽動極生陰為萬物之化神是天人之不可測也有先天之火性為太極本有後天之火神為太陽元有無相之火精為五行體有有相之火氣為生剋用以故天地人物之先非火不能生天地人物之後非火不能養水非火不能自潤木非火不能自長土非火不能自和金非火不能自堅即人生非附麗于父母精血之火不能脫化成胎身非火不剋化飲食而長養骨肉形非火不能出力作勞命非火一時不能久存即人垂危心上暖氣附麗雖暝去尚能復生心上暖氣才無四行雖在終不能起人之死尸有陰魄附體者與所葬之地有暖氣溫養其年雖久啓壙儼然出土見風即時敗壞此天地人物之餘火尚能如是況有心之精神以為聖者如日月燈明之相麗寧不足以充塞乎天地而默成其人物之位育哉又須知此火以性空之火為主有智慧火緣生火有無明火業識火有瞋欲火癡迷火有冥陽鬼神無根之火各自麗化而有真偽大小之不同也一等陋人不知魂升魄降因於業力尚有精爽之火性妄謂人死神滅無三世因果善惡報應之説反指佛氏為異端虛無寂滅之教去人倫絶天理而排闢之夫既以佛為虛無則不應以因果示人倫使悟生死而證性命以教為寂滅則不應以報應明天理使擇善惡而全心神不知所謂去人倫絶天理者莫大於誣人死神滅也人果死而神滅則此後人類從何出生若謂天能降衷於人道之大原出於天是天為有性情之天乎為無性情之天乎謂天無性情彼既自無性情何能有性情與人謂天有性情則天與人同有性情不可以性情分人且此天獨居何地乎謂是無地之天天而無地則天亦無有作為不應如此紛紜降衷與人若謂此天是上帝之天與三十三天梵釋相類則當是有性情之天能作善法樂五欲者也又如是天降衷賦命之人是有性情之人乎無性情之人乎若無性情之人彼既自無性情又何能受天衷命若有性情之人彼既自有性情如何又受天之衷命此衷此命是有性情之衷命是無性情之衷命若有性情之衷命則人之性情已有之如何更受天之性情衷命若言此人原是無性情之人因受天之衷命而後始有性情是則無性情之人從何而有且能承受天之衷命乎不然土木金石本是無性情者亦當受天之衷命與人同有性情則上帝之可天可人可空可物亦可以分合同異也人既能受天之衷命而不知因果乃自滅絶其神不特人如傀儡不能祈天永命而上帝亦何其易於息機乎上帝既能以衷命與人何不作一永命之人如天之自強不息生物不測與高明博厚同其悠久乎陋者又謂人稟於天之清者為聖賢為仁善稟於天之濁者為凡愚為暴惡如此則人真似木偶既無性情不知憎愛懵然受天所賦聽彼清濁任天戲弄夫上帝好生只應平等為心何當以清賦此以濁賦彼使順逆相反自違其天命乎或謂上天原不賦人以清濁世人稟受於天自有清濁而作善惡則何謂作善天降之百祥作惡天降之百殃救者曰但人作善惡天乃因而賞罰之也豫謂上天既不授命於人而人自為善惡如我無借貸於人無端索償是天何橫逆如此而不聽其人之自作自受乎或又謂天之賦卑原無彼此如一器物與人善用則順而昌不善用則逆而亡如此則又落在佛氏之因果報應也世人不知自心循業發現而有聖凡依正之報強以聖愚貴賤善惡壽夭皆天命所賦又何知自性之天自心之命所感見之同異乎若果是天賦天何賦堯之清而聖又賦其子丹朱濁而嚚以報之既賦瞽瞍夫婦以頑嚚則不應賦長子舜清而聖以報之既報長以清何又賦其小子象濁而傲以雜之如文王武周父子之清聖而又報之以管蔡此非各自循業之報乎蓋人自心天命之流行逆順以成因果也彼上帝之天蒼蒼之視亦何能如此分合同異之不可類而齊乎試以易理推之乃知性命之神不滅不可誣也聖宗之道莫精微於大易聖人未作易時大易不傳之理全在天地人物中及聖人作易後則天地人物生生不息之理皆在大易中豫以先天後天表原始返終之故而以乾坤為樞紐故有乾元用九坤元用六為聖人幹天旋地之妙若無此用則八八卦七七蓍皆無情之物無以通變化行鬼神也世人讀易訓易往往蹉過此二元二用未嘗專提出也又何處見聖人能致中和參贊位育二元為大經大法二用為大功大能哉乾坤是先天定位變化之機全在後天坎離復姤二爻為天根地柢之元是為九六之初此慎獨之機精一之祕天人之竅性命之關中和之宗位育之本能用此九即能原始而出生能用此六即能返終而入死所謂原始返終知生死之故通乎晝夜而知者既不知此何知朝聞夕死之道哉更須知陽之出即六為九陰之入即九為六陰陽元是一氣以出入起伏別為之名耳即人一身呼之出為陽九之升吸之入為陰六之降督任二脈即乾坤之二元何曾有二氣之不一哉吾故曰聖人通乎一氣之變化而能出生入死以傳神凡愚昧乎一氣之死生而為生變死化以失性能知此則用初九即用八八諸爻之九用初六即用八八諸爻之六一奇一偶之交錯須剛柔相濟始成兼到之中和惟聖人能用九即用六用六即用九故能通變化而行鬼神與人物造命賢者只能用九六而奉承天命順人物以各正性命百姓則但為九六生滅所用而且顛倒生命悖逆天理為失身失命之徒聖人之所以與百姓同其憂患者獨用此九六之神設為道教以制禮樂刑政曲成其人物之九六於可安立處不致自相賊亂也豫嘗曰造化之妙必附麗於天地人物始能脫化其精神以成中和位育之元元不息猶心神之附麗官骸大道之附麗器用也太極必附麗於八八卦爻以摩蕩使諸卦爻亦自附麗於屢遷周流者正以能脫化於生死易而不易也夫至聖莫過孔子猶自附麗于祖述憲章上律下襲為始終一貫之時中孟子亦善於附麗私淑以攝清任和而脫化焉夫附麗諸聖而集成者是自能擴克會通神明統類曾非假於外鑠也吾宗傳燈亦此旨也世間山海虛空草木金石無不有火以無人能取用故自埋沒有人以燧鏡鑽斗而取出之以附麗於煙紙草木傳諸鐙灶其用無窮謂有傳者是師資相激初投機之時也謂無傳者是師資已印契之後也使不傳終似廢物而自埋使有傳還似借光而未發又況傳受之有善惡邪正為聖凡升降之各異可漫漫哉世法不悟河圖洛書洪範及五經四書老莊諸大子史未必能會通精一時中之道如出世法不悟華嚴法華楞嚴唯識諸大經律論與宗門傳燈諸録未必能會通性相一多相即而通達佛道也夫不善於陰翊王化之不逮與折攝邪外之同歸者正以各坐於宗教一偏之枯也故豫獨於易旨三致意焉古人有謂易取意於畫前而實傳神於畫後畫前之意即太極也曰易有太極是生兩儀即此太極是先天後天之本即是伏羲一畫此畫即負陰抱陽是諸畫之宗未曾以有無而名之號曰太極又何必加以無極乎此中須悟通變化裁可也周子云無極而太極將謂無極是無有方體就萬物統體言之太極是會其要領就一物根柢言之無無極則太極無所本無太極則無極無所寓乎朱晦菴極力闡發未免支離夫加無極於太極未嘗不妙但其説不圓反失通變後人泥無無極則太極止足為一物之根柢如未加無極時則易有太極皆不足為萬物體統可乎邵氏曰未可以有無動靜言而未嘗離乎有無動靜也夫對有極言無極而不落有無號而太之尚不執一可執二執三乎後人有謂宋儒雖能發明聖學亦多有蔽於注釋之臆見杜撰失其本來面目者不若還經本文令人於八面玲瓏無牽掣障蔽處自尋自繹必有得於祕密通乎聖人命意之微也前古不論即孔孟亦於絶學時深思而通之周程陸朱亦於絶學時深思而通之雖通之有本末大小安知後人獨無如孔子之賢於堯舜者哉古人著作如醫書雖一家法有各善者或著脈經或著病機或著藥性或著炮製或著成方或著醫案必須合異為同而用之則神更有善於著作者則取其親切要妙以會通之如煉成金丹只待人解吞耳秖如寂然不動感而遂通天下之故此一故字即是造物無盡藏也大易以感而遂通之故有八八六十四卦無不經緯之此感之時義大矣哉天地以陰陽交感而化生萬物聖人以德政感人心而化成天下如卜筮法於人未感一爻時則周天諸卦皆寂然不動曾無吉凶悔吝之可占天下之賾在乎幾幾者動之微也幾之未動神亦莫測以故聖人之明道設教先命人慎獨審幾正所以慎感感是危微之端中和之兆此而不慎則成習不著行不察無所忌憚而放辟邪侈尤難於審察制伏也故吾以罪莫大於不知念起神莫妙於能見幾先幾先之妙在爻爻交易中見九六之用在念念遷變中神幾感之故與佛華嚴諸經甚合偈云佛身克滿於法界此即寂然不動太極之本體也普現一切群生前此即諸卦交錯成文之象也隨緣赴感靡不周此即感而遂通天下之故也而恆處此菩提座此即成天下之亹亹何思何慮也雖然此感之故先須悟得始不為妄想境界所感而生執著顛倒聖人悟此感之故故能用九以通天時用六以行地利用九六以成人和我佛悟此感之故乃曰奇哉一切衆生皆具如來智慧德相但因妄想執著而不證得我當教以解脫之法使各自證得然則佛雖自悟亦必附麗自己智慧德相用之以示無性緣生而脫化其一切妄想執著以證緣生無性又能使六凡四聖皆得附麗我五時説教以脫化其智慧德相於拈花微笑作教外不傳之宗雖皆屬一真法界惟佛祖能徹悟心性圓滿果因附麗於十界聖凡以大權方便脫化格外機神傳此宥密為法界主中主也是則皆以明此幾感神其麗化因根之利鈍以成自他受用一真之法原無大小先後其機宜在人自悟耳莊生謂薪盡火傳人或失於附麗豫以火麗薪傳人當悟此神化今人心之火初失於藏而不能善取次則失於取而不能附麗後又失於附麗非法而不能傳此真神即真火藏之於太極必因感而後應如世火能生水木土金實藏麗於水木土金中亦必因感而後脫化如龍為火之至精必藏於淵海之至密非附麗於雷霆風雨亦不能起蟄也故太極火神必先附麗於坎二陰中當坤盡子月之半一陽始來為地雷復所謂帝出乎震以躍乎龍門而入於巽方乃相見乎離為九五之飛龍在天與天地合德四時合序而後成乎離中一陰姤於乾底而致養乎坤以麗澤乎兌而戰勝乎乾後入天門以勞息乎坎而成言乎艮此即原始返終而貞下起元也乃知生死之故以通晝夜之道如循環之中虛而無有端倪可得所謂時乘六龍以御天以聖人能用九於附麗故脫化為無首無尾可見此先天而天不違後天而奉天時即薪之傳火燈之續焰而教外別傳特嗣過現未來三世日月燈明之所以然者必如此也華嚴一真法界以寂滅場地香水海中之藏為金剛際此正水中之金坎中之陽為善財童子之初爻純粹精之不雜者是慎獨精一時中克己之第一念也人心道心渾在厥中之隱見惟大人能克念作聖緝熙敬止不失赤子之心則能福城東際發於帝震群動之初如海日出於扶桑遇文殊之根本大智而法乳成人儼然巽順而附麗於南方離明獲五十三善知識之差別智而脫化於普賢之行證得致養麗澤於坤兌之地位始得慈氏補坎之處以成純乾而入毗盧藏身樓閣之重重涉入涉入重重之妙密初從體起用此攝用歸體正以太極如一真法界之主中主也著述大經須華嚴為原始以人地為宗佛於寂滅場發用法華為返終以法乘為主法以大牛車歸體如善財之子陽為復卦之初心龍女之午陰為姤卦之初智能悟此初心之九初智之六則於法華華嚴大易河洛隨得之淺深而了生脫死成佛作聖世出世法曾不離此一真法界也世人謂佛儒之分者皆以人智之見自別利鈍之根自殊耳夫一心之外豈更有異法可得哉人知木石中有火不知善於麗化者終於木石之自置也木石中火須以刀錐取之以煙紙度之以草木接之以鐙灶傳之則聽其無所不用凡夫既無取法火神何自而發乎外道不善於取以刀錐擊碎木石不特不得火神又且失本來形性於空亡斷滅二乘之人雖能善巧而取於五識浮光迸出分段生死正如時禪忽於聞聲見色驀然有省究竟墮無事甲裏還守幽間坐變易生死之枯木寒崖異草青也獨有大乘利智能以大行大願之刀錐取一真法界之火神附麗於機緣之煙紙傳受於宗旨之薪燈以脫化其十界五蘊識精之變易生死為等妙大覺之三身四智以妙協向上不傳之火神也是誰得此一錐便能透出眉光迸出胸卍與我輝天照地密古藏今於言象之外哉後世學人咿唔章句依通識解尚未全知至其為人處何曾於事理險絶處頓斷業識得根本真智然後於一切生死險絶處證差別妙行於事事無礙境界通變此遮那神用乎大易乾坤開闢後繼以屯蒙立君立師天險莫過於雷地險莫過於水水雷之險難作草昧英雄之妄想皆起非有初爻之妙智真主從地震作能自建立以出經綸而破惑亂則天下之無知妄作何自寧息吾人同陷於險難亦無自而出矣故先立君以嗣天地位育之象蒙當初創則人物皆在山水草澤間相渾何能使一王之法即時家諭戶曉仰體力行而無犯其功令哉苟不立師法教之以居倫處世之方導之以安身立命之義則天地何自以為天地君臣何自以為君臣乎夫立君所以能成天下之經綸者能用來復之初九為天地人物之本心用此以習入坎出坎之險如龍之潛於九淵乘風雷以出而為天地之文明所謂習坎維心亨行有尚心之不亨行何有尚太極真精不入坎出坎又何自而經綸天下天向一中生造化人從心上起經綸此一何一即坎中之奇一即厥中之精一此心何心即復初之天心即時中之道心不入坎出坎此一此心又能自用以見事功哉此一此心猶是太極動後之一心太極未動之先求此一此心皆不可得凡大易中之陰陽動靜皆動後之陰陽動靜如陰陽之後又為水火剛柔皆後天之陰陽也此非讀唯識者安知有心丁心所與三細六粗之次第亦唯頓悟向上全提之妙者則非性相事理之所能擬議也微乎微乎更以幾感之故論之如火在木石中無善巧以出有無之險何以得此火神為傳心燈之用世人全心陷於癡愛事法中陽明之智不習善巧何自而出如孩提之子雖秉二五之精純如泉在山巖險固中非得水脈鑿而導之何能因始達以漸至於澤及天下哉孔子開章便道學而時習之即習此心坎使心亨也應知天之險於日月星辰也誰能仰而觀之以得其文地之險於山川丘陵也誰能俯而察之以得其理人心之險於喜怒哀樂也誰能近取而制之於中和物性之險於生剋制化也誰能遠取而用之於通變主公設險以守其國不徒以城池兵甲也四維不張國乃滅亡使禮樂刑政之險不能設以防民心則自心尚不可守何能保守天下國家之城池兵甲乎險之時義大矣哉不惟是也八八六十四卦三百八十四爻無一卦一爻不是大易危微之至險無一卦一爻不是喜怒哀樂之最難過無一卦一爻不是吉凶悔吝之最難通者使非聖人善用九六之初何能得幾之先神致誠之先見而不為喜怒哀樂之所遷變不為吉凶悔吝之所迷昧也哉世人只知王公設險以守其國百姓設險以守其家誰知先聖之制河圖洛書洪範六經書史與禮樂刑政射御書數九流百工等無非此心之附麗設幾感之險令人習之以維天下之心以創天下之義以治天下之情以通天下之志以開天下之愚迷以塞天下之狂放以絶天下之篡逆以杜天下之竊欺或防之未發或制之將然或治之已成且使未發者發於誠而不敢發於不誠將然者從於道而不敢從於非道已成者創其善不敢復為不善此皆先聖制險以守人心以存天道也何曾於心外別有事功哉佛氏以慈悲設教而附麗於三藏修多羅與宗門千七百淆訛公案則一言一句一機一境一語一默一棒一喝一逆一順一正一邪如吹毛劍塗毒鼓如虎缺馬馵觸背不得何非設險使參學者習而脫化之為入坎出坎使衆生之金出礦無明之火出木真心出於妄想解脫出於執著不如此則衆生若干種心若干種情若干種妄想執著如何能觸其聲影即頓斷命根不遍習差別之險則涅槃妙心正法眼藏亦終如金之在礦火之在木更無能自出也參學人不肯求了生死而自陷於依通識解如假死之汞終不可以見火果是出險之九轉還丹又何不可以脫胎換骨超凡越聖也哉豫故重重表此習坎心亨麗正繼照之旨蓋佛聖能以心習坎而成盧舍綱宗凡夫須以坎習心而入法界種草合之不妨能異分之不妨能同為參學者不傳之祕其有能猛然自悟自證則此道之存於麗化者何幸參同説鐸夜子問曰和尚嘗有云凡厥有生者皆當參造命立身處世之三法既得實際庶足以知大權示現顯密開宗之意窮則知變變則知通不至於自迷陷而無救也特求示此三參之法杖人彈指曰阿誰向此中造命去又舉拳曰阿誰向此中立身去又展兩掌拍一拍曰阿誰向此中處世去復袖手而笑曰會耶鐸夜曰且留此與向上人請按下雲頭入此泥水救荒亂之迷可乎杖人笑曰卻原來客是相師也試為汝標示之凡厥有生莫不有知只此靈知古今不昧凡聖不磨其所以異者只為真知不能自了因隨念而成垢淨淨則不迷垢則不悟既不能使常覺不迷又何能使常迷忽悟欲使忽悟必須返參尋常不參終無自悟以故佛祖獨貴參悟之門聖賢全重省察之法如曰三參者一須參造命二須參立身三須參處世參造命之法莫過於一念未生前父母未生前喜怒哀樂未發前參立身之法莫過於善惡未萌之際教養命意之際人倫立義之際參處世之法莫過於事物交接之中經營生計之中出處變通之中參此三法唯佛祖聖賢帝王能始終本末備悉天下古今之事理成全天地位育之化機人既有身於天地間則與天地人物相關性命身世相接分之似有彼此之殊合之實無自他之別佛祖洞視則有同體之心聖賢徹觀則有胞乳之義帝王總攬則有統御之宗故凡厥有生須當參此三法是世間出世間皆不可須臾離也更請細言之如何謂之造命凡人皆本有生何必更造須知此命有性命之命是不生不滅之命有業命之命是意想所作之命有身命之命是感報所結之命本心自性初無聖凡善惡形色勝劣之名言特以無念清淨心中忽生一念意想乃有淨垢善惡之分既有淨垢善惡之分則有聖凡業識之命既有聖凡業識之命則有聖凡業報之身既有聖凡業報之身則有勝劣依報之世教中所謂無明不覺生三細境界為緣長六粗是也此不覺隨緣四字是當參當悟之本法也惟一念不生之前以不覺故妄起善惡之念而隨淨垢之緑使能參透此不覺緣生而性空則了根本無明而證性命之體是成等正覺也能參透此緣生不覺而無性則了意想業命而證身世之用是莊嚴淨國也果能參透命由心造身因業生淨垢業分感報世異誰謂過見未來無因果之報應哉試即現世而推之使無報應如何各才生身便有富貴貧賤善惡賢愚之異即現世為人各自一身造業始終前後或異或同雖則事各有殊其法曾無差別如人未造業初誰能定其功罪升降之事天子雖操賞罰生殺之權亦不能強置人於非分法中如士子之考言試事各有等差則進之於有司薦之於朝廷天子亦必因其文章政事而後準法以下其敕命雖曰命降自天其實皆由自造如命九卿科道百司及天下庶職各自有分命各自有出身各自有地位此非命由業造身由業生爵祿名位皆天之明命與分之成數哉以吾心意生之理而造命吾命緣生之分而成數世人不達緣生而陷於命數又誰能轉緣生之數且於數中而造命哉如在吏部是數或移其數而超升或移其數而遷轉或移其數而下降此皆於數中造命命中造數也不見道堯只能薦舜於天不能使天以天子與舜能參透此意則知堯之所以薦舜舜之所以薦禹禹之所以傳子湯武之所以代天討罪文武之所以受命有周孔子與顏曾思孟之所以為千聖百王之師者皆自能造此聖命聖身聖世與天地同其高厚悠久也若上天能造人命則天何獨秪造三皇五帝三王及此數聖賢哉推而至於出世間法世尊之為法界主中主達磨之為教外正法眼二支五宗之為向上全提皆能自造命於本心自性也惟佛祖聖賢能善用心而自造命所以先天而天不違後天而奉天時此外九流百家士農工賈亦自有造命立身處世與佛聖相參於天地間者在也其間或有聖凡善惡權實淳疵之不同不可概以形迹而窺測者如佛氏以一心法廣開十界之門有以五逆十惡而造地獄之身命有以慳貪嫉姤而造餓鬼之身命有以貪欲癡迷而造畜生之身命有以世諦五常十善戒法而造人仙天梵之身命有以四諦因緣轉分段生死而造二乘小果之身命有以般若心宗轉變易生死而造佛祖之身命有由一念之豎於十界次第而漸造地位之慧命有由一念之橫於十界隨類而頓造當體之慧命即世間法亦有循途漸進異路交通而造分數之身命亦有大機忽遇平步青霄而造大成之身命或如桀紂有一時造犯天條之命或如宰輔有一時造誅九族之命此皆明如日星昭示今古者誰謂命不由心而造身不從業而成也哉故豫曰善造命者只在善用其向上心志端其正大趨向占高尚之地步享速疾之便宜亦不必以世間所處之地位為地位世間所尚之機權為機權所謂向上者正是一念未生前之類也趨向者妙密圓通之類也地步者自利利人之類也便宜者主中作主之類也吾人以分數在三教即三教中造命在百家九流即百家九流中造命不必別尋蹊徑求尊反成卑求榮反成辱求進反成退求得反成失也進退得失未嘗不可求但求之無理取之無道則顛倒耳如醫者以生死危難造人命堪輿以相宅卜葬造人命星者以守分進取造人命相者以量才作為造人命卜者以趨吉避凶造人命至於士人則以設教維世造人命農者以勤苦耕種造人命工者以器物利用造人命商者以交易相濟造人命然此有善與不善其功過不爽也善者則能密用聖賢造物之機權交扶民生身世之經濟不善者不特不能自己造命亦乃傷天滅理其禍有不可勝言者此惟士可兼醫輿星相卜之術農工商三者自食其力則不可責以術數天下之所以得養者皆食其力而農之為命尤重也自古及今皆稱三教以道養天下百家五流以術養天下三民以力養天下然此天下非道以成治則五流三民亦無所措手足矣使無三民之力養天下則三教五流又何可一日無養欲為天下立極者不於教養以致其中和則天下人物又何自以各正性命哉天下無制全賴神聖設教以造天下之命天下有制全賴世主輔相之能行教養之法以造天下之命也使一日不與天下造命則一日天下無安身立世之處矣以故佛聖不敢以一人自了即了天下之事不敢以一世自足便足千古之宗聖人以一夫不被堯舜之澤為推而內之溝中佛祖以一法不嚴於遮那法身為陷盡法界之種性若非參透如此造命何敢以虛空界盡而生疲厭哉不見世尊於雪山夜睹明星乃大悟曰奇哉一切衆生皆具如來智慧德相但因妄想執著而不證得我今既悟既證必當教以解脫之法令一切衆生皆悟此妄想執著本無實法而證如來智慧德相與我無異始得名為平等菩提一真法界也正以一法若有毗盧墮在凡夫萬法若無普賢失其境界阿難悟得如來藏性乃發誓曰願今得果成寶王五濁惡世誓先入如一衆生未成佛終不於此取泥洹泥洹者如來極果不生不滅大涅槃即薩婆若海大寂滅場地毗盧遮那與十方諸佛同悟同證此清淨法身之常寂光土也亦是一切凡聖衆生本源清淨覺地雖居十法界中各各差別原不曾離此地阿難未悟時以五濁為衆生業地及悟後乃知五濁衆生之根根塵塵周遍法界當體即是如來藏心捨此五濁無從發智悲行願而為入處以成就寶王證如來之莊嚴極果也衆生全身在此覺地以妄識緣生各自顛倒執著其心命身世不知參究不得此入處耳如天上之星辰羅列各自不同而不離於天其地上人物禽獸山川草木各自為類而不曾離於地此天即吾性之覺天此地即吾性之覺地此種種不同之類即吾靈知之所發現捨吾靈知則一切皆不能發現也人在睡夢中凡所見所聞所交所接之命之身之世天地人物與明暗色空各各差別皆不出一己靈知之所發現如無此靈知則無此夢想如無此夢想則無此靈知若以唯識推之根身器界所生各有次第心王心所見分相分親疏自證等分先後能所種子現行之別一法不可攙越如能悟此靈知之夢想于一時頓現于一念頓消何曾有親疏次第之畢所謂一念發真歸源十方世界即時消殞夢裏明明有六趣覺後空空無大千是也又誰能悟覺後之心境還如夢中而不執著乎又誰能悟萬法歸一一歸何處之旨為我在青州作一領布衫重七斤乎此又非木人石女所得而唱和也傀儡戲曲盡古今人物之差別線索雖百般抽牽何曾動著本身妄想生滅顛倒不曾動著常住真心如群兒之舞弄鏡光故曰迷之則生死始悟之則涅槃證而衆生為夢想役其靈心如真金為匠作役為瓶盤叉釧其名相雖異而金性未移真金雖能隨緣現衆器器器之金曾無變異所謂心佛及衆生是三無差別也以故華嚴毗盧遮那為一真法界之主中主隨緣而現為正覺世間主有情世間主器世間主統十方塵剎諸佛菩薩若聖若凡若天魔外道夜叉羅剎山靈海島一切鬼神與五十三參善知識無論是男是女是僧是俗各自有主曾不移本位一絲毫許如善財雖初得根本知後得差別智而始終曾不易其童心於其中間法法不相到而自到各各不相知而自知亦不見別求戀易名相而成佛皆與遮那同一藏性三昧如金性之無一無異無欠無餘更不必如法華會權歸實三戀淨土次第授記龍女轉男然後向南方無垢界成佛也會得華嚴之不變隨緣與法華之隨緣不變則知是法住法位世間相常住之妙旨矣又如梨園登臺各自作古今人物曾不昧此靈知而喜怒哀樂曲盡其情雖屬假事能以全副真精神為之又不自謂能如此超然解脫不執著也殆所謂世間奇男子乎及乎下臺或讚之則喜詈之則怒稱他為聖人之流則矜呵他為賊人之類則恨雖皆上下無實而迷悟之情不同豫謂臺上戲子以有為無故能如佛聖之解悟臺下戲子以無為有故同衆生之執迷世人全身是戲大地是臺而不能如戲子之解悟者豈非以妄想執著自迷倒哉使人皆能參透以有為無之解悟以無為有之執迷則臺上臺下皆相忘于大化之鄉也豈不為世出世間之真奇特乎雖然更須知衆生以不干己事常解脫其干己事常執迷何以見之嶽王墳前鑄鐵秦檜賢愚莫不禮嶽王生敬畏心擊秦檜且溺之嗚呼世人于嶽何親於檜何怨特以好善惡惡之良知良能有不可磨滅者在至有事干涉於私己便自蒙蔽或能設身處地不黨秦而助嶽且能爭善惡是非如拜嶽墳打秦檜之不惜心手者幾人哉更有可笑者如檜再世幸得為人到此墳前亦必禮嶽王而自擊也彼董卓何嘗不痛罵王莽盧杞何嘗不罵李林甫但傍觀者多醒當局者易迷耳人有善惡之良則可以處身世而無昧人無執著之妄則可以悟心命而不迷如果能參透如夢如戲登臺上之禪則諸法皆畫蛇添足捫空布彩耳鐸夜曰三世諸佛以種種方便因緣譬喻言詞開示其結集經典充滿海藏流布十方秪應衆生業無不盡衆生界無不空而猶然如在夢中其出生受生不由人教偏能具足一切癡愛貪嗔嫉妒我慢誑欺姦矯詐偽種種妄想執著法門觸處皆現如磁石之見針自合貪欲之見色自迷抑且磨之不滅壞亦不銷諸佛豈曾為彼設教結集此業識之藏於天上人間哉是何善法教之多不能就如煉石之難于補天斷鰲之艱于立極惡法不教卻自能成如流水之易于趨海野火之速於燎原豈善惡逆順之理有固然哉將謂初教之不親次教之漸似再教之逼真終教之必神乎將謂佛聖世出世法如春夏秋冬之必當循環乎必生住異滅而後成法化乎必成住壞空而後成法界乎如此則佛聖之道只能以一時人救一世事不可以前遺後亦不可以後代前乎或以不可遺為相遺以不可代為相代必以各時各世各自為繼往開來始不壞其造命立身處世之事以互相密成者使人各自振作而不倦乎杖人乃大笑曰其然豈其然乎子不見窮須知變變須知通通須知久此所謂千聖不傳之祕乎天地不能以一時成歲佛聖不能以一法利生太極不能以一卦成易帝王不能以一制成治神道不能以一教齊民立法不能以一義成宗醫王不能以一藥治病以故佛有三藏十二部儒有經書子史九流百家各有傳授之業善能參透一法可以通一切法參透一切法可以歸一法或各自執于一法專于一門大小偏圓正邪淺深之異皆不能出一念未生前為根宗也即有透此根宗而不悟差別徒執未生以為己證而不能使法界聖凡同參悟此心命身世則佛聖亦是自了漢如焦芽敗種墮斷常坑矣何足為法界之調御師哉但有能參一念未生前則於身世不遠從源出流自得本宗若上根利智之人何枝末非原本之心哉如孔子謂視其所以觀其所由察其所安視觀察三字即參究也即精一慎獨克己也所以所由所安即生住異滅之心也何心何事無以由安哉但無人能視觀察耳又如曾子之動容貌出詞氣正顏色動是誰動正是誰正出是誰出此三字即有神之司存也容貌顏色辭氣三者即如籩豆之事也世人視此三者為事而外之豈非自棄其形色別覓天性之所存乎曾子見道之妙慎獨之功全在於此足見動容周旋而中禮為盛德之至灑掃應對皆是精義入神果如是而參造次必于是顛沛必于是何非復禮歸仁之所在乎果能如是參求其不如是亦不可得也趙州所謂除二時粥飯不雜用心何異終食之不違仁與須臾之不可離此道乎儒者不肯參究禪者不能遍參便有儒釋之分淺深之異使能參透此旨則學佛自能知儒通儒自能造佛世豈有曾入門庭而不肯造堂奧者乎一部禮記不出母不敬三字至於儼若思安定辭安民哉即大學中庸之三綱領也如謂動正出即曾子之戒定慧也容貌顏色詞氣即曾子之經律論也既不曰形色而曰所貴乎道者三非曾子之禪乎即門人記孔子所慎齋戰疾非慎此三也以形容夫子之慎如齋如戰如疾也此慎即夫子之戒定慧也此齋戰疾即夫子之經律論也得此慎之神非夫子自性宗通之禪乎即吾佛三藏十二部之妙與教外別傳之神亦不出此身語意三業也神而明之化而裁之默而成之亦必存乎其人耳何分世法出世云乎哉自無如粉飾取榮而不致精一末法姦巧本學日荒天下豈果皆可以粉飾而不切於心命身世遂足久安長治乎大氐善者終順可以漸誘漸磨而惡者終逆必致暴起暴滅佛聖深見其常遠見其大不敢謂善惡不同謀也不見先聖為萬世制作凡民生日用養生送死乃至山川鬼神禽獸草木無所不用其極以安身世性命無少偏虧合天下之人會古今之事為一人之事或有匹夫匹婦一事一物不得其所者引為一人之責一己之罪天下即不己責而一己當自責古今即不我關而一我當自關從上帝王聖賢與出世佛祖為十方慈父世豈有師遺天下之徒父捨法界之子哉天下人皆有父義子義法界人皆有師義徒義然未有不子而能父未有不徒而能師者也人不以父子師徒自命則將為何如人哉既知則必真知不真知則迷苦而不可救既為則必真為不真為則迷倒而不可扶夫真為者非欲盡為極富貴權位之人也為此外慕便喪身失命矣真知者真知有造命之妙法立身之善事處世之正道如父頑母囂弟傲煢煢鰥夫亦自能以孝道得祿位名壽如伊尹傳説太公之終顯及顏曾思孟之不遇亦何嘗不從貧賤自致身於聖賢豪傑之間哉豫雖如此比似以激發世人而其宗旨實要人參究造命為法界中第一義也世人不知此意故不畏天命不畏大人不畏聖人之言不知造命立身處世之法乃敢犯法侮亂蹈于不測或甘死于偷安取樂或醉死於亂事危機所以畏之一字為衆生出苦海之慈航即人天之聖與三乘大聖皆有所畏乃能成就大法唯佛出過聖凡永謝二死故號為無畏法王如師子一吼百獸腦裂自此之外誰敢不畏哉如我意者即佛祖大聖亦有畏也佛為法界之父而法界之子有一無知以犯危險則父母之為子計不能不憂畏也如火宅中諸子以癡迷不知畏故或迷死於五欲之樂或迷死於五逆之惡或迷死于功名富貴勢利恩愛或迷死於文字道理知見功業而不知出生死性命之活路或以正為邪以邪為正妄自顛倒執著不可教之以道不可化之以法不可制之以刑不可畏之以威或以一邪事而亂國家或以一逆政而壞天下是一人之別業與天下之同業互為因緣互為消長或激之以自憤或毒之以破迷或因禍而致福或由亂而成平也在佛祖神聖正眼視之安知非衆生無始劫積集有不可思議智種於五蘊識藏或以上天造物憐愍沉迷因其業力掀翻其劫習如火宅之三災變起使諸子棄捨貪欲命根而趨出火宅以取三車也孟軻氏亦謂世人多死于安樂少生于憂患若非苦到動心忍性而得增益其所未能亦終是小人陷于坑阱而莫之知避也夫世出世間法皆重在有主有主之學雖習邪法而皆可歸于正無主之學雖習正法而或亦流于邪如華嚴有三世間而盧舍那為主中主則十方塵剎皆有所主雖欲自妄不能妄雖欲自亂不能亂雖欲自邪不能邪雖欲自外不能外也造天下之命者其在斯乎天下非一人之天下乃天下人之天下人能以天下之天下為心者即一人是天下之人萬古之人唯天下之一人能以天下之性命如一己之性命天下之道德如一己之道德天下之功業如一己之功業天下之罪過疾苦如一己之罪過疾苦者則能分性命道德功業教養與天下而為天下不以天下之教養養我一人當以我一人之教養共養于天下為心為法為事或可以為君師主盟此天下也人不知天下之亂皆是生民自己業報反乃怨天運恨世數自古以來天何曾陷堯舜禹湯文武周孔不為聖何曾使桀紂幽厲莽卓操懿必為亂哉所謂禍福無門惟人自召寧不信乎夫佛聖之妙道深遠難測不至於神悟焉終不足以感通於天下也初心參學者未可即令其盡知未可即令其盡行但能控其先得入處之真而察其心命之所可知其所不可知者當自悟精其身世之所可行其所不可行者當自神如知焉而不久習于察行焉而不久造於精則亦徒事虛文其所謂察而悟精而神者曾不感通于實際而反怪佛聖之道雖嘗知嘗行而不見效于神悟豈不為自誣與誣佛聖哉更須知世人非不察不精也如察而非所當察精而非所當精如百工之妙技外道之妙門雖察雖精又何預於佛聖之道法與性命之神悟哉正由此輩以不察不精之知行與非所當為之參學流弊至後之學者例如此從事襲成頑風以痼天下為不可救藥豈非千古教法之大冤哉從來此道一治一亂天下承平日久人多死於故常以假性情出假禮義以假禮義作假文章以假文章取假功名事業以假功名事業立假道德聲名及乎天下既無實際而上下無勤儉之功有侵殘之害事無生法物多困窮天下相奪相爭勢必各無自立則三教九流百工技藝無不假假相偽各不相容如養癱之必潰久蠹之必摧積火之必然畜毒之必發安能不傾天下之否不倒天下之倉不化腐爛為神奇不反乾坤為再造然後如大冶紅爐乃能煆去一切假物煉出一切真性情真文章真事業真功名道德真禪道佛法安知此非佛聖天地之所以為天下造新命立新身處新世作新宗旨經法乎人能參透此窮則變變則通通則久之妙密則能以窮變之機自造造人自立立人自達達人雖不能博施天下濟衆古今亦可以一真之法存此世間以濟度人也昔人願天常生聖人願人常行善事者以有聖人在世天下雖有小人終不致為亂自當循守善法如無聖人在位則雖有聖德如孔孟無能以致天下如禪道於會昌不免自隱其身以故此造命之道猶重在位者得之雖天下之萬民不一一皆能立身處世而天下如大船聖人能載萬民而撑之於生死苦海免風波之溺不亦大哉如大地皆是風波蛟龍鬼怪之危而無舟楫以度大地皆賊盜虎狼之險而無善兵以護世之能自度自免幾人哉是故佛祖以性命之道而通聖賢帝王及有權位者聖賢帝王與有權位者能以造命之法推及三教九流天下黎庶以至山川鬼神則天下之身可立天下之世可處天下之命可以自造造人也而世之能自造者亦佛聖之所與也我此三參宗旨清淨法身毗盧遮那如來於自心正中立十方法界諸佛身命之極為主中主如堯舜之精一厥中孔子之一貫時中與大易河圖洛書洪範之建中立極合致陰陽之中和成位育之經濟三教九流百工技術雖有大小淺深之殊曾無一法一事一物不由此主之中而得自成立也即吾教外諸宗皆以向上全提正中妙協為千聖不傳之旨捨此則是外道邪命陷于偏枯欲出此陷如不以中又何有出身之處哉所謂天向一中生造化人從心上起經綸羅經之針非中不定子午律呂之管非中不見天心如此之類非中皆不成就又況為君為師與天下人物造此身命不有神於中焉者而能為世出世間之主人公哉故有天下者必祀天祭地奉宗廟與先聖先王及有功德于世者乃至社稷嶽瀆山川鬼神無不統制其祀典以隆殺於禮中為聖帝明王之師法設使世間之師道能尊則於出世間法自能尊尊親親此毗盧師法身父為吾心法界之主中主也中乎中乎自非參透而神悟此中之妙密有不可得而思議者誰能與於斯乎善乎韶國師之示衆云世尊於一切處成等正覺菩提樹下成等正覺塵塵剎剎成等正覺閻浮世界裏成等正覺一切聖凡乃至三途地獄處無不成等正覺更須知吾法門於言語機鋒豎拂拈椎無不是令人成等正覺者如華嚴為一真法界有勝熱婆羅門以五炙投身令人成等正覺無厭足王斬截刑戮令人成等正覺婆須密以貪欲清淨令人成等正覺又如提婆達多歌利王等及十方作大魔王外道者或以欲鉤而引其佛智或以非法而導其神機至治世語言資生業等雖種種幻法於實相印中皆以大權示現密令人於一切逆順法中造命立身處世而成等正覺不然則道有偏黨而滯狹小法有所不到事有所不及也何故以心外別無有法法外別無有心如心境可分則前之所謂金性與器相亦可分夢想與靈知亦可分戲子與戲文亦可分水與波浪亦可分春與花葉亦可分六根與此身亦可分六識與一心亦可分三教與性命亦可分善此顯密法門者機不墮于毒海妙不昧于始終大用現前絶無滲漏則分與不分皆名言無實法也不見先聖親丁此難曲盡天下之變亂目不耐見心不自安入水入泥推原此故乃不辭三令五申叮嚀反覆如貫花之參差回文之周匝不過要人自參自悟自得自證以自脫化耳世尊於靈山拈花百萬人天獨迦葉微笑者得如來正法眼藏教外別傳之旨蓋能深悟此本分風光有千聖不傳之妙也如阿難號為多聞第一猶自迷於聖見法執不忘不知金襴袈裟外別傳何物若非迦葉尊者於糞掃堆頭翻出正法眼藏何能以倒卻門前剎竿令阿難頓斷偷心跳出活路悟此向上不傳之祕為三藏十二部之綱宗哉達磨渡蘆面壁二祖安心得髓六祖落葉歸根來時無口青原聖諦不為不落階級而廬陵米價妙出全提南嶽説似不中染汙不得而磨磚作鏡別出大機二支得之而分流五宗得之而會旨是皆能與佛聖造命與人天立身而處世也世人若但執佛聖之言教而不參究宗旨終是自救不了何能與人天作眼目與佛祖作師宗哉末法邪外掩日月燈之光明恐世人陷于長夜之迷幸此鐸者能振先聲於三墮縱橫中以啓夢覺以悟戲場使人皆得入千聖不傳之密門苟非與法界衆生示異方便中之方便出向上全提之旨何能會法界同參皆令悟入此遮那主中主之光明遍照大統綱宗哉
