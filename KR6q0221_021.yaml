body:
  text: 門人大成大存大然大中較序尊正規序豫昔以不知自己主人公落處忽因聞貓叫有省復於諸祖語録如倒剎竿青州衫等機緣疑慮橫生返參久之乃於一喝耳聾處豁然驚悟始知有宗門向上關捩子自是細究五家門庭堂奧曲盡賓主人境功位正偏之旨及閲華嚴法華諸大經論洞見佛祖建立開張妙出言象若不如是互換豫奪則身心性命之機不得鎔通廓徹嗣參證於博山東苑受印記於壽昌之後乃痛自感激曰佛祖深恩難為酬報獨此弘揚法化紹續宗風使不斷絶庶無孤負耳於是思之先聖以法為身以慧為命以微妙為食以功德為衣以教化為門庭以宗旨為堂奧以參悟為真子以證成為法王以叢林為場地以衆生為本根以規矩為栽培以薰習為雨露以莊嚴為心花以祕密為覺果以常住為壽元以傳受為生育是故一真法界以舍那為生父以彌勒為導師以普賢為長子以文殊為發機以勝友為助道以善財為初心以衆生為蕩子以華藏為家鄉夫如是含靈之種性妙盡而佛祖之覺道圓成也故豫嘗以世人不知普賢稱長子何義蓋一切衆生皆有一子之分特以捨父遠逃流蕩忘返故耳自非普賢以十大願遍入剎塵而接引其就路還家指點其轉身歸父安得使此衆生本有性中迸出一念初心之善財童子而念念圓成此正覺哉惟童子一念純真全無變異始終參歷妙性如如以故末後初心愈明更不必成佛而本自圓成也不見他佛發願皆云願我來世得作佛時以如何功德智慧成就衆生獨此普賢十願則曰禮拜稱贊供養懺悔隨喜請法請佛隨學順生回向是皆特作弟子以奉父師之意始使諸子得從其後而有所趨向也故舍那為父視子普賢為子向父善財為子承順觸背俱渾如火續火為主中主所謂大人不失赤子之心赤子能全大人之性是也今之主法建叢林者當如是住則現世當身紹隆聖位不待來生求證莊嚴也讀尊正規知豫此意能發是願則報恩有全矣崇禎十三年庚辰元旦匡山圓通寺住持沙門道盛謹題尊正規小序觀我大雄調御丈夫之立出世法也必先制戒律以教誡諸佛子使不敢越外作犯始得直趨正覺之道逮至歷祖建立叢林亦必因時制宜以變化其戒律而折中為規矩使參學之徒習知稱性之法然後循行安穩自無破律犯戒之事所以規矩立則僧徒齊而叢林之法化職此興矣今融會先聖之法為尊正規凡住我叢林者必先命教授令彼熟習其規則自無賞罰之過與相賊之弊也然此非徒居衆者之所當尊也即使單丁住山曠蕩行腳能領略此中之旨則亦脫穎於凡聖叢中矣豈曰法門小補哉豫昔嘗於本閩福州羅山結制時葉臺山相國偕曹能始諸公過訪見禪堂所立規條乃大嗟曰是吾相業所不及也諸公毋忽之此正如二程子游古剎見僧威儀雍肅乃相顧歎曰不意三代之禮樂在是嗚呼使諸佛祖師之道不與聖帝明王之法相參贊則又安可以西方之教一日暫居此土哉故歷代國王宰臣之所以護持佛者正謂有此足以陰翼王化之所不逮也吾徒又安可自輕而不兢兢於尊正乎尊正鑒序人之有生也須遇三種大緣始易於成立三種者何一生于聖明之世而天下之化行俗美則此生如蓬生麻中不扶自植也二生于善德之家而天性之倫常養育則此身如旃林之木無有異種也三遇賢哲之師而教誨之明嚴妙密則此身如在冶之金日見其精也是故君親師之恩等于天地尤有殊勝者故難可酬報也人無三種之緣又無天資之稟則亦迷墮乎無可救援之地矣苟有天資之稟初無三種之緣後或遇善機之觸引或遭逆事之激成或披佛聖之典墳或逢知識之指示大生慚愧創發宿因頓捨癡迷猛發正志將勤補拙下體求人深窮參證之功必盡性命之道此則真自能成立之豪傑也是豈容易而得之哉豫痛念末世法弱魔強成人之勝緣獨少壞人之惡境偏多或有法而不能全或有人而不盡善以故集先佛選聖之法為規更彙參證肯切之語為鑒使此六種之機緣能就則此尊正之叢席可成千古法門始終可以概見天下參學庶幾可以統收而大多勝之三義乃於此備舉之矣即不然有能深心讀此規鑒一身準此參同雖生來無三大緣之遭值而末後得入先佛選聖之科亦可謂不負此生平之奇特也夫古人豈獨異于今人也哉蓋亦稱其超類拔萃能善用心占地步端趨向以真參實悟佛祖心法之妙而行事取證皆有成驗者足為現在人天之規鑒後世師宗之權衡者也古人亦有遇三種大緣而無天資之稟與無慚愧自勵之心如今人之不足稱者不稱何礙焉若以言不顧行解不考證而亦隨聲稱之則將須彌盧為載籍亦不足多也可見古人之能善用心妙在用佛祖之圓明妙心為本心如投胎于帝王生來便尊貴無與等也占地步妙在占佛祖之廣大地步為地步如王子才登于父位天下之臣民皆皈命也端趨向妙在端佛祖之嚴密趨向為趨向如王子秉政為帝主全提其正令殺活自在也果能承當此事則決不敢以淺小之法自欺欺人決不敢以未悟證為已悟證決不敢以未廣大為廣大以故能超乎其類拔乎其萃為人天之規鑒為佛祖之權衡也今人有能追古人之尊貴如此者豈非法門之大幸哉會祖規序豫昔閲五燈見從上佛祖始終之事乃作法印記有六種綱宗一參悟二印證三師承四法嗣五家風六付囑始終雖分為六其實統于一參悟也使無參悟何有印證及師承哉唯有參悟則有印證因印證則有師承因師承則有法嗣因法嗣則有家風因家風則有付囑也所以威音王前無師自悟則可威音王後無師自悟而不有印證則屬邪宗外道等無所據證也即我佛釋迦亦自謂我於法無所得故燃燈佛即為我授記若我於法有所得則燃燈佛即不為我授記然則佛佛相傳莫不因自悟而後有印證師承也如釋迦于賢劫為第四佛亦嘗以僧伽黎衣付迦葉尊者轉付慈氏佛出世傳授將來豈非佛祖親相授受而有所據證哉故佛末後于靈山拈花獨有迦葉微笑乃以正法眼藏涅槃妙心不立文字教外別傳之旨付與迦葉為西天第一祖而迦葉再傳阿難以至達磨始來東震為初祖傳慧可至曹溪衣鉢不傳獨以心法傳授南嶽青原分為溈仰臨濟曹洞雲門法眼五宗宋元間溈仰雲門法眼無傳迄至昭代秖有臨濟曹洞二派繁衍天下中有提唱臨濟曹洞宗旨者亦不過幾人使今日濟洞二家不得其真正宗旨安知不踵溈仰雲門法眼之流弊以致無傳乎豫於是乎懼慨然將西天東土以至五家宗師而會其始終之旨為會祖規以表東西密相付曾無二法脈也或問師所會者東西諸祖及五家之宗旨也而五家之子孫全不會歸則何處見後世之流弊哉豫曰若廣收則有五燈矣又何從見吾會祖有提綱以振其目舉直以措諸枉乎而後世之弊正以不悟上祖及五家之真正綱宗耳使能悟上祖與五家真正綱宗則心心相印法法相承傳於萬古如人之眼色耳聲鼻香舌味身觸意法等皆天然體用之法無有一法能自越踰亦無有一法能變易之也或曰如云天然體用者是世間有為有相之法也是出世法無聖凡之得失無迷悟之是非何可以天然體用之法而比擬哉豫曰子知心外無法法外無心乎佛祖出世之法正以人不悟真如自性而於根身器界妄生迷悟而自異其性相之法也不見法華云是法住法位世間相常住以不壞世相而成法性乎所以世尊付法偈曰法本法無法無法法亦法今付無法時法法何曾法秖此一偈便是佛祖天然體用不可變易之微妙法印也若知此意則知吾作會祖規以存東西密相付之根本法印使後世子孫能悟此根本法印則五家門庭堂奧之宗旨不致流弊而無傳也或曰會祖規乃會五家宗旨也今五家秪有臨濟曹洞二宗而三宗之後無傳又何以會乎豫曰夫五家之宗旨即少林之宗旨也既五家能悟少林之宗旨豈有少林之宗旨不可以會五家門庭施設堂奧深微之宗旨哉此吾深有望於具頂門眼懸肘後符者當使一花五葉之宗旨重重開敷於天下後世耳或曰近世叢林凋弊之極不見漢官威儀久矣況復得睹三代禮樂之猶在乎今日吾師立此會祖圖規以揭出西天東土及五家門庭堂奧之宗旨實為天然體用不易之常法亦乃振古所未有之奇特也豫曰此不過竊取祖述於迦葉達磨憲章於馬石五宗以六種綱宗而集始終一貫之大成耳豈別有所謂奇特之建立哉會祖規小序或問師著尊正規以佛菩薩及諸宗祖出世為人種種經律論藏淨土止觀懺法等門庭施設堂奧深微始終本末折入禪宗為集佛祖大成已無餘蘊矣茲又作會祖圖獨以禪宗為一叢林之式今天下諸家學人見尊正規之妙正恨其集會之未能而師倏然復先折出禪宗自作一家無乃方招之欲入而又直拒之遠去乎豫曰非然豫所制選聖場會諸家為一者使知佛菩薩與諸祖無二道也如孔子當時刪詩書定禮樂述易經作春秋使此五經為一內聖外王之道為萬古不易之宗也今豫重作宗門會祖圖式又如孔子述易之上下經為之十傳以集伏羲文王周公創制之旨而明周易之大成使後世之宗易者則得其大全如五經雖共為大全而詩書禮樂春秋亦不妨各於本經有大全也豫今不特以宗門會祖別作一統為大全即經律論觀亦各有統為一大全也如禪自有五宗為統經自有五教為統律自有五部為統論自有五攝為統而吾經律論禪淨等而大統于佛者正如詩書禮易春秋之大統于儒也使經律論禪淨等各無統紀則選聖諸堂所學何事所宗何旨而諸堂又何足以成此大統于選聖場哉故吾作會祖圖則知經律論淨止觀懺法等皆當各會其宗以成其大全則殆可謂我佛始終一貫之大全也知吾此意則隨宗隨處皆可建立如治一經不妨會通五經治五經不妨會通一經也或又問如一經為會通五經與一宗之會通諸宗亦可以取譬發明而會通之乎豫曰我昔嘗以五經喻一歲之四時如吾五宗與諸宗之相配亦然也五經之喻為何夫書經有體仁之旨足以長人春也詩經有嘉會之旨足以合禮夏也春秋有利物之旨足以和義秋也禮記有貞固之旨足以幹事冬也易經則統此四德如乾元亨利貞以冒天下之道一歲之統四時也分而言之則五經各秉一時之正令合而言之則一經各具乾元亨利貞之四德也使五經各不具此四德則聖人之一言有不足為天下法也此蓋論教之大端如此耳若但以大易能定天地別尊卑以化成天下將謂詩書禮春秋皆不足以定天地別尊卑與化成天下也耶若於此會得聖人述大易之意實是發揮四經之意則知吾作會祖圖之意正所以發明選聖場諸家之大宗旨也即如經律論觀禪以一歲四時配之經則勃然開發春也律則燦然敷陳夏也論則凜然精核秋也觀則冥然清徹冬也禪則渾然通洽如歲運無言而四時行也單以禪宗配之溈仰則如春之生育臨濟則如夏之明露雲門則如秋之嚴峭法眼則如冬之精純曹洞則如四季之統化也此亦擬其大概有如此折攝耳豈溈仰臨濟曹洞雲門法眼之宗旨有優劣同異乎然必須悟此宗旨之妙密始可會通諸祖為一大成庶使此宗傳之萬古而不可昧滅亦無有非人能破壞以篡亂之也豫於是先為是說使閲吾規者有以鑑于言象之外云耳會祖鑒序從上佛祖之宗旨心心相印法法相承傳至後世有不爽其印有相似其印有全失其印而且僞其印以為真印者夫印一也或印此而真或印彼而僞何也祖師真印如王右軍之真帖善摹者則逼真不善摹者則稍似又不善摹者則失真而自為僞矣與真帖何與哉此蓋摹帖者之有工拙也如祖師之印必得其人之真則印之非其人也則不印之矣豈有真人之印而肯印彼僞人乎不見古人云大匠能誨人以規矩不能誨人以巧諸祖之印猶規矩也誨之以規矩則巧從之而出也安能捨規矩而誨之以巧乎雖不能捨規矩誨之以巧又安能執規矩誨之以必巧乎從上如佛以一音演說法聞者隨類各得解是佛以一音之法印如印空印水印泥自成其所受矣即西天諸祖中亦有一師陷于牛跡而弟子分為六宗各唱異端非達磨往而救之則彼陷溺又何自而出耶所以諸祖不惜性命為法求人欲使此慧命不致斷絶耳不計其人必得必傳亦不計其人為正傳為旁出也至於末後當機決擇傳受之際不得不精嚴而分皮分髓也此正法眼藏流我東土至黃梅有南宗北宗之分至曹溪為一枝橫出得法者無數獨南嶽青原二支子孫為盛後人遂以為正傳而南陽忠一宿覺荷澤會諸師子孫微眇後人遂以為旁出如馬祖同參六人而南嶽以餘者得吾眉眼耳鼻舌獨以道一為得吾心善古今而石頭於青原門下則曰衆角雖多一麟足矣又如馬祖與西堂百丈南泉玩月而馬祖以經入藏禪歸海惟有普願獨超物外當時之人豈不以南泉為逸格之奇乎殊不知百丈海出溈山黃檗為二宗之祖而仰山亦謂馬祖出八十餘員善知識惟百丈得大機黃檗得大用其餘皆唱導之師黃檗亦云馬祖出八十餘員善知識問著箇箇阿漉漉地獨有歸宗老較些子若是則仰山以南泉歸宗皆唱導之師而歸宗又謂仰山決擇不精為之漏網乎而南泉歸宗雖其後世子孫不能傳遠然彼趙州長沙高安輩大機大用震駭古今世無與敵也又如睦州出自黃檗巖頭出自德山睦州能植臨濟之大樹又能接雲門之出群巖頭能於鰲山以悟雪峰若此二老之後亦竟不傳亦豈可謂法印之不真乎雲峰悅嘗稱雲門氣宇如王亦自以巴陵鑒三轉語可與己作忌而巴陵出泐潭澄嘗與黃龍南分座說法而悅公知南公未穩乃曰雲門語如九轉還丹澄公有法與人如汞銀見火則流誰謂死語能活人乎南公因此激發始入慈明之室遭其譏呵乃大悟及其接人亦如汾陽慈明其法嗣真淨文輩出世五祖演稱其有雲門作略東林總亦出自南公則說無事禪嘗印可蘇子瞻張無盡蘇公不能當佛印玉泉之機鋒張公又重受兜率真淨之煆煉至於慈明又出楊岐會會出白雲端端出五祖演演出圓悟勤勤出大慧杲虎丘隆而大慧之門網羅天下如馬祖臨濟之中興不知隆公之瞌睡虎出應庵華密庵傑之嗣直傳至于今也又如石頭之出藥山儼儼出道吾智雲巖晟船子誠三人相亞豎而出道吾之出石霜諸雲巖之出洞山價船子之出夾山會而石霜夾山之後亦竟無傳獨洞山出曹山寂雲居膺而曹山名振天下咸推尊之曰曹洞宗殊不知雲居出同安丕以至太陽玄玄幾絶以托付浮山而得投子青青傳芙蓉楷以至少林雪庭裕直至于今也嗚呼孰知佛祖以一時之慧命傳於萬世者皆賴有真正法印而親相授受哉若謂南陽永嘉南泉歸宗趙州睦州巖頭道吾船子巴陵雲峰黃龍佛鑑佛眼大慧諸大宗師子孫後亦不傳則可若謂法印之不真與不可傳于後又奚可哉如法印之真也則天下後世自有能讀其法語聞其機用如吾先壽昌經和尚讀惟寬禪師大好山一語而頓悟從上宗旨者何代無其人哉或問古今之人有於佛祖言教一見其語而悟有參久而後悟有參而錯會遇師友鏟除指點敲擊煆煉而後悟者有參久不悟至於決擇知識又不悟或反於古人語及知識語下謬生知解自為明悟更不受明眼指點煆煉者或終身參學毒入骨髓而不可救藥者若此輩其功過為何在乎曰此無他也秪是最初一念無真為了生死心耳若有真為生死心者未有參學親炙知識而不悟自己本分及佛祖宗旨者也其始過在無為生死心其次見知識門庭熱鬧其貪欲之心轉為求名聞利養乃至于佛祖言語文字道理知解慧悟五種執著為障為礙所謂語言文字道理知解慧悟愈高而生死情識執著計取之心愈甚故雖于佛祖宗旨上著到而實生死偷心不死如毒藥入於牛乳變為酥酪醍醐之上味而此上味尤能殺人也故云醍醐上味為世所珍遇斯等人翻成毒藥正以最初無此真正根本末後安得有真正因果哉然則佛祖之道為無救藥于此輩乎夫藥正為療此等病也如能去害藥之忌則藥靈而病除矣用其藥而不去其忌則藥有夾毒不能單行矣況此妙藥能入人骨髓經絡而毒物夾入藥中則藥到于骨髓經絡之處而毒亦到于骨髓經絡之處矣大法醫王又奈之何哉此非佛祖法藥之過乃受法藥者之帶雜毒之過也不見古人云惟琉璃瓶始能盛師子乳餘器盛之則裂而失其乳矣佛祖之道非人不傳傳之非人則破法而壞道矣故余集諸祖參悟真機可為心法正印者評之於五燈熱中可與會祖規參看則全得諸祖門庭堂奧宗旨之密也此卷但採諸録中有可作鑒誡者評之為會祖鑒以防其真器去其雜毒純粹其宗旨精嚴其傳受使五宗之根本法脈常住於叢林可以經大傳遠而不混亂與昧滅耳五燈熱序圓通燥性杖人曰自豫本來熱性一朝觸發直欲八面燎人因閲五燈會元愈覺火就燥而此熱焰愈不能自掩也何則夫世間出世間之最猛烈者莫過於火火性一發則大千法界無論凡情聖解殊相劣形入此性火真空如紅爐飛雪了無可得故我釋迦於一切法了無所得始獲燃燈授記相繼日月燈明是知火之最親切處全在此熱性猛烈耳火乃熱焰之名熱乃火光之實惟此實相無相微妙法門獨我世尊於空劫之前㘞地迸出指天指地洞燒十方仍自深匿雪山夜半忽復頓現及至五時設化於火宅中燒出諸子以迄末後拈花如大火聚人天百萬近之則燎卻面門惹發迦葉煆金夙火熱性不禁遂乃破顏微笑是則雄雄之尊唯火與火乃能親相授受也自迦葉以此熱心相傳燈焰相續傳至達磨火性急烈走向東來燒得神光了不可得以至南嶽青原析為五家分燈列焰熱性相炎所以古人師資激揚參證心法是皆熱性相摩觸發本有靈焰而傳此千聖不傳之密旨也若是死水裏浸非魚龍之熱性攪動則寶藏不興頑石裏藏非錐鑿之熱性攻擊則火星不迸枯木裏隱非陽春之熱性吹噓則花果不生冷灰裏埋非薪木之熱性燒燃則火種斷絶所以參學之人若非熱心相激真性洞明又安能迸出胸襟透出頂𩕳使此靈光獨耀迥脫根塵而光天照地耀古騰今也哉自宋元之末熱性漸微燈光散亂以致鬼火燐光互相起滅造妖捏怪比比然矣今之學者多無熱性秪向古人光影門頭藉此為見識知解東戲西弄孰能捨此性命入大火聚如善財童子稟此根本烈性投身於勝熱三昧火中而頓發自心無差別智之光焰乎更有白癡不知何者是火竊相似語或以螢光為火或以橘皮為火則其弄光影者愈訛而愈背矣其弄光影者或能一念知非猶足投身火中燒去從前妄計生死執著之根所謂近火易焦因風吹火尚不遠也蓋傳燈者傳此熱焰也惟此熱焰乃能燒絶生死知見透出真性靈明若秪弄此光影徒益顛倒迷狂耳今人漫以為喻殊不知獨有此火死中有活活中有死縱橫異類出入死生其火所觸之處更不容他一物而又能成一切物也雖則大千性相承此火力而成大千性相承此火力而壞而此熱焰之性且亙古今而不變超生滅而常存又孰敢以成與壞而擬議於其間哉雖然孰不有此熱性設使不遇師友真火觸發又安能透此靈焰與佛祖爭光而照徹天地哉了知此義則此親傳熱焰之恩真不可得而昧滅也以故乃於五燈中擇出師資參悟熱性相觸最猛烈者一一評出而激揚之或拈或提或徵或詰或揀辨其正邪或定當其宗旨蓋欲與佛祖發揮祕奧使此法眼妙心真實熱焰不致斷絶而傳無窮也或有人問秪如師資未相激發之時這箇熱性安寄在何處燥性杖人拈如意擊頂𩕳曰你不見東家點燈西家暗坐壽昌闃然禪師指據録序從上佛祖出世及所留言教直是與人指點與據證耳使指點而不發機據證而無省悟則雖有出世言教亦何預人之生死性命哉豫丁巳年隨侍博山東苑二先師為先壽昌師翁上壽時諸耆年羅列滿堂而目中已默識其概矣因就寢室詢其門下潛有所契之人翁從容曰潛契者不無何可盡說似人要自有不可掩者耳若夫元著元瑩元謐諸子皆有省發其老而逝者足以自了但出世為人須如南堂所謂必得十全始可也彼元謐者其年尚未看將來操履之時緣耳豫謹拜命因去金陵而闃大師亦去燕都明年正月翁忽遷化四月間師從燕都歸會豫天界兩相悲感更與訂約以機緣不偶隔去二十有年客冬豫始返壽昌掃先翁塔師乃屈身推揚為振祖道適與師坐禪因問曰某聞海岸黃居士深與師伯投契嘗有偈頌相激且極力勸請出世何固吝不為先翁一光大乎師曰吾自度不暇敢越分為人此黃公護法如是耳豫曰聞黃公再三書來索法語于浙中授梓何不先付現前人作一題目乎師笑曰此是道璞竊有所録豫已取而焚之矣豫數索不得因密令侍者揭篋取之師於是無可奈何豫曰今日捉獲師伯贓物了也師曰賊聻豫曰洞上這枝花影自有人承當在豫即書其事以作緣起至於發揮公之出世指據大事則海岸未了公案當自來結款也豫直名其録曰指據異日于此録中能發機省悟者是亦不負立法與流通者之深心云崇禎丁丑孟夏法侄道盛題于祖庭方丈憨山大師全集序余嘗思聖賢立身維世或開創或繼述或守成或重興或救弊其大經大法制作之微事無不周義無不備使千萬世下有能尋其旨趣皆可因之而振起也我佛祖出世為人以超生死立性命之法而化凡聖迷悟之心其示現普門感應異類者豈非以續三世之慧燈傳大千之種智乎憨山大師生平已見於著述與諸明眼傳記贊銘舉世莫不知為再來肉身大士矣余何能贊一辭蓋痛念法門而有感焉當宗門凋落之際憨山與雲棲達觀稱三大師相為鼎立以悟宗門之人不據宗門之位是預知宗門將振故為大防獨虛此位而尊此宗使狂妄僭竊之徒自生畏懼而不敢眇視輕踐此其心又奚啻程嬰杵臼哉嗚呼有三大師如此光明赫奕於前而後世尚有僭竊不恤為大師之罪人者寧不大可慨歟雖然孔子作春秋正萬世名義雖不能使萬世之名義皆正而不正者亦何能逃春秋之誅余昔年見大師贊豫壽昌先祖及撰塔銘即突出大好山千里遙相見之句已知與先祖把手共遊向上一路矣至於平生說法著作曲盡一代時教始終本末全體佛心全行祖意其提唱拈頌及指示偈語曾何減於古人曾何讓於今人天下後世自知師實祖位之人不居祖位豈可以師不自居即為非祖位人乎師沒後二十二年而全身不壞與曹溪六祖開創重興無有二義其進於維世大經大法而能續法身慧命誠無不周無不備也茲者大師之孫堅如欲募刻師夢遊全集特請為序而贊成之豫嘉其為法忘軀之誠因述余仰止慕慨之思云爾紫竹林集序孔子曰辭達而已矣教中云宗通而後說通蓋情見乎辭不以辭害意正是意句俱得宗說皆通也況文言為載道之器非文言則道不足以傳如吾佛祖皆生西域滅度之久孰能知之亦必籍此言教始得親見親聞始知吾人具有秪因迷悟而差失耳末法捨此文字言教又從何而悟入乎豫癸未冬于金陵會顓大師相與莫逆偶別往浙扶竿徑山今日重來白門而師已示寂于紫竹林矣豫深悼而弔之其室中有千輻佛地二子彙師生平法語著作名紫竹林集以請余曰此吾師生平之骨髓師意不欲人序故闕如也師獨推重和上和上俄至則此感應道交甚為奇特末後光明不待和上發揮之而誰望乎余謂紫竹言教久信海內何用更贅但師之法語著作皆從胸中流出稱性而談所謂言與心親行與道合非世人揣摩摹擬之辭翰與浮言過實者所可比也有能讀此集知其意句嚗嚗落處則亦可從此悟入心性之密恩逾父母矣法乳所流寧有窮哉重刻證道歌注頌序還丹一粒點鐵成金至理一言轉凡成聖此惟吾宗門足以當之故豫嘗令學人熟讀寶志公十二時歌傅大士心王銘三祖信心銘永嘉證道歌石頭參同契雲巖寶鏡三昧諸著作參研久之自能隨事觸機頓入圓明妙性何則此諸祖如大醫王從曠劫來遍採奇異方藥修煉微妙靈丹末法之人何幸遇此如靈丹在口但能信而吞之便足起死回生轉凡成聖豈非證道歌中所謂粉骨碎身未足酬一句了然超百億乎世人以諸祖無有法嗣又孰知愈於有法嗣者之法乳益深乎吾弟子姚愚谷嘗隨豫廬山圓通偶得竺源禪師所注頌證道歌不啻如獲髻珠深為祕惜去年攜來金陵質顓大師贊其梓行亦自於林中剃落改號千輻今復乞豫序其流通之意豫曰善哉從上諸祖不吝修證之勞以自受用者施於末法而末法自惟將何以報深恩今子廣為流通何嘗非析骨刺血之意乎雖然莫將容易得便作等閒看惟真琉瓶能盛獅乳其他則裂也醍醐毒藥辨之者誰往往一等癡狂拾得古人現成快活之句以為己得更不思所謂證道果證何道乎果能證到絶學無為不求妄想不求真乎果能證到縱遇刀鋒常坦坦假饒毒藥也閒閒乎若不能親悟親證古人證道所在直須生大慚愧始得竺源禪師機用縱橫殺活自在雖能箭上加尖未免平地陷虎不惜性命漢子到遮裏也須別能破圍斬將始有出身活路重刻悲華經序豫昔在穎州同鹿門西公嘗談釋迦牟尼佛悲誓宏深堪忍此五濁惡世說難信法行難行事更令衆生捨此方業苦取諸佛淨土其於極樂彌陀獨為詳切六方諸佛同稱希有豫意諸佛亦當有說娑婆世界釋迦牟尼佛悲願經專以呵責彼土諸菩薩弟子毋貪著勝妙境界生娑婆親覲釋迦即此濁惡心境成就六度萬行而取正覺豫欲代彌陀說釋迦牟尼佛經以互相酬唱不亦更顯發乎西公大笑曰此即夢筆和上本願經也相與撫掌作一法喜今唐宜之居士一見悲華經即勸請流通耿二憶居士即捐資重刻固知寶藏如來與寶海梵志一枝悲華照十方剎曾未昧滅也又安知非寶海梵志悲願所加被而分身揚化與豫互為證明乎二居士既深信此經肯自擯棄其心而不於生死海中作度人舟乎顧宜之居士猶有出入生死海中未易遊行之懼豫曰二乘人以生死菩提為二以涉生死為破戒大士以生死菩提為不二以捨生死為破戒蓋大士以度生為行捨生死海是捨諸佛菩薩之行願也又從何而得證此功德莊嚴哉不特出世法如此即處世大聖人以天下之溺為己溺天下之饑為己饑有一不被堯舜之澤者如己推而內諸溝中萬方有罪罪在朕躬天下有道吾不與易此皆大菩薩之悲願決非獨善其身之小賢可比也至於教外別傳全機大用如洞宗禮絶百僚之尊貴墮不斷聲色之隨墮披毛戴角之類墮超超乎千聖不傳之密何嘗非悲華心之所發哉惟悟入此宗乃能三墮縱橫人境互奪正偏妙協玄要同時又孰謂宗教之不足以互相發明哉真參實悟之徒尤當速速細讀此經則佛祖之恩酬報有地矣釋門真孝録序天地生人人孝天地受中以生苟不自覺又何效焉大小聖凡惟反本者覺而化之有以五欲自覺覺親以及人者此俗孝效在三途也有以五戒自覺覺親以及人者此常孝效在人天也有以十善自覺覺親以及人者此淨孝效在釋梵也已上三孝世間覺也六凡以未出分段生死尚昧于妄覺也有以諦緣自覺覺親以及人者此勝孝效在二乘也有以六度自覺覺親以及人者此等孝效在大乘也有以性靈自覺覺親以及人者此妙孝效在佛祖也已上三孝出世覺也四聖以能出變易生死證悟于正覺也以世間覺論則人之有身本於父母惟孝父母則能成生身立身之事以出世覺論人之知孝本於師法惟孝師法則能成入世出世之事故戒經先以孝順父母師僧孝順至道之法為宗旨此正發明世法出世法為大覺之真孝也捨此生身生法之本孰能成此立身出世之大孝哉今年禮雲棲塔時建公以張夢宅居士所集釋門真孝録示豫豫讀之不勝擊節曰此真吾意中事也而居士先得之矣居士素皈依雲棲大師受菩薩大戒深喜古航法兄報親庵之制以為盡善今集佛祖經論真孝之法以自覺覺親以覺人一心行持怵然四顧可不謂能覺世間出世間之孝子而自取其至效者乎豫喜其有同然之舉因為之序
