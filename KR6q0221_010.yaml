body:
  text: 門人大存弘智大璸大奇較法語洞宗標正師室中因諸門人侍立有僧出問洞上宗旨乞和尚指示師良久云會麼曰不會師曰你不如西天外道曰某不曾問有言無言師云卻又似西天外道進云惟大慈悲曲垂方便令我得入師云雪竇道邪正不分過由鞭影如何是鞭影進云莫是良久處麼師云一翳在眼空花亂墜進云外道見箇甚麼便得悟入師云劫賊入空房進云莫是疑根斷絶去麼師云我說你不如西天外道僧禮拜歸位師乃顧衆云汝等還知價公始終機緣之妙密乎公初為沙彌時念心經至無眼耳鼻舌身意處輒自捫其面以問師曰我分明有何故經言無今人讀經能如此觸發天機即其師亦可使猛然自討入處乎從此參方首謁南泉因為馬祖諱辰營齊泉問衆馬祖還來否公乃出曰待有伴即來南泉是個通身手眼底漢也只得道此子雖後生甚堪雕琢公曰和尚不得壓良為賤正如虎生三日氣已食牛尋常輩孰能當其爪牙嗣于忠國師無情說法話有省已向荊棘林中能下足矣及辭雲巖問此去有人問百年後還邈得師真否如何秖對此正向沒孔鐵鎚重下楔也不是此老大難酬他乃良久云秖這是殺人刀活人劍不妨利害若是德山臨濟未免以棒喝用事且道良久云秖這是還與棒喝有同別也無公既已悟無情說法到此如何又開眼尿床沉吟不下莫是識法者懼所謂承當個事大須審細麼秪這一劄愈見銀山鐵壁大火聚中無你進步處無你躲根處無你轉身吐氣處從此所悟所解底命根不容不斷但不能向月明簾外㘞地一聲跳出身裏之門而得全機大用奮激不已忽于過水睹影乃打失眼睛大悟前旨正如德山於上座欲點那個心處不能出脫乃以潭不見龍不現致個疑頭迫得無路無門忽於吹滅紙燭處乃絶後蘇來大叫曰從此天下老和尚欺瞞我不得也明眼人試看價公與德公悟門是何如哉故公乃作偈自述悟證與石頭參同契之明暗妙協雲巖所付寶鏡三昧之渠我交參深相符合即以重離回互而立正偏五位之宗旨使公不於此得真正全機大用何能自云切忌從他覓迢迢與我疏即有悟得自己若不見人以妙密鍵鎚打開九重錦縫透過百種冤門則大法不明觸途成滯終不能自我作主折攝法界之群機也正以理明而自神動神動而自天隨如聖人作而萬物睹凡夫視為高遠之事殊不知萬物皆備于我我之聖心一發則天地萬物皆隨我而全現也人無聖心安得謂之聖人此價公頓悟真我之大機大用故能我今獨自往而法界皆全彰我之神用此正以我能作主則先天而天不我違後天而天奉我時也知盧舍那佛頓出藏身則三身四智十方應化皆互為主伴交參若但於頭頭上明物物上顯不知向上尊貴一路自別則不免於處處得逢渠即認渠為真我卻又落在驢前馬後之階下漢何能作主於法界攝重重涉入之三昧又何能處處逢渠即是我處處稱尊即我是渠哉師說至此驀呼云大衆正當恁麼時是個甚麼畢竟洞山祖面目作麼生衆愕然師云打破鏡來誰照燭鶴沖霄漢出銀籠衆禮拜師曰吾洞上之旨不特能會通五宗之祕即如來一代時教之始終本末與儒道九流尊卑體用事理功位之名分無有不收攝而闡發者也此宗無語句亦無實法與人正以明破即不堪法死則不能活人舞吹毛擊塗毒無論搆得搆不得未免喪身失命矣不獲已立個正偏賓主玄要人境暗機圓相六義三關九帶十真等已是刻畫虛空雕鑿渾沌但先聖深恐法久成弊邪異繁興若不為物作則立此宗旨則萬世何從揀別真僞使此法眼妙心不昧滅哉古人之立法立言正如大易之立象立辭也使無大易之象辭則天下萬世何從而得天地造化之幾微人物生死之性命哉所貴於觀象玩辭而顯仁藏用也人每以理為活數為死不知理雖活或以意見自用而反落於怪邪數雖死能存法則而可悟其天然有不得於象則求之于辭有不得于辭則求之于象或于言辭有盡而得象意無窮是法住法位世間相常住不于此可悟耶吾于疊三變五中見其象畫之奇偶妙協乃知偏中至不可以兼中至而重犯兼中到也何妨拈出以待神明之者如太極舍四象為五位即是河圖洛書以中五含十不過一奇一偶之參兩錯綜而成其中和位育也六爻之偏正回互者即奇偶之兼帶妙協也蓋萬物無不負陰抱陽陰不抱陽則孤而不産陽不負陰則寡而不生陰陽偏勝則散亂斷滅何以承天命之化育乎故聖人深幾裁成之揭其奇偶之樞機而變理其太過不及以致中和則天地人物各自正其性命此參贊位育之功能惟其善用九六轉變其乾坤造化所以為至神至妙也重離如太極之含四象者即五中之十如荎草之含五味金剛杵之具五楞也之中一圈為天地人物之心即太極為重離含四卦之兼中到也東方一圈即少陽之正中偏也西方一圈即少陰之偏中正也南方一圈即太陽之正中來也北方一圈即太陰之偏中至也覺範洪公以互卦為回互以單卦為互疊先大過中孚而後單巽單兌特一說耳少陽少陰體尚未純但能疊進而未可即變太陰太陽體已至純但能變轉而不可復進吾洞上借此配喻偏正回互以用疊為三變盡成五誰得此意象外之深旨乎回互者如教中之回向也內外上下因果本末皆各相含攝之謂也或回正向偏以理奪事則無事而不理可奪色法以明心也或回偏向正以事奪理則無理而不事可奪空心以明法也或回正中事理之全體而來向全用則事理俱奪而可即妙有以成等正覺也或回偏中事理之全用而至向全體則事理俱不必奪而可即正覺以成大化權也或回此正偏事理之體用向此天然尊貴無著真宗全提法界則向上兼中到又何言哉重離六爻偏正回互疊三變五天然妙協原非意見所能強為之分合也此重離之偏正混融也以重離初爻之奇疊上為重巽下斷如正中偏也以重巽初爻之偶疊上為重兌上缺如偏中正也以本離疊上成巽兌為三卦則不可更疊矣更疊之則又成一重離矣既為重兌則當用變變則當先從內卦之兌翻轉成巽合外卦之兌變為澤風大過則四奇在中兩偶在初上如坎中之滿為正中來也大過既成則又當變此內卦之巽為兌變外之兌為巽以成此為風澤中孚則二偶在中四奇在初二五上如離中之虛為偏中至也以四而疊變既盡則兼到自成中五耳或謂正來偏至聚訟至今究何決焉曰疊如二少變如二太約幾易簡矣舉二而參統之如陰陽之藏太極如寒暑之藏天舉四而中五統之如太極之舍四象如天之四時蓋象數奇偶費隱先後可互徵也吾概舉其綱幾而變化在其中矣正偏兼中兼何須重舉乎寂然不動感而遂通天下之故所謂感為易體也吉凶悔吝生乎動不有感而動之則何卦爻之疊變哉經中以應觀法界性一切由心造而心不動則十界聖凡之名相了不可得有何四句可離有何百非可絶說個絶代靈心亦強名也正以十界之機感乃應之正中偏者以上黑下白為少陰兼少陽也偏中正者以上白下黑為少陽兼少陰也正中來者以中黑外白為太陰之全體協太陽來也偏中至者以中白外黑為太陽之全用協太陰至也兼中到者以全放全收其黑白而混融之不可以黑白表顯名跡到此俱化類之不齊混則知處不落是非無敢和矣此大總相一真毗盧華藏法界圓融行布不可得而互表互遮者也大易以陽為奇為正為君為白以陰為偶為偏為臣為黑吾宗則借奇為陰為正為君為黑借偶為陽為偏為臣為白所謂夜半正明為正中偏天曉不露為偏中正又不當執此以相反其奇偶也引而伸之何處不具掃而置之原自不壞此後之說吾何能限然寧有逃于中五者哉祇如八八六十四卦中奇即此一奇偶即此一偶奇偶太極即費即隱分之則大絶方所合之則細入無間就中行布圓融彌綸一際死不礙活活不礙死孰能分合此中之奇偶正偏渠我賓主哉此惟親悟親證無我無位之真人入于剎那際無間三昧者始能傳受此千聖不傳之祕旨也洞曹君臣正偏及功勛父子主賓五位參同宗旨正中偏者即君視臣也以上黑下白而體尚與用分方將使合如堯之聖君乃能求舜之賢良是勞于求臣以盡君道此所謂妙容雖不動光燭本無偏也亦謂君向臣亦謂父垂慈養子亦謂主能接賓偏中正者即臣向君也以外白內黑而用始從體歸方將得一如舜之賢臣乃能求堯之聖明是勤于事君以盡臣職此所謂不墮諸異趣凝情望聖容也亦謂臣奉君亦謂子承歡孝父亦謂賓能對主正中來者即君御極也以黑在白中而體已成其用如不顯惟德百辟其刑此所謂妙德尊寰宇高明朗大虛也惟我獨尊故又謂之功無能與比即篤恭而天下平亦謂父全業付子亦謂主能作賓偏中至者即臣攝政也以白在黑中而用已成其體如玄德升聞重華協帝此所謂靈機弘聖道真智利群迷也率賓歸王故又謂之共功同歸至化即共樂無為之治亦謂子全身紹父亦謂賓能為主兼中到者即君臣道合也以黑白渾融而體用一無分別如堯舜之揖讓德成舜先賓能相續為主而堯退位又作主中主堯既不居正位舜亦不居偏功此所謂渾然無內外和融上下平也亦謂之功功是無功無不功也亦謂之父子恩忘斧斫不開向上尊貴之正命食亦不取矣此祕密藏千聖不傳豈言所可盡哉示普侍者歸圓通豫侍者鑑咦普子隨從九年今命歸廬山因以一紙禮求警策豫曰知我平日痛為汝乎你師解銜日子嘗親依辨山寶壽諸知識咸器重之丙子隨豫於西陵李家宰諸公稱為英敏豫曰此子病不能愚恐難善後及從歸壽昌闃然翁黃元公亦撫而慰之豫見其好勝喜名輒露淺鮮益痛叱痛逐之你師亦感泣不忍去豫主圓通你師以緣事攜你往粵禮曹溪祖塔及歸以汝乞豫曰大日不能承事和尚此子朴實可代日奉侍惟痛鉗鎚即日之受命也後你師掩關福山旋到雪峰出而歿於旅次豫時主鼓山命汝去茶毗其骨歸壽昌普同汝師雖死豫每以你師痛策汝使汝勤勞忠心用命是應當事但習氣不自嚴切好刻責人非惟參究不力而心亦終日不快樂你自視能如汝師之英敏乎尚不能自善其後汝如此資質可不深為自警而追思汝師乎普因告欲閉關誓死心徹究以不負平日督責之恩豫因書此令從此去果能不忘督責之深痛自裁抑潛自參究則何大事不發明乎子深勉之無負始終之心也示真儀準禪人古人參學必至於悟證有足以驚天地感鬼神而超超乎聖凡之外者皆由最初發心為欲了生死正性命也今人最初未有為了生死心以故所參者是文字道理機鋒公案之禪所學者是知識為人門庭施設之事縱使參得學得秪成一箇無明業識虛憍我慢以欺誑世人而圖名聞利養為法門之賊住其流弊又有不勝言者是何曾有求了生死之功行哉此正如蠶之用盡心機吐盡絲繭適足為自己生死自纏自縛之計為可悲也真儀準子嘗親依豫於圓通別去參諸方尊宿近復歸見豫天界因追究其所以正吾前言所參學之流弊以自為有進豫深斥之必欲其以求了生死自悟性命為本則其為人天軌範皆悟證後之事也因書以勉之示旌川慧生禪人德山見僧入門便棒臨濟見僧入門便喝魯祖見僧入門便面壁趙州見僧入門便云喫茶去無業見僧擬問便云莫妄想睦州見僧便云現成公案好與三十棒或才入門便捉住云速道速道擬對即推出去此一等老古錐刺骨刺髓徹困為人若才擬議便墮坑落塹陷身死漢無出頭路矣那堪更踏步向前逐語生解打葛藤弄鬼眼睛問如何承當如何透脫乃至如何參究如何下手如何看話如何起疑如何進步轉身如何出言吐氣豈但白雲萬里枷鎖千重也哉若不恁麼又如何始得箇入處又如何得出離生死悲哉胡餅討甚麼汁雖然到遮裏也須是箇真正為生死底斬釘截鐵漢子始有箇趣向分不然總恁麼縱汝意識從世諦流布去孤負天下人寧有限量哉慧生禪人求豫指示已是要教棒折如何又恁麼放行山僧也是慣向泠灶裏下火不免將錯就錯或死灰裏爆出一粒豆也不可知示郝子荊居士新安郝子荊居士才奇志異絶侶孤風常參諸方獨折節於三峰藏和尚因游戲于頂日問石二公之門一日訪豫於長干一見傾倒因出藏公父子所示參禪須參宗門之句其法語反覆拈提皆足開發人知見豫閲畢居士禮拜求一語以相激揚豫呼曰居士秪遮一句作麼生士曰不會豫曰好箇金剛圈棘栗蓬士擬議豫展開兩手士以手來摵豫即劈面一掌曰遮老賊士笑而退豫曰蹉過了士復禮請于指示豫曰我宗無語句亦無實法與人或不得已一語一默一作一用一棒一喝一指一示是皆欲人直下了然于心絶未嘗以語默作用棒喝指示及種種言句機鋒為宗旨令人參究也即靈山會上迦葉見佛拈花而悟阿難聞倒剎竿而悟亦何常以拈花之機倒竿之句而參悟耶正以後世學人根性遲迷未能直下豁徹因而返自參究以至苦勞積久歲月或後遇師友機緣感觸而後開悟乃知從前種種言句機鋒等皆是直指人心見性成佛之妙其為方便接引初心入路原不執一也辟如世間有欲見主人者或了無一語直入堂奧而相見或通謁者而後相見或投名刺書柬而後相見或借親友引進而後相見或值門閉乃以拳擊手拍瓦敲口叫以至罵辱激憤始聞門而出相見或主人畏避犯法事情官府讎家擁兵仗困繞其屋宅搗其門庭搜其藏匿生擒活捉而後相見此皆因其主人事勢親疏緩急不得不如是非先必定有如此種種之法也雖求見之法種種不同而所以令主人相見之旨豈有異哉後世師法不妙根性不齊不知從上直指見性之旨徒以語默作用棒喝指示及種種言句機鋒以為一定宗旨得非深昧直指當下之旨執指為月也哉自拈花倒竿投針示相以及廬陵米日面佛麻三斤乾屎橛青州布衫重七斤十八女兒不繫裙與三玄三要主賓照用君臣正偏三句一鏃九十七種圓相等神變不測是皆透出我本來宗旨之方法也若但以名相而求語句而討不明就中方法所以得相見之意何異執敲門瓦子而不打開大門安從得見主人之面目乎以是後世不繇自己直下發明乃於古人言句機鋒分別計較穿鑿扭捏支離破碎陷墮識情不幾誤入邪外稠林而不可救拔也哉汝正骨人發心直須透破了擔荷調御之任不須更作廋讔相撮弄也珍重叢林藥石法語古之禪林號為百怨門要人於千不自繇萬不自在中煆煉出千得自繇萬得自在底三昧來所以始終有大受用將來亦為得人若參禪人有一法不能透有一事不能為有一人不可與有一處不可居又安得向異類行而變化其異類哉吾嘗曰若叢林有一等人收拾不得未足為通方叢林若衲子有一叢林居住不得未足為通方衲子人生之器量深淺於此可以見矣今有一等說我來親覲善知識元為向上大法豈來此修苦行習禪定哉若夫堂外作務從來不慣也沒那心去做禪堂曾坐過來也沒心更去受職事人瑣碎規矩我有個絶好規矩法度他又不肯把職事與我當我看那一班人也沒幾個似我遮般有開發底不是十二點底斗子便是攢死蛇底癡人必須與我一個小房但要明窗淨几文書紙筆幾味茶果可以點心或看語録寫草字或做些詩偈歌頌或困倦時稍睡一覺同參道友三五人常著幾個轉語論幾則公案吃些茶談些語或簡點諸方或議論時事或笑口拍掌或揚眉吐氣亦不負我等有方外風味若不如此豈肯蹐蹐局局如那一等不曾大有省發底終日打樁搖櫓如繫驢橛子如三家村書地相似叢林之規矩法令元為彼一等初心行人嚴設豈可加我通心之士又有一等素出頭者曰我非為參學求依止我看彼會下無人屈為輔弼特地裏扶持他出世為人乃至為他代筆代座又豈可不破格以禮遇我嗚呼你真是其人豈特明窗下安排當果熟香飄龍天將自推出也豈可強自炫暴乎若秪如是狂妄過高則二祖立雪斷臂百丈不作不食溈山種畬插鍬雪峰三登九造葉縣擯叱浮山種種為法忘軀沉陸下賤如龍潛九淵者皆所謂十二點斗子之活計也又何處有今日之事哉佛法宗風自此掃地魔祟妖孽自此塞天矣可勝歎哉又有一等自謂我特來親依善知識為決擇生死偶遇知賓行人或侍者同事有一言稍拂其意即時捲單便行心憤憤口悱悱不勝訕謗知識毀罵叢林而終身含恨雖過門亦不入也嗚呼如世間有真決科秀才因學宮門子一言不合即將巾衫送還宗師有是事否真為生死人正要將此身心性命入大冶洪爐煆煉盡無始劫積習業識鉗鎚盡無始劫生死命根豈肯包藏禍心蓋覆毒種為自刑自害之人哉又安肯取一時之利便造萬劫之迷坑而不求自出哉又況古佛大士尚欲示同凡夫入異類中行同事攝示種種功過為人天標榜今為生死垢重之人于生死性命絶無一毫解脫又安能為人與為將來人之眼目乎吾嘗云欲向千人頭上坐必須萬人腳下眠欲向高高峰頂立須向深深水底行欲為尊貴中之尊貴須為卑賤中之卑賤善游魔界乃真游佛界善入五陰乃真度五陰今人未能發一智消一惑行一非常之事安有非常之果嗚呼哀哉我嘗見許多英靈衲子遭此惡疾遂致終身自棄不惟不能成人末後業報苦果有不可勝言者吾深有感于此故不惜口業為汝等先進此一服良藥而已惟不我吐法門幸甚復示圓覺化上座昔普化沿途掣風顛遇巡街御史出隸人喝道而行普化攛向道前作咄咄聲御史呼隸捉下打五棍普化曰似則似是則不是復欣然𢔒徉而去山僧嘗問諸學人且道御史賞罰分明否普化有出身路否似則似是則不是一敲一唱妙密希奇向遮裏覷破真可入如幻解脫法門也今上座到處唐突不妨衝流度刃何以怪人呵叱驅逐乎巡街御史與我知賓職事還有同別否你果能如普化當呵呵大笑不敢以己妨人不見無厭足王之門庭而斬首刳眼支解衆形未嘗以身語意業惱亂六道群靈者乎又不見寒山拾得放曠不羈每遭人叱逐自撫掌笑傲打鎖敲枷又何嘗以人不知而自慍怒乎必欲使人禮敬不敢怠慢則自當循規蹈矩周旋上下所謂機貴回互不敢觸犯鋒芒也今既不能入荊棘林游獅子窟如裸形之人責人不以禮貌又如賊兵之專以放殺虜掠為事卻怪人以刀杖禦暴即世諦中亦無是事況我祖宗門下劍戟縱橫特欲破除學人之偷心妄法哉我亦知上座是學脫略不羈之人但可恣意於草昧荒疏之外何可放縱於規矩法度之中如上座前日謁顓愚大師唐突無禮且輕擊其背大師以不采無窮你自納敗闕若使諸方拄杖打折不放你在何可以善知識勘學人之機而倒用於善知識之前哉你既如此行事當盡天下無措足之地矣還敢大言世人昧於名相而不知超略幻惑豈非當局自迷者乎示石潮寧西堂法語吾宗末裔傳至少林金沙太混若非吾廩山翁于宗鏡書祖披出純精別行一路幾于人天冒昧何能回拔今時哉篤生壽昌老祖得無師智掘出大好山中掀翻黃龍頭角正是胸中迸出始能遮天蓋地也及接我東苑先師便驀地推下險坑使自跳出捉敗遮老漢莫作怪即杖人撞開祖父之門全是赤身挨白刃以故生平不拘拘于三玄甲胄五位鎗旗別施符劍八面破敵今時之弊正坐在各執名器不能神其殺活終屬濁智流轉不鑒溈仰雲門法眼之後因何而自絶乎吾子始于太平棒頭得火燒裙帶消息今復來此烹煉自應如九轉神丹變化不測異日大起吾宗則皋鶴之聲光自遠矣子當慎之
