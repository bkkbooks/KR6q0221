body:
  text: 序佛以大權示現法華顯實末後惟拈一花東渡別傳直指五宗焱興認花認拈祗供棓喝雷奔電拂愈出愈奇然識法者懼能免逋藪耶凌官球曰不可獨行不許僭竊陳旻昭曰須是其人始得非可以依樣按水葫蘆鬥鹵莽也杖人於刀兵水火中求大傷心人窮盡一切超而隨之乃集大成乃定宗旨恰好托孤于竹關則吾友也今出世且二十年龍天推出于青原七祖倒插之枯荊竟發櫱矣龍象駢集緇素景從敲金戛玉節拍蕭森法乳流通奉者得寶拙菴凡夫覽而歎焉愚生近溪壽昌之鄉親炙海岸黃公又遇竺師盤礡終縣影事後閱藥地炮莊僅乃汗出今展此錄隨場示應惟禮拜退而已更何語乎然因時而徵一寔有不得漫然過者聞之曰單提法身尚有法身向上事擬欲承當劍去久矣合啄敲唱本無奈何欻起斗絕無棲泊分不見一法猶半提耳全提綱要包舉彌綸更有不煩掃建處一切現成然倚此膠杯乃大病也無方裁方應病予藥須歷事在萬古茶飯柝薪炊煮事理圓畢從來增減不得何容毫釐繫念乎雙鎖金鎞意句相鏟他出繆刺隔治更靈展演出格亦是偶然揮劍則利握刀則傷忌執而有之所以隨分拈提宵練無跡人但見其三墮縱橫不可擬議而不知其泰豆氏舞交衢也八音繁會應接不暇而祝敔歷然絲毫不動或以為理窟殘壘或以為淵雲餘技不知其吞吐古今皆我指爪拈花落草豈限町畦木舌揵椎異響合奏正是隨類現身入田不揀耳所至道場翼翼謖謖千指樓閣不日巍然按其踐履斲水噴雪布袖平澹來往翛翛正是本色光明寸絲不挂縣寓大畜總作藥籠多生一生具足淵源三才一心之故自少遍窮行布本圓五地五明至頤象宜直鹽醬也嗟乎莊語不信戲語不敢姑從旁而質敘之時哉雉噫百淬金剛委土新硎不涉方便天以世界為爐冶人以痰疾生德慧歷濁奇緣大聖或脩偏行集大成後鳥道不妨橫飛況乎夙願大人應此午會徹頂徹底條理其中超一切隨一切而乘時統御之深心大力藏密無間風雨露雷莫非恩也夫豈世出世間測度所能及哉生死本無生死何用贅疣泥洹乎竿木乎任人牛馬矣果然二十年剝爛不必為何事自信三十年後此話大行為何事感此絡索千載旦暮不妨覆葉于掌就其一莖而消歸之更不妨挈多于林舉其全集而熏沐之故以愚管為之嚆矢願同心者勿滯籬門無負此午會可也康熙庚戌大鄣道中老山學人徐芳拜書序生死發藥見于大宗師易則以寂感蘊示端幾而神明其故者也卓立幾幾誰肯研極而與語通神明類萬物質俟不惑其詎信乎關尹曰以可得可行者善吾生以不可得不可行者善吾死牛翼馬手是悟出否佛以因果障狂瀾以戒定慧仁智交圓為理事以拈花為契證以法住法位為誠諦此其概也生來死去為疑城天竺外道以有無四見矯亂而惟惟決之猶不豁然感佛恩乎麻三斤乾矢橛一種棘栗蓬果為何而設耶習氣難以卒除及盡今時藥病展轉噓噓固然遯貴滑疑之耀瑰士造閉以困駴或掩行布以求圓而詭隨昌之安得無午會之醫醫者乘夙願力因法救法哉藥地大師淵源三世覯閔窮盡息喘杖門點睛飛潛非偶然矣世無具真心細心者疇能合鼎薪炮莊而通其故乎公因反因殊破天荒實乃如此自上叩之時乘現身自下鐸之隨分自盡而已此冊切切豈無攻堅以解者杖人曰冬煉三時乃享無冬無夏之天此冬灰之旨乎石頭大師曰本末盡歸宗當知用及處玅協何疑但背與庭代錯為用耳時為流通以待神明者東海學人興翱趙㟲謹識天界覺浪盛禪師全錄序今日之佛法不謂之極盛不可今日之佛法不謂之極衰不可遍道場皆宗師遍棗梨皆語錄人以為盛吾以為衰故欲從今日佛法之盛救今日佛法之衰則必舉天下之證法王寶座者盡奪其席焉而後可舉天下之稱支那撰述者盡火其書焉而後可夫所謂證法王寶座之人與所稱支那撰述之書遊其門者方共儀之以為為人天作眼目為佛祖續命脈而一旦謂必奪其席必火其書而後可則彼之遊其門者方群起而議吾言之肆而且瞽而欲從今日佛法之盛救今日佛法之衰將遂勢窮于無可如何乎曰聖賢設教有極盛之時亦有極衰之時亦無有極衰而不可救藥之時則為今日回光長夜砥柱狂瀾亦不過從法王寶座支那撰述中而觀其孰為數十年來所共宗之人數十席中所共傳之書表而出之以教天下而天下之凡遊其門者亦或有以自止而今日諸方名宿亦或藉手以補救之而有餘叩其人其人如在讀其書其書大成則惟天界之覺浪杖人蓋杖人于一切處成等正覺無住無不住當時諸龍象奔走庭堂者實繁有徒諸名鄉鉅儒獲聆片晌透一針者亦無不心悅誠服薰沐歸嚮而某以生晚緣薄從未一親其庭乃于今佛法極盛即極衰之時謂其人為世所共宗之人謂其書為世所共傳之書而推崇之以為此真正令全提救時良劑天下之人不幾謂吾為隨聲附影徇名失實而悵悵然其何之乎曰非也吾儒道統之傳有見而知者有聞而知者不得謂見知之人可以同堂共訂而聞知之人遂不可隔世傳心孟軻居戰國去聖人之世若此其遠而自謂予未得為孔子徒予私淑諸人究之知言養氣願學孔子千百載後宗其道者至躋之七十二子之上與泰山曲阜俎豆鐘鼓億萬斯年推之于佛何獨不然吾雖未登杖人之堂不視其父視其子而猶及見其門之能嗣杖人之傳者前則有青原笑峰今則有藥地愚者此兩人在吾儒中皆天民先覺擔當斯道以文詮木鐸之秘以心維幾希之微以身繫綱常之重百尺樓上千仞巖前死生榮辱俱無足以動其心者使非杖人煆煉錘鑿使生平豪氣盡歸淡漠絕代聰明相忘渾沌而欲俾其葉落歸根灼破兩頭悟本超宗回互玅協頭正尾正永不退轉甘心出入門下不其難哉往笑公來住青原吉人士屢請正席方丈每謙讓未遑一則曰待老人至再則曰待老人至及聞老人圓寂奔喪東下不啻孝子哭其考妣藥公繼主青原揭地掀天不落階級四方來學以為儒宗者以為禪宗而于杖人語錄及別種著述時手一帙以教同人且欲舉各刻重行參訂彙付剞劂用垂來茲較之析薪負荷徒讀父書者大相逕庭兩人且不以予為不可教而每于沉迷依戀之中時施警策間行喚醒噫兩人之于杖人固所稱見而知者而予雖未親杖人猶得從杖人之徒以聞杖人之教亦豈敢遂謂聞而知者而乃于佛法極盛即極衰之時獨尊杖人以挽回補救使天下讀杖人之書者從此爭自濯磨爭自悔悟不得為見而知之人猶得為聞而知之人則舉杖人之書而彙梓之以行于世功豈淺鮮若夫杖人正法眼藏變化機權御一乘車摧五魔道片詞微旨觸類旁通不特有益于禪而且有益于儒則已有李夢白黃元公馬培元李小有陳旻昭諸先生序以不朽而予以未夢箇中之人敢與諸見而知者談伎倆味醍醐今日藥地前日笑峰告之杖人杖人有靈得無急遣侍者日此鹵莽漢推出門外也哉時康熙戊申秋月青原弟子張貞生薰沐拜題龍湖寶筏語錄序乙亥丙子之交流寇方熾予與同參友特延龍湖覺浪大師於寶筏禪林開堂說法正欲藉此以一番振作也人初或疑之曰為此迂事斯何時者及大師陞座顧鑑嚬呻激揚闡發人天圍繞無不欽悅所謂王登寶殿野老謳歌正令全提群邪皈命豈非諸法性無常佛種從緣起也哉夫出世宗旨大師已弘宣其密余世內人也請以世諦重為質之賊勢孔棘時士民之饔食如故乎市肆如故乎誦讀如故乎是皆不廢何獨廢說法耶法即飲食之知味出入之門戶定亂之兵符也夫既如是而又孰能廢哉況今聚而聞法之士即合而城守之士也總斯人也饑而食寒而衣寇至而登城寇遠而聞法城守不礙於聞法聞法亦何礙於守城乎蓋守城之害有三一畏心二慳心三分別心見賊輕逃困乏不濟左右分袒者此三心之崇也大師說法首破此三心單刀直入大震全威出死入生神變自在人人如此心心如此何憂乎辦賊已哉毋論瞿曇舉步殃崛旋機慈指放光狂象奔伏唐不空三藏持護國仁王經致毘沙現身而吐蕃歸化即吾儒分中驅鱷渡虎單車詣壘賊不入境者一皆精貫天人而成此功用也況大師祖印真傳門庭孤峻委心亂世調御攝持獨揭剛圈嚴施棒喝太虛空中抽釘拔楔普門示現度脫無方於兵戈中惠諸三昧處危城裏轉大法輪斯可謂真能大興寶鏡宗風善入不變異處任他三墮縱橫者也蹄馳火宅大車之賜豈迂掉撥煙波寶筏之乘何快謹集斯錄用廣法施具眼高人言前薦取崇禎丙子楚黃學人李長庚拜題覺浪大師歸壽昌序余少從丘長孺處望見龍湖老子顏色書生茫茫然未知領解在長安從袁伯修兄弟游始知吾宗門大事時時激揚每歸來輒向綦隆黃檗呈之念公屢遭痛罵十餘年間前後不啻十餘次雖根鈍機遲不蒙印可半字而于不蒙印處覺有少分入許不覺念公先往自嘆大事無緣止將性相經論度目過日世路風波又歷十餘載此念亦閒置矣山居值寇盜干戈謀生無計一日有僧慈遍以雪關大師問答語見示觸動風機不惜敗缺一二妄呈雪師婆心困徹批駁鉗鎚極力相為于托缽公案尤加針劄會覺浪大師主龍湖蓋二師皆博山龍象也一見深相契合有所問答另具錄中一日與諸英衲同集偶舉時節因緣有舉眾生心緣起諸如來者有舉如來為一大事因緣出世者舉大通智勝佛十劫坐道場者余因問座僧恒鑒比如文殊不能出女子定罔明出之是何因緣鑒曰此罔明有緣師震威一喝曰不是看取托缽公案余拍案曰大師何得平地殺人恒鑒通身汗下余亦默有省會師坐禪堂舉拄杖子連問余二次余不置對蓋余是時於世法內事有所回互故不欲當機以三頌呈之頌曰荊棘叢中解敝衣旋風八面解重圍須知微服兼章甫孔子曾呈第一機師因出世婆心徹我為世法徹婆心同是一般琴與笛無絃無孔說知音四十年曾坐艸衣秘宣內外有玄機沒蹤跡處藏身是谷口寒雲自在飛師笑頷之值夢筆山僧眾來迎為了先壽昌大師掃塔之約欲暫還江西同參大眾悲泣挽留如喪考妣一夜忽夢一蟬長七寸一鵲下逐之蟬走入艸中余曰險哉回首見師曰俊哉驚寤復合眼見師喝云休去歇去余曰余歇去矣師又喝曰誰教你歇來余驚起披衣待走禪堂則師已戒行矣僧允中請師陞座請末後一語師說畢下座復坐門外大眾齊集時多儒者師舉云顏子喟嘆一章書仰鑽瞻忽求之于道孔子一博一約指出我來所以教中云萬象之中獨露身余問曰云何清淨本然忽生山河大地師云遮一問何處起來師因問余曰比如纔舉末後句儒家也有麼余曰和尚放過某甲師云放過了余曰群龍無首師云遮是當頭話余曰過此以往未之或知也師曰再舉余曰子出門人曰何謂也師良久曰情到不堪回首處一齊分付與東風蓋龍湖為邑先輩周柳塘先生開堂卓吾老子及念公久住以三大師之區非大師不能復興一時大眾殷留是地出余母曾氏故曾氏諸君子留之更摰師于佛前證盟掃塔後即還龍湖大眾方為安心余又獻頌三章曰黃金靈骨尚依然萬里清空塔影圓月印千江同一點龍湖先掛夜明簾谷口雲深路不迷青山行令正全提蓮花出處楊花著池面浮萍池底泥灑淚絲絲別去津莫言離別念非真更將末後頻頻問兜率如今笑轉新師云雖然不可艸艸更為陞堂一說師陞堂說畢問余曰聞汝在看法華有何言句余曰昨看提婆只有一頌呈上頌曰平地孤堆最誤人枉將法座賺冤親瞿曇自有金針度認影迷頭又隔津師云何不道提婆別有金針度余曰恁麼是老婆勘破有來繇也師大喝一聲下座丙子六月楚黃學人李長庚稽首題壽昌覺浪大師語錄序先壽昌得無師智特唱玄風末後以一枝佛法囑付東苑諸方咸訝之余見東苑嫡子浪公機用勦截雷轟電掣有德山臨濟門風公嘗親見先壽昌默受心印故手眼與諸方迥殊耆宿見其言句尊之日新壽昌蓋謂吾師獨傳先祖真命脈也諸方悟得乾蘿蔔禪口如扁擔安得縱橫自在如我師之辯才無礙哉三種滲漏獨我師能脫格單行洞水逆流吾見其人聞其語矣崇禎丁丑中秋壽昌法子黃端伯和南題圓通語錄序長庚昔嘗參諸尊宿或指示或商確或機鋒或棒喝然未有如今覺浪大師之奇迅超絕縱橫玅協者也蓋師於世出世法已透內聖外王先佛後祖之微故其神發秘旨光闡玄猷不特為學人衲子點眼刳心直當與儒師宗匠返魂奪命此非庚獨佞於師試請披讀龍湖壽昌新城福山與今圓通諸語錄及植聖尊正別傅法印宗盟諸著作始知古今衡鑒非一人敢私也師嘗云治世之道以堯舜為正始文武為正終其刪定作述獨孔子能始終一貫集眾聖大成不則堯舜文武之道亦支離而失其渾全矣至於出世之宗以達磨為正始五家為正終若不有如孔子者出則此宗猶未免于散滅也即此足見宗門孔子當仁不讓矣師方出世年淺且多涉賊亂中故海內知師者尚少而黃元公乃今之楊大年張無垢也本出先壽昌博山之門所以於師獨親庚亦繇是得與密交方外共事大師不啻馬祖石頭當世豈非夙生承稟今復同時者乎況茲應匡廬圓通旻古佛折半破三於三百年後重來大作佛事之識則師為古佛再來信有徵也恨庚老矣使得加我數年以隨天下英傑共睹厥後奇特不亦快哉謹序其斑窺以質正同參云崇禎己卯年上元楚黃學人李長庚伏首撰洪都語錄序向上事語忌十成若錯認定盤星則河陽新婦當側身局影三日不出聲艸昧初基人情沕穆不設觸諱之禁不架箭鋒之機拈花倒竿而已垂衣拱手矣當時傳法僅憑一金襴袈裟或偶垂半偈而法窮則變衣止不傳則各立一赤幟或秉拂子為爪牙或推枕子為鋒刃不過一節度使信旗五家異軍特起倒用魔印假道虞境火牛木馬俱從幻出雖使血濺梵天入廛出巇尚不許將軍見太平豈有圯上兵書可相授受而韓盧逐塊捫響追空狡已脫而藪者尚待於株亦宗門之季世矣覺浪大師自壽昌得法後應古佛縣記建圓通一剎竿乾闥王瑟任指出聲法界不藏駒蹋天下遂憩章門演泰定列缺雷雨九土膏墳隨三根人而接誘之各赴來機豈非時節因緣使然表衝旋三十年未得噴地一蒙深劄更無伎倆可呈誓奉深心塵剎永依座下獨怪老人舌覆大千未留一字徒吸盡西江而去矣親到圓通再為拔本弟子丁立表題靈谷語錄序不孝於衰絰中方悲慕罔極忽憶古德云大事未明如喪考妣轉覺痛切親不知親之去處我不知我之始終此真亙古今所共之生死大疑情也安得不疑又惡容自己偶故人羅君邀過靈谷訪圓通浪大師予初以宗門多拒絕人及見師接塵笑談高閒雄快因從容問曰學人參道可以開諭乎師曰道也者常也其性則主乎天地古今為獨靈非身世生死所能變滅故佛稱曰奇哉正以人皆有之而人多不能自有之反以至常為至奇也孔子能發憤好學故曰朝聞道夕死可矣惟孔子能自得之故生死不足為累其謂孔子不悟無生大道不與佛同大權示現前後唱酬吾不信也今儒釋自畫為二道本大同而不相為謀者則不善學之病也予不勝傾倒因相與游於松風石澗之上盤踞而坐烹茗對酌師忽指澗水曰公見麼予曰逝者如斯夫師正色曰公又恁麼去予時悚然良久復問曰幸師指示師曰莫被人欺瞞好予於是脫然始知大事未明不可不見明眼人也乃于所寓循公房題其額曰遇浪處識所感耳時予太座師姚太僕公子愚谷世兄前於江右棄官從大師學道深得鉗錘之力自丙子夏仲都門別來幾及十載始復晤談甚愜世兄以大師全集及靈谷新錄示予曰此新序必藉一言予雖不文然感師指示不敢不勉焚香披閱一二見其白椎說法處或掀天揭地電捲雷轟或化日春風花香鳥語或呵佛罵祖顛倒英雄或驟帝馳王權衡治亂至於熱呵痛棒拔楔抽釘收放殺活之間真不可得而思議也然忠孝之故剖肝膽而不辭徹困之深擒虎狼而獨捷要其指歸則尊正會規集成佛祖之統宗談易論學繼述周孔之道法其欲會同世出世法以定天下萬世宗旨也人孰測師之深意哉昔歐陽文忠公見明教嵩書曰不意空門有此即予謂師實總南陽明教與覺範玅喜不足多也予暫得及門未悉堂與中事僅述所窺如此大方明眼有深知師者當別有向上一著在崇禎癸未古滇學人王錫袞稽顙拜題金陵語錄序古今持世之功存乎佛法王道故二帝有施濟猶病之心諸佛有度盡眾生之願無其事有其理有其理非無其事也漢唐宋歷代之君臣或棄王道以奉佛法或闢佛法以尊王道尊王而不及純王奉佛而同於謗佛皆爭於其末之分未窺於其本之合耳獨我太祖聰明睿知臨照萬方於龍興之初即建諸梵剎顯彰宗教陰翼皇圖傳一貫之心杜紛爭之口非惟相萬於前代之闢佛者亦相萬於前代之奉佛者三百年來久安長治此其徵矣邇來緇俗相沿多迷本智師承大壞搆忿執迷假儒衣書士非真士傍佛門戶僧非真僧貌儒佛津梁入塵勞韁鎖莫覺莫悟迷者愈迷罕聞身心性命之真宗遂釀水火刀兵之劫運天人減損魔外縱橫洵莫甚於此際圓通覺大師以正法眼直指全提行世難行度人難度李夢白冢宰之敘師云不特能發揚先佛後祖之秘即聖學王道之宗旨亦無不抉盡其微可謂知師矣歷觀佛祖出世玅在救時無法不收無機不被師於今日若但如德山之見人便棒臨濟之見人便喝睦州之見人便閉門俱胝之見人便豎指此又何難正使鑑顧動容開悟正性談笑揮指銷落偷心此乃師之全機大用玅辨宏才炤用縱擒正偏玅協世間出世皆有證入之門上智下愚悉受平等之法師嘗謂扶陽太過則抗扶陰太過則慘使諸方參學知其門庭高峻不專在棒喝拒絕之嚴正當如春風時雨起其焦枯不期榮而自榮不期化而自化何籍肅殺之氣行於慘害凋傷之世乎師且目擊弭亂之轉乖心傷陰翊之靡度恐貽佛法無靈之謗痛自責成於己之深故能示不殺機立無死地開龍戰勿疑之血脈復碩果不食之貞元為法求人為國資治通二帝施濟猶病之心行諸佛度盡眾生之願必祈今日佛法指歸上報皇恩至化如斯救世誰謂無人或謂留都宰官駢集龍象諦觀師結制靈谷時節因緣正大化宣流之日師蓋以金陵為龍興之地圖王奉佛精神可求發揚於此振其末必循其本也至於萬法同時亦如楞嚴會上十方微塵國土一時開現佛之威神令諸世界合成一界寧止續達磨之燈超寶誌之座乎盤舊聞道風新漸法化然根性下劣于師未知少分茲從所見而言之僅入門之歌嘆云爾淮南弟子李盤拜題鳩茲語錄序覺浪大師胸有智珠舌為寶筏天龍推出為大地兒孫飛灑法乳余亦仰乳兒孫之一也今茲中春師不果棲賢之游以浮丘作化城余亦適省沐居里函丈有期魔嬈間生梗我良覿及余蓱寄姑溪聞師將赴堂席於姑之白紵為停歸馭以遲之已而遇師鳩茲江滸磬折纔終世緣相嬲提命無幾語然滿堂目成懣然心服知祖印固在師肘間眾仰所歸固不虛矣余往之知師不離文字因緣諸鋟行法錄比諸寶瑤所至必俱嘗舉謂友人鳩茲璃柯羅子大師行世文字何必減玅喜幻住二老人乎今師鳩茲法語踵行勺公屬余為弁適璃柯別余江上指示水濱高剎前此千春杯渡道場在焉以神通論應讓前人若云單提祖印一代津梁定屬今日浪杖人矣余韙斯言敬錄以引龍眠史參學王大礽題覺浪和尚語錄序天下之盛會莫若江南江南之大善知識莫若覺浪和尚年未古稀而閩楚吳越江淮以底舊京建業展坐具者閱歷五十會聲名洋益無間華夷到處雲行雨施影從響附欽為明神戀如慈父實目前所罕遘往昔所希有也良繇洞上真鋼刮人眼膜夢筆靈氣直射斗牛居恒澄徹一門該練三學遂使儒門澹泊收拾不住者都得皈師換一頭面翻一筋斗而禪門之徒無論玄門之徒又無論矣不急嘗讀孟子七篇至末章敘述堯文至孔子見知聞知道統皎於日星歸結然而無有乎爾則亦無有乎兩句著語囫圇咬嚼不破全似言語道斷見聞雙泯從此無復擔荷魯道之人金絲堂鐘鼓章䙜剎那間交付西來衣缽矣又嘗讀莊子有東郭子問道惡乎在莊子疊答以在螻螘在稊稗在瓦甓在矢溺又有與物無際不際之際等是全似麻三斤乾屎橛前後際斷為呵佛罵祖西來大意無義話頭最先嚆矢抑何奇物吻合甚也是知孔教而孟宗老教而莊宗釋迦教而達摩宗宗中教教中宗參同玅協臭腐神奇則浪和尚之坐進此道而集三聖大成固有不可思議者在矣是以筆說舌說實說權說橫說豎說旁說曲說熾然說無間歇說語大莫載語小莫破毫末不足窮至細之倪天地不足窮至廣之域所謂萬川歸之不知何時止而不盈尾閭泄之不知何時已而不虛尺水可使興波狂瀾偏能砥柱逝者不舍晝夜資深若決江河即令四隩橫流大地陸沈畢竟大覺海中前波不動後波後浪一如前浪眼見傾湫倒峽換谷移陵總不越曹溪一滴青原半點洞山五位東苑一指呼吸飛灑中萬派朝宗處源頭活水來遇此解者可許讀浪和尚等身著述少分相應乎不慧自從白下滄桑之日塵剎相對浹歲盤桓數數然望洋向若而歎拊髀雀躍而遊比來檇李兩番卓杖諸剎翹首企足瞻禮趨迎恐後旬月之間說大戒於龍洲而真如而楞嚴而天寧幢幡爭致鼓吹同聲浩浩說法狼籍如許悉憑朱葵石郡侯矢無邊心締最上契純陀之供屢修維摩之坐常滿圓就棗梨香積終始輪藏勝因自憨山雪嶠兩大師飛錫我禾檀緣輻輳以來未有如浪和尚之擎扶象教拂拭禪門咄咄後先輝映者也神豹寸班吉光片羽禾錄之視諸錄特芥子之納須彌耳而明眼人見偏得全聞一知十不止作東土文字觀併不止作西來無文字觀則於標一函三之旨思過半矣曹溪侍者福徵譚貞默槃談謹撰天界初錄序余下根鈍器衰老失學每見世間文字及諸方語錄堆床積案便眼昏頭運不能開卷每拈懶贊語那有閒功夫朁俗人拭鼻涕耶然每於燈殘月落夢回寐醒先佛古師一二染神剋骨語句影略逗漏時時落齒牙喉吻中如小兒弄語時婆婆和和有人詰之茫然不能置答有掩口一笑耳與覺浪和尚相聞十餘年始得把臂不交一語頓覺心腑清涼輒伸筆為文以贈頃又見其天界初會語是四十年前與焦弱侯諸先生聚首提唱者迄今藏棄篋笥未有人著語而公之上首鶴谿猥以見屬每欲下筆輒作婆婆和和然是又可一笑也常聞長者言本朝禪門自琦楚石泐季潭後一燈迢然而憨山大師盛稱壽昌無明以為法眼圓明振起末俗今浪老實壽昌的骨子孫建大法幢獅絃繼響讀斯語者有以洞見其提挈綱要照用縱奪之機無以斯世顢頇儱侗冬瓜瓠子之禪同類而舉揚之庶不為延津刻舟之人所竊笑也昔吾憨師贊壽昌之像曰突出大好山千里遙相見博山見之以為知壽昌之深無如憨師也今吾幸於暮年得見浪老相與敲空作響無舌而談善財童子登妙峰頂不見德雲比丘及見德雲乃在別峰之上蓋余與浪老所謂千里遙相見者如此鶴谿以為然否歲在戊戌夏五望日海印弟子虞山錢謙益和南書於杭城之報恩院崇先語錄序皋亭浪和尚真不可以名狀也自弱冠即得無師智自然智自能悟道特定宗旨於壽昌東苑二祖父從此以一杖拄天地雙眸炯古今放九界身光施十方法乳剖三藏秘旨透五宗全機直使橫亙豎窮負此靈性者皆知自己心中有法界主中主之恩力也古云寄諸空言不如行諸實事而師四五十年來坐道場五十有餘會著作佛祖儒老內外篇集百有餘種無一不是創語無一不是活機無一不是痛心無一不是刺骨每於刀兵慘殺巾開創興復行人之所難行道愈高而心愈下己愈損而人愈欽無彼此而能曲順機宜忘悟述而得大同物類參同法界麗化宗燈密金鍼於錦縫提向上於牢關托三教之真孤寄九流之正命千聖混而知處諸方類之不齊尤於洞上之君臣父子功位正偏與濟上之主賓人境玄要照用有關於聖學王道處處加意發明使天下無此名教則不成天下古今無此宗旨則不成古今矣師昔有詩云吾人性所全用舍有獨至其存萬世謀惟一知己地秖遮萬世謀知己地是何宗旨之妙密乎即洞山之邈真臨濟之喫棒德山之見龍溈山之撥火雲門之攛杖法眼之豎指不有知己地而能存萬世謀乎推此則可見師之性所全矣旦根識闇昧何足以窺一班三十年來仰師之名前讀諸刻直下令人心死汗下去冬始得到皋亭參謁一瞻眉宇如天日春光一聽法音如迅雷啟蟄深知此崇先之真歇宗脈真不歇五百年後有能使宋高宗敕建之崇先顯孝得以光被於天下而昔時之文章道學節義更當超超振起於兩間已有在於此錄也旦何幸獲附一言於千古大光明之下哉當湖鐵雪弟子行旦馬嘉植薰沐拜述天界覺浪盛禪師全錄目次卷首新序舊序發凡卷一上堂卷二上堂卷三上堂卷四上堂卷五上堂卷六小參卷七示眾卷八普說卷九茶筵法語卷十法語卷十一機緣卷十二頌古卷十三源流贊卷十四贊佛事卷十五偈卷十六附載卷十七塔銘卷十八詩卷十九論卷二十論卷二十一序卷二十二序卷二十三記卷二十四說卷二十五說卷二十六說卷二十七書扎卷二十八題跋卷二十九雜紀卷三十雜紀卷三十一雜紀卷三十二雜紀卷三十三雜紀卷三十四目錄終螺川王騰霄書曾毓祥梓
