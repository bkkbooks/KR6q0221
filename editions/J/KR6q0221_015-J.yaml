body:
  text: 門人大璽大量大杲大充較偈自參歌參禪人自憤發切莫斬頭去求活此個元來你現成自悟一回方洒脫若不悟必從迷其誰本分合天機自非打破達多鏡未免癡狂向外馳西來意何直指九年面壁泠如水神光設不乞安心焉得使渠求自己自覓了正依稀輕輕一點釋深疑萬古碧潭空界月再三撈摝始應知從此後心相傳衣法絲絲命若懸汝若返照密在汝如人飲水對誰言甚麼物恁麼來當頭一劄眼眉開說似一物即不中豈是顢頇可妄猜作何務不落級就手行拳不費力親口親供勿自欺徹底無依獨超逸佛非坐鏡非磚車不行兮牛著鞭果然窺影便騰踏腳下兒孫如湧泉特地裏解尋思纔出曹溪即自奇鈯斧無痕今現在幾人曾領此風規鴨子去扭痛鼻一喝耳聾尤駭異巍巍獨坐大雄峰吐舌踢瓶爭意氣如蚊子上鐵牛脫落皮膚真自繇從來千聖不相識咬指抽刀謾展眸秉金剛滅胡種腹饑不得點心噇龍潭吹滅眼中花白棒橫揮佛祖悚我此宗無實法當機要你桶底脫從門入者匪家珍自胸迸出始開闊一支分五列派誰在井中叫出快三頓棒徹老婆心拶斷腳跟何慷慨無情說法我非渠三界唯心百雜碎看古人何榜樣今時參學須增上莫只隨波向下流自己打失真柱杖真參禪為生死豈是要圖作佛祖死生根木未曾空秪因未悟我自己既未悟須自參自參自己復何難若能瞥悟未來者佛法機緣太煞閒方便說名禪宗自性通時萬法通百千三昧隨時用曲唱全提妙不窮大丈夫肯自昧烈烈轟轟徹勘對翻身躑地獅子兒吒吒呀呀誰匹配哮一聲群獸滅逼出娘生真汗血一朝奮發此神威踏破山河如片雪更囑你信自心休較禪機與古今公案話頭誰不有達磨未來須自尋依語解恣偷心墮他毒海枉沉吟個裏生機成敗種爭見焦芽發早春汞銀禪招箭垛管教精彩難入火誰識無門解脫門玄情密意真羈鎖沒入頭無把柄正是向上人行徑象王蹴處絕狐蹤龍袖拂開全體凈無師智自然智不從諸聖求神秘頂𩕳自有路沖霄豈借清風生羽趐竿頭步進毋遲絕後重甦不你欺傍他家含安生理得便宜處失便宜宋元問有阿那參扣機緣放不過或於語錄結冤讎日久疑團忽打破直至今法成弊一狗見形群狗吠例將死語當參禪除卻驢椿無利市禪何物硬差排祖師活意可憐哉顛倒不令渠自肯按牛喫草一何獃雖機鋒亦棒喝幾曾痛處深錐劄為伊本地未超玄爭免相將成賺瞎不中病不驚危誰能發藥彼生機正如孽子孤臣事困慮衡心乃有為生死切自通靈不必偏於根境爭俄然觸發此堅密擊竹觀桃總現成禪何病情何疑捏目生花更是誰不能撲碎空王鑑撥影披光徙爾為直下明須銕漢著手心頭便自判回頭轉腦益狂迷萬劫命根安得斷試再問何如參痛揮一掌與羞慚風前驀見婆心切笑殺香嚴禮溈山坐禪歌坐禪者何所圖禪非坐臥非工夫為調攝爾初機士節制身心立範模四威儀坐獨靜儼然端莊無不敬外息諸緣內自寧心如壁處好參證無始來流識業不知常住妄生滅誰能暫息此塵勞冷眼看茲驀地瞥孤易懈眾難疲形神相警密欽持不自在中觀自在百怨爐鎚煆是非互鞭策共針錐散亂昏沉毋自欺誠於中則凜于外其十嚴乎指目為意集起心攀緣自視曾何肝肺然不睹不聞前拶透獨中消息許誰詮空劫外命何安掀翻太極古皇盤冥冥杳杳精烏有打破先天罔象關根境寂守幽閒法塵緣影鐵圍山空亡外道常拘執萬劫痴迷愈石頑禪非定參非思定境思情節外枝要你返將心自剖樹倒藤枯好見幾幾何見莫狐疑水盡山窮更有誰拼死懸崖親撒手命根斷處是生機無依寂勿隨照刀頭拶入沒縫竅裂破娘生舊面皮驀地相逢堪一笑寂滅場一真界緣起無生方廣大十世古今當念間一切法成正覺快十劫滯不現前迸出眉光始豁然未來佛莫生疑議過去燈明本自傳喫了飯洗足坐須菩提卻冷窺破即從座起歎希奇若箇當機無蹉過果能如是便降心不勝令人悲淚墮畏生死自肯切三世佛祖無妙訣秪這便是金剛鋒直剖此心千萬劫可不佛可不禪自家性命待誰憐此生若不明來歷枉入泥犁受痛鞭不自疑情不切所以真機不發越強將公案作活頭那個甘心咬木橛不提話坐何為我欲公看自是誰莫只念他言與句道火何曾燒口皮宋流弊世相沿謂看話頭即是禪不識五宗前祖道曾將何語作蹄筌無一物不惹埃何期自性此奇哉若能一念知非去自己靈光不用臺趙州狗性有無天光猶執夜明符可惜獃郎無志氣空於水裏按葫蘆竹篦子何觸背不疑言句真叵耐成群列隊弄精魂驢劫依他語作解想得奇情愈妄迢迢向外渠轉誑何如良久自旋機乃識循途非向上主中主不出戶門外兒孫休步武苟無一物獻尊堂卻好承顏無逆忤古佛住在何處返思靈燄妙而秘特地當央喚出來莫教癡兒井裏覷問的意三頓棒元來佛法無多樣赤肉團邊薦得伊無位真人非莽蕩撮三千如芥大放在目前朗朗箇打鼓普請眾同看一翳在眼空花墮法身病非一種虛空莫妄剮空籠直饒澄徹似寒潭光影門頭生死哄念不動如須彌黑山鬼子正相依等閒拶斷秦時鑽北斗藏身解展眉三界心萬法識浩浩商量沒窮極當胸擊破碧玻璃大地山河無影跡彼三關須自造佛手伸來驢腳到捉敗黃龍斯爪牙生緣失卻來時道透剛圈吞棘栗可中曾費纖毫力知是般事便甘休三腳驢兒任跳躑傀儡戲有機關舉止分明莫熱瞞俄然窺得抽牽者撫掌呵呵出鬧藍正法眼本圓明一朝夢斷兩眉清看彼拈花成甚事漫與英奇作證盟能自肯復何言勘破方知不值錢未是馬駒真種骨徒教南嶽苦磨磚呼惺佛偈此念兼中更問誰可憐明極反成迷但能呼惺自家底南北東西笑展眉此心圓淨非凡聖亙古何曾昧滅來秪為眾生迷本有勞他古佛下塵埃屈指伸來我獨尊新生孩子擲金盆無端驚起白拈手捉得真人一橛痕迥出根塵鬚髮落儼然獨露古僧伽鵲巢蘆膝空生影沒臭彌陀笑眼花一念超超六識空雪山寒透豁雙瞳明星夜半風光凜徹見真丹無異同體露真常佛已成更何妄想作眾生此心淨則六門淨十世古今落葉聲舉起分明大木叉當當常住古遮那千華臺上法身句心地金剛戒性多頂門透出髻中光一句心銷億劫狂七處八還休賣弄阿難玉線引針長持缽歸來誰見幾空生特地歎希奇分明一念無私處般若花開白藕池罔明彈指阿嬌還鴦崛傳言解產難卻笑渠儂徒著力超超四座自開顏靈光獨耀迥根塵十八同時一照新彈指豁開多寶塔呈珠龍女化全身日月燈明轉法華三乘並駕白牛車堂堂體露真常妙十六王原是一爺日入西方月出東南山燒炭北山紅雙林忽唱茶毘曲木馬嘶開無縫空四十九年無一字文殊請轉是何輪須知教外別傳密一句當機迥見聞一心不亂是真宗萬法都收六字中沒孔鐵鎚當面擲十方三世盡銷鎔懸鼓全開十六門九蓮花擁一慈尊誰知法藏婆心切四十八重同命根靈山一會盡英奇偶爾拈花笑不知幸自可憐忘彼我無端付囑被風吹金欄之外更何傳呼得阿難諾已全推倒剎竿消息絕了然東土與西天一句分明古月輪提婆謾自著名言缽水投針誰妙協春來花發了無痕覿面梁王曾不識廓然無聖孰知機覓心不得安心竟三拜堂堂得髓歸信不達來書不通無痕鈯斧砍虛空往來不畏石頭滑千里噓噓振古風一句了然非向背揚眉瞬目轉無聊俄然脫體皮膚落蚊子曾親上石頭泠灰撥出一星兒燒卻娘生兩朵眉信口吹來蟲禦木淨瓶踢倒笑吟歸十方一路箭鋒機扇子驚教天帝噫拶斷秦時𨍏轢鑽鯉魚吞卻涅槃飛此是曹源一滴水誰於言下振全機僧繇落筆能神變點著龍睛破壁飛一句渾崙鑿不休千名萬號謾相酬三斤麻繫庭前柏笑倒溈山水牯牛萬法無能與此儔西江吸盡自開眸鐵船浮水呵呵笑一曲無絃百草頭一句玄該𠁼字門當機歷歷主賓存三三前逗三三後無著文殊謾躲跟一喚全機五位尊未容擬議正偏分當風寶印重重妙錦縫花開不露文撥塵見佛太煩勞一句揮來劍刃豪真照無邊人不稟渠無國土孰栖巢狗子誰將佛性呼漫疑是有漫疑無一歸何處知端的穿破青州赤骨盧密露君王三寸鐵森森大地是刀兵趙州古佛何神妙不用干戈建太平中天好月誰能用寂子輕撩岑大蟲一腳踏翻真痛快㘞聲裂破九蓮叢千佛堂堂有此名居何國土化何生秀才一句能題破黃鶴樓前崔顥驚向上一宗無語句與人實法土難消何如喚惺沙盆破免教巫咸向外招語默誰能通不犯鷓鴣啼處百花新須知一句無私度把斷咽喉有要津從門入者未為奇迸出心師乃可師千聖不傳真命脈鰲山大叫不吾欺世界拈來如芥大雪峰打鼓普同看當央漆桶不能會鱉鼻山前天地翻試問春秋是幾多分明提示卻淆訛那知晝夜一百八賺殺韓公打破鍋六字通紅金彈子簉破威音劫外天三腳驢兒閒跳擲杖林山下漫揮鞭大好山中突出奇石屏巖上倚藤枝俄然一嘯千峰震東土西天笑展眉山上鯉魚海底塵三千樓閣五峰新杖頭正眼輕輕點雙徑家風指一輪靈山拈出這枝花眼底風流不可誇笑殺飲光能獨笑別傳萬古破風車酬和李夢白太宰四首一滴曹源是處生誰教枯木裏龍鳴玉鞭敲惺維摩默梁八原來親弟兄誰培大樹影森森睦老當年知此音一掌虎鬚曾捋得令人千載憶婆心正眼開來心不傳雞巢棲鳳雪連天西陵老子輕拈出賺卻他家漿水錢此來愁悴不勝衣傷盡春心不出幃添得蛾眉千古眼連環終可惜金椎贈埋菴禪師偈先後同參老壽昌知君氣宇久昂藏諸方踏遍山川別一杖攪來風月狂自憤有吾能作主何嫌無土莫稱王少林劍己心相許忍不斬新剖此光示寶方殿主朝朝暮暮打鐘鼓蒼天蒼天叫冤苦可惜夜來風雨中吹落閒花知幾許示張僧持立年剔起眉自看三十立何度特地叩靈山月圓正當戶寄示祁年超居士天章有密意曾未得通風間氣關千古可無責季公寄示祁文在居士不作傷心人須作快心事振起自家宗闢出他家路寄示葉配林居士決不便如此乃知別有奇遮些兒古怪千古亦驚疑問建安殿下疾西園花鳥弄陰晴示疾毘耶眼獨清古鏡不煩龍袖拂面如日月太分明寄贈通政張坤翁我既然遙遙拍手公必爾欣欣點頭人生秪有遮些子得來何處不風流聞曹山西阿祖塔有啟壙者見全身長可九尺頭大如斗黃金鎖子骨儼然未散乃驚而掩之今欲重新窣堵予乃寂祖三十二世嗣法孫又何敢辭其責然亦見住祖庭人之責也因賦此志感為之先聲云荷玉山中按劍人大唐國裏已橫身如今喜見頭顱在千古西阿句獨新腳下兒孫驚法乳是誰能續主中主祖庭塔上月光生三墮風高須薦取與李灌溪居士潛龍勿用神於九天地立心誰見首應笑青衫重七斤元來卻是蘇州有挽汪本和大康偈并引天都汪比部本和居士年七十七以家學兼得儒佛二宗之妙生平所作功業已多末於杖人笑峰處獨切施木建皋亭真歇祖剎以刻新集傳燈為自慰今己亥夏蛻然知時遺命而化不負吾法門真弟子矣淵源力究朝聞道仕宦猶勤出世鞭既撥博山關捩子還參諸宿棘蓬禪拚身入得虎跑窟拈草撐開真歇天獨喜傳燈能續命蛻然笑囑占機先卓庵成子天目掩關作此示之天目奇絕人能道天目險絕人能到獨是三個老古錐奇險無有人能效高峰死關真抵死斷崖命根真斷耳幻住真如幻術人誰能真似佗父子吾徒自視何骨力乃敢膽大與為敵嶄然據彼上頭關當使三老齊辟易果辟易天目奇險增百尺不辟易且在三老腳跟下仰取佗鼻息咄寄些菴郭天門遮些些是那些些疑殺趙州東院西壁上葫蘆口欲破那些些笑遮些些寄出泥尹洞庭天闕山中騎小驢翻身踏破古西湖俄於泥裏出頭看擦背金剛首肯無送劉開西撾毒子歸潯陽丈夫各有不甘事肯使幾希負古今石耳峰前機已密杖頭撾出毒尤深示滴投曾青藜不曾做到傷心處平地喫交徒自嚼憤極忽逢真毒手生平怨恨一時消光雪存子從徑山辭歸閩於慘殺中行乞葬親今來大平省杖人正搔著舊所痛處因作此示之我有考妣曾兩喪舉目無親空自葬打破靈床誰敢況搥胸蒼天成大於存子亦學汝師浪雙將父母俱勾當道個孝字真毀謗千古痛心秖此棒示觀濤奇子逝者如斯日下流其誰小鹿撞心頭驀然撞破疑團子撒手橫行笑不休示石波藏子欲知諸佛出身處須識東山水上行一句咬開空劫夢堂堂日午打三更傳藏子好參明莫教孤負此生平
