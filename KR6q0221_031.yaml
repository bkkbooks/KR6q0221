body:
  text: 門人大然弘智大中大權較雜紀浮華紀略浮山去桐且百里從江入則半之戊子春夢筆杖人從白門來竟至會聖巖掃塔而桐邑諸公皆不及會小子聞而從遊誠哉幸也遠公初於兵戈參葉縣後為太陽得青鷹一帶雙關高風仰止此杖人所以再三歎歟過華嚴寺惜其殿庫不稱巖嶂吳觀我太史恢復後無人續起草深丈二要自有其時待其人也金谷之巔若建一閣則合明柳峰黃華會公諸翠滴此湖中誠曠觀哉閲胡心澤公浮山志見鍾伯敬賞雷躍公乾坤怪未了天風醉花鳥杖人曰人從不見而見輒以為怪及乎知不自知遂如醉矣黑白未分前一著落在何處笑此棋盤怪耶醉耶過阮君洞阮霧靈公所題森舉記中於此寫寄憨公詩彼岸南雲千頃雪下方落日萬池金杖人曰上下一覷亦勿怪其醉也洞左野同巖方君靜廷尉筮同人於野而名之行窩方潛夫中丞題亞侯曰此中丞夢邵子而命宓山書者近編時論多以邵子發揮因問元會運世之旨杖人曰彼固信成住壞空而享其時義者人悟本空則穿過阿僧祗劫矣與時偕行豈復動其中乎忽有揭竿白雲巖者擾擾且至四衆獸駴杖人晏然以數語諭而感之攘攘者遂去救此名山祖庭始信定力之有用如此森迎杖人於黃華諸友相聚歎亂杖人曰此正天地之妙鉗鎚也遠公兵戈裏參學今日煆煉不更切乎霜雪剝落碩果之仁獨存是無生法忍也浮山棋盤著著皆是先著諸公正好自煉豈可蹉過森禮謝曰無生法忍感冬恩矣弟子大森方爾瞻記過樅陽記小龍中方寺迎杖人於浮山因過蛟臺抵天喜院院故漢壽侯祠舉侯日在天中之語喜而名之兆及謁杖人噓唏世故遂及畏匡絃歌天未喪文如後死何杖人有真性情真事業真文章數語語甚痛快兆及悲曰經生家此時安所用之杖人曰惡知此世界非沙汰汗漫無用之學然後事業出性情見而文章即性道乎士毋苦恨亂而悲憤也小雅之詩曰怨五至之終曰哀吾嘗謂莊生詆聖人斥王者何乃憤甚若知其心蓋傷而不傷怒而不怒者乎若離騷者又多乎哉哀樂無常每相反而相生二者之中主者為何物乎大學之草蛇灰線盡於好惡中庸之反復轆轤以節哀樂兩端用中本貞夫一曰藏恕曰先慎亦因是也亭午過望龍菴及故讀書此間大小龍山佳哉從杖人望之語三祖山漢武祀天柱代南嶽事三祖寺門有望嶽碑遊外以弘內曠觀瀟灑望而喜之固其寓也杖人曰五須彌在吾掌中誰能望之心有天遊遊即息也非靜正者不知也壁有龍眠圖因詢龍眠投子有遊天柱過投子之興焉杖人曰李伯時隱居龍眠曾為遠公蓮社圖是亦能天遊者又作陽關三疊送別圖有一釣翁持竿立水傍觀者盡忽不知乃李龍眠靜中隨手點化人處黃沙萬里蕭蕭馬鳴擾擾憂煎得毋為持竿人所笑及撫掌曰得靜旨矣燈下論國家治亂之故兩京殉難之士世人出處之情甚悉杖人曰邇靜正遠不禦信得及乎進退存亡死生大業莫逃於幾知幾先者其神乎及舉石齊易象正與家潛夫叔時論問焉杖人曰數數者非數而見乃謂之象此固一切見成者也神明者因觸幾焉時之為義大矣哉損益盈虛與時偕行變變不變在其中矣及問坤上爻杖人曰七日來復之幾也勿謂無龍陰退則陽至如戰慎獨之謂也野者人不見也陰陽生克而血脈流通乾生極必死故亢而姤坤死極必生故戰而復死生相循如環無端及曰猶未離其類也何以故杖人曰安見龍馬非一類乎復問亢龍杖人曰兩唯聖人一正為本知則貫矣時乘法位無用安排致命遂志過涉滅頂不可咎也從心即亢不踰矩即潛時哉素逝亢以為潛寧有悔耶客問何謂素逝杖人曰逝者如斯夫素其位而行色斯舉矣翔而後集上律天時六合之矩靜見幾先曾格此否知始知終而直下不失其正焉已矣中方迎者鵠立矣遂行題望龍曰古風菴桐城學人方兆及記漆園提素逝杖人握亢潛透過閒忙哀樂不易燧彌宇宙一際方圓消息隨時只在幾先爍破耳渙其躬而入水火善藏刀而無死地固曰風雨無鄉怨怒不及其實準飛集谷惟舉翔而知之滿地迷陽空歌衰鳳雉噫一曲至今龍吟此篇為蛟峰弟所記愚時避亂粵西也癸巳始炙杖人閉關高座點睛哭笑何世何出乙未奔喪廬墓重編時論亢潛兼中時感恩矣因覽蛟峰書而集之弘智謹識癸甲全提癸未除夜語問人於生死能蛻然者何修得之師曰能於生死蛻然者儒門大略亦有三種上焉者如朝聞道可以夕死彼能原始反終知生死之故通乎晝夜之道循環無端生本無生可生死本無死可死故幻身之生死不足以驚駭其無生死之心蛻然如逆旅傳舍主人一行一止總無憂懼也人不悟此本無生死之道即如三家村裏朴實頭漢自謂人生必有死先置棺木衣服臨死分付兒孫遺囑後事而去不為外物所纏惡疾所苦能蛻然無纍此亦善人之無冤業無欺害或平生正直剛決或布施念佛持經咒者之所能而生死幾微未明本心常住未悟亦未可為見道也中焉者如忠臣孝子義夫節婦知義理名分臣必死忠子必死孝夫必死義婦必死節知此忠孝節義四字亦自能死與日月爭光不必盡見道也如必見道始能死彼婦人未讀堯舜周公之書未參生死性命之道何以能死哉今有人讀聖賢之書參佛祖之道反不如愚夫愚婦之能死者彼為聰明心所使義理障所害私欲乘之如人參資於毒藥其毒愈甚其惑愈狂也下焉者如愚癡無知百姓偶然犯法囚獄禁錮求死不得或情真罪當甘死如歸或逼迫之極投水自縊又如刺客報仇荊軻聶政之輩或死於知己或死於俠氣或死於憤恨或死於恩愛此皆死於妄想顛倒未得死所尤不足以語見道也如朝廷邊塞之大臣大將死難者雖多死於義理者甚少是故君子喻於義不喻於利義則無心於是非榮辱得失利害之間利則有心於取捨趨避進退諱忌之內不特本心失其大義即本心之利亦竟失之矣即此三種生死世人尚認不清安望其能悟常住真心本無心意識之變異生死及四大色身之分段生死哉若欲了此常住真心本無生死非參究楞嚴經及唯識論諸經典決不知有了生死之法不參究禪宗更無直下了生死之心看經教只明得了生死之理參心性乃盡得了生死之心如不了心終是說食不飽說飛不超說水益乾說茶益渴何濟於實事乎然所言實事又非取於外貌名相惟能參悟此心本無容受生死之地而此心無所安寄無所依倚蓋一切衆生皆於無心可得之中了脫生死根本又於無心可得之中妄起生死根本了生死者但了其虛妄心之生死至真實心尚自無所安寄無有名相又何有一心為容受生死之地也人心果能了脫虛妄則幻身生死苦樂非其所計古亦有悟道知識臨終業病纏身苦痛難忍此但色身受苦彼真心無有生死苦樂也如人飲酒必醉向火必熱服毒必苦受割必痛豈如土木頑石之無知始為能了生死哉但當此際自能作主不受妄想流轉為可貴耳果能如此雖入刀山劍樹孰能昧滅其真知真見乎盤再拜曰千古生死之關可於此破矣師曰也須親自參透親自解脫始得不然說時似悟對境還迷也衆惕然一居士問曰某處一院主平日最真實凡開期場請法師待學者至誠盡敬護法僧衆無不讚仰忽一日遇知識點化自覺生死事大乃以庫房帳目始末查明留一字於房半夜遁去無處蹤跡奈何師曰是他平日能於事緣得爽利解脫故今日不與人商量超然徑去使他腳跟有一些點染牽絆則此時不能自去而人亦覓得著他矣正古人所謂超生死不相干之地了鬼神覷不破之機也諸居士亦嘗對人說我欲如何斬截妻子恩愛我欲如何擺脫世利情緣非所謂相逢盡道休官去林下何曾見一人乎我見善說者多不能自行善行者多不對人說蓋說時無行路行時無說心也使今日真參究性命者如此人不假商量卜度驀直參將去何道理情識能障其悟門哉居士問曰弟子欲求脫生死無出身之路何也師曰你問那僧如何便有出身之路世事如何不繫他不特此也如人見人欲死乃悲痛他欲死者亦自驚怖腳忙手亂不忍死去何異世人欲出門先捨不得家中恩愛欲上路又怕前途凶險是皆自心惑亂自心豈心外有法能惑亂人乎如果有家不可出有路不可行則此僧捨此院不得而人亦覓得著他矣如他恁麼脫手不顧而去可見生死識情皆自心妄想執著非真有生死識情能繫縛我之靈妙真心也居士曰如今世法之人皆為名利恩愛所牢籠非出世法何能解救師曰世間法牢籠粗出世法牢籠細如籠好鳥用竹絲籠瓦罐食固不解脫更用金絲籠玉罐食亦不解脫竹絲籠人輕賤他易破壞不甚牢金絲籠人珍重他難破壞更堅牢居士曰主人不肯打開籠自又不能撞破籠時如何師笑曰我有一戲論最痛快昔有一八哥能人言在籠中不能出忽聞人傳西來老達磨善救人迷情一日達磨經過八哥叫曰西來意西來意你教我箇出籠計達磨奇之即曰你要出籠計除是你腳逼直眼緊閉鳥大悟少頃主人來呼八哥八哥已僵死籠中矣主人大駭急開籠取置掌上對人悲嘆欲埋葬之㘞地一聲奮然飛去青霄之上叫曰西來意西來意謝你教我出籠計若非忍死吞聲這一場安得我絶後重蘇輒飛去居士謝曰和尚太煞慈悲救我如此我等不大死一場安能出生死牢籠可以人而不如鳥乎師曰公等天資奇拔如好鳥毛羽音聲令人可愛所以不求入人牢籠而人千謀百計必欲捉入牢籠也使諸公以愚魯自晦收神入心如死貓頭自無人著價何知希之可貴哉師曰公等有大根器直信千生萬劫只有這一件生死大事必須自參自悟自了自證決不假心外一法所能了脫則此生精神氣力決不可外用恐蹉誤卻我千生萬劫這生死大事也如今若不急急求真正師友結箇生死冤家拼此一生互相斬截了脫去則如彼惡友輩相牽相引落在坑阱裏何日能自跳出又何人能使他出哉郝荊子曰閻羅王拋下一件皮在地下有一鬼才動箇愛心其皮便捆在他身上變成那箇去了師曰凡天下人見功名富貴利欲恩愛文字道理知見玄妙機鋒公案才有一念貪著心便被他捆縛去被他轉變去本分風光卻昧滅也孰能超然出於生死又能入生死而度人出生死乎莊三求曰生死之事甚是難明師曰生死之念甚是難了凡一切衆生不為生念所生則為死念所死生念之類一切有念是也死念之類一切無念是也蓋生本無生死本無死惟佛祖能出衆生情識之妄生死故能以言句機鋒為殺刀活劍殺衆生之妄生使不為生念所生活衆生之妄死使不為死念所死所以逢生即殺逢死即活殺中有活活中有殺必須盡其生死之機始能超其殺活之用有時殺人刀即活人劍有時活人劍即殺人刀若不如此佛祖何以超出衆生之生死而衆生又何能自超於生死哉且道殺刀活劍只今在那箇所在諸公快須拔出始得莫教失落待人救拔卻難也甲申元日語問念佛法門亦可見性成佛乎師曰此當念喚醒主人公直指人心見性成佛之全提宗旨也參禪雖為直指悟入者難唯念佛乃真圓頓法古人指念佛為捷徑猶未盡其善捷徑雖異於曲路岐途未免從門外而入今主人現坐堂皇之上自呼自醒豈有舍元殿上之人更覓長安之捷路乎故吾以念佛即念心使常住真心圓明淨照不向外馳求則超出聖凡善惡是非大小偏圓諸對待之外矣今人不知自心念自佛強立西方許多名相轉使此心王向諸心所法上比量較計是令殿上帝王降階而與群臣黎庶較貴賤也是復令殿上帝王轉向士庶位中求科第進取而後再進王位也夫此內紹宗旨不繇臣僚功勳而入所謂諸三昧中之王三昧既謂之王三昧何可與心所法及諸名相六度萬行差別進修相比量哉今日無真念佛者皆主持蓮宗之人誤此心王之佛流落他鄉耳如主人在家中坐忽有客從外來呼主人在家否若真正主人合應曰你喚我作甚麼若此時自己作主不得卻向門外亂走客復呼曰主人你歸家來與你說話彼主人聞呼之急愈走遠去如人追賊相似愈呼愈趕不著且不計千山萬水拋家棄土去也又安得彼一念自悟主人元在家常住坐乎嗚呼大地衆生皆是昧自己主人棄家亂走者惟我彌阤慈父念此衆生如一子念念欲呼彼在家中住坐莫向外馳求也問拋家外走呼之不回要設何法令其歸耶師曰此喻甚妙人走在他鄉須歲月始得歸家而達磨云一念旋機還同本得信得及否衆生心迷如身睡床上夢馳萬里之外或見天堂之極樂或見地獄之極苦或見刀兵水火賊盜劫賊或迷妻子名利恩愛或於冤家業障罪犯臨身或於朝廷邊塞軍國大事不勝憂悲苦惱驚魂駭魄大叫救苦阿彌阤佛驚回大夢原來身子猶在床上雖則通身汗下亦不曾移寸步出故鄉也安可以他鄉實法會耶故曰念念呼醒夢中人自悟本無生死心今人睡熟沉酣不能自醒必須眷屬親友呼之推之錐之劄之伶俐人一呼便醒沉重者再加推呼若更睡死沉迷不免深錐痛劄入於骨髓而救之如果死而不返此一念佛心猶足為九轉還丹起死回生肉白骨而返靈魂惜乎千古之人不知念佛之靈驗如此雖佛祖廣長舌相無如之何矣吾三寸錐子亦將奈之何哉問曰念佛即是念心何不但令人念心為直指乎師曰衆生心多不淨正以妄想愛欲多牽入輪回生死此等妄想愛欲之心不是地獄心即是餓鬼心不是畜生心即是修羅心不是五逆十惡心即是貪瞋癡妒貢高我慢殺盜淫妄僭竊篡亂之心此心何可念哉世間最可念者父母有時照應不著或病患之至雖叫爺娘不能免其苦至若妻子恩愛兄弟朋友之好嬋娟玉帛珍寶車馬宮室土地乃至萬乘之尊極品之貴一旦生死禍患毫無能救返而求之最親莫若自己身手頭目耳鼻口舌互相愛護一朝目昏耳聾手攣腳痓咽哽舌結氣息不通則心志神魂皆顛倒迷亂而不能作主況身外之法何可念哉身外之法既不可念則心上之法如平日能文章能詩偈能說道理能經濟世事能明經教妙義能參公案機鋒及到一口氣不來時畢竟心思不及擬議不能惟有此念佛心自為主宰始得自繇自在超超乎聖凡善惡生死妄業之外豈非靈光獨耀迥脫根塵體露真常即如如佛乎或曰唯心淨土與參禪同發願往生又與參禪異歟師曰禪重在不離本體恐人心外取境故不言末而末自在本中念佛亦重在不離本體而兼言發願往生以資信力雖名為教乃圓頓最上乘諸三昧中之三昧王也如悉達太子投胎於淨梵王夫人腹中才生下地已是天上天下獨尊亦便是梵王太子父王之天下國家皆是太子所有何用如臣子從一科一第取功名爵位以至極品而後始有國土哉信此一念妙圓真心天然尊貴迥絶聖凡秪恐不是真佛種子不愁成佛不解說法非如諸小教修一功立一行斷一惑進一品漸積階梯而後到極地也問有至老念佛不輟未得直下成佛者何也師曰誦堯舜之言行堯舜之道則可謂堯舜矣讀聖人之書而行盜賊之事安能直下成聖人哉今有誦佛祖之言行衆生之行者有之未有發佛祖之心而行衆生之行者也如誦忠孝之言為賊盜之行者有之未有為忠孝之行而肯誦賊盜之言者也若人心起賊心雖莊嚴道場共作佛事一舉一動無非是賊若心是佛心雖入於盜賊之鄉混於異類之道一舉一動無非是佛是故聖賢亦只以自心之顧諟緝熙克己慎獨為盡心率性之妙道何曾外其心而取於聲音相貌乎念佛三昧法門獨取一心之純粹精如易之乾不見六龍之有首則純一統天乃見天則之不雜也是故阿彌陀佛在極樂為無量光在華嚴則是法界藏身之主中主於宗門則可以配天然尊貴還鄉盡是兒孫事祖父從來不出門而嘗寂光土清淨法身又何必極力推爺在裏頭耶五臺紀略李延壽隨左鶴巖吳燕公周開遠諸友同皈覺浪大師於五臺院遠近如堵師皆隨機開示諸子端拱緘默無能送難偶有拈周海門聖學宗傳問者師因云泰伯既入道統夷惠何以不入孟子稱夷惠以清和已有踐聖之階不以入録不知何所見而云然孔門諸賢顏曾貢夏思孟不待說而曾點漆雕開事不多見亦既入矣則仲弓閔子騫有若輩又安可不入耶因拈有子所云信而必取近義恭而必取近禮夫豈無味而收以因不失其親一句大有關係親者親切也大凡道理不到親切如何可宗從上先聖制禮樂皆因民最親切處乃是中和中節之學不觀下節孔子曰敏事慎言必就其言事之有道者正之如食無之求飽居無之求安與有道之是人是己此皆可以想見其因親二字之義孰謂有若不見道哉衆皆聳然曰師不獨開有子生面大有補宗傳之遺我輩不能讀書知人正為不親切耳仍有謁客至相與靜坐良久師詠杜詩落花游絲白日靜又拈欲覺聞晨鐘鶴巖問其意師云落花游絲非白日靜人何得具此冷眼發深省句妙在欲覺上非欲覺何能發深省如曾子無欲覺處即夫子呼之何能自唯哉鶴巖曰師解詩至此又為我輩發欲覺之晨鐘矣李子曰昨見師學庸宗旨妙義無窮從來惑格物致知四字師又引天生蒸民四句作證是則博我約我豈非無內無外無中間乎師曰格致者即明明德之無不在而在此下手也李子曰補格物章贅耶師曰誠意章毋自欺句正以好惡二者貞夫一也人能於心幾初動處如惡惡臭如好好色毫無自欺如此致知始是真知始是無妄蓋欺亦自欺也慊亦自慊也此自字豈非慎獨之意誠不可掩哉下節說小人閒居為不善見君子然後厭然知此厭然即是良知逼露自不可欺一提醒其良知使無所逃詎必十目十手之指視而後謂之嚴乎因此好惡徹上下左右前後之矩治己治人隨處見天則矣真正力行故曰良能正所以成此知之分量也德潤身心廣體胖不悟其本誠而能之乎鶴巖諸子云經生家平日循事境而忘自心今日披慎獨之幾微矣壽復問致中和一節師曰會得道也者三字麼壽曰不會師顧鶴巖曰既不會道為何物如何會中和致位育乎自陽明近溪諸公過去此脈遂衰山野不惜心力必欲扶起堯舜孔顏之心傳於天下後世抱斯志已久因無講求斯道者常覺伊人可懷今日諸公叩問是空谷足音矣試略拈之一部中庸大旨全在性道教三句性雖本自天命而實在人心之能率天命者是道此道若人人能率則何用教為因有不能率此天命之性者故聖人立此率性之教而為修道之宗旨也故教者教天下以當然之則也然不從修道來則異端曲學皆足以亂世故云率性然後謂之道性者天人合一之理也然不從天命來則可善可惡皆足以誣天故云天命然後謂之性率修者即率修此性中之道教也故次節直頂道說觀也者二字要人知得此道是率性而來者即此就是天命既認得是天命則如時行物生何須臾可離須知可離即非率性也道之發端不在睹聞而在不睹不聞此幾微處舉步一錯則千里萬里俱錯而戒懼又在不睹不聞之先所以說隱者見之幾微者顯之幾非有慎獨工夫向此睹聞聲色之絶待處省察何以成此率修而不失性之功用哉子思恐人落於有無兩邊故特拈出喜怒哀樂未發與發皆中節使人體認不是率情乃是率性性即是中率之即和中是天命之公正和是流行之無乖大本者是寂然不動之地達道者是感而遂通之途人果能致此中和必要在不睹不聞處以慎其獨而天地於此位萬物於此育矣又何更有無忌憚為自誤誤人之道哉須知此理不必別尋注腳只於本文逐章看去一一皆有印證諸公不信還請退而省其私亦足以發明杖人之學庸宗旨矣衆禮而退弟子大年李延壽謹紀大契曰生平不剖之疑甚多即如坑長平六十萬卒夫六十萬卒未必盡犯可死之罪而慘酷若此豈長平衆生之業報耶抑坑之者種毒自有毒發時耶師云當兩軍對壘之時存亡呼吸非彼即此得勝為強不勝者死雖有冤對然此中非如故殺者之利害也昔關公未嘗不斬將搴旗特以其義膽忠肝照耀古今就中生殺之機固有別耳如人誤傷一蟻穴百萬生靈與一人無故取一蟻殺之者其罪輕重何如所謂行一不義殺一不辜雖有天下不為者慎此殺機也此機弗動自然不殺無辜此機妄動自然殘害不顧是六十萬卒以動殺機而獲殺報也坑之者亦以動殺機而自種毒也大聖賢無死地固不為人所殺大奸雄惡貫未即滿亦不即為人所殺今無孔子微服過宋之幾先自居於福地又無曹瞞敬禮關公之智獲效於華容徒蠢蠢發機自作自受造化雖善亦無如之何矣師言未終而諸弟子當下生生之心油然以出即師亦以此問為可挽回殺運有足補世教云大全曰大慧語録有云天命之謂性清淨法身也率性之謂道圓滿報身也修道之謂教千百億化身也不識此等意義可以互相發明耶師曰此三配妙矣然且未盡今日詳言之可乎天命句是本來常住法身即正因佛性實相般若不屬修證而成者是也率性句是自性現量之德即了因佛性觀照般若不起染污之妄是也修道句是日用常行之事即緣因佛性文字般若不墮迷執之途是也蓋性學絶傳繼往開來全恃有教但所貴乎教者在於以修道教人耳諸子百家非不自云立教而刑名法術去道滋遠是自誤誤人也豈得謂之修道之教乎所謂道者何即率吾人固然之性是也率之而中其秩序之天則為君子中庸不修而以偏詞抹摋中節則為小人反中庸譬之太極盤中金針對合六十四卦皆安其位針若一差六十四卦盡移矣雖然群儒論性幾成聚訟故歸其原於天命而善惡并善惡混諸議總無參入處後章於穆不已便注此句於穆者即天也不已者即命也其言上天之載無聲無臭者即至誠是也常住真性原不斷絶即無息是也教以當然而歸於自然行乎歷然而信其天然三性即一性之本始也佛性即我性之靈覺也行無事必有事無然畔援無然欣羡何處容計較造作心哉如或紗縠請從此格大年曰中庸三句既窮極義理之精微矣別傳之明心見性敢望慈言一暢發之師曰且作幾箇圈圈可乎第一圈性第二圈心第三圈命第四圈身第五圈世性寂然不動妙淨圓明原無色相可名心為源頭之地源頭而善則生機流於命定慧見於身種種福緣便自成一善世界矣源頭而惡則殺機流於命凶殘見於身種種禍胎便自成一惡世界矣幾者靜動之微吉凶之先見者也譬之天子端拱未發念時是先天未兆也忽發念用某命為六部官是先天造命命已下則落後天之數也六部命下便各自盡其職業雖有兼才不敢代庖蓋此幾一慎良知惺惺便見自性即成佛矣若此幾不慎迷卻良知便不見自性即墮迷途矣是善者得福皆因心造必不能以惡人而代享善人之福也即有禍亦福也惡者得禍亦因心造必不能以善人而代罹惡人之禍也即有福亦禍也差之毫釐失之千里矣繫傳舉中孚言應違可弗慎乎夫物格知至者當處歷然當處寂然所謂先天後天大本差等斷非判若兩橛也猶執首上安首之綴旒乎哉直須神明其故處處見其則焉質俟不惑易不欺人明矣貴知有者自願窮盡總在各人自己格皆備之物見大公之性中隨時之節勿作口頭禪例聽過也少坐因作以示之衆復愕然師曰此處不能現前仍是口頭漉漉空過矣鑄鏡磨鏡如何可忽衆益惕然桐城弟子大全左國林謹紀
