body:
  text: 門人大然弘智大存大中較雜紀青山小述師謂今古文章之妙莫過於論語其旨趣幽微前人亦有所未發也語中有孔氏大知己者三人焉讀者能一一醉心否耶其一為儀封人封人不過一見面耳不交一語不設一問即出而咨嗟判斷尊之至極信之至深斷之至決以為吾夫子乃萬世師也何喪不喪之與有何有道無道之與有試觀木鐸二字今古以來論贊尼山者有過於此者乎是亦藉賞鑑夫子而自見於千古之上者也其二為達巷黨人贊曰大哉孔子博學無所成名只此兩語已畫出夫子全體全神即夫子聞之亦開顏微笑辭之不可受之不當而曰黨人愛我欲我成名乎人誰不欲名者但成名必有所執執御執射吾將擇而處此庶幾其御也矣於前篇贊歎居然隱躍照應其三為楚狂接輿他人亦有知尊孔子者而未有若斯人之稱之曰鳳也當時無知且有呼之為喪家之狗者矣而楚狂獨稱之曰鳳贊之曰德而惜之曰衰豈中根人見地所能勘出者乎孔子下車將欲與語而斯人已不可復見其鴻飛冥冥真可一想像也余問曰孔子下欲與之言假如接輿尚在將為夫子作一轉語其所言者是何言歟師亦微笑曰此正記者之妙不必蛇足也余曰惜此三人終不知其姓氏豈所謂猶龍者是其人歟師曰此又須知自夫子之木鐸一振天下而天下野無遺賢莫不皆乘機而起以附會於雲龍風虎之末如夫子不周流不問津不投宿不擊磬則晨門荷蕢丈人長沮桀溺微生畝之徒又何從得因夫子而自顯其奇得與於主賓迭唱之列而爭光千古也哉又有所謂南子者何物么魔亦欲一見夫子遂得附於周家有婦人焉之列此所謂聖作物睹三代之際於斯愈見其盛也師謂其為人也孝弟而好犯上者鮮矣若孝弟自不犯上作亂只應曰其為人也孝弟而犯上者鮮矣何必多一好字可見從來犯上之人必其自以為孝弟者也自以為孝弟而為其上者略有所不當遂悻悻然曰君父有過非我規正之諫諍之而誰歟從此生出好字而悖逆不道俱胎於此矣此蓋非真能孝弟者也真能孝弟者決不自以為孝弟者也舜惟不自以為孝弟故卒能使瞍象感化而後已此其所以為真孝弟而其仁不可勝用也師謂子使漆雕開仕誠試驗之也然見開於經世之事儘可優為之矣而開乃如夢忽驚自指此中一件大事未能相信得過夫子喜不自勝更不設是非不假贊歎而記者窺夫子之神情而記云子悅亦善於傳神也師謂夫子明知吾道不行而遑遑救世婆心決不能已惟恐及門之人念頭衰敗激發不起故提出子路來作機鋒猛然曰吾道不行吾當去而入海矣及門之人誰肯從我庶幾其由歟此時若不提出仲由則子路不喜子路不喜則及門之人有信不信夫子全神依然鈍置唯時子路既喜夫子遂急急以痛棒打轉曰是何人者歟是何人者歟其由歟此一勇無所取裁之人吾問子我豈浮海之人哉我豈浮海之人哉似將子路全體掀翻於千丈崖巔推落下地將一輩及門之士冰消瓦解而吾非斯人之徒之語不必再申打退鼓者於是乎不敢自息更憤發而興起矣此與前邊發語居然剌謬所謂有殺有活者是也師又謂亦有道理全然具在而不得一問則不出者且不得一至偏之問以至於無可對答之問其全神亦不出者如宰我從井短喪乃是宰我感慨發難之問正欲夫子正言直斥之此所謂善為說辭互為激揚也又如必不得已而去於斯三者何先則問在答中答在問中矣自此以下在他人必不敢再問而夫子亦何必再答耶乃子貢再窮而夫子正告然後知此一件大事自古及今有何生何死可以脫離即痛癢不關之人聞此可以通身汗下甚矣聖門問答甚於鐘鼓雷霆也師謂昔人有言以正治國以奇用兵吾以為天下之奇未有不出於正者用之自不測耳即如用兵必當以正治兵以奇取勝如堂堂正正三令五申七伐八伐四門六花孰有一件不由於正者惟教之以正之極而忽以奇而用之如九天之上九地之下此是不可擬議不可告誡而共取勝也如弄嬰兒於股掌之上蓋此處智不可傳也跡不可學也如背水井陘奪幟減灶火牛流馬等用略用其意無不萬全者非筆之所能述也豈特治兵以正即治國亦且有奇焉如高宗之於殷也一傳說為興殷之臣也然必知一世之人其心皆繫於傳說矣而幸有神奇之事曰夢帝求良云爾云爾也而後一出而成中興之盛如武之於周也一太公為興周之臣也然亦必知一世之人其心皆繫於太公矣而幸有神奇之事曰非熊非罷太公望子久矣云爾云爾也而後一出而成牧野之盛蓋聖帝明王取威定霸必先審一世之人心於其所注射之處而復繼之以神道設教之意而感之夢兆以使萬心皆如一心夫然後一舉百當行之而不疑也管仲之欲霸桓公也桓公田而管仲御見鬼焉公謂仲曰仲父何見曰臣無見也公反而不懌遂病齊士有皇子告敖者曰公則自傷鬼胡能以傷公公曰然則有鬼乎曰有水有罔象丘有崒山有夔野有方皇澤有委蛇公請問委蛇之狀皇子曰委蛇其大如轂其長如轅紫衣而朱冠其為物也惡聞雷車之聲則捧其首而立見之者殆乎霸桓公霍然而起輾然而笑曰此寡人之所見者也於是正衣冠不終日病去而日圖伯功卒以霸天下夫使見鬼之時問仲而仲亦云見則桓不病不病則皇子告敖之言奚以入而伯心奚以堅故夫皇子告敖之言安知非仲父之移桓公精神於圖伯之事陰用而不使之知者耶噫微矣師謂古今文章之士似與道德性命無甚關係然而往往有為乾坤吐氣若無此一筆便不能使千古英雄一段精光永永流傳於天地之間此誠所為不朽盛事非虛語也如太史公文章第一不必論論其傳項羽一段昔人謂高帝大風歌與霸王垓下歌各自寫出帝王興衰氣象蓋謂其語足並也余獨謂垓下是何等時虞姬死而子弟散匹馬逃亡身迷大澤此際亦何暇更作歌詞即有作亦誰聞之而誰記之歟吾謂此數語者無論其事之有無應是太史公筆補造化代為傳神首二句轟轟烈烈感憤千狀是造物之逼殺英雄直使風雲失色而天地無光後二句怨極悲極到此處饒他蓋世好漢至於無可奈何只有一悲憤以作結局耳此與下文天之亡我非戰之罪也一語正相映帶然後將英雄喪身失命時一段氣概譜出全神而文章之事亦可以不朽於天地之間矣細玩此語余讀史幾十年來未有拈解及此者可以使項將軍下拜亦可使龍門生叩首九原也師又曰吾猶怪文章之士嘗自逞其筆鋒所至不善為千古傳疑以為遺恨即如武王之取天下不過救民於水火之中原非敢懟其父而仇其君也既已克殷而紂衣其寶玉自焚而死則其事已畢矣而必曰左仗黃鉞右麾白旄斬紂頭懸之太白旗此是何語無論武王之聖必不忍為而太公周公以下多少聖臣肯陷君於過如此其甚者歟如以寶玉美女獻紂以出文王於羑里之類皆不仁者之不經也漢高滅楚猶封楚為魯公越勾踐勝吳欲赦夫差必三問之范蠡而後決以武王伐紂而不商之諸臣是周公太公不如范蠡而武王不如漢高與勾踐也太公於叩馬諫者猶曰義士扶而去之而甘心手刃於既死之共主是與鞭尸誣伍子胥等耳此不可信之太公周公而況於武王乎此事即有傳疑當一筆抹殺又如董公三老說沛公為義帝發喪一語此興漢第一等大義而遺之惜乎太史之不能也又如夫子臨歿而自稱曰泰山其頽梁木其萎此亦非聖人語以聖人生平無些子不退讓而臨終自謂泰山梁木抑何其陋也若此只可作門人慨歎傷感之語安得杜撰之謂是夫子自道吾故於文人之不能周旋有遺恨焉談詩次客謂太白絶句為唐一人某絶句為第一師不以為然也太白才高時有露處如但見淚痕濕不知心恨誰眼淚恨容滿面有何含畜可思何如玉階生白露夜久浸羅襪卻下水晶簾玲瓏望秋月二十字耶玉階露白旋生浸人則空庭獨立夜分已久直是徹骨冰冷形影無依不可攀援而四顧躊蹰只有明月在天耳一筆到底不寂寞而寂寞已甚不言悲怨而悲感凄怨極矣作詩者之神情原在詩外所以謂之仙人也老杜新婚別云妾身未分明何以拜姑嫜人俱一往看過余謂未分明三字寫出新婚未成人之狀多少艱難羞澀一篇精神此其頰上三毛乎妾薄命詩云墮地自生神是何意耶人以妾為人棄抑或季女斯饑怨薄命耳此詩若曰妾之薄命其在父母生我呱呱下地時若為男子則墮地自生神矣既為女子擲之地投之水弄之瓦妾之得此於父母懷中也已薄命矣如是觀之一語深入骨髓不可以色聲香味求也一日登山詠云此境可常住浮生自不能古今千態萬狀無限陸離而此以自不能三字寫之何等真率自然何等感慨痛恨詩骨高貴登臨曠懷無踰此者又詠云此境可常住浮生自不能師曰儒門有一怨字如大舜如怨如慕太甲之自怨自艾與詩之可以怨等乃禪家所謂疑情必欲求其故而不得也本初曰大疑大悟小疑小悟不疑不悟疑又豈易言哉今而後余于學道求己有入門矣師曰豫昔在一名邑與諸縉紳會茶方就坐偶有一老文學到來諸公皆起讓其座有一縉紳曰此吾老社友也惜乎讀書未成耳豫時不能放過乃顧之曰公將謂讀書已成也若但以得高爵厚祿即謂之讀書有成則曾子躬耕顏子陋巷皆是讀書未成也彼縉紳勃然變色甚不安豫曰公無傷也此舉世風俗如此豈獨公哉世人未生兒子時每向佛神前祈禱多生中舉中進士做尚書閣老兒子曾未有祈禱但生做聖做賢兒子及有兒子未展開書本未寫上大人時即相囑曰你好生讀書必須求連登科甲始得曾未有曰你好生讀書必須求格致誠正始得此所謂黃河向源頭上濁了也源頭上以作聖作賢為事則以能作聖作賢為讀書有成不以不能取連登科甲為讀書無成也復有一位曰大師痛快之極但太利害耳豫曰不利害則不痛快此吾所以不敢有負聖賢不敢有負你讀書君子不敢自負我是方外之人乃同于流俗也前縉紳亦轉為歡喜曰非大師不能出此語非學生不能當此語豫曰正惟公是其人故作此語相激揚耳此老文學忍喜不禁才辭出門逢人即大叫曰這個才是真大和上這個才是真出世人我等皆要真讀聖賢書更無以中舉中進士為念以自誤誤人誤天下國家也此和上之言人人皆知只是難得他於諸縉紳中出此痛快之言令人心悅而誠服也豫聞師敘及此不覺生大慚感生大痛恨恨早不聞此言如吹毛劍塗毒鼓能立地出人生死也世人只知以棒喝為棒喝說禪為說禪又誰知吾師一言一字棒盡天下人喝盡天下人誰聞此棒喝不汗下心死死而復蘇也哉噫聖人難遇固如是乎師曰昔在麻城與李孟白諸公聚談梅長公曰請問和上如此世界壞極人心壞極在佛菩薩以何慈悲方便而救濟之將來畢竟如何底止勿以機鋒見示幸明白一提醒之豫亦好笑乃以手作樣曰國初之時如一錠大圓寶相似梅公疾點首曰開口便就妙了快請教豫曰這一錠銀十成足色及斬碎來用卻塊塊是精底或人見其太好乃過一道爐火攙一分銅是九成了也九成銀尚可用再過第二手又攙一分銅是八成了及第三第四乃至第七第八手到如今只見得是精銅無銀子氣矣梅公曰然則如何處之豫曰如此則天厭之人亦厭之必須一併付與大爐火烹煉一番使那銅鉛鐵錫都銷盡了然後還他國初十成本色也梅公曰如此則造物須下毒手豫曰不下毒手則造物者不仁亦無功而天地之心皆亡矣梅公與李冢宰諸公相顧曰噫不知我輩還有能跳出此造化之爐錘否初曰聞下此爐正是冷水澆背師嘗曰天地古今無空闕之時無空闕之人無空闕之事無空闕之理惟聖人不違心而擇時不捨事而求理以天下之事是吾本分中事古今之時是吾當然之時所以處治處亂處吉處凶皆是心王游衍大中至正之道今人動以生不逢時權不在我為恨試問汝天當生何等時處汝方好天當付何等權與汝方足我說恨時恨權之人皆是不知自心之人故有悖天自負之恨又安知生生死死升升沈沈盡屬自己業力哉汝不知自心業力強弱不視自己種性福德智慧才力學行造詣機緣還得中正也無卻乃恨世恨時恨人恨事且道天生汝在世間所作何事分明分付許多好題目與汝汝無本事自不能成如庸醫不恨自己醫學不精卻恨世人生得病不好天應生何等好病獨留與汝醫成汝之功佛祖聖賢將許多好脈訣好藥性好良方好製法留下與汝汝自心粗不能審病診脈量藥裁方卻怪病不好治是豈神聖工巧之醫哉汝不能醫即當反求諸己精讀此書深造此道則自然神化也果能以誠仁信義勉強力行向上未有不造到佛祖聖賢地位向下未有不造到英雄豪傑地位今人果知有此則自不恨生不逢時權不在我與自為暴棄之人也二十年夢寐皈依覺浪杖人而未得一晤戊子六月始得領威音於靈寺從遊青山深自愧幸然恨生平不能有所見聞為印證地讀癸甲全提龍湖外録等篇有歡喜信受而已吾聞通天地人曰儒又聞知佛乃能知儒吾既未能捨儒而見道又安能捨佛而尊儒也本地風光未能省發而欲嗷嗷乞人以不識機用之棒喝即雷霆何益於聾而泰山奚益於瞽乎師通身是眼通體是膽彈指是法觸手皆圓三教九流處處指出本來活路即文章技藝頭頭點出現在妙明噫嚱真大統矣我輩無論學佛學儒而不聞師語恐亦水中撈月鏡裏尋花耳上堂法語自有記者余因隨其晨暮茶次隨筆録之或録未及全或全未及聞則以俟之同參留神於此者或因一言頓開心眼則千聖絶學賴有振起也毗陵弟子大音惲本初謹記余老歸空門粗涉教乘根器鈍劣了不知向上一著一時尊宿開堂豎拂都不參請自笑如城東老姥獨不見佛有目余不喜宗門作夜郎王倔強者不復置辨頷之而已今年孟夏會覺浪杖人於武林數年相聞握手一笑觀其眉宇疏疏落落如有一往冰雪之韻沁入人心腑間退而翻其書得其與吾友梅長公問畣一則杖人有烹煉銅銀造物須下毒手之語快讀一過殘燈明滅霍然如電光得路愈讀愈快亟呼自釀椹酒澆之乃就寢嗚呼長公不可作矣有情世界已經大火爐猛利烹煉神焦鬼爛邈然如昆明劫灰矣長公與杖人問畣尚在紙上如見鬚眉如聞嘆噫長公精靈男子目光如炬安知爾時不在天宮寶地中奮髯捋鬚與八十老人挑燈酹酒相春應和乎杖人又云古今事理無空闕時今人動恨生不逢時權不在我如醫不恨己學不精卻恨世病生得不好是豈知自心之人哉此一痛棒有人聞之言下不汗下心死死而不能復蘇者此則風痺不知痛癢與死人無異者也世人眼孔如針聞說睦州陳尊宿將一草鞋挂城門止巨寇之兵鄧隱峰擲錫空中解吳元濟兩軍之鬥口吐不能收以為都無此事我觀和尚此番提唱便可使大地平沉虛空粉碎睦州之鞋隱峰之錫便當從舌根筆尖上取次涌出始知懸崖撒手人實有此理實有此事非為現通非為表法人自看不到信不及耳余於杖人新刻諸書中信手拈出作為贈言或挂壁間或鑱木上使見者聞者身毛皆豎涕淚悲泣庶不負獅子一吼亦不負余與杖人覿面相對一片老婆心也或曰杖人囊拈宗教參同儒釋多文廣義浩如煙海今所舉者非其要也毋乃市兒之博輕金錢而重搏黍乎余曰善哉子之能發吾蒙也此義文長赴在來日戊戌夏海印弟子虞山蒙叟錢謙益槃談謹序何三省曰黃山谷最賞東坡沈著痛快張顛濡墨得之擔夫其為痛快世豈知耶惲道生寫杖人之痛快蒙叟又從而痛快之有同別否如其悠悠讀過不能死蘇一任世人看作擔夫爭道
